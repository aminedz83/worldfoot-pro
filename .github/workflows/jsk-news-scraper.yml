name: JSK News Scraper

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run scraper
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python3 - <<PYEOF
          import requests
          from bs4 import BeautifulSoup
          import os
          from datetime import datetime
          import time

          SB_URL = "https://iqeqlsxjiklygywjirqs.supabase.co"
          SB_KEY = os.environ["SUPABASE_KEY"]
          HEADERS = {"User-Agent": "Mozilla/5.0"}

          SB_HEADERS = {
              "apikey": SB_KEY,
              "Authorization": "Bearer " + SB_KEY,
              "Content-Type": "application/json",
              "Prefer": "resolution=ignore-duplicates"
          }

          RSS_URL = "https://news.google.com/rss/search?q=JS+Kabylie&hl=fr&gl=DZ&ceid=DZ:fr"

          r = requests.get(RSS_URL, headers=HEADERS, timeout=15)
          soup = BeautifulSoup(r.text, "lxml-xml")
          items = soup.find_all("item")[:15]
          print(f"Found {len(items)} articles")

          for item in items:
              try:
                  title = item.find("title").text.strip()
                  link = item.find("link").text.strip() if item.find("link") else ""
                  pub_date = item.find("pubDate").text if item.find("pubDate") else ""
                  source = item.find("source").text if item.find("source") else "Google News"

                  published_at = datetime.now().isoformat()
                  if pub_date:
                      try:
                          published_at = datetime.strptime(pub_date, "%a, %d %b %Y %H:%M:%S %Z").isoformat()
                      except:
                          pass

                  res = requests.post(
                      f"{SB_URL}/rest/v1/jsk_articles",
                      headers=SB_HEADERS,
                      json={
                          "title": title,
                          "link": link,
                          "image": None,
                          "source": source,
                          "published_at": published_at
                      }
                  )
                  print(f"OK: {title[:40]} -> {res.status_code}")
                  time.sleep(1)

              except Exception as e:
                  print(f"Error: {e}")
          PYEOF
