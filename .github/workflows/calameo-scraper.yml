name: Competition Une Scraper

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Run Apify scraper
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          pip install requests --quiet

          python3 - <<PYEOF
          import requests
          import os
          import time
          from datetime import datetime

          APIFY_TOKEN = os.environ["APIFY_TOKEN"]
          SUPABASE_KEY = os.environ["SUPABASE_KEY"]
          SB_URL = "https://iqeqlsxjiklygywjirqs.supabase.co"

          SB_HEADERS = {
              "apikey": SUPABASE_KEY,
              "Authorization": "Bearer " + SUPABASE_KEY,
              "Content-Type": "application/json",
              "Prefer": "resolution=merge-duplicates"
          }

          KEYWORDS = ["la une", "competition du", "compétition du", "edition du", "une de"]

          run = requests.post(
              f"https://api.apify.com/v2/acts/apify~facebook-posts-scraper/runs?token={APIFY_TOKEN}",
              json={
                  "startUrls": [{"url": "https://www.facebook.com/competitionalgerie"}],
                  "resultsLimit": 20
              }
          ).json()

          run_id = run["data"]["id"]
          print(f"Run ID: {run_id}")

          for _ in range(24):
              time.sleep(10)
              status = requests.get(
                  f"https://api.apify.com/v2/actor-runs/{run_id}?token={APIFY_TOKEN}"
              ).json()["data"]["status"]
              print(f"Status: {status}")
              if status == "SUCCEEDED":
                  break

          items = requests.get(
              f"https://api.apify.com/v2/actor-runs/{run_id}/dataset/items?token={APIFY_TOKEN}"
          ).json()

          print(f"Posts: {len(items)}")

          for item in items:
              text = (item.get("text") or "").lower()
              if not any(k in text for k in KEYWORDS):
                  continue

              image = None
              if item.get("photo_image"):
                  image = item["photo_image"].get("uri")
              elif item.get("media") and len(item["media"]) > 0:
                  image = item["media"][0].get("thumbnail")

              if not image:
                  continue

              url = item.get("url") or item.get("postUrl") or ""
              published_at = item.get("time") or datetime.now().isoformat()

              res = requests.post(
                  f"{SB_URL}/rest/v1/competition_une",
                  headers=SB_HEADERS,
                  json={
                      "title": "La Une · Compétition",
                      "image_url": image,
                      "facebook_url": url,
                      "published_at": published_at
                  }
              )
              print(f"Saved: {res.status_code} - {image[:50]}")
              break
          PYEOF
