name: Calameo Scraper

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 supabase

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python3 - <<PYEOF
          import requests
          from bs4 import BeautifulSoup
          from supabase import create_client
          import os
          from datetime import datetime
          CALAMEO_URL = "https://fr.calameo.com/accounts/008156103"
          HEADERS = {"User-Agent": "Mozilla/5.0"}
          sb = create_client(os.environ["SUPABASE_URL"], os.environ["SUPABASE_KEY"])
          r = requests.get(CALAMEO_URL, headers=HEADERS, timeout=15)
          soup = BeautifulSoup(r.text, "html.parser")
          books = soup.select("article, .book, li.item")[:10]
          print(f"Found {len(books)} items")
          for book in books:
              try:
                  link = book.find("a", href=True)
                  img = book.find("img")
                  title_el = book.find(["h2","h3","h4","span"])
                  if not link: continue
                  href = link["href"]
                  pdf_url = "https://fr.calameo.com" + href if href.startswith("/") else href
                  image_url = img.get("src") or img.get("data-src") if img else None
                  title = title_el.get_text(strip=True) if title_el else "Edition du jour"
                  sb.table("competition_une").upsert({"title": title, "image_url": image_url, "pdf_url": pdf_url, "published_at": datetime.now().isoformat()}, on_conflict="pdf_url").execute()
                  print(f"OK: {title}")
              except Exception as e:
                  print(f"Error: {e}")
          PYEOF
