name: Competition Une Scraper

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          APIFY_KEY: ${{ secrets.APIFY_KEY }}
        run: |
          python3 - <<PYEOF
          import requests
          import os
          from datetime import datetime
          import time

          APIFY_KEY = os.environ["APIFY_KEY"]
          SB_URL = os.environ["SUPABASE_URL"]
          SB_KEY = os.environ["SUPABASE_KEY"]
          BUCKET = "competition-une"

          SB_HEADERS = {
              "apikey": SB_KEY,
              "Authorization": "Bearer " + SB_KEY,
              "Content-Type": "application/json",
              "Prefer": "resolution=ignore-duplicates"
          }

          # Lancer Apify
          run = requests.post(
              "https://api.apify.com/v2/acts/apify~facebook-posts-scraper/runs",
              headers={"Authorization": f"Bearer {APIFY_KEY}"},
              json={
                  "startUrls": [{"url": "https://www.facebook.com/competitionalgerie"}],
                  "resultsLimit": 5
              }
          ).json()

          run_id = run["data"]["id"]
          print(f"Run ID: {run_id}")

          # Attendre fin
          for i in range(20):
              time.sleep(15)
              status = requests.get(
                  f"https://api.apify.com/v2/actor-runs/{run_id}",
                  headers={"Authorization": f"Bearer {APIFY_KEY}"}
              ).json()["data"]["status"]
              print(f"Status: {status}")
              if status == "SUCCEEDED":
                  break

          # Récupérer posts
          items = requests.get(
              f"https://api.apify.com/v2/actor-runs/{run_id}/dataset/items",
              headers={"Authorization": f"Bearer {APIFY_KEY}"}
          ).json()

          print(f"Found {len(items)} posts")

          for post in items:
              try:
                  media = post.get("media", [])
                  image_temp_url = media[0].get("url") if media else None
                  facebook_url = post.get("url", "")
                  title = post.get("text", "")[:100] or "Edition du jour"
                  published_at = post.get("time", datetime.now().isoformat())

                  if not image_temp_url:
                      print(f"Skip - no image: {title[:30]}")
                      continue

                  # Télécharger image
                  img_response = requests.get(image_temp_url, timeout=15)
                  if not img_response.ok:
                      print(f"Skip - image download failed: {img_response.status_code}")
                      continue

                  # Nom fichier unique basé sur facebook_url
                  file_name = facebook_url.split("/")[-1].split("?")[0] or str(int(time.time()))
                  file_name = f"{file_name}.jpg"

                  # Upload dans Supabase Storage
                  upload = requests.post(
                      f"{SB_URL}/storage/v1/object/{BUCKET}/{file_name}",
                      headers={
                          "apikey": SB_KEY,
                          "Authorization": "Bearer " + SB_KEY,
                          "Content-Type": "image/jpeg",
                          "x-upsert": "true"
                      },
                      data=img_response.content
                  )
                  print(f"Upload: {upload.status_code}")

                  # URL permanente
                  permanent_url = f"{SB_URL}/storage/v1/object/public/{BUCKET}/{file_name}"

                  # Insérer dans Supabase
                  res = requests.post(
                      f"{SB_URL}/rest/v1/competition_une",
                      headers=SB_HEADERS,
                      json={
                          "title": title,
                          "image_url": permanent_url,
                          "facebook_url": facebook_url,
                          "published_at": published_at
                      }
                  )
                  print(f"OK: {title[:40]} -> {res.status_code}")

              except Exception as e:
                  print(f"Error: {e}")
          PYEOF
