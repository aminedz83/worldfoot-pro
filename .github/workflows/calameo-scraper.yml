name: Competition Une Scraper

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          APIFY_KEY: ${{ secrets.APIFY_KEY }}
        run: |
          python3 - <<PYEOF
          import requests
          import os
          from datetime import datetime

          APIFY_KEY = os.environ["APIFY_KEY"]
          SB_URL = os.environ["SUPABASE_URL"]
          SB_KEY = os.environ["SUPABASE_KEY"]

          # Lancer le scraper Apify
          run = requests.post(
              "https://api.apify.com/v2/acts/apify~facebook-posts-scraper/runs",
              headers={"Authorization": f"Bearer {APIFY_KEY}"},
              json={
                  "startUrls": [{"url": "https://www.facebook.com/competitionalgerie"}],
                  "resultsLimit": 5
              }
          ).json()

          run_id = run["data"]["id"]
          print(f"Run ID: {run_id}")

          # Attendre la fin
          import time
          for i in range(20):
              time.sleep(15)
              status = requests.get(
                  f"https://api.apify.com/v2/actor-runs/{run_id}",
                  headers={"Authorization": f"Bearer {APIFY_KEY}"}
              ).json()["data"]["status"]
              print(f"Status: {status}")
              if status == "SUCCEEDED":
                  break

          # Récupérer les résultats
          items = requests.get(
              f"https://api.apify.com/v2/actor-runs/{run_id}/dataset/items",
              headers={"Authorization": f"Bearer {APIFY_KEY}"}
          ).json()

          print(f"Found {len(items)} posts")

          for post in items:
              try:
                  image_url = post.get("media", [{}])[0].get("url") if post.get("media") else None
                  facebook_url = post.get("url", "")
                  title = post.get("text", "")[:100] or "Edition du jour"
                  published_at = post.get("time", datetime.now().isoformat())

                  if not image_url:
                      continue

                  res = requests.post(
                      f"{SB_URL}/rest/v1/competition_une",
                      headers={
                          "apikey": SB_KEY,
                          "Authorization": f"Bearer {SB_KEY}",
                          "Content-Type": "application/json",
                          "Prefer": "resolution=ignore-duplicates"
                      },
                      json={
                          "title": title,
                          "image_url": image_url,
                          "pdf_url": facebook_url,
                          "published_at": published_at
                      }
                  )
                  print(f"OK: {title} -> {res.status_code}")
              except Exception as e:
                  print(f"Error: {e}")
          PYEOF
