// Service Worker avec support notifications
if('serviceWorker' in navigator){
  const sw=`
    const C='wf-pro-v8';
    self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(['./'])).then(()=>self.skipWaiting()));});
    self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))).then(()=>self.clients.claim()));});
    self.addEventListener('push',e=>{
      const d=e.data?.json()||{};
      e.waitUntil(self.registration.showNotification(d.title||'WorldFoot Pro',{
        body:d.body||'',

        tag:d.tag||'wf',
        vibrate:[200,100,200],
        data:d.data||{},
      }));
    });
    self.addEventListener('notificationclick',e=>{e.notification.close();e.waitUntil(clients.openWindow('./'));});
    self.addEventListener('fetch',e=>{
      const u=e.request.url;
      if(u.includes('api-sports.io')){e.respondWith(fetch(e.request).catch(()=>new Response('{"errors":{"net":"offline"}}',{headers:{'Content-Type':'application/json'}})));return;}

    });

const _cache=new Map();
let _apiCallsToday=parseInt(localStorage.getItem('wf_api_calls_'+new Date().toDateString())||'0');
let _apiCallsDate=new Date().toDateString();
function _trackApiCall(){
  const today=new Date().toDateString();
  if(today!==_apiCallsDate){_apiCallsToday=0;_apiCallsDate=today;}
  _apiCallsToday++;
  try{localStorage.setItem('wf_api_calls_'+today,_apiCallsToday);}catch(e){}
}

async function api(path,ttl=15000,signal=null){
  const now=Date.now();
  if(_cache.has(path)&&now-_cache.get(path).t<ttl) return _cache.get(path).d;
  _trackApiCall();
  const r=await fetch(BASE+path,{headers:{"x-apisports-key":API_KEY},signal});
  if(!r.ok) throw new Error(`Erreur HTTP ${r.status}`);
  const j=await r.json();
  if(j.errors&&Object.keys(j.errors).length){
    const msg=Object.values(j.errors)[0];
    throw new Error(typeof msg==="string"?msg:"Erreur API");
  }
  const d=j.response??[];
  _cache.set(path,{d,t:now});
  return d;
}

function useMinute(elapsed,status){
  const[m,setM]=useState(elapsed??0);
  useEffect(()=>{
    setM(elapsed??0);
    if(!LIVE_ST.has(status))return;
    const id=setInterval(()=>setM(v=>{const c=(status==="2H"||status==="ET")?96:47;return v<c?v+1:v;}),60000);
    return()=>clearInterval(id);
  },[elapsed,status]);
  return m;
}
function useFlash(hg,ag){
  const prev=useRef({h:null,a:null}),[on,setOn]=useState(false);
  useEffect(()=>{
    const p=prev.current;prev.current={h:hg,a:ag};
    if(p.h!==null&&(hg>p.h||ag>p.a)){setOn(true);const t=setTimeout(()=>setOn(false),4000);return()=>clearTimeout(t);}
  },[hg,ag]);
  return on;
}

function Pitch({lineup,isHome}){

  const rows=[1,...form];let idx=0;
  const grid=rows.map(n=>{const r=[];for(let i=0;i<n&&idx<pts.length;i++)r.push(pts[idx++]);return r;});
  const W=260,H=178,rc=grid.length,tc=isHome?T.red:T.blueB;
  return<svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:"block"}}>

    <circle cx={W/2} cy={H/2} r={22} fill="none" stroke="rgba(255,255,255,.07)" strokeWidth={1}/>
    <circle cx={W/2} cy={H/2} r={2} fill="rgba(255,255,255,.14)"/>
    {isHome
      ?<><rect x={7} y={H/2-27} width={38} height={54} fill="none" stroke="rgba(26,29,35,.08)" strokeWidth={1}/><rect x={7} y={H/2-13} width={16} height={26} fill="none" stroke="rgba(255,255,255,.07)" strokeWidth={1}/></>
      :<><rect x={W-45} y={H/2-27} width={38} height={54} fill="none" stroke="rgba(26,29,35,.08)" strokeWidth={1}/><rect x={W-23} y={H/2-13} width={16} height={26} fill="none" stroke="rgba(255,255,255,.07)" strokeWidth={1}/></>}
    {grid.map((row,ri)=>{
      const x=isHome?16+(ri/(rc-1||1))*(W-32):W-16-(ri/(rc-1||1))*(W-32);

}

// MODULE BLESS S / SUSPENDUS (endpoint Pro)

//
// COMPOSANT ANALYSE   Statistiques avanc es H2H

function AnalysePanel({h2h,homeTeam,awayTeam,hSt=[],aSt=[],homeHistory=[],awayHistory=[]}){
  if(!h2h||h2h.length===0)return<div style={{textAlign:"center",padding:"44px 20px",color:T.t3,fontSize:13}}>Pas assez de donnÃ©es H2H</div>;

  const hid=homeTeam.id;

  // âââââââââââââââââââââââââââââââââââââââââââââââ
  // MOTEUR DE CALCUL INTELLIGENT
  // âââââââââââââââââââââââââââââââââââââââââââââââ

  // ââ Analyse H2H ââ
  const h2hStats=(()=>{
    let hW=0,aW=0,draws=0;
    let over05=0,over15=0,over25=0,over35=0,over45=0;
    let btts=0,hCS=0,aCS=0;
    let hFirst=0,aFirst=0,noFirst=0;
    let totalGoals=0,hGoalsTotal=0,aGoalsTotal=0;
    let last5=[],last5H=0,last5A=0,last5D=0;

    h2h.forEach((m,i)=>{
      const isHome=m.teams.home.id===hid;
      const mg=m.goals.home??0,ag=m.goals.away??0;
      const hGoals=isHome?mg:ag, aGoals=isHome?ag:mg;
      const tot=hGoals+aGoals;
      totalGoals+=tot;
      hGoalsTotal+=hGoals;
      aGoalsTotal+=aGoals;
      if(hGoals>aGoals){hW++;if(i<5)last5H++;}
      else if(aGoals>hGoals){aW++;if(i<5)last5A++;}
      else{draws++;if(i<5)last5D++;}
      if(tot>0.5)over05++;
      if(tot>1.5)over15++;
      if(tot>2.5)over25++;
      if(tot>3.5)over35++;
      if(tot>4.5)over45++;
      if(hGoals>0&&aGoals>0)btts++;
      if(aGoals===0)hCS++;
      if(hGoals===0)aCS++;
      if(hGoals>0&&aGoals===0)hFirst++;
      else if(aGoals>0&&hGoals===0)aFirst++;
      else if(hGoals===0&&aGoals===0)noFirst++;
      else{hFirst+=0.5;aFirst+=0.5;}
      last5.push({hGoals,aGoals,tot});
    });

    const n=h2h.length;
    const avgGoals=totalGoals/n;
    const avgH=hGoalsTotal/n;
    const avgA=aGoalsTotal/n;

    // Tendance sur les 5 derniers vs globale
    const last5n=Math.min(5,n);
    const last5avg=last5.slice(0,last5n).reduce((s,m)=>s+m.tot,0)/last5n;
    const trendUp=last5avg>avgGoals+0.3;
    const trendDown=last5avg<avgGoals-0.3;

    return{hW,aW,draws,n,over05,over15,over25,over35,over45,btts,hCS,aCS,
           hFirst,aFirst,noFirst,avgGoals,avgH,avgA,
           last5,last5H,last5A,last5D,last5avg,trendUp,trendDown,
           pct:(x)=>Math.round(x/n*100)};
  })();

  // ââ Analyse Ã©quipe (depuis historique rÃ©cent si dispo, sinon H2H) ââ
  const analyseTeam=(history,teamGoals,concededGoals,n)=>{
    // Force d'attaque = buts marquÃ©s / match
    const atk=teamGoals/n;
    // Force dÃ©fensive = buts concÃ©dÃ©s / match (moins c'est mieux)
    const def=concededGoals/n;
    // Clean sheets %
    const cs_pct=history.filter?.(m=>m.conceded===0).length/n*100 ?? 0;
    // Rating attaque 0-10
    const atkRating=Math.min(10,atk*2.5);
    // Rating dÃ©fense 0-10 (inverser: moins de buts concÃ©dÃ©s = meilleure dÃ©fense)
    const defRating=Math.min(10,Math.max(0,10-(def*3)));
    // Ãquilibre = diffÃ©rence entre atk et def
    const balance=atkRating-defRating;
    const profile=balance>2?"ð¡ï¸ Offensif":balance<-2?"ð¡ï¸ DÃ©fensif":"âï¸ ÃquilibrÃ©";
    const overall=(atkRating+defRating)/2;
    return{atk:atk.toFixed(2),def:def.toFixed(2),atkRating,defRating,overall,profile,balance};
  };

  const hProfile=analyseTeam(homeHistory,h2hStats.avgH,h2hStats.avgA,h2hStats.n);
  const aProfile=analyseTeam(awayHistory,h2hStats.avgA,h2hStats.avgH,h2hStats.n);

  // ââ Score de probabilitÃ© intelligent ââ
  const calcProba=(()=>{
    // Base: rÃ©sultats H2H pondÃ©rÃ©s (rÃ©cents = plus de poids)
    let hScore=0,aScore=0,dScore=0;
    h2h.forEach((m,i)=>{
      const w=Math.max(1,h2h.length-i); // poids dÃ©croissant
      const isHome=m.teams.home.id===hid;
      const hG=isHome?m.goals.home??0:m.goals.away??0;
      const aG=isHome?m.goals.away??0:m.goals.home??0;
      if(hG>aG)hScore+=w;
      else if(aG>hG)aScore+=w;
      else dScore+=w;
    });
    const total=hScore+aScore+dScore||1;
    let hp=hScore/total,ap=aScore/total,dp=dScore/total;

    // Ajustement par profil attaque/dÃ©fense
    const atkAdj=(hProfile.atkRating-aProfile.defRating)*0.02;
    const defAdj=(aProfile.atkRating-hProfile.defRating)*0.02;
    hp=Math.max(0.05,hp+atkAdj);
    ap=Math.max(0.05,ap+defAdj);
    dp=Math.max(0.05,1-hp-ap);

    // Normaliser
    const s=hp+ap+dp;
    hp=hp/s;ap=ap/s;dp=dp/s;

    // PrÃ©diction Over/Under basÃ©e sur profil + H2H
    const expGoals=(hProfile.atk*1+aProfile.atk*1+h2hStats.avgGoals)/3;
    const ou25=h2hStats.pct(h2hStats.over25);
    const ou15=h2hStats.pct(h2hStats.over15);
    const ou35=h2hStats.pct(h2hStats.over35);

    // Confiance = plus on a de matchs, plus c'est fiable
    const confidence=Math.min(100,h2hStats.n*10);

    return{hp:Math.round(hp*100),ap:Math.round(ap*100),dp:Math.round(dp*100),
           expGoals:expGoals.toFixed(1),ou25,ou15,ou35,confidence};
  })();

  // ââ xG depuis stats live ââ

  const[detail,setDet]=useState(null),[q,setQ]=useState(""),[lg,setLg]=useState(null),[favOnly,setFO]=useState(false);
  const[picker,setPicker]=useState(false),[cd,setCd]=useState(15),[spin,setSpin]=useState(false);
  const stripRef=useRef(null),timerRef=useRef(null),cdRef=useRef(null),loadRef=useRef(null);
  const isToday=date===today();

  // hasLive stable via useMemo   safe pour useEffect deps
  const hasLive=useMemo(()=>data.some(f=>LIVE_ST.has(f?.fixture?.status?.short)),[data]);
  const liveInterval=15;

  const load=useCallback(async(silent=false)=>{
    if(!silent){setSt("load");setErr("");}else setSpin(true);
    try{
      const d=await api(`/fixtures?date=${date}&timezone=Europe/Paris`,15000);
      setData(d);
      if(!silent)setSt("ok");
    }
    catch(e){if(!silent){setSt("err");setErr(e.message);}}
    finally{if(silent)setSpin(false);}
  },[date]);

  useEffect(()=>{loadRef.current=load;},[load]);
  useEffect(()=>{
    const ctrl=new AbortController();
    setData([]);
    load(false,ctrl.signal);
    return()=>ctrl.abort();
  },[load]);

  // Timer adaptatif selon nb matchs live â Ã©conomie quota
  const liveCount=useMemo(()=>data.filter(f=>LIVE_ST.has(f?.fixture?.status?.short)).length,[data]);
  const adaptiveInterval=liveCount>=4?15:liveCount>=1?30:60; // 15s/30s/60s

  useEffect(()=>{
    clearInterval(timerRef.current);clearInterval(cdRef.current);
    if(!isToday){setCd(null);return;}
    const iv=adaptiveInterval;
    setCd(iv);
    timerRef.current=setInterval(()=>loadRef.current(true),iv*1000);
    cdRef.current=setInterval(()=>setCd(c=>c<=1?iv:c-1),1000);
    return()=>{clearInterval(timerRef.current);clearInterval(cdRef.current);};
  },[date,isToday,adaptiveInterval]);
  useEffect(()=>{const t=setTimeout(()=>stripRef.current?.querySelector("[data-td='1']")?.scrollIntoView({inline:"center",block:"nearest"}),80);return()=>clearTimeout(t);},[]);

  const openMatch=useCallback(async id=>{
    if(openMatch._ctrl) openMatch._ctrl.abort();
    openMatch._ctrl=new AbortController();
    const sig=openMatch._ctrl.signal;

    // Phase 1 â Affichage IMMÃDIAT depuis cache si dispo
    const cached=_cache.get(`/fixtures?id=${id}`);
    const cachedFix=cached?.d?.[0]??null;
    if(cachedFix){
      setDet({partial:true,data:{fixture:cachedFix,stats:[],events:[],lineups:[],players:[],h2h:[],injuries:[]}});
    } else {
      setDet({loading:true});
    }

    try{
      // Cache adaptatif selon statut match
      const sh=cachedFix?.fixture?.status?.short??"NS";
      const isLive=LIVE_ST.has(sh);
      const isDone=DONE_ST.has(sh);
      const matchTTL=isLive?15000:isDone?10800000:21600000;
      const detailTTL=isLive?15000:isDone?10800000:3600000;

      const fx=await api(`/fixtures?id=${id}`,matchTTL,sig);
      const fix=fx[0];if(!fix)throw new Error("Match introuvable");
      const started=!NS_ST.has(fix.fixture.status.short);
      const hid=fix.teams.home.id,aid=fix.teams.away.id,fid=fix.fixture.id;

      // Phase 2 â Events + Stats en premier (plus utiles visuellement)
      const[evts,stats]=await Promise.all([
        started?api(`/fixtures/events?fixture=${fid}`,detailTTL,sig).catch(()=>[]):Promise.resolve([]),
        started?api(`/fixtures/statistics?fixture=${fid}`,detailTTL,sig).catch(()=>[]):Promise.resolve([]),
      ]);
      setDet(prev=>({...prev,partial:true,data:{...prev?.data,fixture:fix,stats,events:evts}}));

      // Phase 3 â Lineups + Players + H2H + Injuries (secondaire)
      const[lineups,plrs,h2h,injuries]=await Promise.all([
        api(`/fixtures/lineups?fixture=${fid}`,detailTTL,sig).catch(()=>[]),
        started?api(`/fixtures/players?fixture=${fid}`,detailTTL,sig).catch(()=>[]):Promise.resolve([]),
        api(`/fixtures/headtohead?h2h=${hid}-${aid}&last=50`,86400000,sig).catch(()=>[]),
        api(`/injuries?fixture=${fid}`,isDone?10800000:3600000,sig).catch(()=>[]),
      ]);
      setDet({data:{fixture:fix,stats,events:evts,lineups,players:plrs,h2h,injuries}});
    }catch(e){if(e.name!=="AbortError")setDet({error:e.message});}
  },[]);

  const groups=useMemo(()=>{
    let list=data;
    if(lg)list=list.filter(f=>f.league.id===lg);
    if(q.trim()){const s=q.toLowerCase();list=list.filter(f=>f.teams.home.name.toLowerCase().includes(s)||f.teams.away.name.toLowerCase().includes(s)||f.league.name.toLowerCase().includes(s));}
    if(favOnly)list=list.filter(f=>favs.has(f.fixture.id));
    const map={};
    list.forEach(f=>{if(!map[f.league.id])map[f.league.id]={lg:f.league,matches:[]};map[f.league.id].matches.push(f);});
    return Object.values(map).sort((a,b)=>{
      const al=a.matches.some(m=>LIVE_ST.has(m.fixture.status.short))?1:0,bl=b.matches.some(m=>LIVE_ST.has(m.fixture.status.short))?1:0;
      if(al!==bl)return bl-al;
      const pi=l=>LEAGUES.findIndex(x=>x.id===l.lg.id);
      return(pi(a)<0?999:pi(a))-(pi(b)<0?999:pi(b));
    });
  },[data,lg,q,favOnly,favs]);

  const lv=data.filter(f=>LIVE_ST.has(f.fixture.status.short)).length;
  const sel=LEAGUES.find(l=>l.id===lg);
  const dates=useMemo(()=>Array.from({length:15},(_,i)=>{const d=new Date();d.setDate(d.getDate()+i-7);return d.toISOString().slice(0,10);}),[]);
  const DAY=["D","L","M","M","J","V","S"];

  return<div style={{display:"flex",flexDirection:"column",height:"100%",width:"100%",overflow:"hidden"}}>
    {/* Status bar */}
    <div style={{display:"flex",alignItems:"center",gap:8,padding:"6px 14px",background:T.bg1,borderBottom:`1px solid ${T.line}`,flexShrink:0,minHeight:44,width:"100%",boxShadow:"inset 0 -1px 0 rgba(255,255,255,.04)"}}>
      {lv>0?<><div style={{width:8,height:8,borderRadius:"50%",background:T.red,animation:"pulseR 2s infinite",flexShrink:0}}/><span style={{fontSize:11,fontWeight:800,color:T.red}}>{lv} en direct</span></>:st==="ok"?<span style={{fontSize:11,color:T.t3}}>{data.length} matchs</span>:null}
      {spin&&<Spin s={13}/>}
      <div style={{flex:1}}/>
      <button onClick={()=>setFO(v=>!v)} style={{background:favOnly?T.goldL:"none",border:`1px solid ${favOnly?T.gold:T.bg4}`,color:favOnly?T.gold:T.t3,borderRadius:8,padding:"3px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>â Favoris</button>
      <div onClick={()=>load(true)} style={{display:"flex",alignItems:"center",gap:5,cursor:"pointer",background:T.bg3,border:`1px solid ${T.bg4}`,borderRadius:8,padding:"4px 9px"}}>
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke={spin?T.red:T.t3} strokeWidth="2.5" style={{animation:spin?"spin .65s linear infinite":"none"}}><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
        {cd!=null&&!spin&&<span style={{fontSize:10,color:cd<=15?T.red:T.t3,fontWeight:700}}>{cd}s</span>}
      </div>
    </div>
    {/* Bande dates */}
    <div ref={stripRef} style={{display:"flex",gap:5,overflowX:"auto",padding:"10px 14px 10px",background:T.bg0,borderBottom:`1px solid ${T.line}`,flexShrink:0,width:"100%"}}>
      {dates.map(d=>{const td=d===today(),ac=d===date,dt=new Date(d+"T12:00:00");return<div key={d} data-td={td?"1":"0"} onClick={()=>setDate(d)} style={{
        display:"flex",flexDirection:"column",alignItems:"center",gap:3,
        flexShrink:0,cursor:"pointer",width:42,padding:"7px 0",
        borderRadius:11,transition:"all .15s",
        background:ac?"linear-gradient(135deg,#e53535,#c62828)":td?T.redL:"transparent",
        border:`1px solid ${ac?"transparent":td?"rgba(229,53,53,.3)":"transparent"}`,
        boxShadow:ac?T.shadowRed:"none",
      }}>
        <span className="bc" style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:.8,color:ac?"rgba(255,255,255,.8)":td?T.red:T.t4}}>{DAY[dt.getDay()]}</span>
        <span className="bc" style={{fontSize:18,fontWeight:900,color:ac?"#fff":td?T.red:T.t2,lineHeight:1}}>{dt.getDate()}</span>
      </div>;})}
    </div>
    {/* Filtres */}
    <div style={{display:"flex",gap:7,padding:"8px 14px",background:T.bg0,borderBottom:`1px solid ${T.line}`,flexShrink:0,width:"100%"}}>
      <div style={{position:"relative",flex:1}}>
        <svg style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)"}} width="12" height="12" fill="none" stroke={T.t3} strokeWidth="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Ãquipe ou compÃ©tition..." style={{
          width:"100%",background:T.bg2,border:`1px solid ${T.line}`,
          borderRadius:10,padding:"8px 28px 8px 30px",
          color:T.t1,fontSize:16,outline:"none",transition:"border-color .15s",
        }}
        onFocus={e=>e.target.style.borderColor="rgba(229,53,53,.4)"}
        onBlur={e=>e.target.style.borderColor=T.line}
        />
        {q&&<button onClick={()=>setQ("")} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:T.t3,fontSize:13,cursor:"pointer"}}>â</button>}
      </div>
      <button onClick={()=>setPicker(true)} style={{
        display:"flex",alignItems:"center",gap:6,
        background:lg?T.redL:T.bg2,
        border:`1px solid ${lg?T.red:T.line}`,
        borderRadius:10,padding:"8px 11px",
        color:lg?T.red:T.t2,fontSize:12,fontWeight:700,cursor:"pointer",flexShrink:0,
        transition:"all .15s",
      }}>
        {sel?<><span>{sel.flag}</span><span className="bc" style={{fontWeight:700}}>{sel.name}</span></>:<span className="bc" style={{fontWeight:700}}>Ligues</span>}
        <span style={{fontSize:10,opacity:.6}}>â¾</span>
      </button>
      {lg&&<button onClick={()=>setLg(null)} style={{border:`1px solid ${T.line}`,color:T.t3,borderRadius:10,padding:"8px 10px",fontSize:12,cursor:"pointer",background:"none",flexShrink:0}}>â</button>}
    </div>
    {/* Liste */}
    <div style={{flex:1,overflowY:"auto",paddingBottom:"env(safe-area-inset-bottom)"}}>
      {st==="load"?<SkRows/>
      :st==="err"?<div style={{textAlign:"center",padding:"52px 24px"}}><div style={{fontSize:44,marginBottom:16}}>â ï¸</div><div style={{fontSize:14,color:T.t2,marginBottom:24,lineHeight:1.5}}>{err}</div><button onClick={()=>load()} style={{background:T.red,border:"none",color:"#fff",borderRadius:10,padding:"12px 28px",fontSize:14,fontWeight:700,cursor:"pointer"}}>RÃ©essayer</button></div>
      :groups.length===0?<div style={{textAlign:"center",padding:"64px 24px",display:"flex",flexDirection:"column",alignItems:"center",gap:10}}><div style={{fontSize:44,marginBottom:4,opacity:.5}}>ð­</div><div className="bc" style={{fontSize:17,fontWeight:800,color:T.t2,letterSpacing:.3}}>Aucun match</div><div style={{fontSize:13,color:T.t4}}>{favOnly?"Aucun favori ce jour":q?"Aucun rÃ©sultat pour cette recherche":"Pas de matchs programmÃ©s ce jour-lÃ "}</div></div>
      :groups.map(g=><LeagueBlock key={g.lg.id} group={g} onOpen={openMatch} favs={favs} onFav={onFav}/>)}
    </div>
    {/* Picker ligues */}
    <Sheet open={picker} onClose={()=>setPicker(false)}>
      <div style={{padding:"4px 16px 14px"}}>
        <span style={{fontSize:16,fontWeight:700}}>CompÃ©titions</span>
      </div>
      <div style={{paddingBottom:40}}>
        <div onClick={()=>{setLg(null);setPicker(false);}} style={{display:"flex",alignItems:"center",gap:11,padding:"13px 16px",borderBottom:`1px solid ${T.line}`,background:!lg?T.blueL:"none",cursor:"pointer"}}>
          <span style={{fontSize:22}}>ð</span><span style={{fontSize:14,fontWeight:600,color:!lg?T.blueB:T.t1}}>Toutes</span>{!lg&&<span style={{marginLeft:"auto",color:T.blueB}}>â</span>}
        </div>
        {REGIONS.map(region=><div key={region}>
          <div style={{fontSize:10,fontWeight:700,color:T.t3,letterSpacing:1.4,textTransform:"uppercase",padding:"11px 16px 5px",background:T.bg0}}>{region}</div>
          {LEAGUES.filter(l=>l.region===region).map(l=><div key={l.id} onClick={()=>{setLg(l.id);setPicker(false);}} style={{display:"flex",alignItems:"center",gap:11,padding:"12px 16px",borderBottom:`1px solid ${T.line}`,background:lg===l.id?T.blueL:"none",cursor:"pointer"}}>
            <span style={{fontSize:20,flexShrink:0}}>{l.flag}</span>
            <div style={{flex:1}}><div style={{fontSize:14,fontWeight:lg===l.id?700:400,color:lg===l.id?T.blueB:T.t1}}>{l.name}</div><div style={{fontSize:11,color:T.t3}}>{l.country}</div></div>
            {lg===l.id&&<span style={{color:T.blueB}}>â</span>}
          </div>)}
        </div>)}
      </div>
    </Sheet>
    <MatchDetail state={detail} onClose={()=>setDet(null)}/>
  </div>;
}

function FormBadge({c}){
  const bg=c==="W"?"#00b86b":c==="L"?"#e53535":"#888";
  return<div className="bc" style={{
    width:16,height:16,borderRadius:4,background:bg,
    display:"flex",alignItems:"center",justifyContent:"center",
    fontSize:9,fontWeight:900,color:"#fff",flexShrink:0,
  }}>{c==="W"?"V":c==="L"?"D":"N"}</div>;
}

function StRow({r,zc,viewMode}){
  const isTop=r.rank<=3;
  const src=viewMode==="home"?r.home:viewMode==="away"?r.away:r.all;
  const qColor=zc(r.description);
  const bp=src?.goals?.for??r.all?.goals?.for??0;
  const bc=src?.goals?.against??r.all?.goals?.against??0;
  const gd=r.goalsDiff;
  return<div style={{
    display:"flex",alignItems:"center",
    padding:"9px 10px",
    borderBottom:"1px solid rgba(0,0,0,.07)",
    borderLeft:`4px solid ${qColor}`,
    background:"#fff",
    width:"100%",
  }}>
    {/* Rang */}
    <div className="bc" style={{
      width:22,fontSize:12,fontWeight:900,textAlign:"center",flexShrink:0,
      color:r.rank===1?"#00b86b":r.rank<=3?"#555":"#999",
    }}>{r.rank}</div>

    {/* Logo + Nom + Forme */}
    <div style={{flex:1,display:"flex",alignItems:"center",gap:7,minWidth:0,overflow:"hidden",marginLeft:4}}>
      <Logo src={r.team?.logo} size={24}/>
      <div style={{minWidth:0,flex:1}}>
        <div className="bc" style={{
          fontSize:13,fontWeight:isTop?700:500,
          color:"#1a1d23",
          overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
        }}>{r.team?.name}</div>
        <div style={{display:"flex",gap:2,marginTop:3}}>
          {(r.form??"").split("").slice(-5).map((c,i)=><FormBadge key={i} c={c}/>)}
        </div>
      </div>
    </div>

    {/* M (matchs jouÃ©s) */}
    <div className="bc" style={{width:22,textAlign:"center",fontSize:12,color:"#555",flexShrink:0}}>{src?.played??"-"}</div>

    {/* Score BP:BC style Besocer */}
    <div className="bc" style={{
      width:46,textAlign:"center",fontSize:12,flexShrink:0,
      color:"#444",fontWeight:500,letterSpacing:.3,
    }}>{bp}:{bc}</div>

    {/* Diff */}
    <div className="bc" style={{
      width:28,textAlign:"center",fontSize:12,flexShrink:0,fontWeight:700,
      color:gd>0?"#00b86b":gd<0?"#e53535":"#aaa",
    }}>{gd>0?"+":""}{gd}</div>

    {/* Points */}
    <div className="bc" style={{
      width:32,textAlign:"center",fontSize:16,fontWeight:900,flexShrink:0,
      color:isTop?"#00b86b":"#1a1d23",
    }}>{r.points}</div>
  </div>;
}

function KnockoutMatch({m}){
  if(!m) return<div style={{height:56,background:T.bg3,borderRadius:10,opacity:.2,border:`1px solid ${T.line}`}}/>;
  const h=m.teams?.home,a=m.teams?.away,sh=m.fixture?.status?.short;
  const live=["1H","2H","HT","ET","P"].includes(sh);
  const done=["FT","AET","PEN"].includes(sh);
  const hg=m.goals?.home,ag=m.goals?.away;
  const hw=hg!=null&&ag!=null&&hg>ag,aw=hg!=null&&ag!=null&&ag>hg;
  return<div style={{
    background:T.bg2,borderRadius:10,overflow:"hidden",
    border:`1px solid ${live?"rgba(229,53,53,.3)":T.line}`,
    boxShadow:live?`0 0 12px rgba(229,53,53,.15)`:"none",
  }}>
    <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderBottom:`1px solid ${T.line}`,background:hw&&done?"rgba(255,255,255,.03)":"transparent"}}>
      <Logo src={h?.logo} size={18}/>
      <span className="bc" style={{flex:1,fontSize:13,fontWeight:hw?800:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:done&&aw?T.t3:"#fff"}}>{h?.name??"TBD"}</span>
      {hg!=null&&<span className="bc" style={{fontSize:15,fontWeight:hw?900:600,color:hw?"#fff":T.t3,flexShrink:0}}>{hg}</span>}
    </div>
    <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",background:aw&&done?"rgba(255,255,255,.03)":"transparent"}}>
      <Logo src={a?.logo} size={18}/>
      <span className="bc" style={{flex:1,fontSize:13,fontWeight:aw?800:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:done&&hw?T.t3:"#fff"}}>{a?.name??"TBD"}</span>
      {ag!=null&&<span className="bc" style={{fontSize:15,fontWeight:aw?900:600,color:aw?"#fff":T.t3,flexShrink:0}}>{ag}</span>}
    </div>
    {live&&<div style={{padding:"3px 10px",background:"rgba(229,53,53,.1)",borderTop:`1px solid rgba(229,53,53,.2)`}}>
      <span className="bc" style={{fontSize:9,fontWeight:800,color:T.red,letterSpacing:1}}>â LIVE</span>
    </div>}
  </div>;
}

function StandingsTab(){
  const[lid,setLid]=useState(39),[s,setS]=useState(CUR_SEASON);
  const[allGroups,setAllGroups]=useState([]),[rounds,setRounds]=useState([]),[selRound,setSelRound]=useState("");
  const[roundMatches,setRoundMatches]=useState([]),[view,setView]=useState("standings");
  const[st,setSt]=useState("load"),[err,setErr]=useState(""),[cfg,setCfg]=useState(false);
  const[viewMode,setViewMode]=useState("all"); // all | home | away
  const l=byId(lid);
  const isCup=l?.isCup??false;
  const hasGroups=l?.hasGroups??false;
  const hasKnockout=l?.hasKnockout??false;

  // Charger classement ou groupes
  useEffect(()=>{
    let c=false;setSt("load");setErr("");setAllGroups([]);setRounds([]);setRoundMatches([]);setSelRound("");
    if(isCup&&hasGroups){
      // R cup rer tous les groupes A/B/C/D
      api(`/standings?league=${lid}&season=${s}`,3600000)
        .then(d=>{
          if(c)return;
          const st2=d[0]?.league?.standings??[];
          // Chaque  l ment de standings[] = un groupe
          if(st2.length>1){
            setAllGroups(st2);setSt("groups");
          } else if(st2.length===1){
            setAllGroups([st2[0]]);setSt("ok");
          } else {
            setSt("empty");
          }
        })
        .catch(e=>{if(!c){setErr(e.message);setSt("err");}});
    } else {
      api(`/standings?league=${lid}&season=${s}`,3600000)
        .then(d=>{
          if(c)return;
          const r=d[0]?.league?.standings?.[0]??[];
          setAllGroups(r.length?[r]:[]);
          setSt(r.length?"ok":"empty");
        })
        .catch(e=>{if(!c){setErr(e.message);setSt("err");}});
    }
    // Charger les tours  liminatoires si coupe
    if(isCup&&hasKnockout){
      api(`/fixtures/rounds?league=${lid}&season=${s}&current=false`,21600000)
        .then(d=>{if(!c){setRounds(d??[]);}})
        .catch(()=>{});
    }
    return()=>{c=true;};
  },[lid,s]);

  // Charger matchs d'un tour s lectionn 
  useEffect(()=>{
    if(!selRound)return;
    let c=false;setRoundMatches([]);
    api(`/fixtures?league=${lid}&season=${s}&round=${encodeURIComponent(selRound)}`,3600000)
      .then(d=>{if(!c)setRoundMatches(d??[]);})
      .catch(()=>{});
    return()=>{c=true;};
  },[selRound,lid,s]);

  const zc=desc=>{const d=(desc??"").toLowerCase();if(d.includes("champions"))return T.blueB;if(d.includes("europa")&&!d.includes("conf"))return T.gold;if(d.includes("conf"))return T.purpleB;if(d.includes("releg"))return T.red;return"transparent";};
  const SEL={width:"100%",background:T.bg2,border:`1px solid ${T.bg4}`,color:T.t1,borderRadius:8,padding:"10px 13px",fontSize:13,outline:"none",cursor:"pointer"};
  const REGIONS2=[...new Set(LEAGUES.map(l=>l.region))];

  // Regrouper les tours  liminatoires (exclure les tours de groupes)
  const knockoutRounds=rounds.filter(r=>{const rl=r.toLowerCase();return !rl.includes("group")&&!rl.includes("league phase")&&!rl.includes("qualifying");});
  const groupRounds=rounds.filter(r=>{const rl=r.toLowerCase();return rl.includes("group")||rl.includes("league phase");});

  return<div style={{display:"flex",flexDirection:"column",height:"100%",width:"100%",overflow:"hidden"}}>
    {/* Header bouton config */}
    <div style={{padding:"9px 14px",borderBottom:`1px solid ${T.line}`,flexShrink:0,background:T.bg1,minHeight:74,width:"100%"}}>
      <div onClick={()=>setCfg(true)} style={{

    "KingFut":"#1a1a2e","BBC Afrique":"#bb1919","FootMercato":"#ff6b00",
  };
  const srcColor = SOURCE_COLORS[t.source_name]||"#00b86b";
  const date = t.published_at ? new Date(t.published_at).toLocaleDateString("fr-FR",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}) : "";
  const typeColor = t.transfer_type==="Loan"?"#ff9800":t.transfer_type==="Coach"?"#9c27b0":t.transfer_type==="Free Transfer"?"#00b86b":"#1976d2";

  // DÃ©coder les entitÃ©s HTML
  const decodeHtml = (str) => {
    if(!str) return "";

              .replace(/&quot;/g,'"').replace(/&#039;/g,"'").replace(/&apos;/g,"'")
              .replace(/&#(\d+);/g,(_,n)=>String.fromCharCode(n))

  const cleanTitle = decodeHtml(t.player_name);

  const openArticle = (e) => {

//
// ONGLET RÃSULTATS PAR JOURNÃE
//
// ââ Calculer classement Ã  partir des matchs jouÃ©s ââââââââââââââââââ
function computeStandings(allMatches,upToRound,rounds){
  const roundsBefore=new Set(rounds.slice(0,rounds.indexOf(upToRound)+1));
  const played=allMatches.filter(m=>{
    const done=["FT","AET","PEN","AWD","WO"].includes(m.fixture.status.short);
    return done&&roundsBefore.has(m.league.round);
  });
  const teams={};
  const ensure=t=>{
    if(!teams[t.id])teams[t.id]={
      team:t,mp:0,w:0,d:0,l:0,gf:0,ga:0,pts:0,form:[],
    };
    return teams[t.id];
  };
  played.forEach(m=>{
    const h=m.teams.home,a=m.teams.away;
    const hg=m.goals.home??0,ag=m.goals.away??0;
    const hRow=ensure(h),aRow=ensure(a);
    hRow.mp++;aRow.mp++;
    hRow.gf+=hg;hRow.ga+=ag;
    aRow.gf+=ag;aRow.ga+=hg;
    if(hg>ag){hRow.w++;hRow.pts+=3;hRow.form.push("W");aRow.l++;aRow.form.push("L");}
    else if(ag>hg){aRow.w++;aRow.pts+=3;aRow.form.push("W");hRow.l++;hRow.form.push("L");}
    else{hRow.d++;hRow.pts++;hRow.form.push("D");aRow.d++;aRow.pts++;aRow.form.push("D");}
  });
  return Object.values(teams).sort((a,b)=>{
    if(b.pts!==a.pts)return b.pts-a.pts;
    const gdB=b.gf-b.ga,gdA=a.gf-a.ga;
    if(gdB!==gdA)return gdB-gdA;
    return b.gf-a.gf;
  }).map((r,i)=>({...r,rank:i+1,gd:r.gf-r.ga}));
}
