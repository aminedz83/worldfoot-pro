// ═══════════════════════════════════════════════
// CONFIG

const API_KEY = "3a14b1347c177458e2f23bea7899e9cf";
const BASE    = "https://v3.football.api-sports.io";

// ═══════════════════════════════════════════════
// CACHE & TTL
// ═══════════════════════════════════════════════
const _wfmd_cache = new Map();
const WFMD_TTL = { LIVE: 15000, DONE: 86400000, STD: 60000, LONG: 3600000 };

// FIXED: declare variable properly
let wfmd_FIXTURE_ID = null;
let wfmd_refreshInterval = null;
let wfmd_cdInterval = null;
let wfmd_cdVal = 30;

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
function logoUrl(url) {
  if (!url) return '';
  // Proxy via wsrv.nl pour éviter les problèmes CORS/CSP
  return 'https://wsrv.nl/?url=' + encodeURIComponent(url) + '&w=64&h=64&fit=contain&output=png&n=-1';
}

// ═══════════════════════════════════════════════
// API
// ═══════════════════════════════════════════════
async function wfmd_api(path, ttl) {
  ttl = ttl || WFMD_TTL.STD;
  const now = Date.now();
  if (_wfmd_cache.has(path) && now - _wfmd_cache.get(path).t < ttl) return _wfmd_cache.get(path).d;
  const r = await fetch(BASE + path, { headers: { "x-apisports-key": API_KEY } });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const j = await r.json();
  if (j.errors && Object.keys(j.errors).length) throw new Error(Object.values(j.errors)[0]);
  const d = j.response || [];
  _wfmd_cache.set(path, { d, t: now });
  return d;
}

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let WFMD_STATE = {
  fixture: null, events: [], stats: [], lineups: [],
  h2h: [], standings: [], players: [], injuries: [],
  activeTab: 'resume', period: 'all'
};

// ═══════════════════════════════════════════════
// LOADING BAR
// ═══════════════════════════════════════════════
function setLoading(pct) {
  const bar = document.getElementById('wfmd-loading-bar');
  if (!bar) return;
  bar.style.width = pct + '%';
  if (pct >= 100) setTimeout(function() { bar.style.width = '0%'; }, 400);
}

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
const hhmm = function(s) { const d = new Date(s); return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0'); };
const ddmm = function(s) { const d = new Date(s); return String(d.getDate()).padStart(2,'0') + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + d.getFullYear(); };
const esc  = function(s) { if(s==null||s===undefined) return ''; var str=typeof s==='object'?JSON.stringify(s):String(s); return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); };
const statVal = function(arr, key) { var r = arr && arr.find(function(s){ return s.type && s.type.toLowerCase()===key.toLowerCase(); }); return r ? r.value : null; };

function getStatusLabel(sh) {
  const map = { NS:'À venir', TBD:'TBD', PST:'Reporté', CANC:'Annulé',
    '1H':'1re MT', HT:'Mi-temps', '2H':'2e MT',
    ET:'Prol.', BT:'Pause', P:'Tab.', INT:'Interrompu',
    SUSP:'Suspendu', FT:'Terminé', AET:'A.P.', PEN:'Tirs' };
  return map[sh] || sh;
}
function getStatusClass(sh) {
  if (['1H','2H','ET','P'].includes(sh)) return 'live';
  if (sh === 'HT' || sh === 'BT') return 'ht';
  if (['FT','AET','PEN'].includes(sh)) return 'ft';
  return 'ns';
}

// ═══════════════════════════════════════════════
// MAIN LOAD
// ═══════════════════════════════════════════════
function wfmd_showLoading() {
  var containers = {
    'wfmd-timeline-container': '<div class="wfmd-sk" style="height:60px;margin-bottom:10px;"></div>',
    'wfmd-matchinfo-container': '',
    'wfmd-stats-container': '<div class="wfmd-sk" style="height:120px;"></div>',
    'wfmd-compos-container': '<div class="wfmd-sk" style="height:200px;"></div>',
    'wfmd-h2h-container': '<div class="wfmd-sk" style="height:120px;"></div>',
    'wfmd-standings-container': '<div class="wfmd-sk" style="height:200px;"></div>'
  };
  Object.keys(containers).forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.innerHTML = containers[id];
  });
}

async function wfmd_init() {
  wfmd_showLoading();
  if (!wfmd_FIXTURE_ID) {
    try {
      const today = new Date().toISOString().slice(0,10);
      const fixtures = await wfmd_api('/fixtures?date=' + today + '&timezone=Europe/Paris&status=1H-2H-HT', WFMD_TTL.LIVE);
      if (fixtures.length > 0) {
        wfmd_FIXTURE_ID = fixtures[0].fixture.id;
      } else {
        const all = await wfmd_api('/fixtures?date=' + today + '&timezone=Europe/Paris', WFMD_TTL.STD);
        if (all.length > 0) wfmd_FIXTURE_ID = all[0].fixture.id;
      }
    } catch(e) { wfmd_showError(e.message || 'Impossible de trouver un match'); return; }
  }

  if (!wfmd_FIXTURE_ID) { wfmd_showError('Aucun match disponible'); return; }
  setLoading(20);
  await wfmd_loadFixture();
}

async function wfmd_loadFixture() {
  try {
    setLoading(30);
    const fx = await wfmd_api('/fixtures?id=' + wfmd_FIXTURE_ID, WFMD_TTL.LIVE);
    if (!fx.length) { wfmd_showError('Match introuvable'); return; }
    WFMD_STATE.fixture = fx[0];
    updateHeader();
    setLoading(50);

    const fix = WFMD_STATE.fixture;
    const started = !['NS','TBD','PST','CANC'].includes(fix.fixture.status.short);
    const done    = ['FT','AET','PEN','AWD','WO'].includes(fix.fixture.status.short);
    const detailTTL = done ? WFMD_TTL.DONE : WFMD_TTL.LIVE;

    const [evts, stats] = await Promise.all([
      started ? wfmd_api('/fixtures/events?fixture=' + wfmd_FIXTURE_ID, detailTTL).catch(function(){ return []; }) : Promise.resolve([]),
      started ? wfmd_api('/fixtures/statistics?fixture=' + wfmd_FIXTURE_ID, detailTTL).catch(function(){ return []; }) : Promise.resolve([]),
    ]);
    WFMD_STATE.events = evts;
    WFMD_STATE.stats  = stats;
    setLoading(70);
    renderTimeline();
    renderMatchInfo();
    renderStats();

    const hid = fix.teams.home.id, aid = fix.teams.away.id, lid = fix.league.id, season = fix.league.season;
    const [lineups, plrs, h2h, standings] = await Promise.all([
      wfmd_api('/fixtures/lineups?fixture=' + wfmd_FIXTURE_ID, detailTTL).catch(function(){ return []; }),
      started ? wfmd_api('/fixtures/players?fixture=' + wfmd_FIXTURE_ID, detailTTL).catch(function(){ return []; }) : Promise.resolve([]),
      wfmd_api('/fixtures/headtohead?h2h=' + hid + '-' + aid + '&last=30', WFMD_TTL.LONG).catch(function(){ return []; }),
      wfmd_api('/standings?league=' + lid + '&season=' + season, WFMD_TTL.LONG).catch(function(){ return []; }),
    ]);
    WFMD_STATE.lineups   = lineups;
    WFMD_STATE.players   = plrs;
    WFMD_STATE.h2h       = h2h;
    WFMD_STATE.standings = standings;
    setLoading(100);

    updateHeader(); // re-render with goal scorers
    renderCompos();
    renderH2H();
    renderStandings();

    wfmd_startRefreshTimer();
  } catch(e) {
    wfmd_showError(e.message || 'Erreur inconnue');
  }
}

  if (!code || code.length !== 2) return '';
  var c1 = String.fromCodePoint(0x1F1E6 + code.charCodeAt(0) - 65);
  var c2 = String.fromCodePoint(0x1F1E6 + code.charCodeAt(1) - 65);

}

function renderTimeline() {
  const fix  = WFMD_STATE.fixture;
  const evts = WFMD_STATE.events;
  const container = document.getElementById('wfmd-timeline-container');
  if (!container) return;

  if (!evts.length && ['NS','TBD'].includes(fix.fixture.status.short)) {
    container.innerHTML = '<div class="wfmd-empty"><div class="wfmd-empty-icon">⏳</div><div class="wfmd-empty-msg">Le match n\'a pas encore commencé</div></div>';
    return;
  }
  if (!evts.length) {
    container.innerHTML = '<div class="wfmd-empty"><div class="wfmd-empty-icon">📋</div><div class="wfmd-empty-msg">Aucun événement disponible</div></div>';
    return;
  }

  const sorted = [...evts].sort(function(a,b){ return (a.time&&a.time.elapsed||0)-(b.time&&b.time.elapsed||0); });
  const firstH  = sorted.filter(function(e){ return (e.time&&e.time.elapsed||0) <= 45; });
  const secondH = sorted.filter(function(e){ return (e.time&&e.time.elapsed||0) > 45; });

  let html = '';
  let hScore = 0, aScore = 0;

  const renderEvt = function(e) {
    const isHome  = e.team && e.team.id === fix.teams.home.id;
    const elapsed = e.time && e.time.elapsed || 0;
    const extra   = e.time && e.time.extra || 0;
    const minStr  = extra ? elapsed + '+' + extra + "'" : elapsed + "'";

    const isGoal  = e.type === 'Goal';
    const isCard  = e.type === 'Card';
    const isSubst = e.type === 'subst';
    const isVar   = e.type === 'Var';
    const isCSC   = isGoal && e.detail === 'Own Goal';
    const isPen   = isGoal && e.detail === 'Penalty';
    const isMiss  = e.detail === 'Missed Penalty';
    const isYellow= isCard && e.detail && e.detail.includes('Yellow');
    const isRed   = isCard && e.detail && (e.detail.includes('Red') || e.detail.includes('Second Yellow'));

    if (isVar) {
      return '<div class="wfmd-var-row"><span class="wfmd-var-min">' + minStr + '</span><span style="font-size:13px;">⏱️</span><span class="wfmd-var-label">VAR · ' + esc(e.detail||'Vérification') + '</span></div>';
    }

    if (isGoal && !isMiss) {
      if (isCSC) { isHome ? aScore++ : hScore++; }
      else { isHome ? hScore++ : aScore++; }
    }

    let icon = isGoal&&!isMiss ? (isCSC?'⚽':isPen?'🎯':'⚽') : isMiss?'❌' : isYellow?'🟨' : isRed?'🟥' : isSubst?'🔄' : '📋';

    const scoreBadge = (isGoal&&!isMiss) ? '<div class="wfmd-evt-score">' + hScore + '-' + aScore + '</div>' : '';
    const assist = (!isSubst && e.assist&&e.assist.name) ? '<div class="wfmd-evt-sub">Passeur: ' + esc(e.assist&&e.assist.name||'') + '</div>' : '';
    const subtxt = (isSubst && e.assist&&e.assist.name) ? '<div class="wfmd-evt-sub">↑ ' + esc(e.assist&&e.assist.name||'') + '</div>' : '';
    const penLabel = isPen&&!isMiss ? '<span class="wfmd-tag green">Pen.</span>' : '';
    const cscLabel = isCSC ? '<span class="wfmd-tag red">CSC</span>' : '';
    const missLabel = isMiss ? '<div class="wfmd-evt-sub" style="color:var(--red)">Pénalty manqué</div>' : '';

    const side = isHome ? 'home' : 'away';
    return '<div class="wfmd-evt wfmd-evt-' + side + '">'
      + '<div class="wfmd-evt-min' + (isGoal&&!isMiss?' goal':'') + '">' + minStr + '</div>'
      + '<div class="wfmd-evt-icon">' + icon + '</div>'
      + '<div class="wfmd-evt-body"><div class="wfmd-evt-player">' + esc(e.player&&e.player.name||'?') + penLabel + cscLabel + '</div>'
      + (isSubst ? subtxt : assist) + missLabel + '</div>'
      + scoreBadge + '</div>';
  };

  const htH = fix.score&&fix.score.halftime&&fix.score.halftime.home||0;
  const htA = fix.score&&fix.score.halftime&&fix.score.halftime.away||0;

  html += '<div class="wfmd-period-label">1re Mi-temps</div>';
  if (firstH.length) firstH.forEach(function(e){ html += renderEvt(e); });
  else html += '<div class="wfmd-no-evt">Aucun événement</div>';

  if (['2H','HT','ET','FT','AET','PEN'].includes(fix.fixture.status.short)) {
    html += '<div class="wfmd-period-label wfmd-ht-label">Mi-temps ' + htH + '-' + htA + '</div>';
    html += '<div class="wfmd-period-label">2e Mi-temps</div>';
    if (secondH.length) secondH.forEach(function(e){ html += renderEvt(e); });
    else html += '<div class="wfmd-no-evt">Aucun événement</div>';
  }

  if (['FT','AET','PEN'].includes(fix.fixture.status.short)) {
    html += '<div class="wfmd-period-label wfmd-ft-label">Résultat Final ' + (fix.goals.home||0) + '-' + (fix.goals.away||0) + '</div>';
  }

  container.innerHTML = html;
}

  { label: 'Possession & Passes', keys: ['Ball Possession','Total passes','Passes accurate','Passes %'] },

function renderStats() {
  const fix   = WFMD_STATE.fixture;
  const stats = WFMD_STATE.stats;
  const container = document.getElementById('wfmd-stats-container');
  if (!container) return;

  if (!stats.length) {
    container.innerHTML = '<div class="wfmd-empty"><div class="wfmd-empty-icon">📊</div><div class="wfmd-empty-msg">Statistiques non disponibles</div></div>';
    return;
  }

  const hData = (stats.find(function(s){ return s.team && s.team.id === fix.teams.home.id; }) || {}).statistics || [];
  const aData = (stats.find(function(s){ return s.team && s.team.id === fix.teams.away.id; }) || {}).statistics || [];

  let html = '<div class="wfmd-stats-teams">'
    + '<div class="wfmd-stats-team-name">' + esc(fix.teams.home.name) + '</div>'
    + '<div class="wfmd-stats-vs">VS</div>'
    + '<div class="wfmd-stats-team-name right">' + esc(fix.teams.away.name) + '</div>'
    + '</div>';

  STAT_SECTIONS.forEach(function(section) {
    const rows = section.keys.filter(function(k){ const hv=statVal(hData,k),av=statVal(aData,k); return hv!=null||av!=null; });
    if (!rows.length) return;
    html += '<div class="wfmd-stat-section">' + section.label + '</div>';
    rows.forEach(function(k) {
      const hv = statVal(hData,k);
      const av = statVal(aData,k);
      const hvn = parseFloat(hv) || 0;
      const avn = parseFloat(av) || 0;
      const total = hvn + avn || 1;
      const hpct = Math.round(hvn/total*100);
      const apct = 100 - hpct;
      const label = STAT_LABELS[k] || k;
      html += '<div class="wfmd-stat-row">'
        + '<div class="wfmd-stat-val home">' + (hv!=null?hv:'–') + '</div>'
        + '<div class="wfmd-stat-mid"><div class="wfmd-stat-label">' + esc(label) + '</div>'
        + '<div class="wfmd-stat-bars"><div class="wfmd-stat-bar home" style="width:' + hpct + '%"></div><div class="wfmd-stat-bar away" style="width:' + apct + '%"></div></div></div>'
        + '<div class="wfmd-stat-val away">' + (av!=null?av:'–') + '</div>'
        + '</div>';
    });
  });

  container.innerHTML = html;
}

  function isMOM(st){if(!st||!st[0])return false;var g=st[0].games;return g&&g.rating&&parseFloat(g.rating)>=9.0;}

  function natFlag(nat){if(!nat)return'';var c=NAT[nat]||null;if(!c||c.length!==2)return'';return String.fromCodePoint(0x1F1E6+c.charCodeAt(0)-65)+String.fromCodePoint(0x1F1E6+c.charCodeAt(1)-65);}

  /* ── Un joueur sur le terrain ── */

    // - Ballon ⚽ (cercle bleu) = haut-gauche
    // - Chiffre buts si >1 = petit badge sur le ballon
    // - Flèche ↓ (cercle gris) = haut-gauche (si pas de ballon) ou à côté
    // - Carton = haut-gauche (si pas d'autre badge) ou décalé
    var leftBadge = '';
    var hasLeftBadge = false;

    if(goals > 0) {
      leftBadge += '<span class="cp-pl-goals-badge">⚽'+(goals>1?'<span style="font-size:8px;font-weight:900;margin-left:1px">'+goals+'</span>':'')+'</span>';
      hasLeftBadge = true;
    }
    if(subOut) {
      var subCls = hasLeftBadge ? 'cp-pl-subout with-goals' : 'cp-pl-subout';
      leftBadge += '<span class="'+subCls+'">↓</span>';
      if(!hasLeftBadge) hasLeftBadge = true;
    }
    if(red) {
      var rCls = hasLeftBadge ? 'cp-pl-rcard shifted' : 'cp-pl-rcard';
      leftBadge += '<span class="'+rCls+'"></span>';
    } else if(yel) {
      var yCls = hasLeftBadge ? 'cp-pl-ycard shifted' : 'cp-pl-ycard';
      leftBadge += '<span class="'+yCls+'"></span>';
    }

    // MOM haut-droite
    var momBadge = mom ? '<span class="cp-pl-mom">✦</span>' : '';

    // Note bas-droite
    var ratingBadge = rating ? '<span class="cp-pl-rtg" style="background:'+rBg+'">'+rating+'</span>' : '';

    return '<div class="cp-pl" onclick="wfmd_openPlayerSheet('+JSON.stringify({id:p.id,name:p.name,number:p.number,pos:p.pos})+')">'
      +'<div class="cp-pl-wrap">'
      +imgHtml
      +leftBadge
      +momBadge
      +ratingBadge
      +'</div>'
      +'<div class="cp-pl-label"><span class="cp-pl-numtxt">'+esc(p.number||'')+'</span>'+esc(shortName)+'</div>'
      +'</div>';
  }

  /* ── Grouper par lignes selon formation ── */
  function buildLines(lu) {
    var st = (lu.startXI||[]).map(function(i){return i.player;}).filter(Boolean);
    var form = (lu.formation||'4-3-3').split('-').map(Number);
    var lines = [[st[0]]]; // GK toujours en [0]
    var idx = 1;
    form.forEach(function(n){ lines.push(st.slice(idx,idx+n)); idx+=n; });
    return lines; // [GK, def, mil, att]
  }

  /* ── Rendu terrain d'une équipe ──
     Référence FlashScore:
     HOME (moitié haute) : GK en HAUT, puis def, mil, att vers le BAS (ligne médiane)
       buildLines = [GK, def, mil, att] → flex-column = GK en haut ✅ → PAS d'inversion
     AWAY (moitié basse) : att en HAUT (ligne médiane), mil, def, GK en BAS
       buildLines = [GK, def, mil, att] → inverser → [att, mil, def, GK] → flex-column = att en haut ✅
  */
  function renderTeamField(lu, isHome) {
    if(!lu) return '';
    var lines = buildLines(lu);
    if(!isHome) lines = lines.slice().reverse(); // away: att en haut, GK en bas
    var html = '<div class="cp-team-rows">';
    lines.forEach(function(line){
      html += '<div class="cp-row">';
      line.forEach(function(p){ html += pitchPlayer(p, lu.team.id); });
      html += '</div>';
    });
    html += '</div>';
    return html;
  }

  /* ── Ligne joueur dans la liste ── */
  function playerRow(p, tid, isHome) {
    if(!p) return '';
    var stats  = statsOf(tid, p.id);
    var rating = ratingOf(stats);
    var rBg    = ratingBg(rating);
    var nat    = stats&&stats[0]&&stats[0].player ? natFlag(stats[0].player.nationality) : '';
    var goals  = goalCount(p.id);
    var yel    = hasYellow(p.id);
    var red    = hasRed(p.id);
    var outM   = subOutMin(p.id);
    var inM    = subInMin(p.id);
    var isGK   = p.pos==='G';
    var isCap  = stats&&stats[0]&&stats[0].games&&stats[0].games.captain;
    var icons  = '';
    if(goals>0) icons += '<span style="font-size:12px">⚽'+(goals>1?'×'+goals:'')+'</span>';
    if(yel) icons += '<span style="display:inline-block;width:8px;height:11px;background:#ffa726;border-radius:1px;vertical-align:middle"></span>';
    if(red) icons += '<span style="display:inline-block;width:8px;height:11px;background:#e53935;border-radius:1px;vertical-align:middle"></span>';
    if(outM!==null) icons += '<span style="font-size:11px;color:var(--red)">↓</span>';
    if(inM!==null)  icons += '<span style="font-size:11px;color:var(--accent)">↑</span>';
    var extra = (isGK?' <span style="font-size:10px;color:var(--t3)">(G)</span>':'')+(isCap?' <span style="font-size:10px;color:var(--t3)">(C)</span>':'');
    var oc = 'wfmd_openPlayerSheet('+JSON.stringify({id:p.id,name:p.name,number:p.number,pos:p.pos})+')';
    if(isHome){
      return '<div class="cp-list-row" onclick="'+oc+'">'
        +'<span class="cp-num">'+esc(p.number||'—')+'</span>'
        +(nat?'<span class="cp-flag">'+nat+'</span>':'<span class="cp-flag-empty"></span>')
        +'<span class="cp-pname">'+esc(p.name)+extra+'</span>'
        +'<span class="cp-icons">'+icons+'</span>'
        +(rating?'<span class="cp-badge" style="background:'+rBg+'">'+rating+'</span>':'<span class="cp-badge-empty"></span>')
        +'</div>';
    } else {
      return '<div class="cp-list-row cp-list-row-away" onclick="'+oc+'">'
        +(rating?'<span class="cp-badge" style="background:'+rBg+'">'+rating+'</span>':'<span class="cp-badge-empty"></span>')
        +'<span class="cp-icons">'+icons+'</span>'
        +'<span class="cp-pname" style="text-align:right">'+esc(p.name)+extra+'</span>'
        +(nat?'<span class="cp-flag">'+nat+'</span>':'<span class="cp-flag-empty"></span>')
        +'<span class="cp-num">'+esc(p.number||'—')+'</span>'
        +'</div>';
    }
  }

  /* ── ASSEMBLAGE ── */
  var html = '';

  // 1. TERRAIN
  html += '<div class="cp-field">'
    +'<div class="cp-field-goal-home"></div>'
    +'<div class="cp-field-box-home"></div>'
    +'<div class="cp-field-midline"></div>'
    +'<div class="cp-field-circle"></div>'
    +'<div class="cp-field-box-away"></div>'
    +'<div class="cp-field-goal-away"></div>'
    +'<div class="cp-field-content">'
    + renderTeamField(hLu, true)
    +'<div class="cp-mid-space"></div>'
    + renderTeamField(aLu, false)
    +'</div>'
    +'</div>';

  // 2. COMPOS DÉPART
  var hSt=(hLu&&hLu.startXI||[]).map(function(i){return i.player;}).filter(Boolean);
  var aSt=(aLu&&aLu.startXI||[]).map(function(i){return i.player;}).filter(Boolean);
  html += '<div class="cp-list-block"><div class="cp-list-header">'
    +'<span class="cp-list-team-name">'+esc(fix.teams.home.name)+'</span>'
    +'<span style="font-size:10px;color:var(--t3);font-weight:700">COMPOS</span>'
    +'<span class="cp-list-team-name" style="text-align:right">'+esc(fix.teams.away.name)+'</span>'
    +'</div>';
  var maxS=Math.max(hSt.length,aSt.length);
  for(var i=0;i<maxS;i++){
    html+='<div class="cp-dual-row">';
    html+=hSt[i]?playerRow(hSt[i],hLu.team.id,true):'<div class="cp-list-row"></div>';
    html+=aSt[i]?playerRow(aSt[i],aLu.team.id,false):'<div class="cp-list-row cp-list-row-away"></div>';
    html+='</div>';
  }
  html+='</div>';

  // 3. REMPLAÇANTS
  var hSb=(hLu&&hLu.substitutes||[]).map(function(i){return i.player;}).filter(Boolean);
  var aSb=(aLu&&aLu.substitutes||[]).map(function(i){return i.player;}).filter(Boolean);
  if(hSb.length||aSb.length){
    html+='<div class="cp-list-block"><div class="cp-subs-title">Remplaçants</div>';
    var maxSb=Math.max(hSb.length,aSb.length);
    for(var j=0;j<maxSb;j++){
      html+='<div class="cp-dual-row">';
      html+=hSb[j]?playerRow(hSb[j],hLu.team.id,true):'<div class="cp-list-row"></div>';
      html+=aSb[j]?playerRow(aSb[j],aLu.team.id,false):'<div class="cp-list-row cp-list-row-away"></div>';
      html+='</div>';
    }
    html+='</div>';
  }

  // 4. ENTRAÎNEURS
  var hC=hLu&&hLu.coach&&hLu.coach.name;
  var aC=aLu&&aLu.coach&&aLu.coach.name;
  if(hC||aC){
    html+='<div class="cp-list-block"><div class="cp-subs-title">Entraîneurs</div>'
      +'<div class="cp-dual-row">'
      +'<div class="cp-coach-row"><span style="font-size:16px">👔</span><span class="cp-pname">'+esc(hC||'—')+'</span></div>'
      +'<div class="cp-coach-row cp-coach-row-away"><span class="cp-pname" style="text-align:right">'+esc(aC||'—')+'</span><span style="font-size:16px">👔</span></div>'
      +'</div></div>';
  }

  container.innerHTML = html;
}



// ═══════════════════════════════════════════════
// H2H
// ═══════════════════════════════════════════════
function renderH2H() {
  const fix = WFMD_STATE.fixture;
  const h2h = WFMD_STATE.h2h;
  const container = document.getElementById('wfmd-h2h-container');
  if (!container) return;

  if (!h2h.length) {
    container.innerHTML = '<div class="wfmd-empty"><div class="wfmd-empty-icon">⚔️</div><div class="wfmd-empty-msg">Aucune confrontation disponible</div></div>';
    return;
  }

  const hid = fix.teams.home.id;
  const hn  = fix.teams.home.name;
  const an  = fix.teams.away.name;
  let hW=0,aW=0,draws=0,hGoals=0,aGoals=0;
  h2h.forEach(function(m) {
    const isHome = m.teams.home.id===hid;
    const mg=m.goals.home||0, ag=m.goals.away||0;
    const hg=isHome?mg:ag, ag2=isHome?ag:mg;
    hGoals+=hg; aGoals+=ag2;
    if(hg>ag2) hW++; else if(ag2>hg) aW++; else draws++;
  });

  let html = '<div class="wfmd-h2h-summary">'
    + '<div class="wfmd-h2h-box"><div class="wfmd-h2h-val home">' + hW + '</div><div class="wfmd-h2h-lbl">' + esc(hn.split(' ')[0]) + '<br/>Victoires</div></div>'
    + '<div class="wfmd-h2h-box"><div class="wfmd-h2h-val draw">' + draws + '</div><div class="wfmd-h2h-lbl">Matchs<br/>Nuls</div></div>'
    + '<div class="wfmd-h2h-box"><div class="wfmd-h2h-val away">' + aW + '</div><div class="wfmd-h2h-lbl">' + esc(an.split(' ')[0]) + '<br/>Victoires</div></div>'
    + '</div>'
    + '<div class="wfmd-h2h-totals">'
    + '<div class="wfmd-h2h-total-box"><span class="val">' + h2h.length + '</span><span class="lbl">Total matchs</span></div>'
    + '<div class="wfmd-h2h-total-box"><span class="val">' + hGoals + '-' + aGoals + '</span><span class="lbl">Buts totaux</span></div>'
    + '</div>';

  const byYear = {};
  h2h.forEach(function(m){ const y=m.fixture.date&&m.fixture.date.slice(0,4)||'?'; if(!byYear[y])byYear[y]=[]; byYear[y].push(m); });
  Object.keys(byYear).sort(function(a,b){return b-a;}).forEach(function(year) {
    html += '<div class="wfmd-h2h-year">' + year + '</div>';
    byYear[year].forEach(function(m) {
      const mg=m.goals.home||0, ag=m.goals.away||0;
      const isHome = m.teams.home.id===hid;
      const hw=mg>ag, aw=ag>mg;
      const rc = isHome ? (hw?'var(--green)':aw?'var(--red)':'var(--yellow)') : (aw?'var(--green)':hw?'var(--red)':'var(--yellow)');
      html += '<div class="wfmd-h2h-row">'
        + '<div class="wfmd-h2h-dot" style="background:' + rc + '"></div>'
        + '<div class="wfmd-h2h-teams"><div class="wfmd-h2h-home">' + esc(m.teams.home.name) + '</div><div class="wfmd-h2h-away">' + esc(m.teams.away.name) + '</div></div>'
        + '<div class="wfmd-h2h-score">' + mg + '–' + ag + '</div>'
        + '</div>';
    });
  });

  container.innerHTML = html;
}

// ═══════════════════════════════════════════════
// STANDINGS
// ═══════════════════════════════════════════════
function renderStandings() {
  const fix = WFMD_STATE.fixture;
  const container = document.getElementById('wfmd-standings-container');
  if (!container) return;

  const data = WFMD_STATE.standings;
  if (!data.length) {
    container.innerHTML = '<div class="wfmd-empty"><div class="wfmd-empty-icon">📊</div><div class="wfmd-empty-msg">Classement non disponible</div></div>';
    return;
  }
  const standings = data[0]&&data[0].league&&data[0].league.standings&&data[0].league.standings[0] || [];
  if (!standings.length) {
    container.innerHTML = '<div class="wfmd-empty"><div class="wfmd-empty-icon">📊</div><div class="wfmd-empty-msg">Classement non disponible</div></div>';
    return;
  }

  const hid = fix.teams.home.id, aid = fix.teams.away.id;
  let html = '<div class="wfmd-table-wrap"><table class="wfmd-table"><thead><tr>'
    + '<th>#</th><th class="left">Équipe</th><th>MJ</th><th>B</th><th>Pts</th><th>±</th>'
    + '</tr></thead><tbody>';

  standings.forEach(function(r) {
    const isHome = r.team&&r.team.id===hid;
    const isAway = r.team&&r.team.id===aid;
    const cls = isHome ? ' highlight-home' : isAway ? ' highlight-away' : '';
    const isTop = r.rank<=3;
    const gd = r.goalsDiff||0;
    const bFor = r.all&&r.all.goals&&r.all.goals.for||0;
    const bAga = r.all&&r.all.goals&&r.all.goals.against||0;
    html += '<tr class="wfmd-tr' + cls + '">'
      + '<td><span class="wfmd-rank' + (isTop?' top':'') + '">' + r.rank + '</span></td>'
      + '<td class="left"><div class="wfmd-team-cell"><img src="' + esc(r.team&&r.team.logo||'') + '" class="wfmd-team-logo-sm" onerror="this.style.display=\'none\'"/><span class="wfmd-team-nm">' + esc(r.team&&r.team.name||'') + '</span></div></td>'
      + '<td>' + (r.all&&r.all.played||'-') + '</td>'
      + '<td class="small">' + bFor + ':' + bAga + '</td>'
      + '<td><span class="wfmd-pts' + (isTop?' top':'') + '">' + (r.points||0) + '</span></td>'
      + '<td><span class="wfmd-evol ' + (gd>0?'up':gd<0?'down':'') + '">' + (gd>0?'▲':gd<0?'▼':'—') + '</span></td>'
      + '</tr>';
  });

  html += '</tbody></table></div>'
    + '<div class="wfmd-legend">'
    + '<div class="wfmd-legend-row"><div class="wfmd-legend-dot" style="background:rgba(0,193,112,.3)"></div>Équipe domicile</div>'
    + '<div class="wfmd-legend-row"><div class="wfmd-legend-dot" style="background:rgba(37,99,235,.3)"></div>Équipe extérieur</div>'
    + '</div>';

  container.innerHTML = html;
}

// PLAYER SHEET
// ═══════════════════════════════════════════════
function wfmd_openPlayerSheet(data) {
  if (typeof data === 'string') try { data = JSON.parse(data); } catch(e){}
  const sheet = document.getElementById('wfmd-player-sheet');
  if (!sheet) return;
  const photoEl = document.getElementById('wfmd-ps-photo');
  const nameEl  = document.getElementById('wfmd-ps-name');
  const detEl   = document.getElementById('wfmd-ps-details');
  const gridEl  = document.getElementById('wfmd-ps-stats-grid');

  if (photoEl) photoEl.innerHTML = data.photo ? '<img src="'+esc(data.photo)+'" onerror="this.parentNode.innerHTML=\'👤\'"/>' : '👤';
  if (nameEl) nameEl.textContent = data.name||'';
  if (detEl) detEl.textContent = (data.pos||'') + (data.number ? ' · #'+data.number : '');

  if (gridEl) {
    const plrData = WFMD_STATE.players;
    let stats = null;
    plrData && plrData.forEach(function(team) {
      if (stats) return;
      const plr = team.players && team.players.find(function(p){ return p.player&&p.player.id===data.id; });
      if (plr) stats = plr.statistics && plr.statistics[0];
    });

    if (stats) {
      const items = [
        {label:'Mins', val: stats.games&&stats.games.minutes||'-'},
        {label:'Buts', val: stats.goals&&stats.goals.total||0},
        {label:'Assists', val: stats.goals&&stats.goals.assists||0},
        {label:'Tirs', val: stats.shots&&stats.shots.total||0},
        {label:'Cadrés', val: stats.shots&&stats.shots.on||0},
        {label:'Note', val: stats.games&&stats.games.rating ? parseFloat(stats.games.rating).toFixed(1) : '-'},
      ];
      gridEl.innerHTML = items.map(function(it){
        return '<div class="wfmd-ps-stat"><div class="wfmd-ps-val">' + it.val + '</div><div class="wfmd-ps-lbl">' + it.label + '</div></div>';
      }).join('');
    } else {
      gridEl.innerHTML = '<div style="color:var(--t3);font-size:12px;grid-column:1/-1;text-align:center;">Statistiques non disponibles</div>';
    }
  }
  sheet.classList.add('open');
}

function wfmd_closePlayerSheet() {
  const sheet = document.getElementById('wfmd-player-sheet');
  if (sheet) sheet.classList.remove('open');
}

// ═══════════════════════════════════════════════
// REFRESH TIMER
// ═══════════════════════════════════════════════
function wfmd_startRefreshTimer() {
  const fix = WFMD_STATE.fixture;
  if (!fix) return;
  const sh = fix.fixture.status.short;
  const isLive = ['1H','2H','ET','P','HT','BT'].includes(sh);
  const isDone = ['FT','AET','PEN'].includes(sh);
  if (isDone) return;

  const secs = isLive ? 30 : 60;
  wfmd_cdVal = secs;
  var cdEl = document.getElementById('wfmd-refresh-cd');
  if (cdEl) cdEl.textContent = wfmd_cdVal + 's';

  clearInterval(wfmd_refreshInterval);
  clearInterval(wfmd_cdInterval);

  wfmd_cdInterval = setInterval(function() {
    wfmd_cdVal--;
    var cdEl = document.getElementById('wfmd-refresh-cd');
    if (cdEl) cdEl.textContent = wfmd_cdVal + 's';
    if (wfmd_cdVal <= 5 && cdEl) cdEl.style.color = 'var(--accent)';
    else if (cdEl) cdEl.style.color = '';
  }, 1000);

  wfmd_refreshInterval = setInterval(async function() {
    wfmd_cdVal = secs;
    var iconEl = document.getElementById('wfmd-refresh-icon');
    if (iconEl) iconEl.classList.add('spin');
    _wfmd_cache.delete('/fixtures?id=' + wfmd_FIXTURE_ID);
    _wfmd_cache.delete('/fixtures/events?fixture=' + wfmd_FIXTURE_ID);
    _wfmd_cache.delete('/fixtures/statistics?fixture=' + wfmd_FIXTURE_ID);
    await wfmd_loadFixture();
    if (iconEl) iconEl.classList.remove('spin');
  }, secs * 1000);
}

// ERROR

function wfmd_showError(msg) {
  // Afficher l'erreur dans le conteneur timeline (résumé) seulement
  var mainEl = document.getElementById('wfmd-timeline-container');
  if (mainEl) mainEl.innerHTML = '<div class="wfmd-empty"><div class="wfmd-empty-icon">⚠️</div><div class="wfmd-empty-msg">' + esc(msg) + '</div><button class="wfmd-retry-btn" onclick="window.wfmd_init()">Réessayer</button></div>';
  // Vider les autres containers
  ['wfmd-matchinfo-container','wfmd-stats-container','wfmd-compos-container','wfmd-h2h-container','wfmd-standings-container'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.innerHTML = '';
  });
  // Log pour debug
  console.error('[WFMD] Erreur:', msg);
}

#wfmd-app {
flex:1; display:flex; flex-direction:column;
min-height:0; overflow:hidden;
height:100%;
}

/* ══ TOP BAR ══ */
#wfmd-topbar {
  flex-shrink:0;
  display:flex; align-items:center; gap:10px;
  padding:12px 14px;
  padding-top:calc(12px + env(safe-area-inset-top));
  background:var(--bg1);
  border-bottom:1px solid var(--line);
}
#wfmd-topbar button {
  background:var(--bg3); border:none; color:var(--t2);
  font-size:18px; cursor:pointer;
  width:34px; height:34px; border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.topbar-title {
  flex:1; text-align:center; font-size:13px; font-weight:600;
  color:var(--t2); letter-spacing:.3px;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.refresh-badge {
  display:inline-flex; align-items:center; gap:4px;
  padding:5px 10px; border-radius:20px;
  background:var(--bg3); border:1px solid var(--line);
  font-size:11px; font-weight:600; color:var(--t3);
  flex-shrink:0;
}
@keyframes spin { to{transform:rotate(360deg)} }
.spin { animation:spin .6s linear infinite; display:inline-block; }

/* ══ MATCH HEADER ══ */
#wfmd-match-header {
  flex-shrink:0;
  background:linear-gradient(180deg, var(--bg1) 0%, var(--bg0) 100%);
  border-bottom:1px solid var(--line);
  padding:14px 16px 12px;
  position:relative; overflow:hidden;
}
#wfmd-match-header::before {
  content:''; position:absolute; inset:0;
  background:radial-gradient(ellipse 70% 100% at 50% -20%, var(--accent-glow), transparent);
  pointer-events:none;
}
.mh-league {
  display:flex; align-items:center; gap:6px;
  font-size:10px; font-weight:700; color:var(--t3);
  letter-spacing:1.2px;
  margin-bottom:10px;
}
.mh-league span:last-child { text-transform:uppercase; }
.mh-league-dot { width:5px; height:5px; border-radius:50%; background:var(--accent); flex-shrink:0; }

/* Score central FlashScore-style */
.mh-scoreline {
  display:grid; grid-template-columns:1fr auto 1fr;
  align-items:center; gap:12px;
  margin-bottom:10px;
}
.mh-team-block { display:flex; flex-direction:column; align-items:center; gap:8px; }
.mh-team-logo-wrap {
  width:64px; height:64px; border-radius:16px;
  background:#ffffff; border:1px solid var(--line);
  display:flex; align-items:center; justify-content:center;
  overflow:hidden; flex-shrink:0;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
  padding:4px;
}
.mh-team-logo-wrap img { width:52px; height:52px; object-fit:contain; }
.mh-team-name {
  font-size:13px; font-weight:700; color:var(--t1);
  text-align:center; line-height:1.2;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  max-width:120px;
}
.mh-score-center {
  display:flex; flex-direction:column; align-items:center; gap:6px;
  flex-shrink:0;
}
.mh-score-nums {
  font-size:40px; font-weight:800; color:var(--t1);
  letter-spacing:-2px; line-height:1;
  font-variant-numeric:tabular-nums;
}
.mh-score-nums.live { color:var(--accent); }
.mh-status-badge {
  display:inline-flex; align-items:center; gap:5px;
  padding:4px 12px; border-radius:20px;
  font-size:11px; font-weight:700; letter-spacing:.5px;
}
.mh-status-badge.live { background:rgba(244,67,54,.15); color:#f44336; border:1px solid rgba(244,67,54,.3); }
.mh-status-badge.ht   { background:rgba(255,193,7,.12); color:var(--yellow); border:1px solid rgba(255,193,7,.25); }
.mh-status-badge.ft   { background:rgba(100,116,139,.1); color:var(--t3); border:1px solid var(--line); }
.mh-status-badge.ns   { background:rgba(37,99,235,.1); color:var(--blue); border:1px solid rgba(37,99,235,.25); }
.live-dot { width:6px; height:6px; border-radius:50%; background:#f44336; animation:pulseDot 1.2s ease-in-out infinite; }
@keyframes pulseDot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.4)} }
.mh-diff {
  display:inline-block;
  background:var(--accent-glow); border:1px solid rgba(0,193,112,.3);
  border-radius:8px; padding:2px 8px;
  font-size:11px; font-weight:700; color:var(--accent);
}
.mh-goals-row {
  display:flex; justify-content:space-between;
  font-size:10px; color:var(--t3); line-height:1.8;
  padding:0 2px;
}
.mh-goal-scorer { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:44%; }
.mh-date-time { font-size:11px; color:var(--t3); text-align:center; }

/* ══ TABS ══ */
#wfmd-tabs {
  flex-shrink:0;
  display:flex;
  background:var(--bg1);
  border-bottom:1px solid var(--line);
  overflow-x:auto; scrollbar-width:none;
}
#wfmd-tabs::-webkit-scrollbar { display:none; }
.wf-match-detail .tab-btn {
  flex:1; min-width:68px;
  display:flex; align-items:center; justify-content:center;
  height:44px;
  font-size:11px; font-weight:700;
  letter-spacing:.6px; text-transform:uppercase;
  color:var(--t3);
  border:none; background:none; cursor:pointer;
  border-bottom:2px solid transparent;
  transition:all .2s; white-space:nowrap; padding:0 8px;
}
.wf-match-detail .tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }

/* ══ CONTENT ══ */
#wfmd-content {
  flex:1; overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  background:var(--bg0);
  min-height:0;
}
#wfmd-content::-webkit-scrollbar { display:none; }
.wf-match-detail .tab-panel { display:none; padding:16px; animation:fadeIn .18s ease; }
.wf-match-detail .tab-panel.active { display:block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }

/* ══ TIMELINE ══ */
.wfmd-period-label {
  display:flex; align-items:center; gap:8px;
  font-size:10px; font-weight:700; letter-spacing:2px;
  color:var(--t4); text-transform:uppercase;
  margin:14px 0 8px;
}
.wfmd-period-label::before,.wfmd-period-label::after { content:''; flex:1; height:1px; background:var(--line); }
.wfmd-ht-label { color:var(--yellow); }
.wfmd-ft-label { color:var(--accent); }
.wfmd-evt {
  display:flex; align-items:flex-start; gap:8px;
  padding:8px 0;
  border-bottom:1px solid var(--line);
}
.wfmd-evt-away { flex-direction:row-reverse; text-align:right; }
.wfmd-evt-away .wfmd-evt-body { text-align:right; }
.wfmd-evt-min {
  font-size:11px; font-weight:700; color:var(--t4);
  min-width:34px; flex-shrink:0; padding-top:2px;
}
.wfmd-evt-away .wfmd-evt-min { text-align:right; }
.wfmd-evt-min.goal { color:var(--accent); }
.wfmd-evt-icon { font-size:15px; flex-shrink:0; width:20px; text-align:center; padding-top:2px; }
.wfmd-evt-body { flex:1; min-width:0; }
.wfmd-evt-player { font-size:13px; font-weight:600; color:var(--t1); line-height:1.3; }
.wfmd-evt-sub { font-size:11px; color:var(--t3); margin-top:2px; }
.wfmd-evt-score {
  background:var(--accent-glow); border:1px solid rgba(0,193,112,.3);
  border-radius:6px; padding:2px 8px;
  font-size:12px; font-weight:800; color:var(--accent);
  flex-shrink:0; align-self:center;
}
.wfmd-tag {
  display:inline-block; font-size:9px; font-weight:700; border-radius:4px;
  padding:1px 5px; margin-left:4px; vertical-align:middle;
}
.wfmd-tag.green { background:rgba(0,193,112,.15); color:var(--green); }
.wfmd-tag.red   { background:rgba(244,67,54,.15); color:var(--red); }
.wfmd-var-row {
  display:flex; align-items:center; gap:8px;
  padding:6px 10px; margin:4px 0;
  background:rgba(37,99,235,.06); border:1px solid rgba(37,99,235,.15);
  border-radius:8px;
}
.wfmd-var-min { font-size:11px; font-weight:700; color:var(--t4); min-width:34px; }
.wfmd-var-label { font-size:11px; color:var(--blue); font-weight:600; flex:1; }
.wfmd-no-evt { padding:8px 0; color:var(--t4); font-size:12px; text-align:center; }

/* Info card */
.wfmd-info-card {
  background:var(--bg2); border:1px solid var(--line);
  border-radius:14px; overflow:hidden; margin-top:16px;
}
.wfmd-info-row {
  display:flex; align-items:center; gap:12px;
  padding:12px 14px; border-bottom:1px solid var(--line);
}
.wfmd-info-row:last-child { border-bottom:none; }
.wfmd-info-icon { font-size:16px; flex-shrink:0; width:22px; text-align:center; }
.wfmd-info-text { font-size:13px; color:var(--t2); flex:1; line-height:1.4; }
.wfmd-info-text strong { color:var(--t1); font-weight:600; display:block; }

/* ══ STATS ══ */
.wfmd-stats-teams {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 12px; background:var(--bg2); border-radius:12px;
  border:1px solid var(--line); margin-bottom:14px;
}
.wfmd-stats-team-name { font-size:12px; font-weight:700; color:var(--t1); flex:1; }
.wfmd-stats-team-name.right { text-align:right; }
.wfmd-stats-vs { font-size:10px; font-weight:800; color:var(--t4); padding:0 8px; }
.wfmd-stats-subtabs {
  display:flex; gap:3px; margin-bottom:14px;
  background:var(--bg2); border-radius:10px; padding:3px;
}
.wfmd-stats-subtab {
  flex:1; padding:7px 4px; text-align:center; border:none; cursor:pointer;
  border-radius:8px; font-size:10px; font-weight:700; letter-spacing:.5px;
  background:transparent; color:var(--t3); transition:all .2s;
}
.wfmd-stats-subtab.active { background:var(--accent); color:#fff; }
.wfmd-stat-section {
  font-size:11px; font-weight:800; color:var(--accent);
  letter-spacing:1.5px; text-transform:uppercase;
  margin:16px 0 8px; padding-bottom:5px;
  border-bottom:1px solid rgba(0,193,112,.2);
}
.wfmd-stat-row {
  display:flex; align-items:center; gap:8px;
  padding:8px 0; border-bottom:1px solid var(--line);
}
.wfmd-stat-val { min-width:32px; font-size:14px; font-weight:800; color:var(--t1); }
.wfmd-stat-val.away { text-align:right; }
.wfmd-stat-mid { flex:1; display:flex; flex-direction:column; gap:4px; }
.wfmd-stat-label { font-size:11px; color:var(--t3); text-align:center; }
.wfmd-stat-bars { display:flex; gap:2px; height:4px; border-radius:2px; overflow:hidden; background:var(--bg3); }
.wfmd-stat-bar.home { background:var(--accent); border-radius:2px 0 0 2px; transition:width .5s ease; }
.wfmd-stat-bar.away { background:var(--blue); border-radius:0 2px 2px 0; transition:width .5s ease; }

/* ══ COMPOS ══ */

/* ─── TERRAIN ─────────────────────────────────── */
.cp-field {
  position: relative;
  background: #e4e4e4;
  margin: 0 0 14px;
  border-radius: 6px;
  overflow: hidden;
  border: 1.5px solid #b8b8b8;
}
.cp-field-content {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  padding: 12px 4px 12px;
}
/* Ligne médiane */
.cp-field-midline {
  position: absolute;
  left: 0; right: 0; top: 50%;
  height: 1.5px;
  background: rgba(150,150,150,0.55);
  z-index: 0;
}
/* Cercle central */
.cp-field-circle {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%,-50%);
  width: 80px; height: 80px;
  border-radius: 50%;
  border: 1.5px solid rgba(150,150,150,0.5);
  z-index: 0;
}
/* Surface home (haut) */
.cp-field-box-home {
  position: absolute;
  top: 0; left: 20%; right: 20%;
  height: 13%;
  border: 1.5px solid rgba(150,150,150,0.45);
  border-top: none;
  z-index: 0;
}
/* Surface away (bas) */
.cp-field-box-away {
  position: absolute;
  bottom: 0; left: 20%; right: 20%;
  height: 13%;
  border: 1.5px solid rgba(150,150,150,0.45);
  border-bottom: none;
  z-index: 0;
}
/* But home */
.cp-field-goal-home {
  position: absolute;
  top: 0; left: 36%; right: 36%;
  height: 2.5%;
  border: 1.5px solid rgba(130,130,130,0.5);
  border-top: none;
  z-index: 0;
}
/* But away */
.cp-field-goal-away {
  position: absolute;
  bottom: 0; left: 36%; right: 36%;
  height: 2.5%;
  border: 1.5px solid rgba(130,130,130,0.5);
  border-bottom: none;
  z-index: 0;
}
/* Espace milieu terrain */
.cp-mid-space { height: 36px; }

/* Bloc lignes équipe */
.cp-team-rows {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

/* Rangée de joueurs */
.cp-row {
  display: flex;
  justify-content: space-around;
  align-items: flex-end;
  padding: 0 4px;
}

/* ─── JOUEUR ──────────────────────────────────── */
.cp-pl {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  flex: 1;
  max-width: 90px;
  min-width: 0;
  padding-top: 10px; /* espace pour badge au-dessus */
}

/* Wrapper relatif */
.cp-pl-wrap {
  position: relative;
  display: inline-block;
}

/* Photo — carré blanc arrondi */
.cp-pl-photo {
  width: 66px;
  height: 66px;
  border-radius: 14px;
  object-fit: cover;
  display: block;
  background: #ffffff;
  box-shadow: 0 2px 8px rgba(0,0,0,.18);
}
.cp-pl-nophoto {
  width: 66px;
  height: 66px;
  border-radius: 14px;
  background: #ffffff;
  box-shadow: 0 2px 8px rgba(0,0,0,.18);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 700;
  color: #aaa;
}

/* Note — badge coloré bas-droite qui dépasse */
.cp-pl-rtg {
  position: absolute;
  bottom: -6px;
  right: -8px;
  font-size: 11.5px;
  font-weight: 900;
  color: #fff;
  padding: 3px 7px;
  border-radius: 7px;
  line-height: 1.3;
  white-space: nowrap;
  box-shadow: 0 1px 5px rgba(0,0,0,.28);
}

/* Icône ballon but — cercle bleu foncé haut-gauche */
.cp-pl-goals-badge {
  position: absolute;
  top: -8px;
  left: -8px;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: #1a237e;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,.35);
  z-index: 2;
}
/* Compteur buts (si >1) — petit badge par-dessus */
.cp-pl-goals-count {
  position: absolute;
  top: -10px;
  left: 8px;
  background: #1a237e;
  color: #fff;
  font-size: 9px;
  font-weight: 900;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 3;
  box-shadow: 0 1px 3px rgba(0,0,0,.3);
}

/* Flèche substitution — cercle gris haut-gauche (à côté du ballon si but) */
.cp-pl-subout {
  position: absolute;
  top: -8px;
  left: -8px;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: rgba(255,255,255,0.95);
  border: 1.5px solid #bbb;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  color: #555;
  box-shadow: 0 1px 3px rgba(0,0,0,.18);
  z-index: 2;
}
/* Si subout ET but → subout décalé */
.cp-pl-subout.with-goals {
  left: 16px;
}

/* Carton jaune */
.cp-pl-ycard {
  position: absolute;
  top: -8px;
  left: -8px;
  width: 10px;
  height: 14px;
  background: #ffa726;
  border-radius: 2px;
  box-shadow: 0 1px 3px rgba(0,0,0,.28);
  z-index: 2;
}
/* Carton rouge */
.cp-pl-rcard {
  position: absolute;
  top: -8px;
  left: -8px;
  width: 10px;
  height: 14px;
  background: #e53935;
  border-radius: 2px;
  box-shadow: 0 1px 3px rgba(0,0,0,.28);
  z-index: 2;
}
/* Carton décalé si autre badge haut-gauche */
.cp-pl-ycard.shifted,
.cp-pl-rcard.shifted {
  left: 6px;
}

/* Étoile MOM — haut-droite bleu */
.cp-pl-mom {
  position: absolute;
  top: -8px;
  right: -8px;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: #1565c0;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  box-shadow: 0 1px 4px rgba(0,0,0,.3);
  z-index: 2;
}

/* Label nom */
.cp-pl-label {
  font-size: 10.5px;
  font-weight: 600;
  color: #111;
  text-align: center;
  line-height: 1.3;
  width: 100%;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  padding: 0 2px;
}
.cp-pl-numtxt {
  display: block;
  font-size: 10px;
  color: #777;
  font-weight: 500;
}

/* ─── LISTE ──────────────────────────────────── */
.cp-list-block {
  background: var(--bg1);
  border: 1px solid var(--line);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 10px;
}
.cp-list-header {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 10px 12px 8px;
  border-bottom: 1px solid var(--line);
  background: var(--bg2);
}
.cp-list-team-name {
  font-size: 11px; font-weight: 800; color: var(--t1);
  letter-spacing: .3px; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
.cp-subs-title {
  font-size: 12px; font-weight: 800; color: var(--t1);
  padding: 10px 12px 6px;
  border-bottom: 1px solid var(--line);
  background: var(--bg2);
}
.cp-dual-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  border-bottom: 1px solid var(--line);
}
.cp-dual-row:last-child { border-bottom: none; }
.cp-list-row {
  display: flex; align-items: center; gap: 5px;
  padding: 7px 8px; cursor: pointer; min-width: 0;
}
.cp-list-row:active { background: var(--bg3); }
.cp-list-row-away { flex-direction: row-reverse; border-left: 1px solid var(--line); }
.cp-num { font-size: 11px; font-weight: 700; color: var(--t4); min-width: 18px; text-align: center; flex-shrink: 0; }
.cp-flag { font-size: 13px; flex-shrink: 0; line-height: 1; }
.cp-flag-empty { width: 16px; flex-shrink: 0; }
.cp-pname { font-size: 12px; font-weight: 600; color: var(--t1); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
.cp-icons { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
.cp-badge { font-size: 10px; font-weight: 800; color: #fff; padding: 2px 5px; border-radius: 5px; flex-shrink: 0; line-height: 1.3; }
.cp-badge-empty { width: 30px; flex-shrink: 0; }
.cp-coach-row { display: flex; align-items: center; gap: 8px; padding: 8px 10px; flex: 1; }
.cp-coach-row-away { flex-direction: row-reverse; border-left: 1px solid var(--line); }


/* ══ H2H ══ */
.wfmd-h2h-summary { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:16px; }
.wfmd-h2h-box { background:var(--bg2); border:1px solid var(--line); border-radius:12px; padding:12px 8px; text-align:center; }
.wfmd-h2h-val { font-size:26px; font-weight:800; line-height:1; }
.wfmd-h2h-val.home { color:var(--accent); }
.wfmd-h2h-val.draw { color:var(--t3); }
.wfmd-h2h-val.away { color:var(--blue); }
.wfmd-h2h-lbl { font-size:10px; color:var(--t3); margin-top:5px; line-height:1.4; }
.wfmd-h2h-totals { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:16px; }
.wfmd-h2h-total-box { background:var(--bg2); border:1px solid var(--line); border-radius:10px; padding:10px 12px; display:flex; align-items:center; gap:8px; }
.wfmd-h2h-total-box .val { font-size:18px; font-weight:800; color:var(--accent); }
.wfmd-h2h-total-box .lbl { font-size:11px; color:var(--t3); line-height:1.3; }
.wfmd-h2h-year { font-size:13px; font-weight:800; color:var(--accent); margin:14px 0 8px; padding-bottom:5px; border-bottom:1px solid rgba(0,193,112,.2); }
.wfmd-h2h-row { display:flex; align-items:center; gap:8px; padding:9px 0; border-bottom:1px solid var(--line); }
.wfmd-h2h-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.wfmd-h2h-teams { flex:1; min-width:0; }
.wfmd-h2h-home { font-size:12px; font-weight:600; color:var(--t1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.wfmd-h2h-away { font-size:11px; color:var(--t3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.wfmd-h2h-score { font-size:15px; font-weight:800; color:var(--t1); min-width:44px; text-align:center; }

.wfmd-table-wrap { overflow-x:auto; }
.wfmd-table { width:100%; border-collapse:collapse; }
.wfmd-table thead tr { position:sticky; top:0; z-index:2; }
.wfmd-table th { background:var(--bg2); font-size:9px; font-weight:700; color:var(--t4); letter-spacing:1px; text-transform:uppercase; padding:8px 4px; text-align:center; border-bottom:1px solid rgba(0,193,112,.2); }
.wfmd-table th.left { text-align:left; padding-left:10px; }
.wfmd-tr { border-bottom:1px solid var(--line); }
.wfmd-tr td { padding:9px 4px; text-align:center; font-size:12px; color:var(--t2); }
.wfmd-tr td.left { text-align:left; padding-left:10px; }
.wfmd-tr td.small { font-size:10px; }
.wfmd-tr.highlight-home { background:rgba(0,193,112,.07); }
.wfmd-tr.highlight-away { background:rgba(37,99,235,.06); }
.wfmd-rank { font-size:13px; font-weight:800; color:var(--t4); }
.wfmd-rank.top { color:var(--accent); }
.wfmd-team-cell { display:flex; align-items:center; gap:7px; }
.wfmd-team-logo-sm { width:18px; height:18px; object-fit:contain; flex-shrink:0; }
.wfmd-team-nm { font-size:12px; font-weight:600; color:var(--t1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:110px; }
.wfmd-pts { font-size:14px; font-weight:800; color:var(--t1); }
.wfmd-pts.top { color:var(--accent); }
.wfmd-evol { font-size:11px; font-weight:700; }
.wfmd-evol.up { color:var(--green); }
.wfmd-evol.down { color:var(--red); }
.wfmd-legend { margin-top:14px; display:flex; flex-direction:column; gap:5px; }
.wfmd-legend-row { display:flex; align-items:center; gap:7px; font-size:11px; color:var(--t3); }
.wfmd-legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

/* ══ EMPTY / ERROR ══ */
.wfmd-empty { display:flex; flex-direction:column; align-items:center; padding:40px 20px; gap:10px; text-align:center; }
.wfmd-empty-icon { font-size:40px; }
.wfmd-empty-msg { font-size:14px; color:var(--t3); }
.wfmd-retry-btn { background:var(--accent); border:none; color:#000; border-radius:12px; padding:10px 22px; font-size:13px; font-weight:700; cursor:pointer; margin-top:6px; }

/* ══ PLAYER SHEET ══ */
#wfmd-player-sheet {
  position:fixed; inset:0; z-index:200;

}
#wfmd-player-sheet.open { display:flex; }
.player-sheet-inner {
  width:100%; max-width:430px;
  background:var(--bg2); border-radius:20px 20px 0 0;
  padding:20px 16px 36px;
  border-top:1px solid rgba(0,193,112,.3);

}
@keyframes slideUp { from{transform:translateY(40px);opacity:0} to{transform:translateY(0);opacity:1} }
.ps-close { float:right; background:none; border:none; color:var(--t3); font-size:22px; cursor:pointer; }
.ps-header { display:flex; align-items:center; gap:14px; margin-bottom:18px; }
.ps-photo { width:56px; height:56px; border-radius:50%; border:2px solid var(--accent); overflow:hidden; background:var(--bg3); display:flex; align-items:center; justify-content:center; font-size:22px; }

.wfmd-ps-val { font-size:20px; font-weight:800; color:var(--accent); }
.wfmd-ps-lbl { font-size:10px; color:var(--t3); margin-top:3px; }

						  const today=new Date().toDateString();

						async function api(path,ttl=TTL.SCORES,signal=null){
						  const now=Date.now();
						  if(_cache.has(path)&&now-_cache.get(path).t<ttl) return _cache.get(path).d;
						  _trackApiCall();
						  const r=await fetch(BASE+path,{headers:{"x-apisports-key":API_KEY},signal});

						  if(j.errors&&Object.keys(j.errors).length){

						    throw new Error(typeof msg==="string"?msg:"Erreur API");
						  }
						  const d=j.response||[];
						  _cache.set(path,{d,t:now});
						  return d;

						function useMinute(elapsed,status){
						  const[m,setM]=useState(elapsed||0);
						  useEffect(()=>{
						    setM(elapsed||0);
						    if(!LIVE_ST.has(status))return;
						    const id=setInterval(()=>setM(v=>{const c=(status==="2H"||status==="ET")?96:47;return v<c?v+1:v;}),60000);
						    return()=>clearInterval(id);
						  },[elapsed,status]);
						  return m;

						function useFlash(hg,ag){
						  const prev=useRef({h:null,a:null}),[on,setOn]=useState(false);
						  useEffect(()=>{
						    const p=prev.current;prev.current={h:hg,a:ag};
						    if(p.h!==null&&(hg>p.h||ag>p.a)){setOn(true);const t=setTimeout(()=>setOn(false),4000);return()=>clearTimeout(t);}
						  },[hg,ag]);
						  return on;

						// Détecte une grosse occasion : but, penalty, poteau via events API
						function useOccasion(fixtureId) {
						  const [occ, setOcc] = useState(null); // null | "home" | "away"
						  const lastEventId = useRef(null);
						  useEffect(() => {
						    if (!fixtureId) return;
						    let alive = true;
						    let timer = null;
						    const DANGER = ["Goal","missed_penalty","Penalty","Var"];
						    const check = async () => {
						      try {
						        // Bypass cache pour avoir les events les plus frais
						        const evts = await api("/fixtures/events?fixture=" + fixtureId, 8000);
						        if (!alive || !evts || !evts.length) return;
						        // Dernier événement
						        const last = evts[evts.length - 1];
						        const uid = (last.time?.elapsed||0) + "_" + (last.type||"") + "_" + (last.player?.id||"");
						        if (uid === lastEventId.current) return; // déjà vu
						        lastEventId.current = uid;
						        // Vérifier si c'est un événement dangereux
						        const isDanger = DANGER.some(d => (last.type||"").toLowerCase().includes(d.toLowerCase()))
						          || (last.detail||"").toLowerCase().includes("penalty")
						          || (last.detail||"").toLowerCase().includes("missed");
						        if (!isDanger) return;
						        // Identifier l'équipe
						        const side = last.team?.id ? "_tid_" + last.team.id : null;
						        if (!side) return;
						        setOcc(side);
						        if (timer) clearTimeout(timer);
						        timer = setTimeout(() => { if(alive) setOcc(null); }, 6000);
						      } catch(e) {}
						    };
						    const iv = setInterval(check, 12000);
						    check();
						    return () => { alive=false; clearInterval(iv); if(timer) clearTimeout(timer); };
						  }, [fixtureId]);
						  return occ; // "_tid_123456" ou null
						}
