<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldFoot Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: #f5f5f5;
        }
        
        #app {
            max-width: 430px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        
        .header {
            background: #00b86b;
            color: white;
            padding: 60px 20px 20px;
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 800;
        }
        
        .header p {
            font-size: 12px;
            opacity: 0.9;
            margin-top: 5px;
        }
        
        .tabs {
            display: flex;
            overflow-x: auto;
            background: white;
            border-bottom: 1px solid #eee;
        }
        
        .tab {
            padding: 15px 20px;
            font-size: 14px;
            font-weight: 600;
            color: #888;
            cursor: pointer;
            white-space: nowrap;
            border-bottom: 2px solid transparent;
        }
        
        .tab.active {
            color: #00b86b;
            border-bottom-color: #00b86b;
        }
        
        .content {
            padding: 20px;
        }
        
        .match-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #f0f0f0;
        }
        
        .league {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #f0f0f0;
            color: #666;
            font-size: 13px;
            font-weight: 600;
        }
        
        .match {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            cursor: pointer;
        }
        
        .time {
            width: 50px;
            font-size: 13px;
            font-weight: 600;
            color: #00b86b;
        }
        
        .teams {
            flex: 1;
        }
        
        .team-row {
            display: flex;
            align-items: center;
            margin: 5px 0;
        }
        
        .team-name {
            flex: 1;
            font-size: 14px;
        }
        
        .score {
            font-weight: 700;
            margin-left: 10px;
        }
        
        .live {
            background: #ff3b30;
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 20px;
            margin-left: 10px;
        }
        
        .placeholder {
            text-align: center;
            padding: 50px 20px;
            color: #999;
            font-size: 15px;
        }
        
        /* Match Detail */
        .detail-view {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: white;
            z-index: 1000;
            overflow-y: auto;
        }
        
        .detail-header {
            background: #00b86b;
            color: white;
            padding: 50px 20px 20px;
        }
        
        .back-button {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            margin-bottom: 20px;
            cursor: pointer;
        }
        
        .big-score {
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-align: center;
            margin: 20px 0;
        }
        
        .big-score .team {
            flex: 1;
        }
        
        .big-score .team .logo {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            margin: 0 auto 10px;
        }
        
        .big-score .score {
            font-size: 40px;
            font-weight: 800;
            padding: 0 20px;
        }
        
        .status {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .detail-content {
            padding: 20px;
        }
        
        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: #666;
            margin: 20px 0 10px;
        }
        
        .event {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .event-minute {
            width: 40px;
            font-weight: 700;
            color: #00b86b;
        }
        
        .event-icon {
            width: 30px;
            font-size: 16px;
        }
        
        .event-desc {
            flex: 1;
        }
        
        .event-player {
            font-weight: 600;
        }
        
        .event-detail {
            font-size: 12px;
            color: #999;
        }
        
        .big-chance {
            background: rgba(255, 59, 48, 0.1);
            border-left: 3px solid #ff3b30;
            padding-left: 15px;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { background: rgba(255, 59, 48, 0.1); }
            50% { background: rgba(255, 59, 48, 0.2); }
            100% { background: rgba(255, 59, 48, 0.1); }
        }
        
        .stat-row {
            display: flex;
            align-items: center;
            padding: 10px 0;
        }
        
        .stat-value {
            font-weight: 700;
            min-width: 50px;
        }
        
        .stat-label {
            flex: 1;
            text-align: center;
            color: #666;
            font-size: 13px;
        }
        
        .stat-bar {
            height: 6px;
            background: #eee;
            border-radius: 3px;
            overflow: hidden;
            display: flex;
            margin: 5px 0;
        }
        
        .bar-home {
            height: 100%;
            background: #00b86b;
        }
        
        .bar-away {
            height: 100%;
            background: #2563eb;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // Données de test
        const matches = [
            {
                id: 1,
                league: "Ligue 1 Pro",
                home: "JS Kabylie",
                away: "MC Alger",
                homeScore: 1,
                awayScore: 0,
                time: "67'",
                status: "live",
                minute: 67
            },
            {
                id: 2,
                league: "Ligue 1 Pro",
                home: "CR Belouizdad",
                away: "ES Sétif",
                homeScore: 2,
                awayScore: 1,
                time: "FT",
                status: "ft"
            },
            {
                id: 3,
                league: "Premier League",
                home: "Liverpool",
                away: "Arsenal",
                homeScore: 2,
                awayScore: 2,
                time: "78'",
                status: "live",
                minute: 78
            },
            {
                id: 4,
                league: "La Liga",
                home: "Real Madrid",
                away: "Barcelona",
                homeScore: 0,
                awayScore: 0,
                time: "20:45",
                status: "upcoming"
            }
        ];
        
        // Événements du match JS Kabylie vs MC Alger
        const events = [
            { minute: 12, type: "goal", player: "Boudebouz", score: "1-0" },
            { minute: 23, type: "yellow", player: "Benlamri" },
            { minute: 31, type: "bigchance", player: "Belaïli", description: "Tir sur la barre" },
            { minute: 45, type: "substitution", player: "Slimani", detail: "remplace Bounedjah" },
            { minute: 52, type: "goal", player: "Mahrez", score: "1-1" },
            { minute: 67, type: "bigchance", player: "Benzia", description: "Occasion manquée" },
            { minute: 78, type: "red", player: "Zedadka" },
            { minute: 84, type: "var", description: "But refusé - hors-jeu" }
        ];
        
        // Stats du match
        const stats = {
            possession: [55, 45],
            shots: [14, 9],
            shotsOnTarget: [5, 3],
            corners: [6, 4]
        };
        
        let currentView = 'main';
        let selectedMatch = null;
        
        function render() {
            if (currentView === 'main') {
                renderMain();
            } else {
                renderDetail();
            }
        }
        
        function renderMain() {
            const app = document.getElementById('app');
            
            let html = `
                <div class="header">
                    <h1>WORLDFOOT</h1>
                    <p>PRO · LIVE · BY AMINE</p>
                </div>
                
                <div class="tabs">
                    <div class="tab active" onclick="switchTab('scores')">SCORES</div>
                    <div class="tab" onclick="switchTab('standings')">CLASSEMENT</div>
                    <div class="tab" onclick="switchTab('scorers')">BUTEURS</div>
                    <div class="tab" onclick="switchTab('calendar')">CALENDRIER</div>
                    <div class="tab" onclick="switchTab('transfers')">TRANSFERTS</div>
                    <div class="tab" onclick="switchTab('actu')">ACTUALITÉS</div>
                    <div class="tab" onclick="switchTab('results')">RÉSULTATS</div>
                    <div class="tab" onclick="switchTab('jsk')">JSK</div>
                </div>
                
                <div class="content" id="tab-content">
            `;
            
            // Afficher les scores par défaut
            const leagues = {};
            matches.forEach(m => {
                if (!leagues[m.league]) leagues[m.league] = [];
                leagues[m.league].push(m);
            });
            
            for (const [leagueName, leagueMatches] of Object.entries(leagues)) {
                html += `<div class="match-card">`;
                html += `<div class="league">${leagueName}</div>`;
                
                leagueMatches.forEach(m => {
                    const liveBadge = m.status === 'live' ? '<span class="live">LIVE</span>' : '';
                    
                    html += `
                        <div class="match" onclick="openMatch(${m.id})">
                            <div class="time">${m.time}</div>
                            <div class="teams">
                                <div class="team-row">
                                    <span class="team-name">${m.home}</span>
                                    <span class="score">${m.homeScore}</span>
                                </div>
                                <div class="team-row">
                                    <span class="team-name">${m.away}</span>
                                    <span class="score">${m.awayScore}</span>
                                </div>
                            </div>
                            ${liveBadge}
                        </div>
                    `;
                });
                
                html += `</div>`;
            }
            
            html += `</div>`;
            
            app.innerHTML = html;
        }
        
        function renderDetail() {
            const match = matches.find(m => m.id === selectedMatch) || matches[0];
            
            let html = `
                <div class="detail-view">
                    <div class="detail-header">
                        <button class="back-button" onclick="goBack()">←</button>
                        
                        <div class="big-score">
                            <div class="team">
                                <div class="logo"></div>
                                <div>${match.home}</div>
                            </div>
                            <div class="score">${match.homeScore} - ${match.awayScore}</div>
                            <div class="team">
                                <div class="logo"></div>
                                <div>${match.away}</div>
                            </div>
                        </div>
                        
                        <div style="text-align: center;">
                            <span class="status">${match.status === 'live' ? match.minute + "'" : match.time}</span>
                        </div>
                    </div>
                    
                    <div class="detail-content">
                        <div class="section-title">ÉVÉNEMENTS</div>
            `;
            
            events.forEach(e => {
                const isBigChance = e.type === 'bigchance';
                let icon = '⚽';
                if (e.type === 'yellow') icon = '🟨';
                else if (e.type === 'red') icon = '🟥';
                else if (e.type === 'substitution') icon = '🔄';
                else if (e.type === 'var') icon = '📺';
                else if (isBigChance) icon = '⚡';
                
                const extraClass = isBigChance ? 'big-chance' : '';
                const displayText = isBigChance ? 'GROSSE OCCASION!' : e.player;
                
                html += `
                    <div class="event ${extraClass}">
                        <div class="event-minute">${e.minute}'</div>
                        <div class="event-icon">${icon}</div>
                        <div class="event-desc">
                            <div class="event-player">${displayText}</div>
                            ${e.description ? `<div class="event-detail">${e.description}</div>` : ''}
                            ${e.detail ? `<div class="event-detail">${e.detail}</div>` : ''}
                        </div>
                        ${e.score ? `<div class="event-score">${e.score}</div>` : ''}
                    </div>
                `;
            });
            
            html += `
                        <div class="section-title">STATISTIQUES</div>
                        
                        <div class="stat-row">
                            <span class="stat-value">${stats.possession[0]}%</span>
                            <span class="stat-label">POSSESSION</span>
                            <span class="stat-value">${stats.possession[1]}%</span>
                        </div>
                        <div class="stat-bar">
                            <div class="bar-home" style="width: ${stats.possession[0]}%"></div>
                            <div class="bar-away" style="width: ${stats.possession[1]}%"></div>
                        </div>
                        
                        <div class="stat-row">
                            <span class="stat-value">${stats.shots[0]}</span>
                            <span class="stat-label">TIRS</span>
                            <span class="stat-value">${stats.shots[1]}</span>
                        </div>
                        
                        <div class="stat-row">
                            <span class="stat-value">${stats.shotsOnTarget[0]}</span>
                            <span class="stat-label">CADRÉS</span>
                            <span class="stat-value">${stats.shotsOnTarget[1]}</span>
                        </div>
                        
                        <div class="stat-row">
                            <span class="stat-value">${stats.corners[0]}</span>
                            <span class="stat-label">CORNERS</span>
                            <span class="stat-value">${stats.corners[1]}</span>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('app').innerHTML = html;
        }
        
        // Fonctions globales
        window.switchTab = function(tab) {
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab !== 'scores') {
                document.getElementById('tab-content').innerHTML = `
                    <div class="placeholder">
                        ${tab.charAt(0).toUpperCase() + tab.slice(1)} - Bientôt disponible
                    </div>
                `;
            } else {
                renderMain();
            }
        };
        
        window.openMatch = function(id) {
            selectedMatch = id;
            currentView = 'detail';
            render();
        };
        
        window.goBack = function() {
            currentView = 'main';
            render();
        };
        
        // Lancement
        render();
    </script>
</body>
</html>
