		<script>
			// Service Worker avec support notifications
			if ("serviceWorker" in navigator) {
				const sw = `
    const C='wf-pro-v10';
    self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(['./'])).then(()=>self.skipWaiting()));});
    self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))).then(()=>self.clients.claim()));});
    self.addEventListener('push',e=>{
      const d=e.data?.json()||{};
      e.waitUntil(self.registration.showNotification(d.title||'WorldFoot Pro',{
        body:d.body||'',
        icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect width="192" height="192" rx="40" fill="%2300b86b"/><text y="140" x="96" text-anchor="middle" font-size="120">⚡</text></svg>',
        badge:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96"><rect width="96" height="96" rx="20" fill="%2300b86b"/><text y="70" x="48" text-anchor="middle" font-size="60">⚡</text></svg>',
        tag:d.tag||'wf',
        vibrate:[200,100,200],
        data:d.data||{},
      }));
    });
    self.addEventListener('notificationclick',e=>{e.notification.close();e.waitUntil(clients.openWindow('./'));});
    self.addEventListener('fetch',e=>{
      const u=e.request.url;
      if(u.includes('api-sports.io')){e.respondWith(fetch(e.request).catch(()=>new Response('{"errors":{"net":"offline"}}',{headers:{'Content-Type':'application/json'}})));return;}
      e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('./'))));
    });
  `;
				navigator.serviceWorker
					.register(
						URL.createObjectURL(
							new Blob([sw], { type: "application/javascript" })
						)
					)
					.catch(() => {});
			}
		</script>

		/* Point LIVE rouge */
		.live-dot {
			width: 7px;
			height: 7px;
			border-radius: 50%;
			background: #ff5252;
			animation: dotPulse 1.4s ease-in-out infinite,
				pulseR 1.4s ease-in-out infinite;
		}

		/* Animations */
		.row-anim {
			animation: rowIn 0.3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
		}
		.score-pop {
			animation: sPop 0.55s cubic-bezier(0.36, 0.07, 0.19, 0.97)
				forwards;
		}
		.pop-in {
			animation: popIn 0.3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
		}

		/* Cards premium light */
		.card {
			background: #ffffff;
			border: 1px solid rgba(0, 0, 0, 0.06);
			border-radius: 16px;
			box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06),
				0 1px 3px rgba(0, 0, 0, 0.04);
		}

			transition: transform 0.15s ease, box-shadow 0.15s ease;
		}

			transform: scale(0.985);
			box-shadow: 0 1px 6px rgba(0, 0, 0, 0.08);
		}

		/* Glass élégant */
		.glass {
			background: rgba(255, 255, 255, 0.85);
			border: 1px solid rgba(255, 255, 255, 0.9);
			backdrop-filter: blur(20px);
			-webkit-backdrop-filter: blur(20px);
		}

		.tag {
			display: inline-flex;
			align-items: center;
			gap: 4px;
			padding: 3px 9px;
			border-radius: 20px;
			font-size: 10px;

			letter-spacing: 0.6px;
			text-transform: uppercase;
		}

			height: 1px;
			background: linear-gradient(
				90deg,
				transparent,
				rgba(0, 0, 0, 0.08),
				transparent
			);
		}

		/* Bouton premium */
		.btn-premium {
			background: linear-gradient(135deg, #00b86b 0%, #009657 100%);

		.btn-premium:active {

		}

		.input-premium {

					    const id=setInterval(()=>setM(v=>{const c=(status==="2H"||status==="ET")?96:47;return v<c?v+1:v;}),60000);

					    if(p.h!==null&&(hg>p.h||ag>p.a)){setOn(true);const t=setTimeout(()=>setOn(false),4000);return()=>clearTimeout(t);}

					//
					// MODULE BLESS S / SUSPENDUS (endpoint Pro)
					//
					//
					// COMPOSANT ANALYSE   Statistiques avanc es H2H
					//
					function AnalysePanel({h2h,homeTeam,awayTeam,hSt=[],aSt=[],homeHistory=[],awayHistory=[]}){
					  if(!h2h||h2h.length===0)return<div style={{textAlign:"center",padding:"44px 20px",color:T.t3,fontSize:13}}>Pas assez de données H2H</div>;

					  const hid=homeTeam.id;

					  // ═══════════════════════════════════════════════
					  // MOTEUR DE CALCUL INTELLIGENT
					  // ═══════════════════════════════════════════════

					  // ── Analyse H2H ──
					  const h2hStats=(()=>{
					    let hW=0,aW=0,draws=0;
					    let over05=0,over15=0,over25=0,over35=0,over45=0;
					    let btts=0,hCS=0,aCS=0;
					    let hFirst=0,aFirst=0,noFirst=0;
					    let totalGoals=0,hGoalsTotal=0,aGoalsTotal=0;
					    let last5=[],last5H=0,last5A=0,last5D=0;

					    h2h.forEach((m,i)=>{
					      const isHome=m.teams.home.id===hid;
					      const mg=m.goals.home??0,ag=m.goals.away??0;
					      const hGoals=isHome?mg:ag, aGoals=isHome?ag:mg;
					      const tot=hGoals+aGoals;
					      totalGoals+=tot;
					      hGoalsTotal+=hGoals;
					      aGoalsTotal+=aGoals;
					      if(hGoals>aGoals){hW++;if(i<5)last5H++;}
					      else if(aGoals>hGoals){aW++;if(i<5)last5A++;}
					      else{draws++;if(i<5)last5D++;}
					      if(tot>0.5)over05++;
					      if(tot>1.5)over15++;
					      if(tot>2.5)over25++;
					      if(tot>3.5)over35++;
					      if(tot>4.5)over45++;
					      if(hGoals>0&&aGoals>0)btts++;
					      if(aGoals===0)hCS++;
					      if(hGoals===0)aCS++;
					      if(hGoals>0&&aGoals===0)hFirst++;
					      else if(aGoals>0&&hGoals===0)aFirst++;
					      else if(hGoals===0&&aGoals===0)noFirst++;
					      else{hFirst+=0.5;aFirst+=0.5;}
					      last5.push({hGoals,aGoals,tot});
					    });

					    const n=h2h.length;
					    const avgGoals=totalGoals/n;
					    const avgH=hGoalsTotal/n;
					    const avgA=aGoalsTotal/n;

					    // Tendance sur les 5 derniers vs globale
					    const last5n=Math.min(5,n);
					    const last5avg=last5.slice(0,last5n).reduce((s,m)=>s+m.tot,0)/last5n;
					    const trendUp=last5avg>avgGoals+0.3;
					    const trendDown=last5avg<avgGoals-0.3;

					    return{hW,aW,draws,n,over05,over15,over25,over35,over45,btts,hCS,aCS,
					           hFirst,aFirst,noFirst,avgGoals,avgH,avgA,
					           last5,last5H,last5A,last5D,last5avg,trendUp,trendDown,
					           pct:(x)=>Math.round(x/n*100)};
					  })();

					  // ── Analyse équipe (depuis historique récent si dispo, sinon H2H) ──
					  const analyseTeam=(history,teamGoals,concededGoals,n)=>{
					    // Force d'attaque = buts marqués / match
					    const atk=teamGoals/n;
					    // Force défensive = buts concédés / match (moins c'est mieux)
					    const def=concededGoals/n;
					    // Clean sheets %
					    const cs_pct=history.filter?.(m=>m.conceded===0).length/n*100 ?? 0;
					    // Rating attaque 0-10
					    const atkRating=Math.min(10,atk*2.5);
					    // Rating défense 0-10 (inverser: moins de buts concédés = meilleure défense)
					    const defRating=Math.min(10,Math.max(0,10-(def*3)));
					    // Équilibre = différence entre atk et def
					    const balance=atkRating-defRating;
					    const profile=balance>2?"🗡️ Offensif":balance<-2?"🛡️ Défensif":"⚖️ Équilibré";
					    const overall=(atkRating+defRating)/2;
					    return{atk:atk.toFixed(2),def:def.toFixed(2),atkRating,defRating,overall,profile,balance};
					  };

					  const hProfile=analyseTeam(homeHistory,h2hStats.avgH,h2hStats.avgA,h2hStats.n);
					  const aProfile=analyseTeam(awayHistory,h2hStats.avgA,h2hStats.avgH,h2hStats.n);

					  // ── Score de probabilité intelligent ──
					  const calcProba=(()=>{
					    // Base: résultats H2H pondérés (récents = plus de poids)
					    let hScore=0,aScore=0,dScore=0;
					    h2h.forEach((m,i)=>{
					      const w=Math.max(1,h2h.length-i); // poids décroissant
					      const isHome=m.teams.home.id===hid;
					      const hG=isHome?m.goals.home??0:m.goals.away??0;
					      const aG=isHome?m.goals.away??0:m.goals.home??0;
					      if(hG>aG)hScore+=w;
					      else if(aG>hG)aScore+=w;
					      else dScore+=w;
					    });
					    const total=hScore+aScore+dScore||1;
					    let hp=hScore/total,ap=aScore/total,dp=dScore/total;

					    // Ajustement par profil attaque/défense
					    const atkAdj=(hProfile.atkRating-aProfile.defRating)*0.02;
					    const defAdj=(aProfile.atkRating-hProfile.defRating)*0.02;
					    hp=Math.max(0.05,hp+atkAdj);
					    ap=Math.max(0.05,ap+defAdj);
					    dp=Math.max(0.05,1-hp-ap);

					    // Normaliser
					    const s=hp+ap+dp;
					    hp=hp/s;ap=ap/s;dp=dp/s;

					    // Prédiction Over/Under basée sur profil + H2H
					    const expGoals=(hProfile.atk*1+aProfile.atk*1+h2hStats.avgGoals)/3;
					    const ou25=h2hStats.pct(h2hStats.over25);
					    const ou15=h2hStats.pct(h2hStats.over15);
					    const ou35=h2hStats.pct(h2hStats.over35);

					    // Confiance = plus on a de matchs, plus c'est fiable
					    const confidence=Math.min(100,h2hStats.n*10);

					    return{hp:Math.round(hp*100),ap:Math.round(ap*100),dp:Math.round(dp*100),
					           expGoals:expGoals.toFixed(1),ou25,ou15,ou35,confidence};
					  })();

					  // ── xG depuis stats live ──
					  const hXG=parseFloat(hSt.find?.(x=>x.type==="expected_goals")?.value)||null;
					  const aXG=parseFloat(aSt.find?.(x=>x.type==="expected_goals")?.value)||null;

					  // ─────────────────────────────────────────────
					  // COMPOSANTS UI
					  // ─────────────────────────────────────────────

					  const pct=h2hStats.pct;

					  const MiniBar=({val,max=100,color="#00b86b",label,sub})=><div style={{marginBottom:8}}>
					    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
					      <span style={{fontSize:11,color:T.t2,fontWeight:600}}>{label}</span>
					      <span style={{fontSize:12,fontWeight:800,color}}>{val}%</span>
					    </div>
					    <div style={{height:6,borderRadius:3,background:T.bg3,overflow:"hidden"}}>
					      <div style={{height:"100%",width:`${val}%`,background:color,borderRadius:3,transition:"width .7s ease"}}/>
					    </div>
					    {sub&&<div style={{fontSize:10,color:T.t3,marginTop:2}}>{sub}</div>}
					  </div>;

					  const SectionTitle=({icon,label})=><div style={{display:"flex",alignItems:"center",gap:7,padding:"14px 16px 10px",borderTop:`1px solid ${T.line}`}}>
					    <span style={{fontSize:14}}>{icon}</span>
					    <span className="bc" style={{fontSize:11,fontWeight:800,color:T.t3,letterSpacing:1.2,textTransform:"uppercase"}}>{label}</span>
					  </div>;

					  const ProfilGauge=({team,profile})=>{
					    const atkW=`${Math.round(profile.atkRating*10)}%`;
					    const defW=`${Math.round(profile.defRating*10)}%`;
					    return<div style={{flex:1,background:T.bg2,border:`1px solid ${T.line}`,borderRadius:14,padding:"12px 10px"}}>
					      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>
					        <Logo src={team.logo} size={20}/>
					        <span style={{fontSize:11,fontWeight:700,color:T.t1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{team.name}</span>
					      </div>
					      <div style={{textAlign:"center",marginBottom:10}}>
					        <span style={{fontSize:13,fontWeight:800,color:T.t2}}>{profile.profile}</span>
					      </div>
					      <div style={{marginBottom:6}}>
					        <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
					          <span style={{fontSize:10,color:T.t3}}>Attaque</span>
					          <span style={{fontSize:11,fontWeight:700,color:T.green}}>{Number(profile.atk).toFixed(1)} but/m</span>
					        </div>
					        <div style={{height:5,borderRadius:3,background:T.bg3}}>
					          <div style={{height:"100%",width:atkW,background:`linear-gradient(90deg,${T.green},${T.greenB})`,borderRadius:3}}/>
					        </div>
					      </div>
					      <div>
					        <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
					          <span style={{fontSize:10,color:T.t3}}>Défense</span>
					          <span style={{fontSize:11,fontWeight:700,color:T.blueB}}>{Number(profile.def).toFixed(1)} enc/m</span>
					        </div>
					        <div style={{height:5,borderRadius:3,background:T.bg3}}>
					          <div style={{height:"100%",width:defW,background:`linear-gradient(90deg,${T.blueB},#82b1ff)`,borderRadius:3}}/>
					        </div>
					      </div>
					      <div style={{textAlign:"center",marginTop:10,padding:"5px 0",background:T.bg3,borderRadius:8}}>
					        <span style={{fontSize:11,fontWeight:800,color:T.gold}}>{profile.atk} buts marqués | {profile.def} enc.</span>
					      </div>
					    </div>;
					  };

					  return<div style={{paddingBottom:40,animation:"fadeIn .2s ease"}}>

					    {/* ── HEADER ÉQUIPES ── */}
					    <div style={{display:"flex",alignItems:"center",padding:"14px 16px",borderBottom:`1px solid ${T.line}`,gap:12}}>
					      <div style={{flex:1,display:"flex",alignItems:"center",gap:8}}>
					        <Logo src={homeTeam.logo} size={28}/>
					        <span className="bc" style={{fontSize:14,fontWeight:800,color:T.t1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{homeTeam.name}</span>
					      </div>
					      <span className="bc" style={{fontSize:11,fontWeight:700,color:T.t3}}>VS</span>
					      <div style={{flex:1,display:"flex",alignItems:"center",gap:8,justifyContent:"flex-end"}}>
					        <span className="bc" style={{fontSize:14,fontWeight:800,color:T.t1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",textAlign:"right"}}>{awayTeam.name}</span>
					        <Logo src={awayTeam.logo} size={28}/>
					      </div>
					    </div>

					    {/* ── xG LIVE (si dispo) ── */}
					    {hXG!==null&&aXG!==null&&<div style={{margin:"12px 16px 0",background:"linear-gradient(135deg,rgba(41,121,255,.08),rgba(41,121,255,.04))",border:"1px solid rgba(41,121,255,.2)",borderRadius:14,padding:"14px"}}>
					      <div className="bc" style={{fontSize:10,fontWeight:800,color:"#82b1ff",letterSpacing:1.5,textTransform:"uppercase",marginBottom:12,textAlign:"center"}}>⚡ xG — Buts Attendus (Live)</div>
					      <div style={{display:"flex",alignItems:"center",gap:12}}>
					        <div style={{flex:1,textAlign:"center"}}>
					          <img src={homeTeam.logo} alt="" style={{width:26,height:26,objectFit:"contain",marginBottom:4}}/>
					          <div className="bc" style={{fontSize:30,fontWeight:900,color:hXG>aXG?"#69f0ae":hXG<aXG?"#e53535":T.t2,lineHeight:1}}>{hXG.toFixed(2)}</div>
					        </div>
					        <div style={{textAlign:"center"}}>

					        </div>
					        <div style={{flex:1,textAlign:"center"}}>
					          <img src={awayTeam.logo} alt="" style={{width:26,height:26,objectFit:"contain",marginBottom:4}}/>
					          <div className="bc" style={{fontSize:30,fontWeight:900,color:aXG>hXG?"#69f0ae":aXG<hXG?"#e53535":T.t2,lineHeight:1}}>{aXG.toFixed(2)}</div>
					        </div>
					      </div>
					      <div style={{height:7,borderRadius:4,overflow:"hidden",display:"flex",marginTop:10,gap:2}}>
					        <div style={{flex:hXG,background:"linear-gradient(90deg,#2979ff,#82b1ff)",borderRadius:4}}/>
					        <div style={{flex:aXG,background:"linear-gradient(90deg,#e53535,#ff5252)",borderRadius:4}}/>
					      </div>
					    </div>}

					    {/* ── PRÉDICTION INTELLIGENTE ── */}
					    <SectionTitle icon="🧠" label={`Prédiction · Confiance ${calcProba.confidence}%`}/>
					    <div style={{padding:"0 16px 12px"}}>

					          <div style={{flex:calcProba.dp,background:T.bg3,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",borderLeft:`1px solid ${T.line}`,borderRight:`1px solid ${T.line}`,minWidth:36}}>

					            <span className="bc" style={{fontSize:16,fontWeight:900,color:"#fff"}}>{calcProba.ap}%</span>
					            <span style={{fontSize:8,color:"rgba(255,255,255,.7)",letterSpacing:.5}}>EXT</span>
					          </div>
					        </div>
					        <div style={{display:"flex",padding:"6px 12px"}}>
					          <div style={{flex:1,display:"flex",alignItems:"center",gap:4}}>
					            <Logo src={homeTeam.logo} size={14}/>
					            <span style={{fontSize:10,color:T.t3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{homeTeam.name}</span>
					          </div>
					          <div style={{flex:1,display:"flex",alignItems:"center",gap:4,justifyContent:"flex-end"}}>
					            <span style={{fontSize:10,color:T.t3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{awayTeam.name}</span>
					            <Logo src={awayTeam.logo} size={14}/>
					          </div>
					        </div>
					      </div>

					      {/* Buts attendus */}
					      <div style={{background:T.bg2,border:`1px solid ${T.line}`,borderRadius:12,padding:"12px 14px",display:"flex",alignItems:"center",gap:12}}>
					        <div style={{fontSize:28}}>⚽</div>
					        <div style={{flex:1}}>
					          <div style={{fontSize:11,color:T.t3,marginBottom:2}}>Buts attendus dans ce match</div>
					          <div className="bc" style={{fontSize:22,fontWeight:900,color:T.gold,lineHeight:1}}>{calcProba.expGoals} buts</div>
					          <div style={{fontSize:10,color:T.t4,marginTop:2}}>Moyenne H2H: {h2hStats.avgGoals.toFixed(2)} · Tendance: {h2hStats.trendUp?"📈 hausse":h2hStats.trendDown?"📉 baisse":"➡️ stable"}</div>
					        </div>
					      </div>
					    </div>

					    {/* ── BILAN H2H ── */}
					    <SectionTitle icon="⚔️" label={`Bilan H2H · ${h2hStats.n} matchs`}/>
					    <div style={{padding:"0 16px 12px"}}>
					      <div style={{display:"flex",gap:6,marginBottom:12}}>
					        <div style={{flex:h2hStats.hW,background:"linear-gradient(135deg,#2979ff,#1565c0)",borderRadius:10,padding:"10px 0",textAlign:"center",minWidth:44}}>
					          <div className="bc" style={{fontSize:24,fontWeight:900,color:"#fff"}}>{h2hStats.hW}</div>
					          <div style={{fontSize:8,color:"rgba(255,255,255,.7)",fontWeight:700,letterSpacing:.5}}>VICTOIRES</div>
					          <Logo src={homeTeam.logo} size={16} style={{margin:"4px auto 0"}}/>
					        </div>
					        <div style={{flex:h2hStats.draws,background:T.bg3,border:`1px solid ${T.line}`,borderRadius:10,padding:"10px 0",textAlign:"center",minWidth:36}}>
					          <div className="bc" style={{fontSize:24,fontWeight:900,color:T.t2}}>{h2hStats.draws}</div>
					          <div style={{fontSize:8,color:T.t3,fontWeight:700,letterSpacing:.5}}>NULS</div>
					        </div>
					        <div style={{flex:h2hStats.aW,background:"linear-gradient(135deg,#e53535,#c62828)",borderRadius:10,padding:"10px 0",textAlign:"center",minWidth:44}}>
					          <div className="bc" style={{fontSize:24,fontWeight:900,color:"#fff"}}>{h2hStats.aW}</div>
					          <div style={{fontSize:8,color:"rgba(255,255,255,.7)",fontWeight:700,letterSpacing:.5}}>VICTOIRES</div>
					          <Logo src={awayTeam.logo} size={16} style={{margin:"4px auto 0"}}/>
					        </div>
					      </div>

					      {/* 5 derniers H2H */}
					      <div style={{display:"flex",gap:4,marginBottom:4}}>
					        {h2h.slice(0,5).map((m,i)=>{
					          const isHome=m.teams.home.id===hid;
					          const hG=isHome?m.goals.home??0:m.goals.away??0;
					          const aG=isHome?m.goals.away??0:m.goals.home??0;
					          const res=hG>aG?"W":aG>hG?"L":"D";
					          const bg=res==="W"?"#2979ff":res==="L"?"#e53535":T.bg4;
					          return<div key={i} style={{flex:1,background:bg,borderRadius:8,padding:"6px 2px",textAlign:"center",minWidth:0}}>
					            <div className="bc" style={{fontSize:12,fontWeight:900,color:"#fff"}}>{res}</div>
					            <div style={{fontSize:9,color:"rgba(255,255,255,.7)",marginTop:1}}>{hG}-{aG}</div>
					          </div>;
					        })}
					      </div>
					      <div style={{fontSize:9,color:T.t4,textAlign:"center",marginBottom:4}}>5 dernières confrontations (domicile = {homeTeam.name})</div>
					    </div>

					    {/* ── PROFILS ÉQUIPES ── */}
					    <SectionTitle icon="📊" label="Profil des équipes"/>
					    <div style={{padding:"0 16px 12px",display:"flex",gap:8}}>
					      <ProfilGauge team={homeTeam} profile={hProfile}/>
					      <ProfilGauge team={awayTeam} profile={aProfile}/>
					    </div>

					    {/* ── OVER / UNDER ── */}
					    <SectionTitle icon="🎯" label="Over / Under"/>
					    <div style={{padding:"0 16px 12px"}}>
					      <div style={{background:T.bg2,border:`1px solid ${T.line}`,borderRadius:14,padding:"14px"}}>
					        <MiniBar val={pct(h2hStats.over15)} color={T.green} label="Over 1.5" sub={`${h2hStats.over15}/${h2hStats.n} matchs · Moy: ${h2hStats.avgGoals.toFixed(1)} buts/match`}/>
					        <MiniBar val={pct(h2hStats.over25)} color={pct(h2hStats.over25)>55?T.green:T.orange} label="Over 2.5" sub={`${h2hStats.over25}/${h2hStats.n} matchs`}/>
					        <MiniBar val={pct(h2hStats.over35)} color={pct(h2hStats.over35)>50?T.orange:T.red} label="Over 3.5" sub={`${h2hStats.over35}/${h2hStats.n} matchs`}/>
					        <MiniBar val={pct(h2hStats.over45)} color={T.red} label="Over 4.5" sub={`${h2hStats.over45}/${h2hStats.n} matchs`}/>
					      </div>
					    </div>

					    {/* ── BTTS ── */}
					    <SectionTitle icon="⚽" label="Les 2 équipes marquent (BTTS)"/>
					    <div style={{padding:"0 16px 12px"}}>
					      <div style={{display:"flex",gap:8}}>
					        <div style={{flex:1,background:h2hStats.btts/h2hStats.n>0.5?"rgba(0,184,107,.1)":T.bg2,border:`1px solid ${h2hStats.btts/h2hStats.n>0.5?T.green:T.line}`,borderRadius:14,padding:"14px",textAlign:"center"}}>
					          <div style={{fontSize:24,marginBottom:4}}>✅</div>
					          <div className="bc" style={{fontSize:26,fontWeight:900,color:T.green,lineHeight:1}}>{pct(h2hStats.btts)}%</div>
					          <div style={{fontSize:10,color:T.t3,marginTop:4,fontWeight:700}}>BTTS OUI</div>
					          <div style={{fontSize:10,color:T.t4,marginTop:2}}>{h2hStats.btts}/{h2hStats.n} matchs</div>
					        </div>
					        <div style={{flex:1,background:T.bg2,border:`1px solid ${T.line}`,borderRadius:14,padding:"14px",textAlign:"center"}}>
					          <div style={{fontSize:24,marginBottom:4}}>❌</div>
					          <div className="bc" style={{fontSize:26,fontWeight:900,color:T.red,lineHeight:1}}>{pct(h2hStats.n-h2hStats.btts)}%</div>
					          <div style={{fontSize:10,color:T.t3,marginTop:4,fontWeight:700}}>BTTS NON</div>
					          <div style={{fontSize:10,color:T.t4,marginTop:2}}>{h2hStats.n-h2hStats.btts}/{h2hStats.n} matchs</div>
					        </div>
					      </div>
					    </div>

					    {/* ── CLEAN SHEETS & PREMIER À MARQUER ── */}
					    <SectionTitle icon="🔒" label="Défense & Cage inviolée"/>
					    <div style={{padding:"0 16px 12px"}}>
					      <div style={{background:T.bg2,border:`1px solid ${T.line}`,borderRadius:14,padding:"14px"}}>
					        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
					          <Logo src={homeTeam.logo} size={18}/>
					          <div style={{flex:1}}>
					            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
					              <span style={{fontSize:11,color:T.blueB,fontWeight:700}}>Clean Sheet {pct(h2hStats.hCS)}%</span>
					              <span style={{fontSize:11,color:T.red,fontWeight:700}}>Clean Sheet {pct(h2hStats.aCS)}%</span>
					            </div>
					            <div style={{height:7,borderRadius:4,overflow:"hidden",display:"flex",gap:2}}>
					              <div style={{flex:h2hStats.hCS,background:"linear-gradient(90deg,#2979ff,#82b1ff)",borderRadius:4}}/>
					              <div style={{flex:h2hStats.n-h2hStats.hCS,background:T.bg4,borderRadius:4}}/>

					          <span>cage inviolée</span>
					          <span>{h2hStats.aCS}/{h2hStats.n} matchs</span>
					        </div>

					    </div>

					    {/* ── PREMIER À MARQUER ── */}
					    <SectionTitle icon="🥇" label="Premier à marquer"/>
					    <div style={{padding:"0 16px 12px"}}>
					      <div style={{background:T.bg2,border:`1px solid ${T.line}`,borderRadius:14,padding:"14px"}}>
					        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
					          <Logo src={homeTeam.logo} size={20}/>
					          <div style={{flex:1}}>
					            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>

					        {[

					          h2hStats.aW>h2hStats.hW?`✅ ${awayTeam.name} domine les confrontations directes (${h2hStats.aW}V/${h2hStats.n}M)`:

					//

					//
					function ScoresTab({favs,onFav}){
					  const[date,setDate]=useState(today()),[data,setData]=useState([]),[st,setSt]=useState("load"),[err,setErr]=useState("");
					  const[detail,setDet]=useState(null),[q,setQ]=useState(""),[lg,setLg]=useState(null),[favOnly,setFO]=useState(false);
					  const[picker,setPicker]=useState(false),[cd,setCd]=useState(15),[spin,setSpin]=useState(false);
					  const stripRef=useRef(null),timerRef=useRef(null),cdRef=useRef(null),loadRef=useRef(null);
					  const isToday=date===today();

					  // hasLive stable via useMemo   safe pour useEffect deps
					  const hasLive=useMemo(()=>data.some(f=>LIVE_ST.has(f?.fixture?.status?.short)),[data]);
					  const liveInterval=15;

					  const load=useCallback(async(silent=false)=>{
					    if(!silent){setSt("load");setErr("");}else setSpin(true);
					    try{
					      const d=await api(`/fixtures?date=${date}&timezone=Europe/Paris`,15000);
					      setData(d);
					      if(!silent)setSt("ok");
					    }
					    catch(e){if(!silent){setSt("err");setErr(e.message);}}
					    finally{if(silent)setSpin(false);}
					  },[date]);

					  useEffect(()=>{loadRef.current=load;},[load]);
					  useEffect(()=>{
					    const ctrl=new AbortController();
					    setData([]);
					    load(false,ctrl.signal);
					    return()=>ctrl.abort();
					  },[load]);

					  // Timer adaptatif selon nb matchs live — économie quota
					  const liveCount=useMemo(()=>data.filter(f=>LIVE_ST.has(f?.fixture?.status?.short)).length,[data]);
					  const adaptiveInterval=liveCount>=4?15:liveCount>=1?30:60; // 15s/30s/60s

					  useEffect(()=>{
					    clearInterval(timerRef.current);clearInterval(cdRef.current);
					    if(!isToday){setCd(null);return;}
					    const iv=adaptiveInterval;
					    setCd(iv);
					    timerRef.current=setInterval(()=>loadRef.current(true),iv*1000);
					    cdRef.current=setInterval(()=>setCd(c=>c<=1?iv:c-1),1000);
					    return()=>{clearInterval(timerRef.current);clearInterval(cdRef.current);};
					  },[date,isToday,adaptiveInterval]);
					  useEffect(()=>{const t=setTimeout(()=>stripRef.current?.querySelector("[data-td='1']")?.scrollIntoView({inline:"center",block:"nearest"}),80);return()=>clearTimeout(t);},[]);

					  const openMatch=useCallback(async id=>{
					    if(openMatch._ctrl) openMatch._ctrl.abort();
					    openMatch._ctrl=new AbortController();
					    const sig=openMatch._ctrl.signal;

					    // Phase 1 — Affichage IMMÉDIAT depuis cache si dispo
					    const cached=_cache.get(`/fixtures?id=${id}`);
					    const cachedFix=cached?.d?.[0]??null;
					    if(cachedFix){
					      setDet({partial:true,data:{fixture:cachedFix,stats:[],events:[],lineups:[],players:[],h2h:[],injuries:[]}});
					    } else {
					      setDet({loading:true});
					    }

					    try{
					      // Cache adaptatif selon statut match
					      const sh=cachedFix?.fixture?.status?.short??"NS";
					      const isLive=LIVE_ST.has(sh);
					      const isDone=DONE_ST.has(sh);
					      const matchTTL=isLive?15000:isDone?10800000:21600000;
					      const detailTTL=isLive?15000:isDone?10800000:3600000;

					      const fx=await api(`/fixtures?id=${id}`,matchTTL,sig);
					      const fix=fx[0];if(!fix)throw new Error("Match introuvable");
					      const started=!NS_ST.has(fix.fixture.status.short);
					      const hid=fix.teams.home.id,aid=fix.teams.away.id,fid=fix.fixture.id;

					      // Phase 2 — Events + Stats en premier (plus utiles visuellement)
					      const[evts,stats]=await Promise.all([
					        started?api(`/fixtures/events?fixture=${fid}`,detailTTL,sig).catch(()=>[]):Promise.resolve([]),
					        started?api(`/fixtures/statistics?fixture=${fid}`,detailTTL,sig).catch(()=>[]):Promise.resolve([]),
					      ]);
					      setDet(prev=>({...prev,partial:true,data:{...prev?.data,fixture:fix,stats,events:evts}}));

					      // Phase 3 — Lineups + Players + H2H + Injuries (secondaire)
					      const[lineups,plrs,h2h,injuries]=await Promise.all([
					        api(`/fixtures/lineups?fixture=${fid}`,detailTTL,sig).catch(()=>[]),
					        started?api(`/fixtures/players?fixture=${fid}`,detailTTL,sig).catch(()=>[]):Promise.resolve([]),
					        api(`/fixtures/headtohead?h2h=${hid}-${aid}&last=50`,86400000,sig).catch(()=>[]),
					        api(`/injuries?fixture=${fid}`,isDone?10800000:3600000,sig).catch(()=>[]),
					      ]);
					      setDet({data:{fixture:fix,stats,events:evts,lineups,players:plrs,h2h,injuries}});
					    }catch(e){if(e.name!=="AbortError")setDet({error:e.message});}
					  },[]);

					  const groups=useMemo(()=>{
					    let list=data;
					    if(lg)list=list.filter(f=>f.league.id===lg);
					    if(q.trim()){const s=q.toLowerCase();list=list.filter(f=>f.teams.home.name.toLowerCase().includes(s)||f.teams.away.name.toLowerCase().includes(s)||f.league.name.toLowerCase().includes(s));}
					    if(favOnly)list=list.filter(f=>favs.has(f.fixture.id));
					    const map={};
					    list.forEach(f=>{if(!map[f.league.id])map[f.league.id]={lg:f.league,matches:[]};map[f.league.id].matches.push(f);});
					    return Object.values(map).sort((a,b)=>{
					      const al=a.matches.some(m=>LIVE_ST.has(m.fixture.status.short))?1:0,bl=b.matches.some(m=>LIVE_ST.has(m.fixture.status.short))?1:0;
					      if(al!==bl)return bl-al;
					      const pi=l=>LEAGUES.findIndex(x=>x.id===l.lg.id);
					      return(pi(a)<0?999:pi(a))-(pi(b)<0?999:pi(b));
					    });
					  },[data,lg,q,favOnly,favs]);

					  const lv=data.filter(f=>LIVE_ST.has(f.fixture.status.short)).length;
					  const sel=LEAGUES.find(l=>l.id===lg);
					  const dates=useMemo(()=>Array.from({length:15},(_,i)=>{const d=new Date();d.setDate(d.getDate()+i-7);return d.toISOString().slice(0,10);}),[]);
					  const DAY=["D","L","M","M","J","V","S"];

					  return<div style={{display:"flex",flexDirection:"column",height:"100%",width:"100%",overflow:"hidden"}}>
					    {/* Status bar */}
					    <div style={{display:"flex",alignItems:"center",gap:8,padding:"6px 14px",background:T.bg1,borderBottom:`1px solid ${T.line}`,flexShrink:0,minHeight:44,width:"100%",boxShadow:"inset 0 -1px 0 rgba(255,255,255,.04)"}}>
					      {lv>0?<><div style={{width:8,height:8,borderRadius:"50%",background:T.red,animation:"pulseR 2s infinite",flexShrink:0}}/><span style={{fontSize:11,fontWeight:800,color:T.red}}>{lv} en direct</span></>:st==="ok"?<span style={{fontSize:11,color:T.t3}}>{data.length} matchs</span>:null}
					      {spin&&<Spin s={13}/>}
					      <div style={{flex:1}}/>
					      <button onClick={()=>setFO(v=>!v)} style={{background:favOnly?T.goldL:"none",border:`1px solid ${favOnly?T.gold:T.bg4}`,color:favOnly?T.gold:T.t3,borderRadius:8,padding:"3px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>★ Favoris</button>
					      <div onClick={()=>load(true)} style={{display:"flex",alignItems:"center",gap:5,cursor:"pointer",background:T.bg3,border:`1px solid ${T.bg4}`,borderRadius:8,padding:"4px 9px"}}>
					        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke={spin?T.red:T.t3} strokeWidth="2.5" style={{animation:spin?"spin .65s linear infinite":"none"}}><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
					        {cd!=null&&!spin&&<span style={{fontSize:10,color:cd<=15?T.red:T.t3,fontWeight:700}}>{cd}s</span>}
					      </div>
					    </div>
					    {/* Bande dates */}
					    <div ref={stripRef} style={{display:"flex",gap:5,overflowX:"auto",padding:"10px 14px 10px",background:T.bg0,borderBottom:`1px solid ${T.line}`,flexShrink:0,width:"100%"}}>
					      {dates.map(d=>{const td=d===today(),ac=d===date,dt=new Date(d+"T12:00:00");return<div key={d} data-td={td?"1":"0"} onClick={()=>setDate(d)} style={{
					        display:"flex",flexDirection:"column",alignItems:"center",gap:3,
					        flexShrink:0,cursor:"pointer",width:42,padding:"7px 0",
					        borderRadius:11,transition:"all .15s",
					        background:ac?"linear-gradient(135deg,#e53535,#c62828)":td?T.redL:"transparent",
					        border:`1px solid ${ac?"transparent":td?"rgba(229,53,53,.3)":"transparent"}`,
					        boxShadow:ac?T.shadowRed:"none",
					      }}>
					        <span className="bc" style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:.8,color:ac?"rgba(255,255,255,.8)":td?T.red:T.t4}}>{DAY[dt.getDay()]}</span>
					        <span className="bc" style={{fontSize:18,fontWeight:900,color:ac?"#fff":td?T.red:T.t2,lineHeight:1}}>{dt.getDate()}</span>
					      </div>;})}
					    </div>
					    {/* Filtres */}
					    <div style={{display:"flex",gap:7,padding:"8px 14px",background:T.bg0,borderBottom:`1px solid ${T.line}`,flexShrink:0,width:"100%"}}>
					      <div style={{position:"relative",flex:1}}>
					        <svg style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)"}} width="12" height="12" fill="none" stroke={T.t3} strokeWidth="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
					        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Équipe ou compétition..." style={{
					          width:"100%",background:T.bg2,border:`1px solid ${T.line}`,
					          borderRadius:10,padding:"8px 28px 8px 30px",
					          color:T.t1,fontSize:16,outline:"none",transition:"border-color .15s",
					        }}
					        onFocus={e=>e.target.style.borderColor="rgba(229,53,53,.4)"}
					        onBlur={e=>e.target.style.borderColor=T.line}
					        />
					        {q&&<button onClick={()=>setQ("")} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:T.t3,fontSize:13,cursor:"pointer"}}>✕</button>}
					      </div>
					      <button onClick={()=>setPicker(true)} style={{
					        display:"flex",alignItems:"center",gap:6,
					        background:lg?T.redL:T.bg2,
					        border:`1px solid ${lg?T.red:T.line}`,
					        borderRadius:10,padding:"8px 11px",
					        color:lg?T.red:T.t2,fontSize:12,fontWeight:700,cursor:"pointer",flexShrink:0,
					        transition:"all .15s",
					      }}>
					        {sel?<><span>{sel.flag}</span><span className="bc" style={{fontWeight:700}}>{sel.name}</span></>:<span className="bc" style={{fontWeight:700}}>Ligues</span>}
					        <span style={{fontSize:10,opacity:.6}}>▾</span>
					      </button>
					      {lg&&<button onClick={()=>setLg(null)} style={{border:`1px solid ${T.line}`,color:T.t3,borderRadius:10,padding:"8px 10px",fontSize:12,cursor:"pointer",background:"none",flexShrink:0}}>✕</button>}
					    </div>
					    {/* Liste */}
					    <div style={{flex:1,overflowY:"auto",paddingBottom:"env(safe-area-inset-bottom)"}}>
					      {st==="load"?<SkRows/>
					      :st==="err"?<div style={{textAlign:"center",padding:"52px 24px"}}><div style={{fontSize:44,marginBottom:16}}>⚠️</div><div style={{fontSize:14,color:T.t2,marginBottom:24,lineHeight:1.5}}>{err}</div><button onClick={()=>load()} style={{background:T.red,border:"none",color:"#fff",borderRadius:10,padding:"12px 28px",fontSize:14,fontWeight:700,cursor:"pointer"}}>Réessayer</button></div>

					function FormBadge({c}){
					  const bg=c==="W"?"#00b86b":c==="L"?"#e53535":"#888";
					  return<div className="bc" style={{
					    width:16,height:16,borderRadius:4,background:bg,

					    fontSize:9,fontWeight:900,color:"#fff",flexShrink:0,

					}

					function StRow({r,zc,viewMode}){
					  const isTop=r.rank<=3;
					  const src=viewMode==="home"?r.home:viewMode==="away"?r.away:r.all;
					  const qColor=zc(r.description);
					  const bp=src?.goals?.for??r.all?.goals?.for??0;

					  const gd=r.goalsDiff;
					  return<div style={{

					//
					function KnockoutMatch({m}){
					  if(!m) return<div style={{height:56,background:T.bg3,borderRadius:10,opacity:.2,border:`1px solid ${T.line}`}}/>;
					  const h=m.teams?.home,a=m.teams?.away,sh=m.fixture?.status?.short;
					  const live=["1H","2H","HT","ET","P"].includes(sh);
					  const done=["FT","AET","PEN"].includes(sh);

					function CalendarTab({favs,onFav}){

					  useEffect(()=>{
					    let c=false;setSt("load");setByD({});
					    const from=today(),to=new Date();to.setDate(to.getDate()+28);
					    api(`/fixtures?league=${lid}&season=${s}&from=${from}&to=${to.toISOString().slice(0,3600000)}&status=NS`,3600000)
					      .then(data=>{if(c)return;const g={};data.forEach(f=>{const d=f.fixture.date.slice(0,10);if(!g[d])g[d]=[];g[d].push(f);});setByD(g);setSt("ok");})
					      .catch(()=>{if(!c)setSt("err");});
					    return()=>{c=true;};
					  },[lid,s]);
					  const openMatch=useCallback(async id=>{
					    if(openMatch._ctrl) openMatch._ctrl.abort();
					    openMatch._ctrl=new AbortController();
					    const sig=openMatch._ctrl.signal;

					    // Phase 1 — Affichage immédiat depuis cache si dispo
					    const cached=_cache.get(`/fixtures?id=${id}`);
					    const cachedFix=cached?.d?.[0]??null;
					    if(cachedFix){
					      setDt({partial:true,data:{fixture:cachedFix,stats:[],events:[],lineups:[],players:[],h2h:[],injuries:[]}});
					    } else {
					      setDt({loading:true});
					    }

					    try{
					      // Cache adaptatif selon statut match
					      const sh=cachedFix?.fixture?.status?.short??"NS";
					      const isLive=LIVE_ST.has(sh);
					      const isDone=DONE_ST.has(sh);
					      const matchTTL=isLive?15000:isDone?10800000:21600000;
					      const detailTTL=isLive?15000:isDone?10800000:3600000;

					      const fx=await api(`/fixtures?id=${id}`,matchTTL,sig);
					      const fix=fx[0];if(!fix)throw new Error("Match introuvable");
					      const started=!NS_ST.has(fix.fixture.status.short);
					      const hid=fix.teams.home.id,aid=fix.teams.away.id,fid=fix.fixture.id;

					      // Phase 2 — Events + Stats (visible en premier)
					      const[evts,stats]=await Promise.all([
					        started?api(`/fixtures/events?fixture=${fid}`,detailTTL,sig).catch(()=>[]):Promise.resolve([]),
					        started?api(`/fixtures/statistics?fixture=${fid}`,detailTTL,sig).catch(()=>[]):Promise.resolve([]),
					      ]);
					      setDt(prev=>({...prev,partial:true,data:{...prev?.data,fixture:fix,stats,events:evts}}));

					      // Phase 3 — Lineups + Players + H2H + Injuries (arrière-plan)
					      const[lineups,plrs,h2h,injuries]=await Promise.all([
					        api(`/fixtures/lineups?fixture=${fid}`,detailTTL,sig).catch(()=>[]),
					        started?api(`/fixtures/players?fixture=${fid}`,detailTTL,sig).catch(()=>[]):Promise.resolve([]),
					        api(`/fixtures/headtohead?h2h=${hid}-${aid}&last=50`,86400000,sig).catch(()=>[]),
					        api(`/injuries?fixture=${fid}`,isDone?10800000:3600000,sig).catch(()=>[]),
					      ]);
					      setDt({data:{fixture:fix,stats,events:evts,lineups,players:plrs,h2h,injuries}});
					    }catch(e){if(e.name!=="AbortError")setDt({error:e.message});}
					  },[]);
					  const SEL={width:"100%",background:T.bg2,border:`1px solid ${T.bg4}`,color:T.t1,borderRadius:8,padding:"8px 11px",fontSize:12,fontWeight:600,outline:"none",cursor:"pointer"};

					      <div style={{flex:1}}><select value={s} onChange={e=>setS(+e.target.value)} style={SEL}>{SEASONS.map(x=><option key={x} value={x}>{x}/{x+1}</option>)}</select></div>
					    </div>
					    <div style={{flex:1,overflowY:"auto",paddingBottom:"env(safe-area-inset-bottom)"}}>
					      {st==="load"?<div style={{display:"flex",justifyContent:"center",padding:52}}><Spin s={26}/></div>
					      :st==="err"?<div style={{textAlign:"center",padding:"44px 24px",color:T.t3}}>Données indisponibles</div>

					        <div style={{padding:"10px 14px 5px",fontSize:11,fontWeight:700,color:T.t3,letterSpacing:1,textTransform:"uppercase",background:T.bg1,borderBottom:`1px solid ${T.line}`,borderTop:`1px solid ${T.line}`}}>{DL(d)}</div>
					        {matches.map(m=>{const isFav=favs.has(m.fixture.id);return<div key={m.fixture.id} onClick={()=>openMatch(m.fixture.id)} style={{display:"flex",alignItems:"center",padding:"11px 14px",borderBottom:`1px solid ${T.line}`,cursor:"pointer",transition:"background .12s"}} onMouseEnter={e=>e.currentTarget.style.background=T.bg2} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>

					              <div style={{flex:1,minWidth:0}}>

					                </div>
					              </div>
					              <div style={{textAlign:"right",flexShrink:0}}>
					                {transfer?.fees&&!isFree&&<span className="bc" style={{fontSize:11,fontWeight:800,color:"#00b86b",display:"block"}}>{transfer.fees}</span>}
					                {isFree&&<span className="bc" style={{fontSize:10,color:"#00b86b",fontWeight:700}}>Agent libre</span>}
					                {isLoan&&!isFree&&<span className="bc" style={{fontSize:10,color:"#ff9800",fontWeight:700}}>Prêt</span>}
					                {transfer?.date&&<span className="bc" style={{fontSize:9,color:"#bbb",display:"block",marginTop:2}}>{new Date(transfer.date).toLocaleDateString("fr-FR",{day:"2-digit",month:"short"})}</span>}
					              </div>
					            </div>;
					          })}
					        </div>)}
					      </div>}
					    </div>
					  </div>;
					}

					//
					// ONGLET RÉSULTATS PAR JOURNÉE
					//
					// ── Calculer classement à partir des matchs joués ──────────────────
					function computeStandings(allMatches,upToRound,rounds){
					  const roundsBefore=new Set(rounds.slice(0,rounds.indexOf(upToRound)+1));
					  const played=allMatches.filter(m=>{
					    const done=["FT","AET","PEN","AWD","WO"].includes(m.fixture.status.short);
					    return done&&roundsBefore.has(m.league.round);
					  });
					  const teams={};
					  const ensure=t=>{
					    if(!teams[t.id])teams[t.id]={
					      team:t,mp:0,w:0,d:0,l:0,gf:0,ga:0,pts:0,form:[],
					    };
					    return teams[t.id];
					  };
					  played.forEach(m=>{
					    const h=m.teams.home,a=m.teams.away;
					    const hg=m.goals.home??0,ag=m.goals.away??0;
					    const hRow=ensure(h),aRow=ensure(a);
					    hRow.mp++;aRow.mp++;
					    hRow.gf+=hg;hRow.ga+=ag;
					    aRow.gf+=ag;aRow.ga+=hg;
					    if(hg>ag){hRow.w++;hRow.pts+=3;hRow.form.push("W");aRow.l++;aRow.form.push("L");}
					    else if(ag>hg){aRow.w++;aRow.pts+=3;aRow.form.push("W");hRow.l++;hRow.form.push("L");}
					    else{hRow.d++;hRow.pts++;hRow.form.push("D");aRow.d++;aRow.pts++;aRow.form.push("D");}
					  });
					  return Object.values(teams).sort((a,b)=>{
					    if(b.pts!==a.pts)return b.pts-a.pts;
					    const gdB=b.gf-b.ga,gdA=a.gf-a.ga;
					    if(gdB!==gdA)return gdB-gdA;
					    return b.gf-a.gf;
					  }).map((r,i)=>({...r,rank:i+1,gd:r.gf-r.ga}));
					}

					function ResultsTab(){
					  const[lid,setLid]=useState(39);
					  const[season,setSeason]=useState(CUR_SEASON);
					  const[rounds,setRounds]=useState([]);
					  const[selRound,setSelRound]=useState("");
					  const[roundIdx,setRoundIdx]=useState(0);
					  const[matches,setMatches]=useState([]);      // matchs de la journée
					  const[allMatches,setAllMatches]=useState([]); // TOUS les matchs saison
					  const[stRounds,setStRounds]=useState("load");

					  // Charger les journées de la saison
					  useEffect(()=>{
					    let c=false;
					    setStRounds("load");setRounds([]);setSelRound("");setMatches([]);setAllMatches([]);
					    api(`/fixtures/rounds?league=${lid}&season=${season}&current=false`,21600000)
					      .then(d=>{
					        if(c)return;
					        const all=d??[];
					        setRounds(all);
					        const midIdx=Math.max(0,Math.floor(all.length/2)-1);
					        setRoundIdx(midIdx);
					        setSelRound(all[midIdx]||"");
					        setStRounds(all.length?"ok":"empty");

					  // Charger TOUS les matchs de la saison (pour calcul classement)

					        if(c)return;

					        setMatches(sorted);
					        setStMatches(sorted.length?"ok":"empty");

					          display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,
					        }}>‹</button>

					        <div style={{flex:1,textAlign:"center"}}>
					          {stRounds==="load"?<Spin/>:
					          stRounds==="ok"?<div>
					            <div className="bc" style={{fontSize:14,fontWeight:800,color:"#1a1d23"}}>{roundLabel(selRound)}</div>
					            <div className="bc" style={{fontSize:10,color:"#888"}}>{roundIdx+1} / {rounds.length}</div>

					      {tabView==="results"&&stMatches==="empty"&&<div style={{textAlign:"center",padding:"60px 20px"}}>

					                }}>{a.name}</span>
					              </div>
					            </div>;

					        </div>)}
					      </div>}
					    </div>

					function App(){
					  const[scr,setScr]=useState(()=>{

					  });
					  useEffect(()=>{try{sessionStorage.setItem("wf_last_tab",scr);}catch{};},[scr]);

					  // Badge JSK — nouveaux articles
					  const[jskBadge,setJskBadge]=useState(()=>{
					    try{return parseInt(localStorage.getItem("jsk_badge")||"0");}catch{return 0;}
					  });
					  const clearJskBadge=()=>{
					    setJskBadge(0);
					    try{localStorage.setItem("jsk_badge","0");}catch{}
					  };
					  // Vérifier nouveaux articles JSK toutes les 15min
					  useEffect(()=>{
					    let alive=true;
					    const check=()=>{
					      const lastSeen=parseInt(localStorage.getItem("jsk_last_seen")||"0");
					      fetch(JSK_FEED_URL).then(r=>r.json()).then(d=>{
					        if(!alive||!d||!d.items||!d.items.length) return;
					        const newest=new Date(d.items[0].pubDate).getTime();
					        if(newest>lastSeen && lastSeen>0){
					          const newCount=d.items.filter(a=>new Date(a.pubDate).getTime()>lastSeen).length;
					          setJskBadge(newCount);
					          try{localStorage.setItem("jsk_badge",String(newCount));}catch{}
					        }
					        if(lastSeen===0) try{localStorage.setItem("jsk_last_seen",String(newest));}catch{}
					      }).catch(()=>{});
					    };
					    check();
					    const t=setInterval(check,15*60*1000);
					    return()=>{alive=false;clearInterval(t);};
					  },[]);
					  // Badge Transferts

					          setTransferBadge(newCount);
					          try{localStorage.setItem("transfer_badge",String(newCount));}catch{}
					        }
					        if(lastSeen===0) try{localStorage.setItem("transfer_last_seen",String(newest));}catch{}
					      }).catch(()=>{});

					  useEffect(()=>{const h=e=>{e.preventDefault();setIE(e);};window.addEventListener('beforeinstallprompt',h);return()=>window.removeEventListener('beforeinstallprompt',h);},[]);

					  return<div style={{background:T.bg0,height:"100svh",width:"100%",maxWidth:430,margin:"0 auto",display:"flex",flexDirection:"column",overflow:"hidden"}}>

					    <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column",width:"100%",background:T.bg0}}>

					    <div style={{height:"env(safe-area-inset-bottom)",background:T.bg0,flexShrink:0}}/>

					// Vérifier auth avant d'afficher l'app
					if(localStorage.getItem('wf_auth')!=='1'){
					  window.location.href='login.html';
					} else {
					  ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App,null));
					}
	</script>
