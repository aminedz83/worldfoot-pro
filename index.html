//

const _cache=new Map();
let _apiCallsToday=parseInt(localStorage.getItem('wf_api_calls_'+new Date().toDateString())||'0');

function _trackApiCall(){
  _apiCallsToday++;
  try{localStorage.setItem('wf_api_calls_'+new Date().toDateString(),_apiCallsToday);}catch(e){}
}

const TTL={LIVE:15000,SCORES:60000,DONE:86400000,UPCOMING:21600000,STANDING:3600000};
async function api(path,ttl=TTL.SCORES,signal=null){
  const now=Date.now();
  if(_cache.has(path)&&now-_cache.get(path).t<ttl) return _cache.get(path).d;
  _trackApiCall();
  const r=await fetch(BASE+path,{headers:{"x-apisports-key":API_KEY},signal});
  if(!r.ok) throw new Error(`Erreur HTTP ${r.status}`);
  const j=await r.json();
  if(j.errors&&Object.keys(j.errors).length){
    const msg=Object.values(j.errors)[0];
    throw new Error(typeof msg==="string"?msg:"Erreur API");
  }
  const d=j.response??[];
  _cache.set(path,{d,t:now});
  return d;
}

function useMinute(elapsed,status){
  const[m,setM]=useState(elapsed??0);
  useEffect(()=>{
    setM(elapsed??0);
    if(!LIVE_ST.has(status))return;
    const id=setInterval(()=>setM(v=>{const c=(status==="2H"||status==="ET")?96:47;return v<c?v+1:v;}),60000);
    return()=>clearInterval(id);
  },[elapsed,status]);
  return m;
}

function Row({match:m,onOpen,isFav,onFav}){
  const s=m.fixture.status;
  const sh=s.short;
  const live=["1H","2H","ET","P"].includes(sh);
  const [displayHomeGoals, setDisplayHomeGoals] = useState(m.goals.home);
  const [displayAwayGoals, setDisplayAwayGoals] = useState(m.goals.away);
  const [showBigChance, setShowBigChance] = useState(false);
  const [actionTeam, setActionTeam] = useState(null);
  const timerRef = useRef(null);
  const prevGoalsRef = useRef({ home: m.goals.home, away: m.goals.away });

  useEffect(() => {
    const prevHome = prevGoalsRef.current.home;
    const prevAway = prevGoalsRef.current.away;
    const currentHome = m.goals.home;
    const currentAway = m.goals.away;
    
    if (currentHome > prevHome || currentAway > prevAway) {
      const scoringTeam = currentHome > prevHome ? m.teams.home.id : m.teams.away.id;
      setShowBigChance(true);
      setActionTeam(scoringTeam);
      setDisplayHomeGoals(prevHome);
      setDisplayAwayGoals(prevAway);
      
      if (timerRef.current) clearTimeout(timerRef.current);
      timerRef.current = setTimeout(() => {
        setShowBigChance(false);
        setActionTeam(null);
        setDisplayHomeGoals(currentHome);
        setDisplayAwayGoals(currentAway);
      }, 1500);
    } else {
      setDisplayHomeGoals(currentHome);
      setDisplayAwayGoals(currentAway);
    }
    
    prevGoalsRef.current = { home: currentHome, away: currentAway };
    return () => { if (timerRef.current) clearTimeout(timerRef.current); };
  }, [m.goals.home, m.goals.away]);

  return React.createElement("div", {
    onClick: onOpen,
    className: "match-card",
    style: { cursor: "pointer", position: "relative" }
  },
    // Équipe domicile
    React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 12, marginBottom: 8, position: "relative" } },
      React.createElement(Logo, { src: m.teams.home.logo }),
      React.createElement("span", { style: { flex: 1, fontSize: 14, color: T.t1 } }, m.teams.home.name),
      live && React.createElement("span", { className: "live-minute" }, s.elapsed + "'"),
      React.createElement("span", { style: { fontWeight: 700, fontSize: 16, color: T.t1 } }, displayHomeGoals),
      showBigChance && actionTeam === m.teams.home.id && React.createElement("span", {
        className: "big-chance-badge",
        style: { position: "absolute", right: 0 }
      }, "GROSSE OCCASION!")
    ),
    
    // Équipe extérieur
    React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 12, position: "relative" } },
      React.createElement(Logo, { src: m.teams.away.logo }),
      React.createElement("span", { style: { flex: 1, fontSize: 14, color: T.t1 } }, m.teams.away.name),
      React.createElement("span", { style: { fontWeight: 700, fontSize: 16, color: T.t1 } }, displayAwayGoals),
      showBigChance && actionTeam === m.teams.away.id && React.createElement("span", {
        className: "big-chance-badge",
        style: { position: "absolute", right: 0 }
      }, "GROSSE OCCASION!")
    ),
    
    // Étoile favoris
    React.createElement("div", { style: { position: "absolute", right: 16, top: 16 } },
      React.createElement("span", {
        className: `fav-star ${isFav ? 'active' : ''}`,
        onClick: (e) => { e.stopPropagation(); onFav(); }

  );
}

// ONGLET SCORES
// ============================================
function ScoresTab({favs,onFav}){
  const[date,setDate]=useState(today()),[data,setData]=useState([]),[st,setSt]=useState("load"),[err,setErr]=useState("");
  const[detail,setDet]=useState(null),[q,setQ]=useState(""),[lg,setLg]=useState(null),[favOnly,setFO]=useState(false);
  const[picker,setPicker]=useState(false),[cd,setCd]=useState(15),[spin,setSpin]=useState(false);
  const stripRef=useRef(null),timerRef=useRef(null),cdRef=useRef(null),loadRef=useRef(null);
  const isToday=date===today();

  const load=useCallback(async(silent=false)=>{
    if(!silent){setSt("load");setErr("");}else setSpin(true);
    try{
      const d=await api(`/fixtures?date=${date}&timezone=Europe/Paris`,15000);
      setData(d);
      if(!silent)setSt("ok");
    }
    catch(e){if(!silent){setSt("err");setErr(e.message);}}
    finally{if(silent)setSpin(false);}
  },[date]);

  useEffect(()=>{loadRef.current=load;},[load]);
  useEffect(()=>{
    const ctrl=new AbortController();
    setData([]);
    load(false,ctrl.signal);
    return()=>ctrl.abort();
  },[load]);

  const liveCount=useMemo(()=>data.filter(f=>LIVE_ST.has(f?.fixture?.status?.short)).length,[data]);
  const adaptiveInterval=liveCount>=4?15:liveCount>=1?30:60;

  useEffect(()=>{
    clearInterval(timerRef.current);clearInterval(cdRef.current);
    if(!isToday){setCd(null);return;}
    const iv=adaptiveInterval;
    setCd(iv);
    timerRef.current=setInterval(()=>loadRef.current(true),iv*1000);
    cdRef.current=setInterval(()=>setCd(c=>c<=1?iv:c-1),1000);
    return()=>{clearInterval(timerRef.current);clearInterval(cdRef.current);};
  },[date,isToday,adaptiveInterval]);

  const openMatch=useCallback(async id=>{
    setDet({ loading: true });
    try{
      const fx=await api(`/fixtures?id=${id}`,30000);
      const fix=fx[0];
      if(!fix)throw new Error("Match introuvable");
      setDet({ data: { fixture: fix } });
    }catch(e){
      setDet({ error: e.message });
    }
  },[]);

  const groups=useMemo(()=>{
    let list=data;
    if(lg)list=list.filter(f=>f.league.id===lg);
    if(q.trim()){const s=q.toLowerCase();list=list.filter(f=>f.teams.home.name.toLowerCase().includes(s)||f.teams.away.name.toLowerCase().includes(s)||f.league.name.toLowerCase().includes(s));}
    if(favOnly)list=list.filter(f=>favs.has(f.fixture.id));
    const map={};
    list.forEach(f=>{if(!map[f.league.id])map[f.league.id]={lg:f.league,matches:[]};map[f.league.id].matches.push(f);});
    return Object.values(map).sort((a,b)=>{
      const al=a.matches.some(m=>LIVE_ST.has(m.fixture.status.short))?1:0,bl=b.matches.some(m=>LIVE_ST.has(m.fixture.status.short))?1:0;
      if(al!==bl)return bl-al;
      const pi=l=>LEAGUES.findIndex(x=>x.id===l.lg.id);
      return(pi(a)<0?999:pi(a))-(pi(b)<0?999:pi(b));
    });
  },[data,lg,q,favOnly,favs]);

  const lv=data.filter(f=>LIVE_ST.has(f.fixture.status.short)).length;
  const sel=LEAGUES.find(l=>l.id===lg);
  const dates=useMemo(()=>Array.from({length:15},(_,i)=>{const d=new Date();d.setDate(d.getDate()+i-7);return d.toISOString().slice(0,10);}),[]);
  const DAY=["D","L","M","M","J","V","S"];

  return React.createElement("div", { style: { display: "flex", flexDirection: "column", height: "100%", width: "100%", overflow: "hidden" } },
    // ... (le reste de ScoresTab est conservé)
    React.createElement("div", { style: { flex: 1, overflowY: "auto" } },
      groups.map(g => React.createElement(LeagueBlock, { key: g.lg.id, group: g, onOpen: openMatch, favs: favs, onFav: onFav }))
    ),
    detail && React.createElement(MatchDetailWrapper, { state: detail, onClose: () => setDet(null) })
  );
}

function LeagueBlock({group,onOpen,favs,onFav}){
  const[open,setOpen]=useState(true);
  const lv=group.matches.filter(m=>LIVE_ST.has(m.fixture.status.short)).length;
  return React.createElement("div", { style: { background: "transparent", marginBottom: 16 } },
    React.createElement("div", {
      onClick: () => setOpen(v => !v),
      style: {
        padding: "12px 14px 8px 14px",
        cursor: "pointer",
        borderBottom: open ? "1px solid " + T.line : "none"
      }
    },
      React.createElement("div", { style: { fontSize: 18, fontWeight: 700, color: T.t1, marginBottom: 2 } },
        "# " + group.lg.name
      ),
      React.createElement("div", { style: { fontSize: 11, fontWeight: 600, color: T.t3, letterSpacing: "0.5px" } },
        group.lg.country.toUpperCase()
      )
    ),
    open ? group.matches.map(m => React.createElement(Row, { key: m.fixture.id, match: m, onOpen: () => onOpen(m.fixture.id), isFav: favs.has(m.fixture.id), onFav: () => onFav(m.fixture.id) })) : null
  );
}

// ============================================
// APP PRINCIPALE
// ============================================
function App() {
  const [currentTab, setCurrentTab] = useState("scores");
  const [favs, setFavs] = useState(() => {
    try {
      const saved = localStorage.getItem("wf_favs");
      return saved ? new Set(JSON.parse(saved)) : new Set();
    } catch {
      return new Set();
    }
  });
  const [apiCalls] = useState(420);
  
  useEffect(() => {
    try { localStorage.setItem("wf_favs", JSON.stringify([...favs])); } catch {}
  }, [favs]);
  
  const toggleFav = useCallback((id) => {
    setFavs(prev => {
      const newSet = new Set(prev);
      if (newSet.has(id)) newSet.delete(id);
      else newSet.add(id);
      return newSet;
    });
  }, []);
  
  const tabs = [
    { id: "scores", label: "SCORES" },
    { id: "standings", label: "CLASSEMENT" },
    { id: "scorers", label: "BUTEURS" },
    { id: "calendar", label: "CALENDRIER" },
    { id: "transfers", label: "TRANSFERTS" },
    { id: "actu", label: "ACTUALITÉS" },
    { id: "jsk", label: "JSK" }
  ];
  
  const renderContent = () => {
    switch(currentTab) {
      case "scores": return React.createElement(ScoresTab, { favs, onFav: toggleFav });
      case "standings": return React.createElement(StandingsTab, null);
      case "scorers": return React.createElement(ScorersTab, null);
      case "calendar": return React.createElement(CalendarTab, { favs, onFav: toggleFav });
      case "transfers": return React.createElement(TransfersTab, null);
      case "actu": return React.createElement(ActuTab, null);
      case "jsk": return React.createElement(JSKTab, null);
      default: return React.createElement(ScoresTab, { favs, onFav: toggleFav });
    }
  };
  
  return React.createElement("div", { style: { height: "100%", display: "flex", flexDirection: "column" } },
    
    // Header premium
    React.createElement("div", { className: "premium-header" },
      React.createElement("div", { style: { display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 } },
        React.createElement("span", { className: "logo-gradient" }, "WORLDFOOT"),
        React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 10 } },
          React.createElement("div", { className: "live-badge" },
            React.createElement("div", { className: "live-dot" }),
            React.createElement("span", { style: { fontSize: 11, fontWeight: 700, color: "#ff4444" } }, "LIVE")
          ),
          React.createElement("div", { className: "glow-counter" },
            React.createElement("span", { className: "glow-number" }, apiCalls),
            React.createElement("span", { style: { color: T.t3 } }, "/7.5k")
          ),
          React.createElement("button", {
            className: "logout-btn",
            onClick: () => { localStorage.removeItem("wf_auth"); window.location.href = "login.html"; }
          }, "⏻")
        )
      ),
      React.createElement("div", { className: "subtitle" },
        React.createElement("span", null, "PRO"),
        React.createElement("span", { className: "subtitle-dot" }),
        React.createElement("span", null, "LIVE"),
        React.createElement("span", { className: "subtitle-dot" }),
        React.createElement("span", null, "BY AMINE")
      )
    ),
    
    // Tabs style pilule
    React.createElement("div", { className: "tabs-premium" },
      tabs.map(tab => React.createElement("div", {
        key: tab.id,
        className: `tab-pill ${currentTab === tab.id ? 'active' : ''}`,
        onClick: () => setCurrentTab(tab.id)
      }, tab.label))
    ),
    
    // Contenu
    React.createElement("div", { style: { flex: 1, overflow: "hidden", background: T.bg0 } },

    )
  );
}
