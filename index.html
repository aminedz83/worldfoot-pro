		<title>WorldFoot Pro</title>
		<script>
			const M = {
				name: "WorldFoot Pro",
				short_name: "WorldFoot",
				start_url: "./",
				display: "standalone",
				background_color: "#f4f5f7",
				theme_color: "#e53535",
				orientation: "portrait",
				icons: [
					{
						src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='40' fill='%2300b86b'/><text y='140' x='96' text-anchor='middle' font-size='120'>⚡</text></svg>",
						sizes: "192x192",
						type: "image/svg+xml",
					},
					{
						src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='100' fill='%2300b86b'/><text y='380' x='256' text-anchor='middle' font-size='320'>⚡</text></svg>",
						sizes: "512x512",
						type: "image/svg+xml",
					},
				],
			};
			const b = new Blob([JSON.stringify(M)], {
				type: "application/json",
			});
			const lk = document.createElement("link");
			lk.rel = "manifest";
			lk.href = URL.createObjectURL(b);
			document.head.appendChild(lk);
		</script>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@600;700;800;900&display=swap"
			rel="stylesheet"
		/>
		<link
			rel="apple-touch-icon"
			href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='36' fill='%2300b86b'/><text y='130' x='90' text-anchor='middle' font-size='100'>⚡</text></svg>"
		/>
		<script>
			// Service Worker avec support notifications
			if ("serviceWorker" in navigator) {
				const sw = `
    const C='wf-pro-v17';
    self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(['./'])).then(()=>self.skipWaiting()));});
    self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))).then(()=>self.clients.claim()));});
    self.addEventListener('push',e=>{
      const d=e.data?.json()||{};
      e.waitUntil(self.registration.showNotification(d.title||'WorldFoot Pro',{
        body:d.body||'',
        icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect width="192" height="192" rx="40" fill="%2300b86b"/><text y="140" x="96" text-anchor="middle" font-size="120">⚡</text></svg>',
        badge:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96"><rect width="96" height="96" rx="20" fill="%2300b86b"/><text y="70" x="48" text-anchor="middle" font-size="60">⚡</text></svg>',
        tag:d.tag||'wf',
        vibrate:[200,100,200],
        data:d.data||{},
      }));
    });
    self.addEventListener('notificationclick',e=>{e.notification.close();e.waitUntil(clients.openWindow('./'));});
    self.addEventListener('fetch',e=>{
      const u=e.request.url;
      if(u.includes('api-sports.io')){e.respondWith(fetch(e.request).catch(()=>new Response('{"errors":{"net":"offline"}}',{headers:{'Content-Type':'application/json'}})));return;}
      e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('./'))));
    });
  `;
				navigator.serviceWorker
					.register(
						URL.createObjectURL(
							new Blob([sw], { type: "application/javascript" })
						)
					)
					.catch(() => {});
			}
		</script>

		/>

const _cache=new Map();
let _apiCallsToday=parseInt(localStorage.getItem('wf_api_calls_'+new Date().toDateString())||'0');
let _apiCallsDate=new Date().toDateString();
function _trackApiCall(){
  const today=new Date().toDateString();
  if(today!==_apiCallsDate){_apiCallsToday=0;_apiCallsDate=today;}
  _apiCallsToday++;
  try{localStorage.setItem('wf_api_calls_'+today,_apiCallsToday);}catch(e){}
}

const TTL={LIVE:15000,SCORES:60000,DONE:86400000,UPCOMING:21600000,STANDING:3600000,H2H:86400000,LINEUP:3600000,PLAYERS:3600000,INJURIES:3600000,TRANSFERS:86400000};
async function api(path,ttl=TTL.SCORES,signal=null){
  const now=Date.now();
  if(_cache.has(path)&&now-_cache.get(path).t<ttl) return _cache.get(path).d;
  _trackApiCall();
  const r=await fetch(BASE+path,{headers:{"x-apisports-key":API_KEY},signal});
  if(!r.ok) throw new Error(`Erreur HTTP ${r.status}`);
  const j=await r.json();
  if(j.errors&&Object.keys(j.errors).length){
    const msg=Object.values(j.errors)[0];
    throw new Error(typeof msg==="string"?msg:"Erreur API");
  }
  const d=j.response??[];
  const skipCache=d.length===0&&(path.includes("/lineups")||path.includes("/players"));
  if(!skipCache)_cache.set(path,{d,t:now});
  return d;
}

function useMinute(elapsed,status){
  const[m,setM]=useState(elapsed??0);
  useEffect(()=>{
    setM(elapsed??0);
    if(!LIVE_ST.has(status))return;
    const id=setInterval(()=>setM(v=>{const c=(status==="2H"||status==="ET")?96:47;return v<c?v+1:v;}),60000);
    return()=>clearInterval(id);
  },[elapsed,status]);
  return m;
}
function useFlash(hg,ag){
  const prev=useRef({h:null,a:null}),[on,setOn]=useState(false);
  useEffect(()=>{
    const p=prev.current;prev.current={h:hg,a:ag};
    if(p.h!==null&&(hg>p.h||ag>p.a)){setOn(true);const t=setTimeout(()=>setOn(false),4000);return()=>clearTimeout(t);}
  },[hg,ag]);
  return on;
}

  const r = parseFloat(rating) || 0;
  if (r >= 8.5) return "#3f51b5";
  if (r >= 8.0) return "#2196f3";
  if (r >= 7.5) return "#4caf50";
  if (r >= 7.0) return "#8bc34a";
  if (r >= 6.5) return "#ffc107";
  if (r >= 6.0) return "#ff9800";
  if (r >= 5.0) return "#f44336";
  return "#9e9e9e";
};

  const defaultFormation = [1, 4, 3, 3];
  
  let lines = [];
  if (formation) {
    const parts = formation.split("-").map(Number);
    lines = [1, ...parts];
  } else {
    lines = defaultFormation;
  }
  
  const result = [];
  let playerIndex = 0;
  
  for (let i = 0; i < lines.length; i++) {
    const lineSize = lines[i];
    const line = [];
    
    for (let j = 0; j < lineSize && playerIndex < players.length; j++) {
      line.push(players[playerIndex]);
      playerIndex++;
    }
    
    result.push(line);
  }
  
  if (playerIndex < players.length) {
    const subs = [];
    while (playerIndex < players.length) {
      subs.push(players[playerIndex]);
      playerIndex++;
    }
    result.push(subs);
  }
  
  return result;
};

      <div style={{display:"flex",alignItems:"center",gap:8}}>

        <span style={{fontSize:14,fontWeight:hw?800:500,color:hw?"#111":aw?"#bbb":"#222",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>

      </div>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <Logo src={m.teams.away.logo} size={20}/>
        <span style={{fontSize:14,fontWeight:aw?800:500,color:aw?"#111":hw?"#bbb":"#222",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
          {an}{aRank?<span style={{fontSize:11,color:"#bbb",fontWeight:400}}>[{aRank}]</span>:null}
        </span>
      </div>
    </div>
    <div style={{width:32,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:7,flexShrink:0}}>
      {has?<>
        <span style={{fontSize:16,fontWeight:hw?900:500,color:flash?"#e53535":hw?"#111":"#999",lineHeight:1}}>{hg}</span>
        <span style={{fontSize:16,fontWeight:aw?900:500,color:flash?"#e53535":aw?"#111":"#999",lineHeight:1}}>{ag}</span>

    <button onClick={e=>{e.stopPropagation();onFav();}} style={{background:"none",border:"none",color:isFav?"#f59e0b":"#ddd",fontSize:18,padding:"0 14px 0 6px",flexShrink:0,cursor:"pointer"}}>
      {isFav?"★":"☆"}
    </button>
  </div>;
}

function AnalysePanel({h2h,homeTeam,awayTeam,hSt=[],aSt=[],homeHistory=[],awayHistory=[]}){
  if(!h2h||h2h.length===0)return<div style={{textAlign:"center",padding:"44px 20px",color:T.t3,fontSize:13}}>Pas assez de données H2H</div>;

  const hid=homeTeam.id;

  const h2hStats=(()=>{
    let hW=0,aW=0,draws=0;
    let over05=0,over15=0,over25=0,over35=0,over45=0;
    let btts=0,hCS=0,aCS=0;
    let hFirst=0,aFirst=0,noFirst=0;
    let totalGoals=0,hGoalsTotal=0,aGoalsTotal=0;
    let last5=[],last5H=0,last5A=0,last5D=0;

    h2h.forEach((m,i)=>{
      const isHome=m.teams.home.id===hid;
      const mg=m.goals.home??0,ag=m.goals.away??0;
      const hGoals=isHome?mg:ag, aGoals=isHome?ag:mg;
      const tot=hGoals+aGoals;
      totalGoals+=tot;
      hGoalsTotal+=hGoals;
      aGoalsTotal+=aGoals;
      if(hGoals>aGoals){hW++;if(i<5)last5H++;}
      else if(aGoals>hGoals){aW++;if(i<5)last5A++;}
      else{draws++;if(i<5)last5D++;}
      if(tot>0.5)over05++;
      if(tot>1.5)over15++;
      if(tot>2.5)over25++;
      if(tot>3.5)over35++;
      if(tot>4.5)over45++;
      if(hGoals>0&&aGoals>0)btts++;
      if(aGoals===0)hCS++;
      if(hGoals===0)aCS++;
      if(hGoals>0&&aGoals===0)hFirst++;
      else if(aGoals>0&&hGoals===0)aFirst++;
      else if(hGoals===0&&aGoals===0)noFirst++;
      else{hFirst+=0.5;aFirst+=0.5;}
      last5.push({hGoals,aGoals,tot});
    });

    const n=h2h.length;
    const avgGoals=totalGoals/n;
    const avgH=hGoalsTotal/n;
    const avgA=aGoalsTotal/n;

    const last5n=Math.min(5,n);
    const last5avg=last5.slice(0,last5n).reduce((s,m)=>s+m.tot,0)/last5n;
    const trendUp=last5avg>avgGoals+0.3;
    const trendDown=last5avg<avgGoals-0.3;

    return{hW,aW,draws,n,over05,over15,over25,over35,over45,btts,hCS,aCS,
           hFirst,aFirst,noFirst,avgGoals,avgH,avgA,
           last5,last5H,last5A,last5D,last5avg,trendUp,trendDown,
           pct:(x)=>Math.round(x/n*100)};
  })();

  const analyseTeam=(history,teamGoals,concededGoals,n)=>{
    const atk=teamGoals/n;
    const def=concededGoals/n;
    const cs_pct=history.filter?.(m=>m.conceded===0).length/n*100 ?? 0;
    const atkRating=Math.min(10,atk*2.5);
    const defRating=Math.min(10,Math.max(0,10-(def*3)));
    const balance=atkRating-defRating;
    const profile=balance>2?"🗡️ Offensif":balance<-2?"🛡️ Défensif":"⚖️ Équilibré";
    const overall=(atkRating+defRating)/2;
    return{atk:atk.toFixed(2),def:def.toFixed(2),atkRating,defRating,overall,profile,balance};
  };

  const hProfile=analyseTeam(homeHistory,h2hStats.avgH,h2hStats.avgA,h2hStats.n);
  const aProfile=analyseTeam(awayHistory,h2hStats.avgA,h2hStats.avgH,h2hStats.n);

  const calcProba=(()=>{
    let hScore=0,aScore=0,dScore=0;
    h2h.forEach((m,i)=>{
      const w=Math.max(1,h2h.length-i);
      const isHome=m.teams.home.id===hid;
      const hG=isHome?m.goals.home??0:m.goals.away??0;
      const aG=isHome?m.goals.away??0:m.goals.home??0;
      if(hG>aG)hScore+=w;
      else if(aG>hG)aScore+=w;
      else dScore+=w;
    });
    const total=hScore+aScore+dScore||1;
    let hp=hScore/total,ap=aScore/total,dp=dScore/total;

    const atkAdj=(hProfile.atkRating-aProfile.defRating)*0.02;
    const defAdj=(aProfile.atkRating-hProfile.defRating)*0.02;
    hp=Math.max(0.05,hp+atkAdj);
    ap=Math.max(0.05,ap+defAdj);
    dp=Math.max(0.05,1-hp-ap);

    const s=hp+ap+dp;
    hp=hp/s;ap=ap/s;dp=dp/s;

    const expGoals=(hProfile.atk*1+aProfile.atk*1+h2hStats.avgGoals)/3;
    const ou25=h2hStats.pct(h2hStats.over25);
    const ou15=h2hStats.pct(h2hStats.over15);
    const ou35=h2hStats.pct(h2hStats.over35);

    const confidence=Math.min(100,h2hStats.n*10);

    return{hp:Math.round(hp*100),ap:Math.round(ap*100),dp:Math.round(dp*100),
           expGoals:expGoals.toFixed(1),ou25,ou15,ou35,confidence};
  })();

  const hXG=parseFloat(hSt.find?.(x=>x.type==="expected_goals")?.value)||null;
  const aXG=parseFloat(aSt.find?.(x=>x.type==="expected_goals")?.value)||null;

  const pct=h2hStats.pct;

  const MiniBar=({val,max=100,color="#00b86b",label,sub})=><div style={{marginBottom:8}}>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
      <span style={{fontSize:11,color:T.t2,fontWeight:600}}>{label}</span>
      <span style={{fontSize:12,fontWeight:800,color}}>{val}%</span>
    </div>
    <div style={{height:6,borderRadius:3,background:T.bg3,overflow:"hidden"}}>
      <div style={{height:"100%",width:`${val}%`,background:color,borderRadius:3,transition:"width .7s ease"}}/>
    </div>
    {sub&&<div style={{fontSize:10,color:T.t3,marginTop:2}}>{sub}</div>}
  </div>;

  const SectionTitle=({icon,label})=><div style={{display:"flex",alignItems:"center",gap:7,padding:"14px 16px 10px",borderTop:`1px solid ${T.line}`}}>
    <span style={{fontSize:14}}>{icon}</span>
    <span className="bc" style={{fontSize:11,fontWeight:800,color:T.t3,letterSpacing:1.2,textTransform:"uppercase"}}>{label}</span>
  </div>;

  const ProfilGauge=({team,profile})=>{
    const atkW=`${Math.round(profile.atkRating*10)}%`;
    const defW=`${Math.round(profile.defRating*10)}%`;
    return<div style={{flex:1,background:T.bg2,border:`1px solid ${T.line}`,borderRadius:14,padding:"12px 10px"}}>

        <span style={{fontSize:11,fontWeight:700,color:T.t1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{team.name}</span>
      </div>
      <div style={{textAlign:"center",marginBottom:10}}>

      </div>
      <div style={{marginBottom:6}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
          <span style={{fontSize:10,color:T.t3}}>Attaque</span>
          <span style={{fontSize:11,fontWeight:700,color:T.green}}>{Number(profile.atk).toFixed(1)} but/m</span>
        </div>
        <div style={{height:5,borderRadius:3,background:T.bg3}}>
          <div style={{height:"100%",width:atkW,background:`linear-gradient(90deg,${T.green},${T.greenB})`,borderRadius:3}}/>
        </div>
      </div>
      <div>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
          <span style={{fontSize:10,color:T.t3}}>Défense</span>
          <span style={{fontSize:11,fontWeight:700,color:T.blueB}}>{Number(profile.def).toFixed(1)} enc/m</span>
        </div>
        <div style={{height:5,borderRadius:3,background:T.bg3}}>
          <div style={{height:"100%",width:defW,background:`linear-gradient(90deg,${T.blueB},#82b1ff)`,borderRadius:3}}/>
        </div>
      </div>
      <div style={{textAlign:"center",marginTop:10,padding:"5px 0",background:T.bg3,borderRadius:8}}>
        <span style={{fontSize:11,fontWeight:800,color:T.gold}}>{profile.atk} buts marqués | {profile.def} enc.</span>
      </div>
    </div>;
  };

  return<div style={{paddingBottom:40,animation:"fadeIn .2s ease"}}>

    <div style={{display:"flex",alignItems:"center",padding:"14px 16px",borderBottom:`1px solid ${T.line}`,gap:12}}>
      <div style={{flex:1,display:"flex",alignItems:"center",gap:8}}>
        <Logo src={homeTeam.logo} size={28}/>
        <span className="bc" style={{fontSize:14,fontWeight:800,color:T.t1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{homeTeam.name}</span>
      </div>
      <span className="bc" style={{fontSize:11,fontWeight:700,color:T.t3}}>VS</span>
      <div style={{flex:1,display:"flex",alignItems:"center",gap:8,justifyContent:"flex-end"}}>
        <span className="bc" style={{fontSize:14,fontWeight:800,color:T.t1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",textAlign:"right"}}>{awayTeam.name}</span>
        <Logo src={awayTeam.logo} size={28}/>
      </div>
    </div>

    {hXG!==null&&aXG!==null&&<div style={{margin:"12px 16px 0",background:"linear-gradient(135deg,rgba(41,121,255,.08),rgba(41,121,255,.04))",border:"1px solid rgba(41,121,255,.2)",borderRadius:14,padding:"14px"}}>
      <div className="bc" style={{fontSize:10,fontWeight:800,color:"#82b1ff",letterSpacing:1.5,textTransform:"uppercase",marginBottom:12,textAlign:"center"}}>⚡ xG — Buts Attendus (Live)</div>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <div style={{flex:1,textAlign:"center"}}>
          <img src={homeTeam.logo} alt="" style={{width:26,height:26,objectFit:"contain",marginBottom:4}}/>
          <div className="bc" style={{fontSize:30,fontWeight:900,color:hXG>aXG?"#69f0ae":hXG<aXG?"#e53535":T.t2,lineHeight:1}}>{hXG.toFixed(2)}</div>
        </div>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:11,fontWeight:700,color:T.t4,letterSpacing:1}}>VS</div>
          <div style={{width:1,height:30,background:T.line,margin:"4px auto"}}/>
        </div>
        <div style={{flex:1,textAlign:"center"}}>
          <img src={awayTeam.logo} alt="" style={{width:26,height:26,objectFit:"contain",marginBottom:4}}/>
          <div className="bc" style={{fontSize:30,fontWeight:900,color:aXG>hXG?"#69f0ae":aXG<hXG?"#e53535":T.t2,lineHeight:1}}>{aXG.toFixed(2)}</div>

      <div style={{height:7,borderRadius:4,overflow:"hidden",display:"flex",marginTop:10,gap:2}}>

            <span className="bc" style={{fontSize:14,fontWeight:900,color:T.t2}}>{calcProba.dp}%</span>
            <span style={{fontSize:8,color:T.t3,letterSpacing:.5}}>NUL</span>
          </div>
          <div style={{flex:calcProba.ap,background:"linear-gradient(135deg,#e53535,#c62828)",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",minWidth:44}}>
            <span className="bc" style={{fontSize:16,fontWeight:900,color:"#fff"}}>{calcProba.ap}%</span>

        </div>

          <div style={{flex:1,display:"flex",alignItems:"center",gap:4}}>
            <Logo src={homeTeam.logo} size={14}/>
            <span style={{fontSize:10,color:T.t3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{homeTeam.name}</span>
          </div>
          <div style={{flex:1,display:"flex",alignItems:"center",gap:4,justifyContent:"flex-end"}}>
            <span style={{fontSize:10,color:T.t3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{awayTeam.name}</span>
            <Logo src={awayTeam.logo} size={14}/>

        <div style={{flex:1}}>
          <div style={{fontSize:11,color:T.t3,marginBottom:2}}>Buts attendus dans ce match</div>
          <div className="bc" style={{fontSize:22,fontWeight:900,color:T.gold,lineHeight:1}}>{calcProba.expGoals} buts</div>

function MatchDetail({state,onClose}){
  const[tab,setTab]=React.useState("resume");
  const[period,setPeriod]=React.useState("all");
  const[compoView,setCompoView]=React.useState("terrain");
  const[playerSheet,setPlayerSheet]=React.useState(null);
  const[standings,setStandings]=React.useState([]);
  const[venueInfo,setVenueInfo]=React.useState(null);
  const[teamStats,setTeamStats]=React.useState({h:null,a:null});
  const contentRef=React.useRef(null);

  const fix     =state?.data?.fixture??null;
  const stats   =state?.data?.stats??[];
  const events  =state?.data?.events??[];
  const lineups =state?.data?.lineups??[];
  const h2h     =state?.data?.h2h??[];
  const players =state?.data?.players??[];
  const injuries=state?.data?.injuries??[];

  const s  =fix?.fixture?.status??{short:"NS",elapsed:null};
  const sh =s.short;
  const hg =fix?.goals?.home??null;
  const ag =fix?.goals?.away??null;
  const has=hg!=null&&ag!=null;
  const isLive=["1H","2H","ET","P"].includes(sh);
  const isDone=["FT","AET","PEN"].includes(sh);
  const isNS  =["NS","TBD","PST","CANC"].includes(sh);

  const min=useMinute(s.elapsed,sh);

  React.useEffect(()=>{
    if(!fix)return;
    const lid=fix.league?.id,season=fix.league?.season;
    if(!lid||!season)return;
    const stTTL=isLive?60000:isDone?10800000:3600000;
    let stCancelled=false;
    const fetchSt=()=>api(`/standings?league=${lid}&season=${season}`,stTTL)
      .then(d=>{if(!stCancelled)setStandings(d);})
      .catch(()=>{});
    fetchSt();
    const stIv=isLive?setInterval(fetchSt,60000):null;
    return()=>{stCancelled=true;if(stIv)clearInterval(stIv);};
  },[fix?.fixture?.id,isLive]);

  React.useEffect(()=>{
    if(!fix?.fixture?.venue?.id)return;
    let cancelled=false;
    api(`/venues?id=${fix.fixture.venue.id}`,86400000)
      .then(d=>{if(!cancelled&&d[0])setVenueInfo(d[0]);})
      .catch(()=>{});
    return()=>{cancelled=true;};
  },[fix?.fixture?.venue?.id]);

  React.useEffect(()=>{
    const hid=fix?.teams?.home?.id,aid=fix?.teams?.away?.id;
    const lid=fix?.league?.id,season=fix?.league?.season;
    if(!hid||!aid||!lid||!season)return;
    let cancelled=false;
    const ttl=86400000;
    Promise.all([
      api(`/teams/statistics?team=${hid}&league=${lid}&season=${season}`,ttl).catch(()=>null),
      api(`/teams/statistics?team=${aid}&league=${lid}&season=${season}`,ttl).catch(()=>null),
    ]).then(([h,a])=>{
      if(!cancelled)setTeamStats({h:h??null,a:a??null});
    });
    return()=>{cancelled=true;};
  },[fix?.fixture?.id]);

  React.useEffect(()=>{
    setTab("resume");
    setPeriod("all");
    if(contentRef.current)contentRef.current.scrollTop=0;
  },[fix?.fixture?.id]);

  if(!state)return null;

  const isPartial=state.partial===true;
  const isLoading=state.loading===true;

  const hhmm2=s=>{const d=new Date(s);return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");};
  const ddmm2=s=>{const d=new Date(s);return String(d.getDate()).padStart(2,"0")+"."+String(d.getMonth()+1).padStart(2,"0")+"."+d.getFullYear();};
  const gv=(arr,key)=>arr?.find(s=>s.type?.toLowerCase()===key.toLowerCase())?.value??null;
  const numv=v=>parseInt(v)||0;

  const getStatusLabel=sh2=>{
    const map={NS:"À venir",TBD:"TBD",PST:"Reporté",CANC:"Annulé","1H":"1re mi-temps",HT:"Mi-temps","2H":"2e mi-temps",ET:"Prol.",BT:"Pause prol.",P:"Tab.",INT:"Interrompu",SUSP:"Suspendu",FT:"Terminé",AET:"A.P.",PEN:"Aux tirs"};
    return map[sh2]||sh2;
  };
  const getStatusClass=sh2=>{
    if(["1H","2H","ET","P"].includes(sh2))return"live";
    if(sh2==="HT"||sh2==="BT")return"ht";
    if(["FT","AET","PEN"].includes(sh2))return"ft";
    return"ns";
  };

  const goals=events.filter(e=>e.type==="Goal"&&e.detail!=="Missed Penalty");

  if(isLoading&&!isPartial){
    return React.createElement("div",{style:{position:"fixed",inset:0,zIndex:950,background:"#f2f4f8",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}},
      React.createElement("div",{style:{width:40,height:40,border:"3px solid rgba(255,107,74,0.2)",borderTopColor:"#FF6B4A",borderRadius:"50%",animation:"spin .7s linear infinite"}}),
      React.createElement("div",{style:{fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,color:"rgba(17,24,39,0.36)",letterSpacing:2,textTransform:"uppercase"}},
        "Chargement..."
      ),
      React.createElement("button",{onClick:onClose,style:{position:"absolute",top:16,left:16,background:"none",border:"none",color:"rgba(17,24,39,0.39)",fontSize:24,cursor:"pointer",padding:0}},"←")
    );
  }

  if(state.error){
    return React.createElement("div",{style:{position:"fixed",inset:0,zIndex:950,background:"#f2f4f8",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12,padding:24}},
      React.createElement("div",{style:{fontSize:44}},"⚠️"),
      React.createElement("div",{style:{fontSize:14,color:"rgba(17,24,39,0.39)",textAlign:"center"}}),
      React.createElement("button",{onClick:onClose,style:{background:"#00c170",border:"none",color:"#111827",borderRadius:12,padding:"11px 24px",fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,fontWeight:700,cursor:"pointer",marginTop:8}},"Retour"),
      React.createElement("button",{onClick:onClose,style:{position:"absolute",top:16,left:16,background:"none",border:"none",color:"rgba(17,24,39,0.39)",fontSize:24,cursor:"pointer",padding:0}},"←")
    );
  }

  if(!fix)return null;

  const statusClass=getStatusClass(sh);
  const round=(fix.league.round||"").replace("Regular Season - ","J").replace("League Phase - ","J");
  const hid=fix.teams.home.id,aid=fix.teams.away.id;

  const TABS2=[
    {id:"resume",label:"Résumé"},
    {id:"stats",label:"Stats"},
    {id:"compos",label:"Compos"},
    {id:"h2h",label:"H2H"},
    {id:"classement",label:"Classement"},
  ];

  const STAT_SECTIONS=[
    {label:"Tirs",keys:["Total Shots","Shots on Goal","Shots off Goal","Blocked Shots","Shots insidebox","Shots outsidebox"]},
    {label:"Attaque",keys:["Corner Kicks","Offsides","Ball Possession","Fouls","Yellow Cards","Red Cards"]},
    {label:"Passes",keys:["Total passes","Passes accurate","Passes %"]},
    {label:"Défense",keys:["Goalkeeper Saves","expected_goals"]},
  ];
  const STAT_LABELS2={
    "Total Shots":"Tirs totaux","Shots on Goal":"Tirs cadrés","Shots off Goal":"Tirs non cadrés",
    "Blocked Shots":"Tirs bloqués","Shots insidebox":"Dans surface","Shots outsidebox":"Hors surface",
    "Corner Kicks":"Corners","Offsides":"Hors-jeux","Ball Possession":"Possession",
    "Fouls":"Fautes","Yellow Cards":"Cartons jaunes","Red Cards":"Cartons rouges",
    "Total passes":"Passes totales","Passes accurate":"Passes réussies","Passes %":"Précision passes",
    "Goalkeeper Saves":"Arrêts gardien","expected_goals":"xG (buts attendus)",
  };

  const hSt=stats.find(s=>s.team?.id===hid)?.statistics||[];
  const aSt=stats.find(s=>s.team?.id===aid)?.statistics||[];

  const computeHalfStats=(half)=>{
    const isFirst=half==="first";
    const evts=events.filter(e=>isFirst?(e.time?.elapsed||0)<=45:(e.time?.elapsed||0)>45);
    const goals=(tid)=>evts.filter(e=>e.type==="Goal"&&e.detail!=="Missed Penalty"&&((e.team?.id===tid&&e.detail!=="Own Goal")||(e.team?.id!==tid&&e.detail==="Own Goal"))).length;
    const yellows=(tid)=>evts.filter(e=>e.type==="Card"&&e.detail==="Yellow Card"&&e.team?.id===tid).length;
    const reds=(tid)=>evts.filter(e=>e.type==="Card"&&(e.detail==="Red Card"||e.detail==="Second Yellow Card")&&e.team?.id===tid).length;
    return {goals,yellows,reds};
  };
  const halfStats=period!=="all"?computeHalfStats(period):null;


  const renderTimeline=()=>{
    if(!events.length&&isNS)return React.createElement("div",{className:"md-empty"},"⏳ Le match n'a pas encore commencé");
    if(isLoading||isPartial&&!events.length)return React.createElement("div",{className:"md-empty"},"📋 Chargement...");
    if(!events.length)return React.createElement("div",{className:"md-empty"},"📋 Aucun événement disponible");

    const sorted=[...events].sort((a,b)=>(a.time?.elapsed||0)-(b.time?.elapsed||0));
    const htH=fix.score?.halftime?.home??0,htA=fix.score?.halftime?.away??0;

    const ctrl=new AbortController();
    setData([]);
    load(false,ctrl.signal);
    return()=>ctrl.abort();
  },[load]);

  const liveCount=useMemo(()=>data.filter(f=>LIVE_ST.has(f?.fixture?.status?.short)).length,[data]);
  const adaptiveInterval=liveCount>=4?15:liveCount>=1?30:60;

  useEffect(()=>{
    clearInterval(timerRef.current);clearInterval(cdRef.current);
    if(!isToday){setCd(null);return;}
    const iv=adaptiveInterval;
    setCd(iv);
    timerRef.current=setInterval(()=>loadRef.current(true),iv*1000);
    cdRef.current=setInterval(()=>setCd(c=>c<=1?iv:c-1),1000);
    return()=>{clearInterval(timerRef.current);clearInterval(cdRef.current);};
  },[date,isToday,adaptiveInterval]);
  useEffect(()=>{const t=setTimeout(()=>stripRef.current?.querySelector("[data-td='1']")?.scrollIntoView({inline:"center",block:"nearest"}),80);return()=>clearTimeout(t);},[]);

  const openMatch=useCallback(async id=>{
    if(openMatch._liveIv){clearInterval(openMatch._liveIv);openMatch._liveIv=null;}if(openMatch._ctrl)openMatch._ctrl.abort();

    const sig=openMatch._ctrl.signal;

    const cached=_cache.get(`/fixtures?id=${id}`);
    const cachedFix=cached?.d?.[0]??null;
    if(cachedFix){
      setDet({partial:true,data:{fixture:cachedFix,stats:[],events:[],lineups:[],players:[],h2h:[],injuries:[]}});

      setDet({loading:true});

    try{

      const cachedIsNS=NS_ST.has(cachedSh);
      const kickoffPassed=cachedDate&&Date.now()>cachedDate.getTime();
      if(cachedIsNS&&kickoffPassed) _cache.delete(`/fixtures?id=${id}`);
      const fixTTL=30000;
      const fx=await api(`/fixtures?id=${id}`,fixTTL,sig);
      const fix=fx[0];if(!fix)throw new Error("Match introuvable");
      const started=!NS_ST.has(fix.fixture.status.short);
      const isLive=LIVE_ST.has(fix.fixture.status.short);
      const isDone=DONE_ST.has(fix.fixture.status.short);

      const hid=fix.teams.home.id,aid=fix.teams.away.id,fid=fix.fixture.id;

      const p_h2h     =api(`/fixtures/headtohead?h2h=${hid}-${aid}&last=50`,86400000,sig).then(d=>update({h2h:d})).catch(()=>{});
      const p_inj     =api(`/injuries?fixture=${fid}`,isDone?10800000:3600000,sig).then(d=>update({injuries:d})).catch(()=>{});

      await Promise.allSettled([p_events,p_stats,p_lineups,p_players,p_h2h,p_inj]);

        openMatch._liveIv=setInterval(async()=>{

            const goals=rf[0]?.goals;
            const status=rf[0]?.fixture?.status;

            {lg===l.id&&<span style={{color:T.blueB}}>✓</span>}

    </Sheet>
    <MatchDetailWrapper state={detail} onClose={()=>setDet(null)}/>

}

//
// STANDINGS TAB (simplifié pour la longueur)
//
function StandingsTab(){
  const[lid,setLid]=useState(39),[s,setS]=useState(CUR_SEASON);
  const[allGroups,setAllGroups]=useState([]),[rounds,setRounds]=useState([]),[selRound,setSelRound]=useState("");
  const[roundMatches,setRoundMatches]=useState([]),[view,setView]=useState("standings");
  const[st,setSt]=useState("load"),[err,setErr]=useState(""),[cfg,setCfg]=useState(false);
  const[viewMode,setViewMode]=useState("all");
  const l=byId(lid);
  const isCup=l?.isCup??false;
  const hasGroups=l?.hasGroups??false;
  const hasKnockout=l?.hasKnockout??false;

  useEffect(()=>{
    let c=false;setSt("load");setErr("");setAllGroups([]);setRounds([]);setRoundMatches([]);setSelRound("");
    if(isCup&&hasGroups){
      api(`/standings?league=${lid}&season=${s}`,3600000)
        .then(d=>{
          if(c)return;
          const st2=d[0]?.league?.standings??[];
          if(st2.length>1){
            setAllGroups(st2);setSt("groups");
          } else if(st2.length===1){
            setAllGroups([st2[0]]);setSt("ok");
          } else {
            setSt("empty");
          }
        })
        .catch(e=>{if(!c){setErr(e.message);setSt("err");}});
    } else {
      api(`/standings?league=${lid}&season=${s}`,3600000)
        .then(d=>{
          if(c)return;
          const r=d[0]?.league?.standings?.[0]??[];
          setAllGroups(r.length?[r]:[]);
          setSt(r.length?"ok":"empty");
        })
        .catch(e=>{if(!c){setErr(e.message);setSt("err");}});
    }
    if(isCup&&hasKnockout){
      api(`/fixtures/rounds?league=${lid}&season=${s}&current=false`,21600000)
        .then(d=>{if(!c){setRounds(d??[]);}})
        .catch(()=>{});
    }
    return()=>{c=true;};
  },[lid,s]);

  useEffect(()=>{
    if(!selRound)return;
    let c=false;setRoundMatches([]);
    api(`/fixtures?league=${lid}&season=${s}&round=${encodeURIComponent(selRound)}`,3600000)
      .then(d=>{if(!c)setRoundMatches(d??[]);})
      .catch(()=>{});
    return()=>{c=true;};
  },[selRound,lid,s]);

  const zc=desc=>{const d=(desc??"").toLowerCase();if(d.includes("promotion"))return"#00c170";if(d.includes("champions league")||d.includes("ligue des champions")||(d.includes("champions")&&!d.includes("conf")))return"#1a56db";if(d.includes("europa league")||d.includes("ligue europa"))return"#7b1f1f";if(d.includes("conference")||d.includes("conf"))return"#a67c00";if(d.includes("releg")||d.includes("relégation"))return"#e53935";if(d.includes("playoff")||d.includes("play-off")||d.includes("barrage"))return"#f59e0b";if(d.includes("europa"))return"#7b1f1f";if(d.includes("qualif"))return"#1a56db";return"transparent";};
  const SEL={width:"100%",background:T.bg2,border:`1px solid ${T.bg4}`,color:T.t1,borderRadius:8,padding:"10px 13px",fontSize:13,outline:"none",cursor:"pointer"};
  const REGIONS2=[...new Set(LEAGUES.map(l=>l.region))];

  const knockoutRounds=rounds.filter(r=>{const rl=r.toLowerCase();return !rl.includes("group")&&!rl.includes("league phase")&&!rl.includes("qualifying");});

  return<div style={{display:"flex",flexDirection:"column",height:"100%",width:"100%",overflow:"hidden"}}>
    <div style={{padding:"9px 14px",borderBottom:`1px solid ${T.line}`,flexShrink:0,background:T.bg1,minHeight:74,width:"100%"}}>
      <div onClick={()=>setCfg(true)} style={{
        display:"flex",alignItems:"center",gap:12,
        background:"#fff",
        padding:"0 14px",cursor:"pointer",height:56,flexShrink:0,
        transition:"background .15s",
      }}
      onMouseEnter={e=>e.currentTarget.style.background="#f5f5f5"}
      onMouseLeave={e=>e.currentTarget.style.background="#fff"}
      >
        <div style={{width:34,height:34,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,background:"rgba(0,0,0,.05)",borderRadius:8}}>{l?.flag??"🏆"}</div>
        <div style={{flex:1,minWidth:0}}>
          <div className="bc" style={{fontSize:15,fontWeight:800,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:"#1a1d23"}}>{l?.name??"—"}</div>
          <div style={{fontSize:11,color:"#888",marginTop:2}}>Saison {s}/{s+1}</div>
        </div>
        <div style={{background:"#00b86b",borderRadius:8,padding:"4px 10px"}}>
          <span style={{fontSize:11,color:"#fff",fontWeight:700}}>⚙️</span>
        </div>
      </div>
    </div>

    {isCup&&(hasGroups||hasKnockout)&&<div style={{display:"flex",background:T.bg1,borderBottom:`1px solid ${T.line}`,flexShrink:0,padding:"8px 14px",gap:8,width:"100%"}}>
      {hasGroups&&<button onClick={()=>setView("standings")} className="bc" style={{flex:1,padding:"8px 4px",background:view==="standings"?"linear-gradient(135deg,#e53535,#c62828)":T.bg3,color:"#fff",border:`1px solid ${view==="standings"?"transparent":T.line}`,borderRadius:10,fontSize:12,fontWeight:800,cursor:"pointer",letterSpacing:.5,boxShadow:view==="standings"?"0 3px 12px rgba(229,53,53,.3)":"none",transition:"all .2s"}}>📊 GROUPES</button>}
      {hasKnockout&&<button onClick={()=>setView("knockout")} className="bc" style={{flex:1,padding:"8px 4px",background:view==="knockout"?"linear-gradient(135deg,#e53535,#c62828)":T.bg3,color:"#fff",border:`1px solid ${view==="knockout"?"transparent":T.line}`,borderRadius:10,fontSize:12,fontWeight:800,cursor:"pointer",letterSpacing:.5,boxShadow:view==="knockout"?"0 3px 12px rgba(229,53,53,.3)":"none",transition:"all .2s"}}>🏆 ÉLIMIN.</button>}
    </div>}

    {view==="standings"&&!isCup&&<div style={{
      display:"flex",background:"#fff",
      borderBottom:"1px solid rgba(0,0,0,.08)",
      flexShrink:0,width:"100%",
      boxShadow:"0 1px 4px rgba(0,0,0,.04)",
    }}>
      {[["all","Overall"],["home","Home"],["away","Away"]].map(([v,lb])=>{
        const a=viewMode===v;
        return<button key={v} onClick={()=>setViewMode(v)} className="bc" style={{
          flex:1,padding:"11px 4px",border:"none",
          background:a?"#fff":"#f7f7f7",
          color:a?"#00b86b":"#888",
          fontSize:11,fontWeight:a?800:500,
          cursor:"pointer",letterSpacing:.3,
          borderBottom:a?"2px solid #00b86b":"2px solid transparent",
          transition:"all .2s",
        }}>{lb}</button>;
      })}
    </div>}

    <div style={{flex:1,overflowY:"auto",width:"100%"}}>
      {view==="standings"&&<>
        {st==="load"&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:14,padding:56}}><Spin s={26}/><span style={{fontSize:13,color:T.t3}}>Chargement...</span></div>}
        {st==="err"&&<div style={{textAlign:"center",padding:"44px 24px",color:T.t2}}><div style={{fontSize:44,marginBottom:14}}>⚠️</div>{err}</div>}
        {st==="empty"&&<div style={{textAlign:"center",padding:"52px 24px"}}><div style={{fontSize:44,marginBottom:14}}>📋</div><div style={{fontSize:14,color:T.t2}}>Classement non disponible</div></div>}
        {(st==="ok"||st==="groups")&&allGroups.map((grp,gi)=>{
          const grpName=grp[0]?.group;
          return<div key={gi}>
            {grpName&&<div style={{
              padding:"8px 14px",
              background:"rgba(230,92,0,.06)",
              borderBottom:"1px solid rgba(230,92,0,.15)",
              borderTop:gi>0?"1px solid rgba(0,0,0,.06)":"none",
              borderLeft:"4px solid #00b86b",
              display:"flex",alignItems:"center",gap:8,
            }}>
              <span className="bc" style={{fontSize:11,fontWeight:800,color:"#00b86b",letterSpacing:1.5,textTransform:"uppercase"}}>GROUPE {grpName.replace("Group ","")}</span>
            </div>}
            <div style={{
              display:"flex",alignItems:"center",
              padding:"6px 10px",
              borderBottom:"1px solid rgba(0,0,0,.08)",
              background:"rgba(0,0,0,.03)",
              position:"sticky",top:0,zIndex:2,

              <div className="bc" style={{width:22,fontSize:9,fontWeight:700,color:"#aaa",textAlign:"center",flexShrink:0}}>#</div>
              <div className="bc" style={{flex:1,fontSize:9,fontWeight:700,color:"#aaa",marginLeft:4}}>Équipe</div>

              <div className="bc" style={{width:46,fontSize:9,fontWeight:700,color:"#aaa",textAlign:"center",flexShrink:0}}>Score</div>
              <div className="bc" style={{width:28,fontSize:9,fontWeight:700,color:"#aaa",textAlign:"center",flexShrink:0}}>Diff</div>
              <div className="bc" style={{width:32,fontSize:9,fontWeight:800,color:"#1a1d23",textAlign:"center",flexShrink:0}}>Pts</div>
            </div>
            {grp.map(r=>{
              const src=viewMode==="home"?r.home:viewMode==="away"?r.away:r.all;
              const qColor=zc(r.description);
              const bp=src?.goals?.for??r.all?.goals?.for??0;
              const bc=src?.goals?.against??r.all?.goals?.against??0;
              const gd=r.goalsDiff;
              const isTop=r.rank<=3;

                    <div style={{display:"flex",gap:2,marginTop:3}}>

                </div>
                <div className="bc" style={{width:22,textAlign:"center",fontSize:12,color:"#555",flexShrink:0}}>{src?.played??"-"}</div>
                <div className="bc" style={{
                  width:46,textAlign:"center",fontSize:12,flexShrink:0,
                  color:"#444",fontWeight:500,letterSpacing:.3,
                }}>{bp}:{bc}</div>
                <div className="bc" style={{
                  width:28,textAlign:"center",fontSize:12,flexShrink:0,fontWeight:700,
                  color:gd>0?"#00b86b":gd<0?"#e53535":"#aaa",
                }}>{gd>0?"+":""}{gd}</div>
                <div className="bc" style={{
                  width:32,textAlign:"center",fontSize:16,fontWeight:900,flexShrink:0,
                  color:isTop?"#00b86b":"#1a1d23",
                }}>{r.points}</div>
              </div>;
            })}
          </div>;
        })}
        {(st==="ok"||st==="groups")&&(()=>{
          const seen=new Map();
          allGroups.forEach(grp=>{
            (Array.isArray(grp)?grp:[grp]).forEach(r=>{
              const d=r?.description;
              if(d&&d.trim()&&!seen.has(d)){
                seen.set(d,zc(d));
              }

          });
          const entries=[...seen.entries()];
          if(!entries.length)return null;
          const order=e=>e[1]==="transparent"?99:0;
          entries.sort((a,b)=>order(a)-order(b));
          return <div style={{padding:"14px 14px 28px",background:"#f7f8fa"}}>
            <div style={{display:"flex",flexDirection:"column",gap:7}}>
              {entries.map(([desc,color])=>color==="transparent"?null:<div key={desc} style={{
                display:"flex",alignItems:"center",gap:12,
                padding:"11px 14px",

                <div style={{width:20,height:20,borderRadius:5,background:color,flexShrink:0}}/>

          </div>;
        })()}
      </>}

      {view==="knockout"&&<div style={{padding:"12px 14px"}}>
        {knockoutRounds.length===0&&<div style={{textAlign:"center",padding:"44px 24px"}}><Spin s={20}/><div style={{fontSize:13,color:T.t3,marginTop:12}}>Chargement des tours...</div></div>}
        {knockoutRounds.length>0&&<>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>
            {knockoutRounds.map(r=>{
              const label=r.replace("Round of ","1/").replace("8th Finals","8 de F.").replace("Quarter-finals","Quarts").replace("Semi-finals","Demis").replace("Final","Finale").replace("3rd Place","3ème Pl.");

                const done=["FT","AET","PEN"].includes(sh);

                const hw=hg!=null&&ag!=null&&hg>ag,aw=hg!=null&&ag!=null&&ag>hg;

                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",background:aw&&done?"rgba(255,255,255,.03)":"transparent"}}>

  useEffect(()=>{
    let c=false;setSt("load");setByD({});
    const from=today(),to=new Date();to.setDate(to.getDate()+28);
    api(`/fixtures?league=${lid}&season=${s}&from=${from}&to=${to.toISOString().slice(0,3600000)}&status=NS`,3600000)
      .then(data=>{if(c)return;const g={};data.forEach(f=>{const d=f.fixture.date.slice(0,10);if(!g[d])g[d]=[];g[d].push(f);});setByD(g);setSt("ok");})
      .catch(()=>{if(!c)setSt("err");});
    return()=>{c=true;};

    if(openMatch._liveIv){clearInterval(openMatch._liveIv);openMatch._liveIv=null;}if(openMatch._ctrl)openMatch._ctrl.abort();
    openMatch._ctrl=new AbortController();
    const sig=openMatch._ctrl.signal;

    if(cachedFix){
      setDt({partial:true,data:{fixture:cachedFix,stats:[],events:[],lineups:[],players:[],h2h:[],injuries:[]}});
    } else {
      setDt({loading:true});

    try{

      const isLive=LIVE_ST.has(sh);
      const isDone=DONE_ST.has(sh);

      ]);
      setDt({data:{fixture:fix,stats,events:evts,lineups,players:plrs,h2h,injuries}});
    }catch(e){if(e.name!=="AbortError")setDt({error:e.message});}
  },[]);
  const SEL={width:"100%",background:T.bg2,border:`1px solid ${T.bg4}`,color:T.t1,borderRadius:8,padding:"8px 11px",fontSize:12,fontWeight:600,outline:"none",cursor:"pointer"};

      {st==="load"?<div style={{display:"flex",justifyContent:"center",padding:52}}><Spin s={26}/></div>

      try{

            <div style={{fontSize:8,color:"rgba(255,255,255,.75)",fontWeight:700,letterSpacing:3,textTransform:"uppercase",marginTop:1}}>PRO · LIVE · BY AMINE</div>
          </div>
        </div>

        <div style={{display:"flex",alignItems:"center",gap:6}}>
          {notifPerm==="granted"&&favs.size>0&&<div style={{
            background:"rgba(255,255,255,.15)",border:"1px solid rgba(255,255,255,.2)",
            borderRadius:20,padding:"4px 10px",display:"flex",alignItems:"center",gap:4,
          }}>
            <span style={{fontSize:10}}>🔔</span>
            <span className="bc" style={{fontSize:10,fontWeight:700,color:"#fff"}}>{favs.size}</span>
          </div>}
          <div style={{
            display:"flex",alignItems:"center",gap:5,
            background:"rgba(255,255,255,.15)",
            border:"1px solid rgba(255,255,255,.2)",
            borderRadius:20,padding:"5px 11px",
          }}>
            <div className="live-dot"/>
            <span className="bc" style={{fontSize:11,fontWeight:800,color:"#fff",letterSpacing:1}}>LIVE</span>
          </div>
          <div title={`API: ${_apiCallsToday}/7500`} style={{
            background:"rgba(0,0,0,.15)",borderRadius:10,padding:"3px 7px",cursor:"default",
          }}>
            <span style={{fontSize:8,color:"rgba(255,255,255,.55)",fontWeight:700}}>{_apiCallsToday}<span style={{opacity:.6}}>/7.5k</span></span>
          </div>
          <button title="Déconnexion" onClick={()=>{localStorage.removeItem("wf_auth");window.location.href="login.html";}} style={{
            background:"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.12)",
            borderRadius:8,padding:"5px 8px",cursor:"pointer",
            color:"rgba(255,255,255,.35)",fontSize:13,lineHeight:1,flexShrink:0,
            transition:"color .2s",
          }}>⏻</button>
        </div>
      </div>

      <div style={{
        display:"flex",marginTop:10,
        overflowX:"auto",overflowY:"hidden",
        scrollbarWidth:"none",WebkitOverflowScrolling:"touch",
        position:"relative",zIndex:1,
      }}>
        {NAV.map(tab=>{
          const a=scr===tab.id;
          return<button key={tab.id} onClick={()=>setScr(tab.id)} style={{
            flexShrink:0,
            display:"flex",flexDirection:"column",alignItems:"center",gap:4,
            padding:"8px 14px 12px",background:"none",border:"none",
            color:a?"#fff":"rgba(255,255,255,.45)",
            transition:"all .2s",cursor:"pointer",position:"relative",
            minWidth:70,
          }}>
            {a&&<div style={{
              position:"absolute",top:4,left:6,right:6,bottom:0,
              background:"rgba(255,255,255,.12)",
              borderRadius:"10px 10px 0 0",
            }}/>}
            <div style={{position:"relative",display:"inline-flex",zIndex:1}}>
              {tab.icon(a)}
            </div>
            <span className="bc" style={{
              fontSize:9,fontWeight:a?800:600,letterSpacing:.8,
              textTransform:"uppercase",whiteSpace:"nowrap",zIndex:1,
            }}>{tab.label}</span>
            {a&&<div style={{
              position:"absolute",bottom:0,left:"20%",right:"20%",
              height:2.5,
              background:"#fff",
              borderRadius:"2px 2px 0 0",
            }}/>}
          </button>;
        })}
      </div>
    </div>

    <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column",width:"100%",background:T.bg0}}>
      {scr==="scores"    &&<ScoresTab    favs={favs} onFav={toggleFav}/>}
      {scr==="standings" &&<StandingsTab/>}
      {scr==="scorers"   &&<ScorersTab/>}
      {scr==="calendar"  &&<CalendarTab  favs={favs} onFav={toggleFav}/>}
      {/* Les autres onglets (transfers, actu, results, jsk) seraient inclus ici mais identiques à l'original */}
    </div>
    <div style={{height:"env(safe-area-inset-bottom)",background:T.bg0,flexShrink:0}}/>
  </div>;
}

// Vérifier auth avant d'afficher l'app
if(localStorage.getItem('wf_auth')!=='1'){
  window.location.href='login.html';
} else {
  ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App,null));
}
		</script>
	</body>
</html>
