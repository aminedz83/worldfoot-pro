<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
    <meta name="theme-color" content="#00b86b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WorldFoot Pro" />
    <title>WorldFoot Pro</title>
    
    <style>
        /* RESET ABSOLU */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            height: 100%;
            width: 100%;
            background: #FFFFFF;
            font-family: 'Barlow', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            position: fixed;
        }
        
        #root {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            background: #FFFFFF;
        }
        
        /* Animations */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        @keyframes pulse-red {
            0% { background: rgba(229, 57, 53, 0.1); border-left-color: #e53935; }
            50% { background: rgba(229, 57, 53, 0.3); border-left-color: #ff1744; }
            100% { background: rgba(229, 57, 53, 0.1); border-left-color: #e53935; }
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        /* Scroll */
        .scrollable {
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        
        .scrollable::-webkit-scrollbar {
            display: none;
        }
        
        .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #FF3B30;
            animation: pulse 1.5s infinite;
            box-shadow: 0 0 0 2px rgba(255,59,48,0.2);
            flex-shrink: 0;
        }
        
        /* Match Detail */
        .md-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: #FFFFFF;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.2s ease;
        }
        
        .md-topbar {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            padding-top: calc(12px + env(safe-area-inset-top));
            background: #FFFFFF;
            border-bottom: 1px solid rgba(0,0,0,0.03);
            flex-shrink: 0;
        }
        
        .md-back-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #F2F2F7;
            border: none;
            border-radius: 10px;
            font-size: 20px;
            color: #1C1C1E;
            cursor: pointer;
            margin-right: 12px;
            flex-shrink: 0;
        }
        
        .md-topbar-title {
            flex: 1;
            font-size: 16px;
            font-weight: 600;
            color: #1C1C1E;
            text-align: center;
        }
        
        .md-content {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        /* Event Row */
        .event-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-bottom: 1px solid #F2F2F7;
            animation: slideIn 0.3s ease;
        }
        
        .event-minute {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: #8E8E93;
            min-width: 45px;
        }
        
        .event-icon {
            font-size: 18px;
            width: 28px;
            text-align: center;
        }
        
        .event-desc {
            flex: 1;
            font-size: 14px;
            color: #1C1C1E;
        }
        
        .event-player {
            font-weight: 600;
        }
        
        .event-sub {
            font-size: 12px;
            color: #8E8E93;
            margin-top: 2px;
        }
        
        .event-score {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: #1C1C1E;
        }
        
        /* Big Chance */
        .big-chance {
            background: rgba(229, 57, 53, 0.1);
            border-left: 3px solid #e53935;
            animation: pulse-red 1.5s ease-in-out infinite;
        }
        
        .big-chance .event-icon {
            color: #e53935;
        }
        
        .big-chance .event-desc {
            color: #e53935;
            font-weight: 700;
            text-transform: uppercase;
        }
        
        /* Stats Cards */
        .stat-card {
            background: #FFFFFF;
            border-radius: 20px;
            margin: 8px 16px;
            padding: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.02);
            border: 1px solid rgba(0,0,0,0.04);
            animation: scaleIn 0.3s ease;
        }
        
        .stat-row {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #F2F2F7;
        }
        
        .stat-row:last-child {
            border-bottom: none;
        }
        
        .stat-value {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 18px;
            font-weight: 700;
            min-width: 50px;
        }
        
        .stat-label {
            flex: 1;
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            color: #8E8E93;
            text-transform: uppercase;
        }
        
        .stat-bar-container {
            height: 6px;
            background: #F2F2F7;
            border-radius: 3px;
            overflow: hidden;
            display: flex;
            margin-top: 8px;
        }
        
        .stat-bar-home {
            height: 100%;
            background: linear-gradient(90deg, #00b86b, #34D399);
            transition: width 0.5s ease;
        }
        
        .stat-bar-away {
            height: 100%;
            background: linear-gradient(90deg, #2563eb, #60A5FA);
            transition: width 0.5s ease;
        }
        
        .goal-bars {
            display: inline-flex;
            align-items: center;
            gap: 2px;
            background: rgba(0,184,107,0.08);
            padding: 3px 8px;
            border-radius: 20px;
            margin-left: 6px;
        }
        
        /* Navigation */
        .nav-tabs {
            display: flex;
            overflow-x: auto;
            background: #FFFFFF;
            border-bottom: 1px solid rgba(0,0,0,0.03);
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        
        .nav-tabs::-webkit-scrollbar {
            display: none;
        }
        
        .nav-tab {
            flex-shrink: 0;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 600;
            color: #8E8E93;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        
        .nav-tab.active {
            color: #00b86b;
            border-bottom-color: #00b86b;
        }
        
        .tab-content {
            flex: 1;
            overflow: hidden;
            background: #FFFFFF;
        }
        
        /* Filter Buttons */
        .filter-btn {
            flex: 1;
            max-width: 160px;
            padding: 12px 0;
            border-radius: 40px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
        }
        
        .filter-btn.active-live {
            background: linear-gradient(135deg, #FF3B30, #FF5E3A);
            color: #FFFFFF;
            box-shadow: 0 8px 20px rgba(255,59,48,0.3);
            transform: scale(1.02);
        }
        
        .filter-btn.active-ft {
            background: linear-gradient(135deg, #34C759, #30B753);
            color: #FFFFFF;
            box-shadow: 0 8px 20px rgba(52,199,89,0.3);
            transform: scale(1.02);
        }
        
        .filter-btn.inactive {
            background: #F2F2F7;
            color: #1C1C1E;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        
        /* Timeline Date */
        .date-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 0;
            width: 44px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }
        
        .date-item.active {
            background: #FF3B30;
            transform: scale(1.02);
        }
        
        .date-item.today {
            border: 1px solid rgba(255,59,48,0.2);
        }
        
        .date-day {
            font-size: 11px;
            font-weight: 600;
        }
        
        .date-number {
            font-size: 18px;
            font-weight: 700;
            font-family: 'Barlow Condensed', sans-serif;
            line-height: 1;
        }
    </style>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- React -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
</head>
<body>
    <div id="root"></div>
    
    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        const API_KEY = "3a14b1347c177458e2f23bea7899e9cf";
        const BASE = "https://v3.football.api-sports.io";
        
        // Statuts
        const LIVE_ST = new Set(["1H", "2H", "ET", "BT", "P"]);
        const DONE_ST = new Set(["FT", "AET", "PEN", "AWD", "WO"]);
        const NS_ST = new Set(["NS", "TBD", "PST", "CANC"]);
        
        // Cache
        const _cache = new Map();
        
        // API sécurisée
        async function api(path, ttl = 60000) {
            try {
                const now = Date.now();
                if (_cache.has(path) && now - _cache.get(path).t < ttl) {
                    return _cache.get(path).d;
                }
                
                const res = await fetch(BASE + path, {
                    headers: { "x-apisports-key": API_KEY }
                });
                
                if (!res.ok) return [];
                
                const data = await res.json();
                const response = data.response || [];
                
                _cache.set(path, { d: response, t: now });
                return response;
            } catch {
                return [];
            }
        }
        
        // Helpers
        const today = () => {
            try {
                return new Date().toISOString().slice(0, 10);
            } catch {
                return "2024-01-01";
            }
        };
        
        const hhmm = (s) => {
            try {
                const d = new Date(s);
                return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
            } catch {
                return "--:--";
            }
        };
        
        const ddmm = (s) => {
            try {
                const d = new Date(s);
                return `${String(d.getDate()).padStart(2, '0')}.${String(d.getMonth() + 1).padStart(2, '0')}`;
            } catch {
                return "--.--";
            }
        };
        
        // ============================================
        // COMPOSANTS
        // ============================================
        
        // Logo
        const Logo = ({ src, size = 20 }) => {
            const [error, setError] = React.useState(false);
            
            const style = {
                width: size,
                height: size,
                borderRadius: size / 2,
                background: "#F2F2F7",
                flexShrink: 0,
                objectFit: "contain"
            };
            
            if (!src || error) {
                return React.createElement("div", { style });
            }
            
            return React.createElement("img", {
                src: src,
                width: size,
                height: size,
                style: style,
                onError: () => setError(true),
                alt: ""
            });
        };
        
        // Spin
        const Spin = ({ size = 20, color = "#FF3B30" }) => {
            return React.createElement("div", {
                style: {
                    width: size,
                    height: size,
                    border: `2px solid ${color}20`,
                    borderTopColor: color,
                    borderRadius: "50%",
                    animation: "spin 0.8s linear infinite"
                }
            });
        };
        
        // ============================================
        // MATCH DETAIL
        // ============================================
        const MatchDetail = ({ matchId, onClose }) => {
            const [fixture, setFixture] = React.useState(null);
            const [events, setEvents] = React.useState([]);
            const [stats, setStats] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const mounted = React.useRef(true);
            
            React.useEffect(() => {
                mounted.current = true;
                setLoading(true);
                
                const loadMatch = async () => {
                    const fixData = await api(`/fixtures?id=${matchId}`, 30000);
                    if (mounted.current && fixData?.[0]) {
                        setFixture(fixData[0]);
                    }
                    
                    const [eventsData, statsData] = await Promise.all([
                        api(`/fixtures/events?fixture=${matchId}`, 15000),
                        api(`/fixtures/statistics?fixture=${matchId}`, 15000)
                    ]);
                    
                    if (mounted.current) {
                        setEvents(eventsData || []);
                        setStats(statsData || []);
                        setLoading(false);
                    }
                };
                
                loadMatch();
                
                return () => {
                    mounted.current = false;
                };
            }, [matchId]);
            
            if (!fixture) {
                return React.createElement("div", { className: "md-overlay" },
                    React.createElement("div", { className: "md-topbar" },
                        React.createElement("button", { onClick: onClose, className: "md-back-btn" }, "←"),
                        React.createElement("div", { className: "md-topbar-title" }, "Chargement...")
                    ),
                    React.createElement("div", { style: { flex: 1, display: "flex", alignItems: "center", justifyContent: "center" } },
                        React.createElement(Spin, { size: 30 })
                    )
                );
            }
            
            const homeTeam = fixture.teams?.home;
            const awayTeam = fixture.teams?.away;
            const status = fixture.fixture?.status?.short || "";
            const isLive = LIVE_ST.has(status);
            const elapsed = fixture.fixture?.status?.elapsed || 0;
            const homeScore = fixture.goals?.home ?? 0;
            const awayScore = fixture.goals?.away ?? 0;
            
            return React.createElement("div", { className: "md-overlay" },
                // Top bar
                React.createElement("div", { className: "md-topbar" },
                    React.createElement("button", { onClick: onClose, className: "md-back-btn" }, "←"),
                    React.createElement("div", { className: "md-topbar-title" }, fixture.league?.name || "Match")
                ),
                
                // Score header
                React.createElement("div", {
                    style: {
                        padding: "20px 16px",
                        background: "linear-gradient(145deg, #FFFFFF, #F8FAFF)",
                        borderBottom: "1px solid rgba(0,0,0,0.04)"
                    }
                },
                    React.createElement("div", {
                        style: {
                            display: "flex",
                            alignItems: "center",
                            justifyContent: "space-between",
                            marginBottom: 12
                        }
                    },
                        React.createElement("div", { style: { flex: 1, textAlign: "center" } },
                            React.createElement(Logo, { src: homeTeam?.logo, size: 48 }),
                            React.createElement("div", {
                                style: {
                                    fontSize: 14,
                                    fontWeight: 600,
                                    marginTop: 8,
                                    color: "#1C1C1E"
                                }
                            }, homeTeam?.name || "")
                        ),
                        
                        React.createElement("div", { style: { textAlign: "center" } },
                            React.createElement("div", {
                                style: {
                                    fontFamily: "'Barlow Condensed', sans-serif",
                                    fontSize: 48,
                                    fontWeight: 900,
                                    color: isLive ? "#FF3B30" : "#1C1C1E",
                                    lineHeight: 1
                                }
                            }, homeScore + " - " + awayScore),
                            React.createElement("div", {
                                style: {
                                    fontSize: 12,
                                    color: "#8E8E93",
                                    marginTop: 4
                                }
                            }, ddmm(fixture.fixture?.date) + " " + hhmm(fixture.fixture?.date))
                        ),
                        
                        React.createElement("div", { style: { flex: 1, textAlign: "center" } },
                            React.createElement(Logo, { src: awayTeam?.logo, size: 48 }),
                            React.createElement("div", {
                                style: {
                                    fontSize: 14,
                                    fontWeight: 600,
                                    marginTop: 8,
                                    color: "#1C1C1E"
                                }
                            }, awayTeam?.name || "")
                        )
                    ),
                    
                    React.createElement("div", {
                        style: {
                            display: "flex",
                            alignItems: "center",
                            justifyContent: "center",
                            gap: 8,
                            marginTop: 8
                        }
                    },
                        React.createElement("div", {
                            style: {
                                padding: "6px 16px",
                                background: isLive ? "rgba(255,59,48,0.1)" : "#F2F2F7",
                                borderRadius: 20,
                                fontSize: 12,
                                fontWeight: 600,
                                color: isLive ? "#FF3B30" : "#8E8E93"
                            }
                        },
                            isLive ? (elapsed + "'") : (status === "FT" ? "Terminé" : "À venir")
                        ),
                        isLive && React.createElement("div", { className: "live-dot" })
                    )
                ),
                
                // Timeline des événements
                React.createElement("div", { className: "md-content scrollable" },
                    events.map((e, i) => {
                        const minute = e.time?.elapsed || 0;
                        const isBigChance = e.type === "Big Chance" || 
                            e.detail?.includes("Big chance") || 
                            e.detail?.includes("Hit woodwork") ||
                            e.type === "Big Chance Created" || 
                            e.type === "Big Chance Missed" || 
                            e.type === "Hit Woodwork";
                        
                        let icon = "⚽";
                        if (e.type === "Card") {
                            icon = e.detail?.includes("Yellow") ? "🟨" : "🟥";
                        } else if (e.type === "subst") {
                            icon = "🔄";
                        } else if (isBigChance) {
                            icon = "⚡";
                        } else if (e.type === "Var") {
                            icon = "📺";
                        }
                        
                        return React.createElement("div", {
                            key: i,
                            className: isBigChance ? "event-row big-chance" : "event-row"
                        },
                            React.createElement("div", { className: "event-minute" }, minute + "'"),
                            React.createElement("div", { className: "event-icon" }, icon),
                            React.createElement("div", { className: "event-desc" },
                                React.createElement("div", { className: "event-player" },
                                    isBigChance ? "GROSSE OCCASION!" : (e.player?.name || "")
                                ),
                                e.assist?.name && React.createElement("div", { className: "event-sub" },
                                    "passe: " + e.assist.name
                                ),
                                e.detail && !isBigChance && React.createElement("div", { className: "event-sub" },
                                    e.detail
                                )
                            ),
                            (e.type === "Goal" && !isBigChance) && 
                                React.createElement("div", { className: "event-score" },
                                    homeScore + " - " + awayScore
                                )
                        );
                    }),
                    
                    // Stats
                    stats.length > 0 && stats.map((stat, index) => {
                        const homeStats = stat.statistics || [];
                        const awayStats = stats.find(s => s.team?.id !== stat.team?.id)?.statistics || [];
                        
                        const getStat = (arr, type) => {
                            const s = arr.find(s => s.type === type);
                            return s?.value || 0;
                        };
                        
                        const possessionH = parseInt(String(getStat(homeStats, "Ball Possession")).replace('%', '')) || 0;
                        const possessionA = parseInt(String(getStat(awayStats, "Ball Possession")).replace('%', '')) || 0;
                        const totalShotsH = parseInt(getStat(homeStats, "Total Shots")) || 0;
                        const totalShotsA = parseInt(getStat(awayStats, "Total Shots")) || 0;
                        const shotsOnH = parseInt(getStat(homeStats, "Shots on Goal")) || 0;
                        const shotsOnA = parseInt(getStat(awayStats, "Shots on Goal")) || 0;
                        const cornersH = parseInt(getStat(homeStats, "Corner Kicks")) || 0;
                        const cornersA = parseInt(getStat(awayStats, "Corner Kicks")) || 0;
                        
                        return React.createElement("div", { key: index },
                            React.createElement("div", { className: "stat-card" },
                                React.createElement("div", { className: "stat-row" },
                                    React.createElement("div", { className: "stat-value" }, possessionH + "%"),
                                    React.createElement("div", { className: "stat-label" }, "POSSESSION"),
                                    React.createElement("div", { className: "stat-value" }, possessionA + "%")
                                ),
                                React.createElement("div", { className: "stat-bar-container" },
                                    React.createElement("div", { className: "stat-bar-home", style: { width: possessionH + "%" } }),
                                    React.createElement("div", { className: "stat-bar-away", style: { width: possessionA + "%" } })
                                )
                            ),
                            
                            React.createElement("div", { className: "stat-card" },
                                React.createElement("div", { className: "stat-row" },
                                    React.createElement("div", { className: "stat-value" }, totalShotsH),
                                    React.createElement("div", { className: "stat-label" }, "TIRS"),
                                    React.createElement("div", { className: "stat-value" }, totalShotsA)
                                ),
                                React.createElement("div", { className: "stat-row" },
                                    React.createElement("div", { className: "stat-value" }, shotsOnH),
                                    React.createElement("div", { className: "stat-label" }, "CADRÉS"),
                                    React.createElement("div", { className: "stat-value" }, shotsOnA)
                                ),
                                React.createElement("div", { className: "stat-row" },
                                    React.createElement("div", { className: "stat-value" }, cornersH),
                                    React.createElement("div", { className: "stat-label" }, "CORNERS"),
                                    React.createElement("div", { className: "stat-value" }, cornersA)
                                )
                            )
                        );
                    })
                )
            );
        };
        
        // ============================================
        // SCORES TAB
        // ============================================
        const ScoresTab = ({ onOpenMatch }) => {
            const [date, setDate] = React.useState(today);
            const [data, setData] = React.useState([]);
            const [status, setStatus] = React.useState("load");
            const [filter, setFilter] = React.useState("all");
            const [search, setSearch] = React.useState("");
            const [spin, setSpin] = React.useState(false);
            const [cd, setCd] = React.useState(60);
            const [selectedMatch, setSelectedMatch] = React.useState(null);
            
            const mounted = React.useRef(true);
