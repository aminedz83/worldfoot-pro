    <style>
        /* RESET ABSOLU */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            height: 100%;
            width: 100%;
            background: #FFFFFF;
            font-family: 'Barlow', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            position: fixed;
            overscroll-behavior: none;
        }
        
        #root {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #FFFFFF;
        }
        
        /* Animations */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        @keyframes pulse-red {
            0% { background: rgba(229, 57, 53, 0.1); border-left-color: #e53935; }
            50% { background: rgba(229, 57, 53, 0.3); border-left-color: #ff1744; }
            100% { background: rgba(229, 57, 53, 0.1); border-left-color: #e53935; }
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        /* Scroll invisible mais fonctionnel */
        .scrollable {
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        
        .scrollable::-webkit-scrollbar {
            display: none;
            width: 0;
            height: 0;
        }
        
        /* Safe area */
        .safe-top {
            padding-top: env(safe-area-inset-top);
        }
        
        .safe-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        .bc {
            font-family: 'Barlow Condensed', sans-serif;
        }
        
        .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #FF3B30;
            animation: pulse 1.5s infinite;
            box-shadow: 0 0 0 2px rgba(255,59,48,0.2);
            flex-shrink: 0;
        }
        
        /* Match Detail Overlay */
        .md-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: #FFFFFF;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.2s ease;
        }
        
        .md-topbar {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            padding-top: calc(12px + env(safe-area-inset-top));
            background: #FFFFFF;
            border-bottom: 1px solid rgba(0,0,0,0.03);
            flex-shrink: 0;
        }
        
        .md-back-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #F2F2F7;
            border: none;
            border-radius: 10px;
            font-size: 20px;
            color: #1C1C1E;
            cursor: pointer;
            margin-right: 12px;
            flex-shrink: 0;
        }
        
        .md-topbar-title {
            flex: 1;
            font-size: 16px;
            font-weight: 600;
            color: #1C1C1E;
            text-align: center;
        }
        
        .md-content {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        /* Timeline Events */
        .event-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-bottom: 1px solid #F2F2F7;
            animation: slideIn 0.3s ease;
        }
        
        .event-minute {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: #8E8E93;
            min-width: 45px;
        }
        
        .event-icon {
            font-size: 18px;
            width: 28px;
            text-align: center;
        }
        
        .event-desc {
            flex: 1;
            font-size: 14px;
            color: #1C1C1E;
        }
        
        .event-player {
            font-weight: 600;
        }
        
        .event-sub {
            font-size: 12px;
            color: #8E8E93;
            margin-top: 2px;
        }
        
        .event-score {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: #1C1C1E;
        }
        
        /* Big Chance Event */
        .big-chance {
            background: rgba(229, 57, 53, 0.1);
            border-left: 3px solid #e53935;
            animation: pulse-red 1.5s ease-in-out infinite;
        }
        
        .big-chance .event-icon {
            color: #e53935;
        }
        
        .big-chance .event-desc {
            color: #e53935;
            font-weight: 700;
            text-transform: uppercase;
        }
        
        /* Stats Cards */
        .stat-card {
            background: #FFFFFF;
            border-radius: 20px;
            margin: 8px 16px;
            padding: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.02);
            border: 1px solid rgba(0,0,0,0.04);
            animation: scaleIn 0.3s ease;
        }
        
        .stat-row {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #F2F2F7;
        }
        
        .stat-row:last-child {
            border-bottom: none;
        }
        
        .stat-value {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 18px;
            font-weight: 700;
            min-width: 50px;
        }
        
        .stat-label {
            flex: 1;
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            color: #8E8E93;
            text-transform: uppercase;
        }
        
        .stat-bar-container {
            height: 6px;
            background: #F2F2F7;
            border-radius: 3px;
            overflow: hidden;
            display: flex;
            margin-top: 8px;
        }
        
        .stat-bar-home {
            height: 100%;
            background: linear-gradient(90deg, #00b86b, #34D399);
            transition: width 0.5s ease;
        }
        
        .stat-bar-away {
            height: 100%;
            background: linear-gradient(90deg, #2563eb, #60A5FA);
            transition: width 0.5s ease;
        }
        
        .goal-bars {
            display: inline-flex;
            align-items: center;
            gap: 2px;
            background: rgba(0,184,107,0.08);
            padding: 3px 8px;
            border-radius: 20px;
            margin-left: 6px;
        }
        
        /* Navigation Tabs */
        .nav-tabs {
            display: flex;
            overflow-x: auto;
            background: #FFFFFF;
            border-bottom: 1px solid rgba(0,0,0,0.03);
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        
        .nav-tabs::-webkit-scrollbar {
            display: none;
        }
        
        .nav-tab {
            flex-shrink: 0;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 600;
            color: #8E8E93;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
        }
        
        .nav-tab.active {
            color: #00b86b;
            border-bottom-color: #00b86b;
        }
        
        /* Tab Content */
        .tab-content {
            flex: 1;
            overflow: hidden;
            background: #FFFFFF;
        }

const { useState, useEffect, useCallback, useRef, useMemo } = React;

// ============================================
// CONFIGURATION SÉCURISÉE
// ============================================
const API_KEY = "3a14b1347c177458e2f23bea7899e9cf";
const BASE = "https://v3.football.api-sports.io";

// Statuts avec fallback
const LIVE_ST = new Set(["1H", "2H", "ET", "BT", "P"]);
const DONE_ST = new Set(["FT", "AET", "PEN", "AWD", "WO"]);
const NS_ST = new Set(["NS", "TBD", "PST", "CANC"]);

// Cache
const _cache = new Map();

// API SÉCURISÉE - jamais de throw
async function api(path, ttl = 60000) {
    try {
        const now = Date.now();
        if (_cache.has(path) && now - _cache.get(path).t < ttl) {
            return _cache.get(path).d;
        }
        
        const res = await fetch(BASE + path, {
            headers: { "x-apisports-key": API_KEY }
        });
        
        if (!res.ok) return [];
        
        const data = await res.json();
        const response = data.response || [];
        
        _cache.set(path, { d: response, t: now });
        return response;
    } catch (err) {
        return [];
    }
}

// Helpers sécurisés
const today = () => {
    try {
        return new Date().toISOString().slice(0, 10);
    } catch {
        return "2024-01-01";
    }
};

const hhmm = (s) => {
    try {
        const d = new Date(s);
        return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
    } catch {
        return "--:--";
    }
};

const ddmm = (s) => {
    try {
        const d = new Date(s);
        return `${String(d.getDate()).padStart(2, '0')}.${String(d.getMonth() + 1).padStart(2, '0')}`;
    } catch {
        return "--.--";
    }
};

// ============================================
// COMPOSANT LOGO SÉCURISÉ
// ============================================
function Logo({ src, size = 20 }) {
    const [error, setError] = useState(false);
    
    const style = {
        width: size,
        height: size,
        borderRadius: size / 2,
        background: "#F2F2F7",
        flexShrink: 0,
        objectFit: "contain"
    };
    
    if (!src || error) {
        return React.createElement("div", { style });
    }
    
    return React.createElement("img", {
        src: src,
        width: size,
        height: size,
        style: style,
        onError: () => setError(true),
        alt: ""
    });
}

function Spin({ size = 20, color = "#FF3B30" }) {
    return React.createElement("div", {
        style: {
            width: size,
            height: size,
            border: `2px solid ${color}20`,
            borderTopColor: color,
            borderRadius: "50%",
            animation: "spin 0.8s linear infinite"
        }
    });
}

// MATCH DETAIL
// ============================================
function MatchDetail({ matchId, onClose }) {
    const [fixture, setFixture] = useState(null);
    const [events, setEvents] = useState([]);
    const [stats, setStats] = useState([]);
    const [loading, setLoading] = useState(true);
    const mounted = useRef(true);
    
    useEffect(() => {
        mounted.current = true;
        setLoading(true);
        
        const loadMatch = async () => {
            // 1. Charger les infos de base (instantané)
            const fixData = await api(`/fixtures?id=${matchId}`, 30000);
            if (mounted.current && fixData?.[0]) {
                setFixture(fixData[0]);
            }
            
            // 2. Charger les détails en parallèle
            const [eventsData, statsData] = await Promise.all([
                api(`/fixtures/events?fixture=${matchId}`, 15000),
                api(`/fixtures/statistics?fixture=${matchId}`, 15000)
            ]);
            
            if (mounted.current) {
                setEvents(eventsData || []);
                setStats(statsData || []);
                setLoading(false);
            }
        };
        
        loadMatch();
        
        return () => {
            mounted.current = false;
        };
    }, [matchId]);
    
    if (!fixture) {
        return React.createElement("div", { className: "md-overlay" },
            React.createElement("div", { className: "md-topbar" },
                React.createElement("button", { onClick: onClose, className: "md-back-btn" }, "←"),
                React.createElement("div", { className: "md-topbar-title" }, "Chargement...")
            ),
            React.createElement("div", { style: { flex: 1, display: "flex", alignItems: "center", justifyContent: "center" } },
                React.createElement(Spin, { size: 30 })
            )
        );
    }
    
    const homeTeam = fixture.teams?.home;
    const awayTeam = fixture.teams?.away;
    const status = fixture.fixture?.status?.short || "";
    const isLive = LIVE_ST.has(status);
    const elapsed = fixture.fixture?.status?.elapsed || 0;
    const homeScore = fixture.goals?.home ?? 0;
    const awayScore = fixture.goals?.away ?? 0;
    
    // Filtrer les grosses occasions
    const bigChances = events.filter(e => 
        e.type === "Big Chance" || 
        e.detail?.includes("Big chance") || 
        e.detail?.includes("Hit woodwork") ||
        e.type === "Big Chance Created" || 
        e.type === "Big Chance Missed" || 
        e.type === "Hit Woodwork"
    );
    
    return React.createElement("div", { className: "md-overlay" },
        // Top bar
        React.createElement("div", { className: "md-topbar" },
            React.createElement("button", { onClick: onClose, className: "md-back-btn" }, "←"),
            React.createElement("div", { className: "md-topbar-title" }, fixture.league?.name || "Match")
        ),
        
        // Score header
        React.createElement("div", {
            style: {
                padding: "20px 16px",
                background: "linear-gradient(145deg, #FFFFFF, #F8FAFF)",
                borderBottom: "1px solid rgba(0,0,0,0.04)"
            }
        },
            React.createElement("div", {
                style: {
                    display: "flex",
                    alignItems: "center",
                    justifyContent: "space-between",
                    marginBottom: 12
                }
            },
                React.createElement("div", { style: { flex: 1, textAlign: "center" } },
                    React.createElement(Logo, { src: homeTeam?.logo, size: 48 }),
                    React.createElement("div", {
                        style: {
                            fontSize: 14,
                            fontWeight: 600,
                            marginTop: 8,
                            color: "#1C1C1E"
                        }
                    }, homeTeam?.name || "")
                ),
                
                React.createElement("div", { style: { textAlign: "center" } },
                    React.createElement("div", {
                        style: {
                            fontFamily: "'Barlow Condensed', sans-serif",
                            fontSize: 48,
                            fontWeight: 900,
                            color: isLive ? "#FF3B30" : "#1C1C1E",
                            lineHeight: 1
                        }
                    }, homeScore + " - " + awayScore),
                    React.createElement("div", {
                        style: {
                            fontSize: 12,
                            color: "#8E8E93",
                            marginTop: 4
                        }
                    }, ddmm(fixture.fixture?.date) + " " + hhmm(fixture.fixture?.date))
                ),
                
                React.createElement("div", { style: { flex: 1, textAlign: "center" } },
                    React.createElement(Logo, { src: awayTeam?.logo, size: 48 }),
                    React.createElement("div", {
                        style: {
                            fontSize: 14,
                            fontWeight: 600,
                            marginTop: 8,
                            color: "#1C1C1E"
                        }
                    }, awayTeam?.name || "")
                )
            ),
            
            React.createElement("div", {
                style: {
                    display: "flex",
                    alignItems: "center",
                    justifyContent: "center",
                    gap: 8,
                    marginTop: 8
                }
            },
                React.createElement("div", {
                    style: {
                        padding: "6px 16px",
                        background: isLive ? "rgba(255,59,48,0.1)" : "#F2F2F7",
                        borderRadius: 20,
                        fontSize: 12,
                        fontWeight: 600,
                        color: isLive ? "#FF3B30" : "#8E8E93"
                    }
                },
                    isLive ? (elapsed + "'") : (status === "FT" ? "Terminé" : "À venir")
                ),
                isLive && React.createElement("div", { className: "live-dot" })
            )
        ),
        
        // Timeline des événements
        React.createElement("div", { className: "md-content scrollable" },
            // Événements normaux
            events.map((e, i) => {
                const minute = e.time?.elapsed || 0;
                const isBigChance = e.type === "Big Chance" || 
                    e.detail?.includes("Big chance") || 
                    e.detail?.includes("Hit woodwork") ||
                    e.type === "Big Chance Created" || 
                    e.type === "Big Chance Missed" || 
                    e.type === "Hit Woodwork";
                
                let icon = "⚽";
                if (e.type === "Card") {
                    icon = e.detail?.includes("Yellow") ? "🟨" : "🟥";
                } else if (e.type === "subst") {
                    icon = "🔄";
                } else if (isBigChance) {
                    icon = "⚡";
                }
                
                return React.createElement("div", {
                    key: i,
                    className: isBigChance ? "event-row big-chance" : "event-row"
                },
                    React.createElement("div", { className: "event-minute" }, minute + "'"),
                    React.createElement("div", { className: "event-icon" }, icon),
                    React.createElement("div", { className: "event-desc" },
                        React.createElement("div", { className: "event-player" },
                            isBigChance ? "GROSSE OCCASION!" : (e.player?.name || "")

                    ),
                    React.createElement("div", { className: "event-score" },
                        (e.type === "Goal" && !isBigChance) ? (homeScore + " - " + awayScore) : ""
                    )
                );
            }),
            
            // Stats (si disponibles)
            stats.length > 0 && React.createElement("div", { className: "stat-card" },
                React.createElement("div", { className: "stat-row" },
                    React.createElement("div", { className: "stat-value" }, "55%"),
                    React.createElement("div", { className: "stat-label" }, "POSSESSION"),
                    React.createElement("div", { className: "stat-value" }, "45%")
                ),
                React.createElement("div", { className: "stat-bar-container" },
                    React.createElement("div", { className: "stat-bar-home", style: { width: "55%" } }),
                    React.createElement("div", { className: "stat-bar-away", style: { width: "45%" } })
                )
            ),
            
            stats.length > 0 && React.createElement("div", { className: "stat-card" },
                React.createElement("div", { className: "stat-row" },
                    React.createElement("div", { className: "stat-value" }, "12"),
                    React.createElement("div", { className: "stat-label" }, "TIRS"),
                    React.createElement("div", { className: "stat-value" }, "8")
                ),
                React.createElement("div", { className: "stat-row" },
                    React.createElement("div", { className: "stat-value" }, "4"),
                    React.createElement("div", { className: "stat-label" }, "CADRÉS"),
                    React.createElement("div", { className: "stat-value" }, "3")

                React.createElement("div", { className: "stat-row" },
                    React.createElement("div", { className: "stat-value" }, "5"),
                    React.createElement("div", { className: "stat-label" }, "CORNERS"),
                    React.createElement("div", { className: "stat-value" }, "2")

}

                d.setDate(d.getDate() + i - 7);

    const groups = useMemo(() => {

function MatchRow({ match, onClick }) {
    if (!match || !match.fixture || !match.teams) return null;
    
    const status = match.fixture.status?.short || "";
    const isLive = LIVE_ST.has(status);
    const isDone = DONE_ST.has(status);
    const elapsed = match.fixture.status?.elapsed || 0;
    
    let timeDisplay = hhmm(match.fixture.date);
    if (isLive) {
        timeDisplay = elapsed + "'";
    } else if (isDone) {
        timeDisplay = "FT";
    }
    
    return React.createElement("div", {
        onClick: onClick,
        style: {
            display: "flex",
            alignItems: "center",
            padding: "8px 16px",
