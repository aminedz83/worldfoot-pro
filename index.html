function safeSet(k,v){try{localStorage.setItem(k,v);}catch{}}
function safeGetJSON(k,d=null){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}

}

if(_mem.has(k))return *mem.get(k).d;

// ─────────────────────────────────────────────
// API + CACHE
// ─────────────────────────────────────────────
async function api(path, ttl=TTL.fixtures, signal=null){
const cached=cacheGet(path,ttl);
if(cached)return cached;
const stale=cacheStale(path);
const opts={headers:{“x-apisports-key”:API_KEY}};
if(signal)opts.signal=signal;
try{
const r=await fetch(BASE+path,opts);
if(!r.ok)throw new Error(`HTTP ${r.status}`);
const j=await r.json();
if(j.errors&&Object.keys(j.errors).length){
const msg=Object.values(j.errors)[0];
if(stale)return stale; // retour stale si erreur
throw new Error(typeof msg===“string”?msg:“Erreur API”);
}
const d=j.response??[];
_mem.set(path,{d,t:Date.now()});
cacheSet(path,d);
return d;
}catch(e){
if(e.name===“AbortError”)throw e;
if(stale)return stale; // stale-while-revalidate
throw e;
}
}

function useMinute(elapsed,status){
const[m,setM]=useState(elapsed??0);
useEffect(()=>{
setM(elapsed??0);
if(!LIVE_ST.has(status))return;
const max=status===“2H”||status===“ET”?96:47;
const id=setInterval(()=>setM(v=>v<max?v+1:v),60000);
return()=>clearInterval(id);
},[elapsed,status]);
return m;
}
function useFlash(hg,ag){
const prev=useRef({h:null,a:null}),[on,setOn]=useState(false);
useEffect(()=>{
const p=prev.current;prev.current={h:hg,a:ag};
if(p.h!==null&&(hg>p.h||ag>p.a)){setOn(true);const t=setTimeout(()=>setOn(false),4000);return()=>clearTimeout(t);}
},[hg,ag]);
return on;
}

function Pitch({lineup,isHome}){
if(!lineup?.startXI?.length)return null;
const pts=lineup.startXI.map(p=>p.player).filter(Boolean);
const form=(lineup.formation||“4-4-2”).split(”-”).map(Number);
const rows=[1,…form];let idx=0;
const grid=rows.map(n=>{const r=[];for(let i=0;i<n&&idx<pts.length;i++)r.push(pts[idx++]);return r;});
const W=260,H=178,rc=grid.length;
const tc=isHome?C.acc:C.blueB;
return<svg width=“100%” viewBox={`0 0 ${W} ${H}`} style={{display:“block”}}>
<defs>
<linearGradient id={`pg${isHome?0:1}`} x1=“0” y1=“0” x2=“0” y2=“1”>
<stop offset=“0%” stopColor={isHome?”#1b3c20”:”#172240”}/>
<stop offset=“100%” stopColor={isHome?”#102415”:”#0f1828”}/>
</linearGradient>
</defs>
<rect width={W} height={H} fill={`url(#pg${isHome?0:1})`} rx={6}/>
<rect x={7} y={5} width={W-14} height={H-10} fill="none" stroke="rgba(255,255,255,.11)" strokeWidth={1} rx={3}/>
<line x1={W/2} y1={5} x2={W/2} y2={H-5} stroke="rgba(255,255,255,.07)" strokeWidth={1}/>
<circle cx={W/2} cy={H/2} r={22} fill="none" stroke="rgba(255,255,255,.07)" strokeWidth={1}/>
{grid.map((row,ri)=>{
const x=isHome?16+(ri/(rc-1||1))*(W-32):W-16-(ri/(rc-1||1))*(W-32);
return row.map((p,pi)=>{
const y=H/(row.length+1)*(pi+1);
const nm=(p.name||””).split(” “).pop().slice(0,8);
return<g key={p.id??`${ri}-${pi}`}>
<circle cx={x} cy={y} r={9} fill={tc} opacity={.9}/>
<text x={x} y={y+1} textAnchor="middle" dominantBaseline="middle" fill="#fff" fontSize={7} fontWeight="bold">{p.number}</text>
<text x={x} y={y+18} textAnchor="middle" fill="rgba(255,255,255,.7)" fontSize={6.5}>{nm}</text>
</g>;
});
})}
</svg>;
}
