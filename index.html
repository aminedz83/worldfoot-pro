const _cache=new Map();
async function api(path,ttl=15000){
  const now=Date.now();
  if(_cache.has(path)&&now-_cache.get(path).t<ttl) return _cache.get(path).d;
  const r=await fetch(BASE+path,{headers:{"x-apisports-key":API_KEY}});
  if(!r.ok) throw new Error(`Erreur HTTP ${r.status}`);
  const j=await r.json();
  if(j.errors&&Object.keys(j.errors).length){
    const msg=Object.values(j.errors)[0];
    throw new Error(typeof msg==="string"?msg:"Erreur API");
  }
  const d=j.response??[];
  _cache.set(path,{d,t:now});
  return d;
}

function useMinute(elapsed,status){
  const[m,setM]=useState(elapsed??0);
  useEffect(()=>{
    setM(elapsed??0);
    if(!LIVE_ST.has(status))return;
    const id=setInterval(()=>setM(v=>{const c=(status==="2H"||status==="ET")?96:47;return v<c?v+1:v;}),60000);
    return()=>clearInterval(id);
  },[elapsed,status]);
  return m;
}
function useFlash(hg,ag){
  const prev=useRef({h:null,a:null}),[on,setOn]=useState(false);
  useEffect(()=>{
    const p=prev.current;prev.current={h:hg,a:ag};
    if(p.h!==null&&(hg>p.h||ag>p.a)){setOn(true);const t=setTimeout(()=>setOn(false),4000);return()=>clearTimeout(t);}
  },[hg,ag]);
  return on;
}

// ─── SCHÉMA TACTIQUE ───
function Pitch({lineup,isHome}){
  if(!lineup?.startXI?.length)return null;
  const pts=lineup.startXI.map(p=>p.player).filter(Boolean);
  const form=(lineup.formation||"4-4-2").split("-").map(Number);
  const rows=[1,...form];let idx=0;
  const grid=rows.map(n=>{const r=[];for(let i=0;i<n&&idx<pts.length;i++)r.push(pts[idx++]);return r;});
  const W=260,H=178,rc=grid.length,tc=isHome?T.red:T.blueB;
  return<svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:"block"}}>
    <defs><linearGradient id={`pg${isHome?0:1}`} x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stopColor={isHome?"#1b3c20":"#172240"}/>
      <stop offset="100%" stopColor={isHome?"#102415":"#0f1828"}/>
    </linearGradient></defs>
    <rect width={W} height={H} fill={`url(#pg${isHome?0:1})`} rx={6}/>
    <rect x={7} y={5} width={W-14} height={H-10} fill="none" stroke="rgba(255,255,255,.11)" strokeWidth={1} rx={3}/>
    <line x1={W/2} y1={5} x2={W/2} y2={H-5} stroke="rgba(255,255,255,.07)" strokeWidth={1}/>
    <circle cx={W/2} cy={H/2} r={22} fill="none" stroke="rgba(255,255,255,.07)" strokeWidth={1}/>
    <circle cx={W/2} cy={H/2} r={2} fill="rgba(255,255,255,.14)"/>
    {isHome
      ?<><rect x={7} y={H/2-27} width={38} height={54} fill="none" stroke="rgba(255,255,255,.09)" strokeWidth={1}/><rect x={7} y={H/2-13} width={16} height={26} fill="none" stroke="rgba(255,255,255,.07)" strokeWidth={1}/></>
      :<><rect x={W-45} y={H/2-27} width={38} height={54} fill="none" stroke="rgba(255,255,255,.09)" strokeWidth={1}/><rect x={W-23} y={H/2-13} width={16} height={26} fill="none" stroke="rgba(255,255,255,.07)" strokeWidth={1}/></>}
    {grid.map((row,ri)=>{
      const x=isHome?16+(ri/(rc-1||1))*(W-32):W-16-(ri/(rc-1||1))*(W-32);
      return row.map((p,pi)=>{
        const y=H/(row.length+1)*(pi+1),nm=(p.name||"").split(" ").pop().slice(0,7);
        return<g key={p.id??`${ri}-${pi}`}>
          <circle cx={x} cy={y} r={9} fill={tc} opacity={.9}/>
          <circle cx={x} cy={y} r={9} fill="none" stroke="rgba(255,255,255,.28)" strokeWidth={.7}/>
          <text x={x} y={y+1} textAnchor="middle" dominantBaseline="middle" fill="#fff" fontSize={7} fontWeight="bold">{p.number}</text>
          <text x={x} y={y+17} textAnchor="middle" fill="rgba(255,255,255,.7)" fontSize={6.5}>{nm}</text>
        </g>;
      });
    })}
  </svg>;
}

// ═══════════════════════════════════════════════
// MATCH ROW — hooks AVANT early return (règle React)
// ═══════════════════════════════════════════════
function Row({match:m,onOpen,isFav,onFav}){
  const s=m.fixture.status;
  const sh=s.short;
  const live=["1H","2H","ET","P"].includes(sh);
  const done=DONE_ST.has(sh);
  const susp=SUSP_ST.has(sh);
  const canc=sh==="CANC";
  const min=useMinute(s.elapsed,s.short);
  const flash=useFlash(m.goals.home,m.goals.away);
  const hg=m.goals.home,ag=m.goals.away,has=hg!==null&&ag!==null,hw=has&&hg>ag,aw=has&&ag>hg;
  const barColor=live?T.red:sh==="HT"||sh==="BT"?T.gold:susp?T.orange:canc?T.red:"transparent";
  const stLabel=sh==="HT"?"MT":sh==="BT"?"Pause":sh==="P"?"Tab":sh==="SUSP"?"Susp.":sh==="INT"?"Inter.":sh==="ABD"?"Arrêté":sh==="CANC"?"Annulé":sh==="PST"?"Reporté":sh==="TBD"?"TBD":sh==="AWD"?"T.vert":sh==="WO"?"Forfait":sh==="AET"?"Ap.Pr.":sh==="PEN"?"Tab":"FT";
  const stColor=sh==="HT"||sh==="BT"?T.gold:susp?T.orange:canc?T.red:sh==="PST"?T.yellow:T.t3;
  return<div onClick={onOpen} className="row-anim" style={{
    display:"flex",alignItems:"center",minHeight:52,cursor:"pointer",
    borderBottom:`1px solid ${T.line}`,
    background:flash?"rgba(229,53,53,.08)":canc||susp?"rgba(0,0,0,.2)":"transparent",
    animation:flash?"gFlash 4s ease forwards":"none",
    transition:"background .18s",opacity:canc?0.45:1,width:"100%",
    position:"relative",
  }}
  onMouseEnter={e=>e.currentTarget.style.background=flash?"rgba(229,53,53,.1)":"rgba(255,255,255,.025)"}
  onMouseLeave={e=>e.currentTarget.style.background=flash?"rgba(229,53,53,.08)":canc||susp?"rgba(0,0,0,.2)":"transparent"}
  >
    {/* Barre colorée gauche */}
    <div style={{width:3,alignSelf:"stretch",flexShrink:0,background:barColor,animation:live?"pulse 1.4s infinite":susp?"pulse 2.5s infinite":"none",borderRadius:"0 2px 2px 0"}}/>
    {/* Statut / Heure */}
    <div style={{width:44,textAlign:"center",flexShrink:0,padding:"0 3px"}}>
      {live
        ?<span className="bc" style={{fontSize:13,fontWeight:800,color:T.red,animation:"lGlow 2s infinite",display:"block"}}>{min}'</span>
        :sh==="NS"
        ?<span className="bc" style={{fontSize:13,fontWeight:700,color:T.t2}}>{hhmm(m.fixture.date)}</span>
        :<span className="bc" style={{fontSize:10,fontWeight:800,color:stColor,display:"block",lineHeight:1.3}}>{stLabel}</span>}
    </div>
    {/* Équipes */}
    <div style={{flex:1,minWidth:0,padding:"7px 8px 7px 4px",display:"flex",flexDirection:"column",gap:6}}>
      <div style={{display:"flex",alignItems:"center",gap:7}}>
        <Logo src={m.teams.home.logo} size={16}/>
        <span className="bc" style={{fontSize:14,fontWeight:hw?800:500,color:aw?T.t3:T.t1,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",letterSpacing:.2}}>{m.teams.home.name}</span>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:7}}>
        <Logo src={m.teams.away.logo} size={16}/>
        <span className="bc" style={{fontSize:14,fontWeight:aw?800:500,color:hw?T.t3:T.t1,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",letterSpacing:.2}}>{m.teams.away.name}</span>
      </div>
    </div>
    {/* Scores */}
    <div style={{width:28,display:"flex",flexDirection:"column",alignItems:"center",gap:6,flexShrink:0}}>
      {has?<>
        <span className="bc" style={{fontSize:16,fontWeight:hw?900:600,lineHeight:1,color:flash?T.red:hw?"#fff":T.t3,animation:flash?"sPop .55s ease":"none"}}>{hg}</span>
        <span className="bc" style={{fontSize:16,fontWeight:aw?900:600,lineHeight:1,color:flash?T.red:aw?"#fff":T.t3,animation:flash?"sPop .55s ease .12s":"none"}}>{ag}</span>
      </>:<span style={{fontSize:12,color:T.t4,marginTop:4}}>-</span>}
    </div>
    {/* Favori */}
    <button onClick={e=>{e.stopPropagation();onFav();}} style={{background:"none",border:"none",color:isFav?T.gold:T.t5,fontSize:15,padding:"0 13px 0 5px",lineHeight:1,flexShrink:0,cursor:"pointer",transition:"color .15s"}}>{isFav?"★":"☆"}</button>
    {/* Flash but — ligne rouge en bas */}
    {flash&&<div style={{position:"absolute",bottom:0,left:0,right:0,height:1,background:"linear-gradient(90deg,transparent,rgba(229,53,53,.6),transparent)"}}/>}
  </div>;
}

function InjuriesPanel({injuries,homeTeam,awayTeam}){

  const hInj=injuries.filter(i=>i.team?.id===homeTeam?.id);
  const aInj=injuries.filter(i=>i.team?.id===awayTeam?.id);
  const typeColor=t=>{
    const s=(t||"").toLowerCase();
    if(s.includes("suspen"))return{bg:T.yellowL,c:T.yellowB,icon:"🟨"};
    return{bg:T.redL,c:T.red,icon:"🤕"};
  };
  const Section=({team,list})=>list.length===0?null:<div style={{marginBottom:8}}>
    <div style={{display:"flex",alignItems:"center",gap:9,padding:"10px 16px 7px",borderBottom:`1px solid ${T.line}`}}>

      <span style={{fontSize:14,fontWeight:700,color:T.t1}}>{team?.name}</span>
      <span style={{fontSize:11,background:T.redL,color:T.red,padding:"2px 9px",borderRadius:10,marginLeft:"auto"}}>{list.length} absent{list.length>1?"s":""}</span>
    </div>
    {list.map((p,i)=>{
      const {bg,c,icon}=typeColor(p.player?.type);
      return<div key={i} style={{display:"flex",alignItems:"center",padding:"10px 16px",borderBottom:`1px solid ${T.line}11`,gap:11}}>
        <Avatar src={p.player?.photo} size={36}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,fontWeight:700,color:T.t1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.player?.name}</div>
          <div style={{fontSize:11,color:T.t3,marginTop:3}}>{p.player?.reason||p.player?.type||"Absence"}</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4,flexShrink:0}}>
          <span style={{fontSize:16}}>{icon}</span>
          <span style={{fontSize:10,background:bg,color:c,padding:"2px 8px",borderRadius:8,fontWeight:700}}>{(p.player?.type||"Blessé").slice(0,12)}</span>

      </div>;
    })}
  </div>;
  return<div><Section team={homeTeam} list={hInj}/><Section team={awayTeam} list={aInj}/></div>;
}

// ═══════════════════════════════════════════════
// MODULE STATS AVANCÉES JOUEURS (endpoint Pro)
// ═══════════════════════════════════════════════
function PlayersStatsPanel({players,homeTeam,awayTeam}){
  const[selTeam,setSelTeam]=useState("home");
  const[sortBy,setSortBy]=useState("rating");

  const tp=players.find(t=>t.team?.id===(selTeam==="home"?homeTeam?.id:awayTeam?.id))?.players??[];

  const SORT_OPTS=[
    {id:"rating",  label:"Note"},
    {id:"minutes", label:"Min"},
    {id:"goals",   label:"Buts"},
    {id:"assists", label:"PD"},
    {id:"shots",   label:"Tirs"},
    {id:"passes",  label:"Passes"},
    {id:"tackles", label:"Tacles"},
  ];

  const sorted=[...tp].sort((a,b)=>{
    const sa=a.statistics?.[0],sb=b.statistics?.[0];
    switch(sortBy){
      case"rating": return (parseFloat(sb?.games?.rating)||0)-(parseFloat(sa?.games?.rating)||0);
      case"minutes":return (sb?.games?.minutes||0)-(sa?.games?.minutes||0);
      case"goals":  return (sb?.goals?.total||0)-(sa?.goals?.total||0);
      case"assists":return (sb?.goals?.assists||0)-(sa?.goals?.assists||0);
      case"shots":  return (sb?.shots?.total||0)-(sa?.shots?.total||0);
      case"passes": return (sb?.passes?.total||0)-(sa?.passes?.total||0);
      case"tackles":return (sb?.tackles?.total||0)-(sa?.tackles?.total||0);
      default:      return 0;
    }
  });

  if(!tp.length) return<div style={{textAlign:"center",padding:"28px 20px",color:T.t3,fontSize:13}}>Stats joueurs non disponibles</div>;

  const ratingColor=r=>{
    const v=parseFloat(r)||0;
    if(v>=8)return T.greenB;
    if(v>=7)return T.yellowB;
    if(v>=6)return T.orangeB;
    return T.red;
  };

  return<div>
    {/* Sélecteur équipe */}
    <div style={{display:"flex",gap:8,padding:"12px 16px 8px",borderBottom:`1px solid ${T.line}`}}>
      {[{id:"home",team:homeTeam},{id:"away",team:awayTeam}].map(({id,team})=><button key={id} onClick={()=>setSelTeam(id)} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:7,background:selTeam===id?T.redL:"none",border:`1px solid ${selTeam===id?T.red:T.bg4}`,borderRadius:8,padding:"8px 10px",cursor:"pointer"}}>
        <Logo src={team?.logo} size={20}/>
        <span style={{fontSize:12,fontWeight:selTeam===id?700:400,color:selTeam===id?T.red:T.t2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{team?.name}</span>
      </button>)}
    </div>
    {/* Tri */}
    <div style={{display:"flex",gap:5,padding:"8px 16px",overflowX:"auto",borderBottom:`1px solid ${T.line}`}}>
      {SORT_OPTS.map(o=><button key={o.id} onClick={()=>setSortBy(o.id)} style={{flexShrink:0,background:sortBy===o.id?T.blueB:T.bg3,border:"none",color:sortBy===o.id?"#fff":T.t3,borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:sortBy===o.id?700:400,cursor:"pointer"}}>{o.label}</button>)}
    </div>
    {/* Liste joueurs */}
    {sorted.map((p,i)=>{
      const pl=p.player,st=p.statistics?.[0];
      const rating=st?.games?.rating?parseFloat(st.games.rating).toFixed(1):null;
      const pos=st?.games?.position;
      const posColor=pos==="G"?T.yellowB:pos==="D"?T.blueB:pos==="M"?T.greenB:pos==="F"?T.red:T.t3;
      return<div key={pl?.id??i} style={{display:"flex",alignItems:"center",padding:"10px 16px",borderBottom:`1px solid ${T.line}11`,gap:10,transition:"background .12s"}} onMouseEnter={e=>e.currentTarget.style.background=T.bg2} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
        <span style={{fontSize:11,fontWeight:700,color:T.t4,width:20,textAlign:"center",flexShrink:0}}>{st?.games?.number||pl?.number}</span>
        <Avatar src={pl?.photo} size={36}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,fontWeight:600,color:T.t1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{pl?.name}</div>
          <div style={{display:"flex",alignItems:"center",gap:6,marginTop:3}}>
            {pos&&<span style={{fontSize:9,fontWeight:800,color:posColor,background:posColor+"22",padding:"1px 5px",borderRadius:4}}>{pos}</span>}
            <span style={{fontSize:10,color:T.t3}}>{fmt(st?.games?.minutes)} min</span>
            {st?.goals?.total>0&&<span style={{fontSize:10,color:T.greenB}}>⚽{st.goals.total}</span>}
            {st?.goals?.assists>0&&<span style={{fontSize:10,color:T.blueB}}>🎯{st.goals.assists}</span>}
            {st?.cards?.yellow>0&&<span style={{fontSize:10}}>🟨{st.cards.yellow}</span>}
            {st?.cards?.red>0&&<span style={{fontSize:10}}>🟥</span>}
          </div>
        </div>
        {/* Stats clés selon tri */}
        <div style={{display:"flex",gap:6,flexShrink:0}}>
          {sortBy==="rating"&&rating&&<div style={{background:ratingColor(rating)+"22",border:`1px solid ${ratingColor(rating)}44`,borderRadius:8,padding:"4px 8px",textAlign:"center"}}>
            <div style={{fontSize:16,fontWeight:900,color:ratingColor(rating),lineHeight:1}}>{rating}</div>
            <div style={{fontSize:9,color:T.t3,marginTop:1}}>note</div>
          </div>}
          {sortBy==="shots"&&<div style={{textAlign:"right"}}>
            <div style={{fontSize:15,fontWeight:800,color:T.t1}}>{fmt(st?.shots?.total)}</div>
            <div style={{fontSize:9,color:T.t3}}>tirs ({fmt(st?.shots?.on)} cadrés)</div>
          </div>}
          {sortBy==="passes"&&<div style={{textAlign:"right"}}>
            <div style={{fontSize:15,fontWeight:800,color:T.t1}}>{fmt(st?.passes?.total)}</div>
            <div style={{fontSize:9,color:T.t3}}>{fmt(st?.passes?.accuracy)}% précision</div>
          </div>}
          {sortBy==="tackles"&&<div style={{textAlign:"right"}}>
            <div style={{fontSize:15,fontWeight:800,color:T.t1}}>{fmt(st?.tackles?.total)}</div>
            <div style={{fontSize:9,color:T.t3}}>tacles</div>
          </div>}
          {sortBy==="minutes"&&<div style={{textAlign:"right"}}>
            <div style={{fontSize:15,fontWeight:800,color:T.t1}}>{fmt(st?.games?.minutes)}'</div>
          </div>}
          {(sortBy==="goals"||sortBy==="assists")&&<div style={{textAlign:"right"}}>
            <div style={{fontSize:15,fontWeight:800,color:sortBy==="goals"?T.greenB:T.blueB}}>{fmt(sortBy==="goals"?st?.goals?.total:st?.goals?.assists)}</div>
            <div style={{fontSize:9,color:T.t3}}>{sortBy==="goals"?"buts":"passes D."}</div>
          </div>}
          {sortBy==="rating"&&<div style={{display:"flex",flexDirection:"column",gap:3,textAlign:"right"}}>
            <span style={{fontSize:10,color:T.t3}}>{fmt(st?.shots?.total)} tirs</span>
            <span style={{fontSize:10,color:T.t3}}>{fmt(st?.passes?.total)} passes</span>
            <span style={{fontSize:10,color:T.t3}}>{fmt(st?.tackles?.total)} tacles</span>
          </div>}
        </div>
      </div>;
    })}
  </div>;
}

      </div>
    </div>

    {/* Vue schéma */}
    {view==="pitch"&&<div style={{padding:"14px 14px 20px"}}>
      <div style={{display:"flex",gap:10}}>
        {hLu&&<div style={{flex:1}}>
          <div style={{fontSize:12,color:T.red,fontWeight:700,textAlign:"center",marginBottom:7}}>{homeTeam?.name} <span style={{color:T.t3,fontWeight:400}}>({hLu.formation})</span></div>
          <Pitch lineup={hLu} isHome={true}/>
          {hLu.coach&&<div style={{display:"flex",alignItems:"center",gap:8,marginTop:8,padding:"7px 9px",background:T.bg3,borderRadius:8}}>
            <Avatar src={hLu.coach.photo} size={32} ring={T.red}/>
            <div><div style={{fontSize:10,color:T.t3}}>Entraîneur</div><div style={{fontSize:12,fontWeight:700,color:T.t1}}>{hLu.coach.name}</div></div>
          </div>}
        </div>}
        {aLu&&<div style={{flex:1}}>
          <div style={{fontSize:12,color:T.blueB,fontWeight:700,textAlign:"center",marginBottom:7}}>{awayTeam?.name} <span style={{color:T.t3,fontWeight:400}}>({aLu.formation})</span></div>
          <Pitch lineup={aLu} isHome={false}/>
          {aLu.coach&&<div style={{display:"flex",alignItems:"center",gap:8,marginTop:8,padding:"7px 9px",background:T.bg3,borderRadius:8}}>
            <Avatar src={aLu.coach.photo} size={32} ring={T.blueB}/>
            <div><div style={{fontSize:10,color:T.t3}}>Entraîneur</div><div style={{fontSize:12,fontWeight:700,color:T.t1}}>{aLu.coach.name}</div></div>
          </div>}
        </div>}
      </div>
    </div>}

    {/* Vue liste */}
    {view==="list"&&<div>
      {[{lu:hLu,tp:hPh,team:homeTeam,tc:T.red},{lu:aLu,tp:aPh,team:awayTeam,tc:T.blueB}].map(({lu,tp,team,tc})=>lu?<div key={team?.id} style={{marginBottom:8}}>
        <div style={{display:"flex",alignItems:"center",gap:9,padding:"10px 16px 7px",borderBottom:`1px solid ${T.line}`}}>
          <Logo src={team?.logo} size={20}/>
          <span style={{fontSize:14,fontWeight:700,color:T.t1}}>{team?.name}</span>
          {lu.formation&&<span style={{fontSize:11,color:T.t3,background:T.bg3,padding:"2px 8px",borderRadius:4,marginLeft:"auto"}}>{lu.formation}</span>}
        </div>
        {(lu.startXI??[]).map((p,i)=><Plr key={`s${i}`} p={p} tp={tp} tc={tc}/>)}
        {(lu.substitutes??[]).length>0&&<>
          <div style={{fontSize:10,fontWeight:700,color:T.t3,letterSpacing:1,textTransform:"uppercase",padding:"8px 16px 4px",background:T.bg0}}>Remplaçants</div>
          {lu.substitutes.map((p,i)=><Plr key={`r${i}`} p={p} tp={tp} tc={T.t4}/>)}
        </>}
      </div>:null)}
    </div>}
  </div>;
}

// ═══════════════════════════════════════════════
// MATCH DETAIL — tous les hooks AVANT early return
// ═══════════════════════════════════════════════
function MatchDetail({state,onClose}){
  const[tab,setTab]=useState("resume");

  // Extraction sécurisée
  const fix     =state?.data?.fixture  ??null;
  const stats   =state?.data?.stats    ??[];
  const events  =state?.data?.events   ??[];
  const lineups =state?.data?.lineups  ??[];
  const h2h     =state?.data?.h2h      ??[];
  const players =state?.data?.players  ??[];
  const injuries=state?.data?.injuries ??[];

  const s  =fix?.fixture?.status??{short:"NS",elapsed:null};
  const hg =fix?.goals?.home??0, ag=fix?.goals?.away??0;
  const has=fix?!NS_ST.has(s.short):false;
  const hw =has&&hg>ag, aw=has&&ag>hg;

  // ⚠️ Hooks toujours avant early return
  const min  =useMinute(s.elapsed,s.short);
  const flash=useFlash(hg,ag);
  useEffect(()=>{setTab("resume");},[fix?.fixture?.id]);

  // Early returns après les hooks
  if(!state)return null;
  if(state.loading)return<Sheet open onClose={onClose}>
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:14,padding:"52px 20px"}}>
      <Spin s={30}/><span style={{fontSize:13,color:T.t3}}>Chargement du match...</span>
    </div>
  </Sheet>;
  if(state.error)return<Sheet open onClose={onClose}>
    <div style={{textAlign:"center",padding:"44px 20px"}}>
      <div style={{fontSize:44,marginBottom:14}}>⚠️</div>
      <div style={{fontSize:14,color:T.t2,marginBottom:24,lineHeight:1.5}}>{state.error}</div>
      <button onClick={onClose} style={{background:T.red,border:"none",color:"#fff",borderRadius:10,padding:"12px 28px",fontSize:14,fontWeight:700,cursor:"pointer"}}>Fermer</button>
    </div>
  </Sheet>;
  if(!fix)return null;

  // Données match
  const hSt=stats.find(t=>t.team?.id===fix.teams.home.id)?.statistics??[];
  const aSt=stats.find(t=>t.team?.id===fix.teams.away.id)?.statistics??[];
  const gv=(arr,k)=>arr.find(x=>x.type===k)?.value??0;
  const mEvt=events.filter(e=>e.type!=="subst");
  const goals=mEvt.filter(e=>e.type==="Goal");

  // Tabs disponibles selon données présentes
  const TABS=[
    {id:"resume",    label:"Résumé"},
    events.length            ?{id:"evts",     label:"Événements"}:null,
    hSt.length               ?{id:"stats",    label:"Stats"}     :null,
    lineups.length           ?{id:"compos",   label:"⚽ Compos"} :null,
    players.some(t=>t.players?.length)?{id:"joueurs",  label:"👤 Joueurs"}:null,
    (injuries.length)        ?{id:"absents",  label:"🤕 Absents"} :null,
    h2h.length               ?{id:"h2h",      label:"H2H"}       :null,
  ].filter(Boolean);

  const SK=[
    "Ball Possession","Total Shots","Shots on Goal","Shots off Goal",
    "Blocked Shots","Corner Kicks","Offsides","Fouls",
    "Yellow Cards","Red Cards","Goalkeeper Saves",
    "Total passes","Passes accurate","Passes %",
  ];

  const ico=e=>{
    if(e.type==="Card")return e.detail?.includes("Yellow")?"🟨":"🟥";
    if(e.type==="subst")return"🔄";
    if(e.detail==="Penalty")return"⚽(P)";
    if(e.detail==="Own Goal")return"⚽csc";
    return"⚽";
  };

  const Evt=({e})=>{
    const home=e.team?.id===fix.teams.home.id;
    return<div style={{display:"flex",alignItems:"center",padding:"9px 16px",borderBottom:`1px solid ${T.line}22`,flexDirection:home?"row":"row-reverse",gap:10}}>
      <span className="bc" style={{fontSize:13,fontWeight:800,color:T.red,width:30,textAlign:home?"left":"right",flexShrink:0,letterSpacing:.3}}>{e.time?.elapsed}'</span>
      <span style={{fontSize:16}}>{ico(e)}</span>
      <div style={{flex:1,textAlign:home?"left":"right"}}>
        <div className="bc" style={{fontSize:14,fontWeight:700,color:T.t1,letterSpacing:.2}}>{e.player?.name??""}</div>
        {e.type==="subst"&&e.assist?.name&&<div style={{fontSize:11,color:T.greenB,marginTop:2}}>↑ {e.assist.name}</div>}
        {e.type!=="subst"&&e.assist?.name&&<div style={{fontSize:11,color:T.t3,marginTop:2}}>{e.assist.name}</div>}
      </div>
    </div>;
  };

  return<Sheet open onClose={onClose}>
    {/* Ligue + fermer */}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"4px 16px 12px"}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <Logo src={fix.league.logo} size={16}/>
        <span style={{fontSize:12,color:T.t3}}>{fix.league.name} · {fix.league.country}</span>
        {fix.league.round&&<span style={{fontSize:11,color:T.t4}}>· {fix.league.round.replace("Regular Season - ","J")}</span>}
      </div>
      <button onClick={onClose} style={{background:T.bg3,border:`1px solid ${T.line}`,color:T.t2,borderRadius:"50%",width:30,height:30,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
    </div>

    {/* Hero score — PREMIUM */}
    <div style={{
      background:"linear-gradient(180deg,#140810 0%,#0c0d17 100%)",
      padding:"14px 18px 18px",
      borderTop:`1px solid ${T.line}`,
      borderBottom:`1px solid ${T.line}`,
      position:"relative",overflow:"hidden",
    }}>
      {/* Glow décoratif */}
      <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse 80% 60% at 50% 0%,rgba(229,53,53,.07) 0%,transparent 70%)",pointerEvents:"none"}}/>
      {fix.fixture.venue?.name&&<div style={{textAlign:"center",fontSize:10,color:T.t4,marginBottom:10,position:"relative"}}>📍 {fix.fixture.venue.name}{fix.fixture.venue.city?`, ${fix.fixture.venue.city}`:""}</div>}
      <div style={{display:"flex",alignItems:"center",position:"relative"}}>
        {/* Équipe domicile */}
        <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
          <Logo src={fix.teams.home.logo} size={52}/>
          <span className="bc" style={{fontSize:13,fontWeight:hw?800:500,color:aw?T.t3:"#fff",textAlign:"center",lineHeight:1.2,maxWidth:95,letterSpacing:.2}}>{fix.teams.home.name}</span>
          {lineups.find(l=>l.team?.id===fix.teams.home.id)?.formation&&<span className="bc" style={{fontSize:11,color:T.t3,background:T.bg3,padding:"2px 9px",borderRadius:20,letterSpacing:.5}}>{lineups.find(l=>l.team?.id===fix.teams.home.id).formation}</span>}
        </div>
        {/* Score central */}
        <div style={{textAlign:"center",minWidth:110,padding:"0 6px"}}>
          {has
            ?<div className="bc" style={{fontSize:54,fontWeight:900,letterSpacing:-2,lineHeight:1,color:LIVE_ST.has(s.short)?"#ff5252":"#fff",textShadow:LIVE_ST.has(s.short)?"0 0 24px rgba(255,82,82,.5)":"0 2px 12px rgba(0,0,0,.5)"}}>{hg}<span style={{color:T.t4,fontSize:28,margin:"0 5px",fontWeight:200}}>-</span>{ag}</div>
            :<div className="bc" style={{fontSize:22,fontWeight:700,color:T.blueB}}>{hhmm(fix.fixture.date)}</div>}
          <div style={{marginTop:7}}>
            {LIVE_ST.has(s.short)
              ?<span className="bc" style={{fontSize:14,fontWeight:900,color:"#ff5252",animation:"lGlow 2s infinite",letterSpacing:.5}}>{min}'</span>
              :<span className="bc" style={{fontSize:11,fontWeight:700,color:["SUSP","INT","ABD"].includes(s.short)?T.orange:["CANC"].includes(s.short)?T.red:["PST"].includes(s.short)?T.yellow:T.t3,letterSpacing:.4}}>{
  s.short==="HT"?"Mi-temps":s.short==="BT"?"Pause prol.":s.short==="ET"?"Prol.":
  s.short==="P"?"Tab":s.short==="SUSP"?"Suspendu":s.short==="INT"?"Interrompu":
  s.short==="ABD"?"Arrêté":s.short==="CANC"?"Annulé":s.short==="PST"?"Reporté":
  s.short==="AWD"?"Tapis vert":s.short==="WO"?"Forfait":s.short==="AET"?"Ap. Prol.":
  s.short==="PEN"?"Tab":s.short==="TBD"?"TBD":s.long??s.short
}</span>}
          </div>
          {has&&fix.score?.halftime&&<div style={{fontSize:10,color:T.t4,marginTop:5}}>mi-temps {fix.score.halftime.home??0}-{fix.score.halftime.away??0}</div>}
        </div>
        {/* Équipe extérieur */}
        <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
          <Logo src={fix.teams.away.logo} size={52}/>
          <span className="bc" style={{fontSize:13,fontWeight:aw?800:500,color:hw?T.t3:"#fff",textAlign:"center",lineHeight:1.2,maxWidth:95,letterSpacing:.2}}>{fix.teams.away.name}</span>
          {lineups.find(l=>l.team?.id===fix.teams.away.id)?.formation&&<span className="bc" style={{fontSize:11,color:T.t3,background:T.bg3,padding:"2px 9px",borderRadius:20,letterSpacing:.5}}>{lineups.find(l=>l.team?.id===fix.teams.away.id).formation}</span>}
        </div>
      </div>
      {/* Buteurs */}
      {goals.length>0&&<div style={{display:"flex",justifyContent:"space-between",marginTop:13,padding:"0 4px",position:"relative"}}>
        <div style={{fontSize:11,color:T.t3,flex:1,lineHeight:2}}>{goals.filter(e=>e.team?.id===fix.teams.home.id).map((e,i)=><div key={i}>⚽ {(e.player?.name||"").split(" ").pop()} <span style={{color:T.t4}}>{e.time?.elapsed}'</span></div>)}</div>
        <div style={{fontSize:11,color:T.t3,flex:1,textAlign:"right",lineHeight:2}}>{goals.filter(e=>e.team?.id===fix.teams.away.id).map((e,i)=><div key={i}><span style={{color:T.t4}}>{e.time?.elapsed}'</span> {(e.player?.name||"").split(" ").pop()} ⚽</div>)}</div>
      </div>}
    </div>

    {/* Tabs */}
    <div style={{display:"flex",overflowX:"auto",borderBottom:`1px solid ${T.line}`,background:T.bg1,padding:"0 4px"}}>
      {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{
        flexShrink:0,padding:"11px 12px",
        background:"none",border:"none",
        borderBottom:`2px solid ${tab===t.id?T.red:"transparent"}`,
        color:tab===t.id?"#fff":T.t3,
        fontSize:11,fontWeight:tab===t.id?700:500,
        cursor:"pointer",whiteSpace:"nowrap",
        transition:"all .15s",letterSpacing:.4,
      }}>{t.label}</button>)}
    </div>

    {/* Contenu */}
    <div style={{paddingBottom:32,animation:"fadeIn .2s ease"}}>

      {tab==="resume"&&(mEvt.length===0
        ?<div style={{textAlign:"center",padding:"32px 20px",color:T.t3,fontSize:14}}>Aucun événement</div>
        :mEvt.map((e,i)=><Evt key={i} e={e}/>))}

      {tab==="evts"&&events.map((e,i)=><Evt key={i} e={e}/>)}

      {tab==="stats"&&<div style={{padding:"16px 18px"}}>
        {SK.map(k=>{const hv=gv(hSt,k),av=gv(aSt,k);if(!hv&&!av)return null;return<StatBar key={k} label={k} hv={hv} av={av}/>;  })}
      </div>}

      {/* ─── MODULE COMPOS + SCHÉMA ─── */}
      {tab==="compos"&&<ComposPanel lineups={lineups} players={players} homeTeam={fix.teams.home} awayTeam={fix.teams.away}/>}

      {/* ─── MODULE STATS AVANCÉES JOUEURS ─── */}
      {tab==="joueurs"&&<PlayersStatsPanel players={players} homeTeam={fix.teams.home} awayTeam={fix.teams.away}/>}

      {/* ─── MODULE BLESSÉS / SUSPENDUS ─── */}
      {tab==="absents"&&<InjuriesPanel injuries={injuries} homeTeam={fix.teams.home} awayTeam={fix.teams.away}/>}

      {tab==="h2h"&&<div>
        <div style={{padding:"11px 16px",fontSize:11,fontWeight:700,color:T.t3,letterSpacing:1,textTransform:"uppercase",borderBottom:`1px solid ${T.line}`}}>Confrontations directes</div>
        {h2h.slice(0,10).map((m,i)=>{
          const hid=fix.teams.home.id,hh=m.teams.home.id===hid,mh=m.goals.home??0,ma=m.goals.away??0;
          const hw2=(hh&&mh>ma)||(!hh&&ma>mh),aw2=(hh&&ma>mh)||(!hh&&mh>ma);
          return<div key={i} style={{display:"flex",alignItems:"center",padding:"10px 16px",borderBottom:`1px solid ${T.line}11`,gap:10}}>
            <span style={{fontSize:10,color:T.t3,width:44,flexShrink:0}}>{m.fixture.date?.slice(0,7)}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,color:T.t2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.teams.home.name} – {m.teams.away.name}</div>
              <div style={{fontSize:10,color:T.t3,marginTop:2}}>{m.league?.name}</div>
            </div>
            <span style={{fontSize:15,fontWeight:800,color:T.t1,flexShrink:0}}>{mh} – {ma}</span>
            <div style={{width:7,height:7,borderRadius:"50%",background:hw2?T.greenB:aw2?T.red:T.gold,flexShrink:0}}/>
          </div>;
        })}
      </div>}
    </div>
  </Sheet>;
}

// ONGLET SCORES
// ═══════════════════════════════════════════════
function ScoresTab({favs,onFav}){
  const[date,setDate]=useState(today()),[data,setData]=useState([]),[st,setSt]=useState("load"),[err,setErr]=useState("");
  const[detail,setDet]=useState(null),[q,setQ]=useState(""),[lg,setLg]=useState(null),[favOnly,setFO]=useState(false);
  const[picker,setPicker]=useState(false),[cd,setCd]=useState(15),[spin,setSpin]=useState(false);
  const stripRef=useRef(null),timerRef=useRef(null),cdRef=useRef(null),loadRef=useRef(null);
  const isToday=date===today();

  // hasLive stable via useMemo — safe pour useEffect deps
  const hasLive=useMemo(()=>data.some(f=>LIVE_ST.has(f?.fixture?.status?.short)),[data]);
  const liveInterval=15;

  const load=useCallback(async(silent=false)=>{
    if(!silent){setSt("load");setErr("");}else setSpin(true);
    try{
      const d=await api(`/fixtures?date=${date}&timezone=Europe/Paris`,0);
      setData(d);
      if(!silent)setSt("ok");
    }
    catch(e){if(!silent){setSt("err");setErr(e.message);}}
    finally{if(silent)setSpin(false);}
  },[date]);

  useEffect(()=>{loadRef.current=load;},[load]);
  useEffect(()=>{setData([]);load();},[load]);

  // Timer adaptatif : se reconfigure quand hasLive change
  useEffect(()=>{
    clearInterval(timerRef.current);clearInterval(cdRef.current);
    if(!isToday){setCd(null);return;}
    setCd(15);
    timerRef.current=setInterval(()=>loadRef.current(true),15000);
    cdRef.current=setInterval(()=>setCd(c=>c<=1?15:c-1),1000);
    return()=>{clearInterval(timerRef.current);clearInterval(cdRef.current);};
  },[date,isToday]);
  useEffect(()=>{const t=setTimeout(()=>stripRef.current?.querySelector("[data-td='1']")?.scrollIntoView({inline:"center",block:"nearest"}),80);return()=>clearTimeout(t);},[]);

  const openMatch=useCallback(async id=>{
    setDet({loading:true});
    try{
      const fx=await api(`/fixtures?id=${id}`);
      const fix=fx[0];if(!fix)throw new Error("Match introuvable");
      const started=!NS_ST.has(fix.fixture.status.short);
      const hid=fix.teams.home.id,aid=fix.teams.away.id,fid=fix.fixture.id,lid=fix.league.id,seas=fix.league.season;
      // Tous les endpoints Pro en parallèle — erreurs silencieuses (Pro peut être limité selon endpoint)
      const[stats,evts,lineups,plrs,h2h,injuries]=await Promise.all([
        started?api(`/fixtures/statistics?fixture=${fid}`).catch(()=>[]):Promise.resolve([]),
        started?api(`/fixtures/events?fixture=${fid}`).catch(()=>[]):Promise.resolve([]),
        api(`/fixtures/lineups?fixture=${fid}`).catch(()=>[]),
        started?api(`/fixtures/players?fixture=${fid}`).catch(()=>[]):Promise.resolve([]),
        api(`/fixtures/headtohead?h2h=${hid}-${aid}&last=10`).catch(()=>[]),
        api(`/injuries?fixture=${fid}`).catch(()=>[]),
      ]);
      setDet({data:{fixture:fix,stats,events:evts,lineups,players:plrs,h2h,injuries}});
    }catch(e){setDet({error:e.message});}
  },[]);

  const groups=useMemo(()=>{
    let list=data;
    if(lg)list=list.filter(f=>f.league.id===lg);
    if(q.trim()){const s=q.toLowerCase();list=list.filter(f=>f.teams.home.name.toLowerCase().includes(s)||f.teams.away.name.toLowerCase().includes(s)||f.league.name.toLowerCase().includes(s));}
    if(favOnly)list=list.filter(f=>favs.has(f.fixture.id));
    const map={};
    list.forEach(f=>{if(!map[f.league.id])map[f.league.id]={lg:f.league,matches:[]};map[f.league.id].matches.push(f);});
    return Object.values(map).sort((a,b)=>{
      const al=a.matches.some(m=>LIVE_ST.has(m.fixture.status.short))?1:0,bl=b.matches.some(m=>LIVE_ST.has(m.fixture.status.short))?1:0;
      if(al!==bl)return bl-al;
      const pi=l=>LEAGUES.findIndex(x=>x.id===l.lg.id);
      return(pi(a)<0?999:pi(a))-(pi(b)<0?999:pi(b));
    });
  },[data,lg,q,favOnly,favs]);

  const lv=data.filter(f=>LIVE_ST.has(f.fixture.status.short)).length;
  const sel=LEAGUES.find(l=>l.id===lg);
  const dates=useMemo(()=>Array.from({length:15},(_,i)=>{const d=new Date();d.setDate(d.getDate()+i-7);return d.toISOString().slice(0,10);}),[]);
  const DAY=["D","L","M","M","J","V","S"];

  return<div style={{display:"flex",flexDirection:"column",height:"100%",width:"100%",overflow:"hidden"}}>
    {/* Status bar */}
    <div style={{display:"flex",alignItems:"center",gap:8,padding:"6px 14px",background:T.bg1,borderBottom:`1px solid ${T.line}`,flexShrink:0,minHeight:44,width:"100%",boxShadow:"inset 0 -1px 0 rgba(255,255,255,.04)"}}>
      {lv>0?<><div style={{width:8,height:8,borderRadius:"50%",background:T.red,animation:"pulseR 2s infinite",flexShrink:0}}/><span style={{fontSize:11,fontWeight:800,color:T.red}}>{lv} en direct</span></>:st==="ok"?<span style={{fontSize:11,color:T.t3}}>{data.length} matchs</span>:null}
      {spin&&<Spin s={13}/>}
      <div style={{flex:1}}/>

        </div>

            {lg===l.id&&<span style={{color:T.blueB}}>✓</span>}
          </div>)}
        </div>)}
      </div>
    </Sheet>
    <MatchDetail state={detail} onClose={()=>setDet(null)}/>
  </div>;
}

    <div className="bc" style={{width:24,textAlign:"center",fontSize:12,color:T.green,flexShrink:0,fontWeight:r.all?.win>0?700:400}}>{r.all?.win??"—"}</div>
    <div className="bc" style={{width:24,textAlign:"center",fontSize:12,color:T.t3,flexShrink:0}}>{r.all?.draw??"—"}</div>
    <div className="bc" style={{width:24,textAlign:"center",fontSize:12,color:r.all?.lose>0?T.red:T.t3,flexShrink:0,fontWeight:r.all?.lose>0?600:400}}>{r.all?.lose??"—"}</div>
    {/* GD */}
    <div className="bc" style={{width:28,textAlign:"center",fontSize:12,color:r.goalsDiff>0?T.green:r.goalsDiff<0?T.red:T.t3,flexShrink:0,fontWeight:r.goalsDiff!==0?700:400}}>{r.goalsDiff>0?"+":""}{r.goalsDiff??""}</div>

// ─── Composant match éliminatoire ───
function KnockoutMatch({m}){
  if(!m) return<div style={{height:56,background:T.bg3,borderRadius:10,opacity:.2,border:`1px solid ${T.line}`}}/>;
  const h=m.teams?.home,a=m.teams?.away,sh=m.fixture?.status?.short;
  const live=["1H","2H","HT","ET","P"].includes(sh);
  const done=["FT","AET","PEN"].includes(sh);
  const hg=m.goals?.home,ag=m.goals?.away;
  const hw=hg!=null&&ag!=null&&hg>ag,aw=hg!=null&&ag!=null&&ag>hg;
  return<div style={{
    background:T.bg2,borderRadius:10,overflow:"hidden",
    border:`1px solid ${live?"rgba(229,53,53,.3)":T.line}`,
    boxShadow:live?`0 0 12px rgba(229,53,53,.15)`:"none",
  }}>
    <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderBottom:`1px solid ${T.line}`,background:hw&&done?"rgba(255,255,255,.03)":"transparent"}}>
      <Logo src={h?.logo} size={18}/>
      <span className="bc" style={{flex:1,fontSize:13,fontWeight:hw?800:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:done&&aw?T.t3:"#fff"}}>{h?.name??"TBD"}</span>
      {hg!=null&&<span className="bc" style={{fontSize:15,fontWeight:hw?900:600,color:hw?"#fff":T.t3,flexShrink:0}}>{hg}</span>}
    </div>
    <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",background:aw&&done?"rgba(255,255,255,.03)":"transparent"}}>
      <Logo src={a?.logo} size={18}/>
      <span className="bc" style={{flex:1,fontSize:13,fontWeight:aw?800:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:done&&hw?T.t3:"#fff"}}>{a?.name??"TBD"}</span>
      {ag!=null&&<span className="bc" style={{fontSize:15,fontWeight:aw?900:600,color:aw?"#fff":T.t3,flexShrink:0}}>{ag}</span>}
    </div>
    {live&&<div style={{padding:"3px 10px",background:"rgba(229,53,53,.1)",borderTop:`1px solid rgba(229,53,53,.2)`}}>
      <span className="bc" style={{fontSize:9,fontWeight:800,color:T.red,letterSpacing:1}}>● LIVE</span>
    </div>}
  </div>;
}

function StandingsTab(){
  const[lid,setLid]=useState(39),[s,setS]=useState(2024);
  const[allGroups,setAllGroups]=useState([]),[rounds,setRounds]=useState([]),[selRound,setSelRound]=useState("");
  const[roundMatches,setRoundMatches]=useState([]),[view,setView]=useState("standings");
  const[st,setSt]=useState("load"),[err,setErr]=useState(""),[cfg,setCfg]=useState(false);
  const l=byId(lid);
  const isCup=l?.isCup??false;
  const hasGroups=l?.hasGroups??false;
  const hasKnockout=l?.hasKnockout??false;

  // Charger classement ou groupes
  useEffect(()=>{
    let c=false;setSt("load");setErr("");setAllGroups([]);setRounds([]);setRoundMatches([]);setSelRound("");
    if(isCup&&hasGroups){
      // Récupérer tous les groupes A/B/C/D
      api(`/standings?league=${lid}&season=${s}`)
        .then(d=>{
          if(c)return;
          const st2=d[0]?.league?.standings??[];
          // Chaque élément de standings[] = un groupe
          if(st2.length>1){
            setAllGroups(st2);setSt("groups");
          } else if(st2.length===1){
            setAllGroups([st2[0]]);setSt("ok");
          } else {
            setSt("empty");
          }
        })
        .catch(e=>{if(!c){setErr(e.message);setSt("err");}});
    } else {
      api(`/standings?league=${lid}&season=${s}`)
        .then(d=>{
          if(c)return;
          const r=d[0]?.league?.standings?.[0]??[];
          setAllGroups(r.length?[r]:[]);
          setSt(r.length?"ok":"empty");
        })
        .catch(e=>{if(!c){setErr(e.message);setSt("err");}});
    }
    // Charger les tours éliminatoires si coupe
    if(isCup&&hasKnockout){
      api(`/fixtures/rounds?league=${lid}&season=${s}&current=false`)
        .then(d=>{if(!c){setRounds(d??[]);}})
        .catch(()=>{});
    }
    return()=>{c=true;};
  },[lid,s]);

  // Charger matchs d'un tour sélectionné
  useEffect(()=>{
    if(!selRound)return;
    let c=false;setRoundMatches([]);
    api(`/fixtures?league=${lid}&season=${s}&round=${encodeURIComponent(selRound)}`)
      .then(d=>{if(!c)setRoundMatches(d??[]);})
      .catch(()=>{});
    return()=>{c=true;};
  },[selRound,lid,s]);

  const zc=desc=>{const d=(desc??"").toLowerCase();if(d.includes("champions"))return T.blueB;if(d.includes("europa")&&!d.includes("conf"))return T.gold;if(d.includes("conf"))return T.purpleB;if(d.includes("releg"))return T.red;return"transparent";};
  const SEL={width:"100%",background:T.bg2,border:`1px solid ${T.bg4}`,color:T.t1,borderRadius:8,padding:"10px 13px",fontSize:13,outline:"none",cursor:"pointer"};
  const REGIONS2=[...new Set(LEAGUES.map(l=>l.region))];

  // Regrouper les tours éliminatoires (exclure les tours de groupes)
  const knockoutRounds=rounds.filter(r=>{const rl=r.toLowerCase();return !rl.includes("group")&&!rl.includes("league phase")&&!rl.includes("qualifying");});
  const groupRounds=rounds.filter(r=>{const rl=r.toLowerCase();return rl.includes("group")||rl.includes("league phase");});

  return<div style={{display:"flex",flexDirection:"column",height:"100%",width:"100%",overflow:"hidden"}}>
    {/* Header bouton config */}
    <div style={{padding:"9px 14px",borderBottom:`1px solid ${T.line}`,flexShrink:0,background:T.bg1,minHeight:74,width:"100%"}}>
      <div onClick={()=>setCfg(true)} style={{
        display:"flex",alignItems:"center",gap:12,
        background:"linear-gradient(135deg,rgba(229,53,53,.08),rgba(229,53,53,.04))",
        border:"1px solid rgba(229,53,53,.15)",
        padding:"0 14px",borderRadius:12,cursor:"pointer",height:56,flexShrink:0,
        transition:"all .15s",
      }}
      onMouseEnter={e=>e.currentTarget.style.background="linear-gradient(135deg,rgba(229,53,53,.14),rgba(229,53,53,.08))"}
      onMouseLeave={e=>e.currentTarget.style.background="linear-gradient(135deg,rgba(229,53,53,.08),rgba(229,53,53,.04))"}
      >
        <div style={{width:34,height:34,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,background:T.bg3,borderRadius:8}}>{l?.flag??"🏆"}</div>
        <div style={{flex:1,minWidth:0}}>
          <div className="bc" style={{fontSize:16,fontWeight:800,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",letterSpacing:.2}}>{l?.name??"—"}</div>
          <div style={{fontSize:11,color:T.t3,marginTop:2}}>Saison {s}/{s+1}</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:1,color:T.t3}}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 1.46 13.43M3.47 18.46A10 10 0 0 1 4.93 4.93"/></svg>
          <span style={{fontSize:8,fontWeight:700,letterSpacing:.5}}>CONFIG</span>
        </div>
      </div>
    </div>

    {/* Toggle Classement / Tours (seulement pour coupes) */}
    {isCup&&(hasGroups||hasKnockout)&&<div style={{display:"flex",background:T.bg1,borderBottom:`1px solid ${T.line}`,flexShrink:0,padding:"8px 14px",gap:8,width:"100%"}}>
      {hasGroups&&<button onClick={()=>setView("standings")} className="bc" style={{flex:1,padding:"8px 4px",background:view==="standings"?"linear-gradient(135deg,#e53535,#c62828)":T.bg3,color:"#fff",border:`1px solid ${view==="standings"?"transparent":T.line}`,borderRadius:10,fontSize:12,fontWeight:800,cursor:"pointer",letterSpacing:.5,boxShadow:view==="standings"?"0 3px 12px rgba(229,53,53,.3)":"none",transition:"all .2s"}}>📊 GROUPES</button>}
      {hasKnockout&&<button onClick={()=>setView("knockout")} className="bc" style={{flex:1,padding:"8px 4px",background:view==="knockout"?"linear-gradient(135deg,#e53535,#c62828)":T.bg3,color:"#fff",border:`1px solid ${view==="knockout"?"transparent":T.line}`,borderRadius:10,fontSize:12,fontWeight:800,cursor:"pointer",letterSpacing:.5,boxShadow:view==="knockout"?"0 3px 12px rgba(229,53,53,.3)":"none",transition:"all .2s"}}>🏆 ÉLIMIN.</button>}
    </div>}

    <div style={{flex:1,overflowY:"auto",width:"100%"}}>
      {/* ─── VUE CLASSEMENT / GROUPES ─── */}
      {view==="standings"&&<>
        {st==="load"&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:14,padding:56}}><Spin s={26}/><span style={{fontSize:13,color:T.t3}}>Chargement...</span></div>}
        {st==="err"&&<div style={{textAlign:"center",padding:"44px 24px",color:T.t2}}><div style={{fontSize:44,marginBottom:14}}>⚠️</div>{err}</div>}
        {st==="empty"&&<div style={{textAlign:"center",padding:"52px 24px"}}><div style={{fontSize:44,marginBottom:14}}>📋</div><div style={{fontSize:14,color:T.t2}}>Classement non disponible</div></div>}
        {(st==="ok"||st==="groups")&&allGroups.map((grp,gi)=>{
          // Détecter si c'est un groupe nommé (ex: "Group A")
          const grpName=grp[0]?.group;
          return<div key={gi}>
            {grpName&&<div style={{
              padding:"9px 14px",
              background:"linear-gradient(90deg,rgba(229,53,53,.08),transparent)",
              borderBottom:`1px solid ${T.line}`,
              borderTop:gi>0?`1px solid ${T.line}`:"none",
              borderLeft:"3px solid #e53535",
              display:"flex",alignItems:"center",gap:8,
            }}>
              <span className="bc" style={{fontSize:11,fontWeight:800,color:T.red,letterSpacing:1.5,textTransform:"uppercase"}}>GROUPE {grpName.replace("Group ","")}</span>
            </div>}
            <div style={{display:"grid",gridTemplateColumns:"26px 1fr 24px 24px 24px 24px 28px 34px",padding:"7px 14px",borderBottom:`1px solid ${T.line}`,background:T.bg2}}>
              {[["#",T.t4],["Équipe",T.t4],["J",T.t3],["G",T.green],["N",T.t3],["P",T.red],["GD",T.t3],["Pts",T.t2]].map(([h,c])=><div key={h} className="bc" style={{fontSize:10,fontWeight:800,color:c,textAlign:h==="Équipe"?"left":"center",letterSpacing:.8,textTransform:"uppercase"}}>{h}</div>)}
            </div>
            {grp.map(r=><StRow key={r.rank+"-"+gi} r={r} zc={zc}/>)}
          </div>;
        })}
        <div style={{padding:"12px 14px 32px",display:"flex",flexWrap:"wrap",gap:10}}>
          {[[T.blueB,"Qualifié"],[T.gold,"Europa Lge"],[T.purpleB,"Conf. Lge"],[T.red,"Relégation"]].map(([c,lb])=><div key={lb} style={{display:"flex",alignItems:"center",gap:5,background:T.bg2,border:`1px solid ${T.line}`,borderRadius:20,padding:"3px 10px"}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:c,flexShrink:0}}/>
            <span className="bc" style={{fontSize:10,fontWeight:700,color:T.t3,letterSpacing:.4}}>{lb}</span>
          </div>)}
        </div>
      </>}

      {/* ─── VUE TOURS ÉLIMINATOIRES ─── */}
      {view==="knockout"&&<div style={{padding:"12px 14px"}}>
        {knockoutRounds.length===0&&<div style={{textAlign:"center",padding:"44px 24px"}}><Spin s={20}/><div style={{fontSize:13,color:T.t3,marginTop:12}}>Chargement des tours...</div></div>}
        {knockoutRounds.length>0&&<>
          {/* Sélecteur de tour */}
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>
            {knockoutRounds.map(r=>{
              const label=r.replace("Round of ","1/").replace("8th Finals","8 de F.").replace("Quarter-finals","Quarts").replace("Semi-finals","Demis").replace("Final","Finale").replace("3rd Place","3ème Pl.");
              const active=selRound===r;
              return<button key={r} onClick={()=>setSelRound(r===selRound?"":r)} style={{padding:"6px 10px",background:active?T.red:T.bg3,color:active?"#fff":T.t2,border:`1px solid ${active?T.red:T.bg4}`,borderRadius:8,fontSize:11,fontWeight:active?700:400,cursor:"pointer",transition:"all .15s"}}>{label}</button>;
            })}
          </div>

            {REGIONS2.map(r=><optgroup key={r} label={r}>{LEAGUES.filter(l=>l.region===r).map(l=><option key={l.id} value={l.id}>{l.flag} {l.name} ({l.country})</option>)}</optgroup>)}
          </select>
        </div>
        <div><div style={{fontSize:10,fontWeight:700,color:T.t3,letterSpacing:1.3,textTransform:"uppercase",marginBottom:9}}>SAISON</div><select value={s} onChange={e=>setS(+e.target.value)} style={SEL}>{SEASONS.map(x=><option key={x} value={x}>{x}/{x+1}</option>)}</select></div>
        <button onClick={()=>setCfg(false)} style={{background:"linear-gradient(135deg,#e53535,#c62828)",border:"none",color:"#fff",borderRadius:12,padding:"15px",fontSize:14,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 16px rgba(229,53,53,.35)",letterSpacing:.3}}>Appliquer</button>

  </div>;
}

function ScorersTab(){
  const[lid,setLid]=useState(39),[s,setS]=useState(2024),[type,setTy]=useState("scorers"),[list,setList]=useState([]),[st,setSt]=useState("load");

          <div className="bc" style={{width:30,textAlign:"center",flexShrink:0}}>{md?<span style={{fontSize:24,lineHeight:1}}>{md}</span>:<span className="bc" style={{fontSize:14,fontWeight:800,color:T.t4}}>{i+1}</span>}</div>
          <div style={{position:"relative",flexShrink:0}}>

function CalendarTab({favs,onFav}){
  const[lid,setLid]=useState(39),[s,setS]=useState(2024),[byD,setByD]=useState({}),[st,setSt]=useState("load"),[detail,setDt]=useState(null);
  useEffect(()=>{
    let c=false;setSt("load");setByD({});
    const from=today(),to=new Date();to.setDate(to.getDate()+28);
    api(`/fixtures?league=${lid}&season=${s}&from=${from}&to=${to.toISOString().slice(0,10)}&status=NS`)
      .then(data=>{if(c)return;const g={};data.forEach(f=>{const d=f.fixture.date.slice(0,10);if(!g[d])g[d]=[];g[d].push(f);});setByD(g);setSt("ok");})
      .catch(()=>{if(!c)setSt("err");});
    return()=>{c=true;};
  },[lid,s]);
  const openMatch=useCallback(async id=>{
    setDt({loading:true});
    try{
      const fx=await api(`/fixtures?id=${id}`);const fix=fx[0];
      const hid=fix.teams.home.id,aid=fix.teams.away.id;
      const[lu,h2h,inj]=await Promise.all([
        api(`/fixtures/lineups?fixture=${id}`).catch(()=>[]),
        api(`/fixtures/headtohead?h2h=${hid}-${aid}&last=10`).catch(()=>[]),
        api(`/injuries?fixture=${id}`).catch(()=>[]),
      ]);
      setDt({data:{fixture:fix,stats:[],events:[],lineups:lu,players:[],h2h,injuries:inj}});
    }catch(e){setDt({error:e.message});}
  },[]);
  const SEL={width:"100%",background:T.bg2,border:`1px solid ${T.bg4}`,color:T.t1,borderRadius:8,padding:"8px 11px",fontSize:12,fontWeight:600,outline:"none",cursor:"pointer"};
  return<div style={{display:"flex",flexDirection:"column",height:"100%",width:"100%",overflow:"hidden"}}>
    <div style={{padding:"9px 14px",borderBottom:`1px solid ${T.line}`,display:"flex",gap:9,flexShrink:0,background:T.bg1,minHeight:52,width:"100%"}}>
      <div style={{flex:2}}><select value={lid} onChange={e=>setLid(+e.target.value)} style={SEL}>{REGIONS.map(r=><optgroup key={r} label={r}>{LEAGUES.filter(l=>l.region===r).map(l=><option key={l.id} value={l.id}>{l.flag} {l.name}</option>)}</optgroup>)}</select></div>
      <div style={{flex:1}}><select value={s} onChange={e=>setS(+e.target.value)} style={SEL}>{SEASONS.map(x=><option key={x} value={x}>{x}/{x+1}</option>)}</select></div>
    </div>
    <div style={{flex:1,overflowY:"auto"}}>
      {st==="load"?<div style={{display:"flex",justifyContent:"center",padding:52}}><Spin s={26}/></div>
      :st==="err"?<div style={{textAlign:"center",padding:"44px 24px",color:T.t3}}>Données indisponibles</div>
      :Object.keys(byD).length===0?<div style={{textAlign:"center",padding:"56px 24px"}}><div style={{fontSize:44,marginBottom:14}}>📭</div><div style={{fontSize:15,color:T.t2}}>Aucun match à venir</div></div>
      :Object.entries(byD).sort(([a],[b])=>a.localeCompare(b)).map(([d,matches])=><div key={d}>
        <div style={{padding:"10px 14px 5px",fontSize:11,fontWeight:700,color:T.t3,letterSpacing:1,textTransform:"uppercase",background:T.bg1,borderBottom:`1px solid ${T.line}`,borderTop:`1px solid ${T.line}`}}>{DL(d)}</div>
        {matches.map(m=>{const isFav=favs.has(m.fixture.id);return<div key={m.fixture.id} onClick={()=>openMatch(m.fixture.id)} style={{display:"flex",alignItems:"center",padding:"11px 14px",borderBottom:`1px solid ${T.line}`,cursor:"pointer",transition:"background .12s"}} onMouseEnter={e=>e.currentTarget.style.background=T.bg2} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
          <span style={{fontSize:13,fontWeight:700,color:T.blueB,width:46,flexShrink:0}}>{hhmm(m.fixture.date)}</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:5}}><Logo src={m.teams.home.logo} size={16}/><span className="bc" style={{fontSize:14,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",letterSpacing:.2}}>{m.teams.home.name}</span></div>
            <div style={{display:"flex",alignItems:"center",gap:7}}><Logo src={m.teams.away.logo} size={16}/><span className="bc" style={{fontSize:14,fontWeight:500,color:T.t2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",letterSpacing:.2}}>{m.teams.away.name}</span></div>
          </div>
          {m.fixture.venue?.city&&<span style={{fontSize:10,color:T.t3,maxWidth:72,textAlign:"right",lineHeight:1.4,flexShrink:0,marginRight:5}}>{m.fixture.venue.city}</span>}
          <button onClick={e=>{e.stopPropagation();onFav(m.fixture.id);}} style={{background:"none",border:"none",color:isFav?T.gold:T.t4,fontSize:15,padding:"0 5px",flexShrink:0,cursor:"pointer"}}>{isFav?"★":"☆"}</button>
        </div>;})}
      </div>)}
    </div>
    <MatchDetail state={detail} onClose={()=>setDt(null)}/>
  </div>;
}
