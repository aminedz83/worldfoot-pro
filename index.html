:root{
  --bg0:#eef0f5;--bg1:#ffffff;--bg2:#f8f9fc;--bg3:#f0f2f8;--bg4:#e4e7ef;--bg5:#d8dce8;
  --line:#e8eaf2;--lineH:#d0d4e4;
  --t1:#0f1117;--t2:#2a2d3a;--t3:#6b7280;--t4:#9ca3af;--t5:#c9d0df;
  --shadow:0 2px 12px rgba(0,0,0,.07);
  --score:#f8f9fc;--row-hover:#f2f4fb;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:#eef0f5;}
body{font-family:'Barlow',sans-serif;color:#0f1117;}
#root{height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
.bc{font-family:'Barlow Condensed',sans-serif;}
input,select,button{font-family:inherit;}
select{-webkit-appearance:none;appearance:none;}
::-webkit-scrollbar{width:0;height:0;}
.sk{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:200%;animation:sk 1.4s infinite;}
.row-anim{animation:rowIn .18s ease;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
@keyframes pulseR{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.6);opacity:.5;}}
@keyframes up{from{transform:translateY(100%);opacity:0;}to{transform:translateY(0);opacity:1;}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes sk{0%{background-position:200%;}100%{background-position:-200%;}}
@keyframes sPop{0%{transform:scale(1);}40%{transform:scale(1.32);}100%{transform:scale(1);}}
@keyframes lGlow{0%,100%{text-shadow:none;}50%{text-shadow:0 0 8px rgba(0,193,112,.8);}}
@keyframes rowIn{from{opacity:0;transform:translateX(-6px);}to{opacity:1;transform:none;}}
@keyframes dotPulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.7);}}
