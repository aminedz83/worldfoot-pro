		<script>
			const M = {
				name: "WorldFoot Pro",
				short_name: "WorldFoot",
				start_url: "./",
				display: "standalone",
				background_color: "#f4f5f7",
				theme_color: "#e53535",
				orientation: "portrait",
				icons: [
					{
						src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='40' fill='%2300b86b'/><text y='140' x='96' text-anchor='middle' font-size='120'>⚡</text></svg>",
						sizes: "192x192",
						type: "image/svg+xml",
					},
					{
						src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='100' fill='%2300b86b'/><text y='380' x='256' text-anchor='middle' font-size='320'>⚡</text></svg>",
						sizes: "512x512",
						type: "image/svg+xml",
					},
				],
			};
			const b = new Blob([JSON.stringify(M)], {
				type: "application/json",
			});
			const lk = document.createElement("link");
			lk.rel = "manifest";
			lk.href = URL.createObjectURL(b);
			document.head.appendChild(lk);
		</script>
		<link rel="preconnect" href="https://fonts.googleapis.com" />

			href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@600;700;800;900&display=swap"
			rel="stylesheet"
		/>
		<link
			rel="apple-touch-icon"
			href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='36' fill='%2300b86b'/><text y='130' x='90' text-anchor='middle' font-size='100'>⚡</text></svg>"
		/>
		<script>
			// Service Worker avec support notifications
			if ("serviceWorker" in navigator) {
				const sw = `
    const C='wf-pro-v17';
    self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(['./'])).then(()=>self.skipWaiting()));});
    self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))).then(()=>self.clients.claim()));});
    self.addEventListener('push',e=>{
      const d=e.data?.json()||{};
      e.waitUntil(self.registration.showNotification(d.title||'WorldFoot Pro',{
        body:d.body||'',
        icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect width="192" height="192" rx="40" fill="%2300b86b"/><text y="140" x="96" text-anchor="middle" font-size="120">⚡</text></svg>',
        badge:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96"><rect width="96" height="96" rx="20" fill="%2300b86b"/><text y="70" x="48" text-anchor="middle" font-size="60">⚡</text></svg>',
        tag:d.tag||'wf',
        vibrate:[200,100,200],
        data:d.data||{},
      }));
    });
    self.addEventListener('notificationclick',e=>{e.notification.close();e.waitUntil(clients.openWindow('./'));});
    self.addEventListener('fetch',e=>{
      const u=e.request.url;
      if(u.includes('api-sports.io')){e.respondWith(fetch(e.request).catch(()=>new Response('{"errors":{"net":"offline"}}',{headers:{'Content-Type':'application/json'}})));return;}
      e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('./'))));
    });
  `;
				navigator.serviceWorker
					.register(
						URL.createObjectURL(
							new Blob([sw], { type: "application/javascript" })
						)
					)
					.catch(() => {});
			}
		</script>

		/>

  try {

const _cache=new Map();
let _apiCallsToday=parseInt(localStorage.getItem('wf_api_calls_'+new Date().toDateString())||'0');
let _apiCallsDate=new Date().toDateString();
function _trackApiCall(){
  const today=new Date().toDateString();
  if(today!==_apiCallsDate){_apiCallsToday=0;_apiCallsDate=today;}
  _apiCallsToday++;
  try{localStorage.setItem('wf_api_calls_'+today,_apiCallsToday);}catch(e){}
}

const TTL={LIVE:15000,SCORES:60000,DONE:86400000,UPCOMING:21600000,STANDING:3600000,H2H:86400000,LINEUP:3600000,PLAYERS:3600000,INJURIES:3600000,TRANSFERS:86400000};
async function api(path,ttl=TTL.SCORES,signal=null){
  const now=Date.now();
  if(_cache.has(path)&&now-_cache.get(path).t<ttl) return _cache.get(path).d;
  _trackApiCall();
  const r=await fetch(BASE+path,{headers:{"x-apisports-key":API_KEY},signal});
  if(!r.ok) throw new Error(`Erreur HTTP ${r.status}`);
  const j=await r.json();
  if(j.errors&&Object.keys(j.errors).length){
    const msg=Object.values(j.errors)[0];
    throw new Error(typeof msg==="string"?msg:"Erreur API");
  }
  const d=j.response??[];
  const skipCache=d.length===0&&(path.includes("/lineups")||path.includes("/players"));
  if(!skipCache)_cache.set(path,{d,t:now});
  return d;
}

function useMinute(elapsed,status){
  const[m,setM]=useState(elapsed??0);
  useEffect(()=>{
    setM(elapsed??0);
    if(!LIVE_ST.has(status))return;
    const id=setInterval(()=>setM(v=>{const c=(status==="2H"||status==="ET")?96:47;return v<c?v+1:v;}),60000);
    return()=>clearInterval(id);
  },[elapsed,status]);
  return m;
}
function useFlash(hg,ag){
  const prev=useRef({h:null,a:null}),[on,setOn]=useState(false);
  useEffect(()=>{
    const p=prev.current;prev.current={h:hg,a:ag};
    if(p.h!==null&&(hg>p.h||ag>p.a)){setOn(true);const t=setTimeout(()=>setOn(false),4000);return()=>clearTimeout(t);}
  },[hg,ag]);
  return on;
}

const getRatingColor = (rating) => {
  const r = parseFloat(rating) || 0;
  if (r >= 8.5) return "#3f51b5";
  if (r >= 8.0) return "#2196f3";
  if (r >= 7.5) return "#4caf50";
  if (r >= 7.0) return "#8bc34a";
  if (r >= 6.5) return "#ffc107";
  if (r >= 6.0) return "#ff9800";
  if (r >= 5.0) return "#f44336";
  return "#9e9e9e";
};

// ── ORGANISER LES JOUEURS PAR LIGNE ──────────────────
const organizePlayersByLine = (players, formation) => {
  if (!players || players.length === 0) return [];
  
  const defaultFormation = [1, 4, 3, 3];
  
  let lines = [];
  if (formation) {
    const parts = formation.split("-").map(Number);
    lines = [1, ...parts];
  } else {
    lines = defaultFormation;
  }
  
  const result = [];
  let playerIndex = 0;
  
  for (let i = 0; i < lines.length; i++) {
    const lineSize = lines[i];
    const line = [];
    
    for (let j = 0; j < lineSize && playerIndex < players.length; j++) {
      line.push(players[playerIndex]);
      playerIndex++;
    }
    
    result.push(line);
  }
  
  if (playerIndex < players.length) {
    const subs = [];
    while (playerIndex < players.length) {
      subs.push(players[playerIndex]);
      playerIndex++;
    }
    result.push(subs);
  }
  
  return result;
};

// ============================================
// APP PRINCIPALE
// ============================================
function App() {
  const [currentTab, setCurrentTab] = useState(() => {
    try { return sessionStorage.getItem("wf_last_tab") || "scores"; }
    catch { return "scores"; }
  });

  useEffect(() => {
    try { sessionStorage.setItem("wf_last_tab", currentTab); }
    catch {}
  }, [currentTab]);

  const [favs, setFavs] = useState(() => {
    try {
      const saved = localStorage.getItem("wf_favs");
      return saved ? new Set(JSON.parse(saved)) : new Set();
    } catch {
      return new Set();
    }
  });

  useEffect(() => {
    try { localStorage.setItem("wf_favs", JSON.stringify([...favs])); }
    catch {}
  }, [favs]);

  const toggleFav = useCallback((id) => {
    setFavs(prev => {
      const newSet = new Set(prev);
      if (newSet.has(id)) newSet.delete(id);
      else newSet.add(id);
      return newSet;
    });
  }, []);

  const tabs = [
    { id: "scores", label: "SCORES" },
    { id: "standings", label: "CLASSEMENT" },
    { id: "scorers", label: "BUTEURS" },
    { id: "calendar", label: "CALENDRIER" },
    { id: "transfers", label: "TRANSFERTS" },
    { id: "actu", label: "ACTUALITÉS" },
    { id: "results", label: "RÉSULTATS" },
    { id: "jsk", label: "JSK" }
  ];

  const renderContent = () => {
    switch (currentTab) {
      case "scores": return React.createElement(ScoresTab, { favs, onFav: toggleFav });
      case "standings": return React.createElement(StandingsTab, null);
      case "scorers": return React.createElement(ScorersTab, null);
      case "calendar": return React.createElement(CalendarTab, { favs, onFav: toggleFav });
      case "transfers": return React.createElement(TransfersTab, null);
      case "actu": return React.createElement(ActuTab, null);
      case "results": return React.createElement(ResultsTab, null);
      case "jsk": return React.createElement(JSKTab, null);
      default: return React.createElement(ScoresTab, { favs, onFav: toggleFav });
    }
  };

  return React.createElement("div", { style: { height: "100%", display: "flex", flexDirection: "column", background: T.bg0 } },
    React.createElement("div", { style: { padding: "16px 16px 8px", paddingTop: "calc(16px + env(safe-area-inset-top))", background: "linear-gradient(135deg, #00b86b, #009657)", color: "#fff" } },

          React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 4, background: "rgba(255,255,255,0.15)", borderRadius: 20, padding: "4px 8px" } },
            React.createElement("div", { className: "live-dot" }),
            React.createElement("span", { style: { fontSize: 10, fontWeight: 700, color: "#fff" } }, "LIVE")
          ),

            React.createElement("span", { style: { fontSize: 9, color: "rgba(255,255,255,0.7)" } },
              _apiCallsToday, React.createElement("span", { style: { opacity: 0.5 } }, "/7.5k")
            )

// Lancement
if (localStorage.getItem('wf_auth') !== '1') {
