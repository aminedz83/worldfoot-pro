        html, body {

            background: #eef0f5;
            font-family: 'Barlow', -apple-system, sans-serif;
            color: #1a1d23;
            overflow: hidden;
        }
        
        #root {
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }
        
        @keyframes dotPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.6); opacity: 0.7; }
        }
        
        .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff5252;
            animation: dotPulse 1.4s ease-in-out infinite;

                } catch {
                    return 'scores';
                }
            });
            
            const [favorites, setFavorites] = useState(() => {
                try {
                    const saved = localStorage.getItem('wf_favs');
                    return saved ? new Set(JSON.parse(saved)) : new Set();
                } catch {
                    return new Set();
                }
            });
            
            useEffect(() => {
                try {
                    sessionStorage.setItem('wf_last_tab', activeTab);
                } catch {}
            }, [activeTab]);
            
            useEffect(() => {
                try {
                    localStorage.setItem('wf_favs', JSON.stringify([...favorites]));
                } catch {}
            }, [favorites]);

                setFavorites(prev => {
                    const next = new Set(prev);

                    return next;

                                    width: '36px',
                                    height: '36px',
                                    background: 'rgba(255,255,255,0.2)',
                                    borderRadius: '10px',
                                    display: 'flex',
                                    alignItems: 'center',
                                    justifyContent: 'center',
                                    fontSize: '18px',
                                    color: '#fff'
                                }
                            }, '⚡'),
                            
                            React.createElement('span', {
                                style: {
                                    fontFamily: 'Barlow Condensed, sans-serif',
                                    fontSize: '22px',
                                    fontWeight: 900,
                                    color: '#fff',
                                    letterSpacing: '-0.5px'
                                }
                            }, 'WorldFoot Pro')
                        ),
                        
                        React.createElement('span', {
                            style: {
                                background: 'rgba(255,255,255,0.15)',
                                borderRadius: '20px',
                                padding: '4px 12px',
                                fontSize: '10px',
                                fontWeight: 700,
                                color: '#fff',
                                letterSpacing: '1px'
                            }
                        }, 'LIVE')
                    ),
                    
                    // Tabs
                    React.createElement('div', {
                        style: {
                            display: 'flex',
                            gap: '4px',
                            marginTop: '8px'
                        }
                    },
                        tabs.map(tab =>
                            React.createElement('button', {
                                key: tab.id,
                                onClick: () => setActiveTab(tab.id),
                                style: {
                                    flex: 1,
                                    padding: '10px 4px',
                                    background: 'none',
                                    border: 'none',
                                    color: activeTab === tab.id ? '#fff' : 'rgba(255,255,255,0.5)',
                                    fontSize: '11px',
                                    fontWeight: activeTab === tab.id ? 800 : 600,
                                    cursor: 'pointer',
                                    borderBottom: activeTab === tab.id ? '2px solid #fff' : '2px solid transparent',
                                    transition: 'all 0.2s',
                                    display: 'flex',
                                    flexDirection: 'column',
                                    alignItems: 'center',
                                    gap: '4px'
                                }
                            },
                                React.createElement('span', { style: { fontSize: '16px' } }, tab.icon),
                                React.createElement('span', null, tab.label)
                            )
                        )
                    )
                ),
                
                // Content
                React.createElement('div', {
                    style: {
                        flex: 1,
                        overflow: 'hidden'
                    }
                },
                    activeTab === 'scores' && React.createElement(ScoresTab, {
                        favs: favorites,
                        onFav: toggleFavorite
                    }),
                    
                    activeTab === 'standings' && React.createElement(StandingsTab, null),
                    
                    activeTab === 'scorers' && React.createElement(ScorersTab, null)
                )
            );
        }
        
        // ============================================
        // POINT D'ENTRÉE
        // ============================================
        ReactDOM.createRoot(document.getElementById('root')).render(
            React.createElement(App, null)
        );
    </script>
</body>
</html>
