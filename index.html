    <script>
        if ("serviceWorker" in navigator) {
            const sw = `
    const C='wf-pro-v56';
    self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(['./'])).then(()=>self.skipWaiting()));});
    self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))).then(()=>self.clients.claim()));});
    self.addEventListener('push',e=>{
      const d=e.data?.json()||{};
      e.waitUntil(self.registration.showNotification(d.title||'WorldFoot Pro',{
        body:d.body||'',
        icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect width="192" height="192" rx="40" fill="%2300b86b"/><text y="140" x="96" text-anchor="middle" font-size="120">⚡</text></svg>',
        badge:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96"><rect width="96" height="96" rx="20" fill="%2300b86b"/><text y="70" x="48" text-anchor="middle" font-size="60">⚡</text></svg>',
        tag:d.tag||'wf',
        vibrate:[200,100,200],
        data:d.data||{},
      }));
    });
    self.addEventListener('notificationclick',e=>{e.notification.close();e.waitUntil(clients.openWindow('./'));});
    self.addEventListener('fetch',e=>{
      const u=e.request.url;
      if(u.includes('api-sports.io')){e.respondWith(fetch(e.request).catch(()=>new Response('{"errors":{"net":"offline"}}',{headers:{'Content-Type':'application/json'}})));return;}
      e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('./'))));
    });
  `;
            navigator.serviceWorker
                .register(URL.createObjectURL(new Blob([sw], { type: "application/javascript" })))
                .catch(() => {});
        }

    <style>
        /* ═══════════════════════════════════════════════════════
           WORLDFOOT PRO — DESIGN SYSTÈME PREMIUM CLAIR
           Police: Plus Jakarta Sans + Instrument Serif + JetBrains Mono
           Palette: blanc ivoire, encre profonde, vert jade, or discret
        ═══════════════════════════════════════════════════════ */

        :root {
            /* Surfaces */
            --c-base:        #F5F6F8;
            --c-surface:     #FFFFFF;
            --c-elevated:    #FFFFFF;
            --c-card:        #FFFFFF;
            --c-input:       #F8F9FB;

            /* Borders */
            --c-border:      rgba(15,23,42,0.07);
            --c-border-md:   rgba(15,23,42,0.11);
            --c-border-str:  rgba(15,23,42,0.16);

            /* Textes */
            --c-ink:         #0F1629;
            --c-ink-2:       rgba(15,22,41,0.60);
            --c-ink-3:       rgba(15,22,41,0.38);
            --c-ink-4:       rgba(15,22,41,0.22);

            /* Accent jade */
            --c-jade:        #059669;
            --c-jade-light:  #10B981;
            --c-jade-dim:    rgba(5,150,105,0.10);
            --c-jade-glow:   rgba(5,150,105,0.20);

            /* Live rouge */
            --c-live:        #E53E3E;
            --c-live-dim:    rgba(229,62,62,0.09);

            /* Or accent */
            --c-gold:        #B7791F;
            --c-gold-dim:    rgba(183,121,31,0.10);

            /* Typographies */
            --f-sans:  'Plus Jakarta Sans', -apple-system, sans-serif;
            --f-serif: 'Instrument Serif', Georgia, serif;
            --f-mono:  'JetBrains Mono', monospace;

            /* Ombres */
            --s-card:    0 1px 3px rgba(15,23,42,0.06), 0 4px 16px rgba(15,23,42,0.06);
            --s-card-md: 0 2px 8px rgba(15,23,42,0.08), 0 8px 24px rgba(15,23,42,0.06);
            --s-header:  0 1px 0 rgba(15,23,42,0.08), 0 4px 20px rgba(15,23,42,0.05);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { height: 100%; -webkit-text-size-adjust: 100%; }

        body {
            height: 100%;
            background: var(--c-base);
            font-family: var(--f-sans);
            color: var(--c-ink);
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overscroll-behavior: none;
            overflow: hidden;
            letter-spacing: -0.01em;
        }
        #root {
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        ::-webkit-scrollbar { display: none; }
        * { scrollbar-width: none; }
        input, select, button { font-family: var(--f-sans); }
        select option { background: #fff; color: var(--c-ink); }
        *, button, a {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }
        .scroll-safe {
            padding-bottom: max(80px, calc(70px + env(safe-area-inset-bottom))) !important;
        }

        /* ── KEYFRAMES ── */
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse {
            0%,100% { opacity: 1; } 50% { opacity: 0.15; }
        }
        @keyframes pulseR {
            0%,100% { box-shadow: 0 0 0 0 rgba(229,62,62,0.4); }
            70%      { box-shadow: 0 0 0 7px rgba(229,62,62,0); }
        }
        @keyframes blink-3 {
            0%,33%,66%,100% { opacity: 1; }
            16%,49%,82%     { opacity: 0.2; }
        }
        @keyframes sk {
            0%,100% { opacity: 0.06; } 50% { opacity: 0.18; }
        }
        @keyframes up {
            from { transform: translateY(110%); opacity: 0; }
            to   { transform: translateY(0); opacity: 1; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-6px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes gFlash {
            0%   { background: rgba(5,150,105,0.10); }
            100% { background: transparent; }
        }
        @keyframes sPop {
            0%   { color: var(--c-jade); transform: scale(1.4); }
            60%  { transform: scale(0.96); }
            100% { color: var(--c-ink); transform: scale(1); }
        }
        @keyframes lGlow {
            0%,100% { text-shadow: 0 0 6px rgba(5,150,105,0.5); }
            50%      { text-shadow: 0 0 16px rgba(5,150,105,0.8); }
        }
        @keyframes dotPulse {
            0%,100% { transform: scale(1); opacity: 1; }
            50%     { transform: scale(1.5); opacity: 0.7; }
        }
        @keyframes shimmer {
            0%   { background-position: -200% 0; }
            100% { background-position:  200% 0; }
        }
        @keyframes rowIn {
            from { opacity: 0; transform: translateY(4px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.95); }
            to   { opacity: 1; transform: scale(1); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes mdSlideUp {
            from { transform: translateY(40px); opacity: 0; }
            to   { transform: translateY(0); opacity: 1; }
        }
        @keyframes mdIn {
            from { opacity: 0; transform: translateY(5px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes mdBarGrow {
            from { transform: scaleX(0); }
            to   { transform: scaleX(1); }
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes stripeShift {
            0%   { background-position: 0% 0; }
            100% { background-position: 300% 0; }
        }

        /* ── UTILITAIRES ── */
        .bc { font-family: var(--f-mono); }

        .live-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--c-live);
            animation: dotPulse 1.4s ease-in-out infinite,
                       pulseR   1.4s ease-in-out infinite;
        }
        .row-anim  { animation: rowIn  0.28s cubic-bezier(0.22,1,0.36,1) forwards; }
        .score-pop { animation: sPop   0.5s  cubic-bezier(0.36,0.07,0.19,0.97) forwards; }
        .pop-in    { animation: popIn  0.28s cubic-bezier(0.22,1,0.36,1) forwards; }

        /* ── CARTES ── */
        .card {
            background: var(--c-card);
            border: 1px solid var(--c-border);
            border-radius: 18px;
            box-shadow: var(--s-card);
        }
        .card-hover { transition: transform 0.15s ease, box-shadow 0.15s ease; }
        .card-hover:active {
            transform: scale(0.985);
            box-shadow: 0 1px 4px rgba(15,23,42,0.08);
        }
        .glass {
            background: rgba(255,255,255,0.88);
            border: 1px solid rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .tag {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 3px 9px; border-radius: 20px;
            font-size: 10px; font-weight: 700;
            letter-spacing: 0.5px; text-transform: uppercase;
        }
        .sep-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--c-border-md), transparent);
        }
        .btn-premium {
            background: linear-gradient(135deg, var(--c-jade) 0%, #047857 100%);

            color: #fff; font-weight: 700;

            transition: all 0.2s ease; cursor: pointer;
        }
        .btn-premium:active {

        }
        .input-premium {
            background: var(--c-input);
            border: 1.5px solid var(--c-border-md);
            border-radius: 12px; padding: 11px 14px;

            transition: border-color 0.2s, box-shadow 0.2s;
            font-family: var(--f-sans);
        }
        .input-premium:focus {
            border-color: var(--c-jade);
            box-shadow: 0 0 0 3px var(--c-jade-dim);
            background: #fff;
        }
        .sk {
            background: linear-gradient(90deg, #F1F3F7 25%, #E8EBF1 50%, #F1F3F7 75%);
            background-size: 200% 100%;
            animation: shimmer 1.6s infinite;
            border-radius: 8px;
        }

        /* ── MATCH DETAIL OVERLAY ── */
        .md-overlay {
            position: fixed; inset: 0; z-index: 950;
            background: var(--c-base);
            display: flex; flex-direction: column;
            max-width: 430px; margin: 0 auto;
            overflow: hidden;
            animation: mdIn 0.2s ease;
        }
        .md-topbar {
            flex-shrink: 0;
            display: flex; align-items: center; gap: 10px;
            padding: calc(14px + env(safe-area-inset-top)) 16px 12px;
            background: var(--c-surface);
            border-bottom: 1px solid var(--c-border);
        }
        .md-back-btn {
            background: var(--c-base);
            border: 1px solid var(--c-border);
            color: var(--c-ink-3); font-size: 18px;
            cursor: pointer; padding: 0; line-height: 1;
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 11px; transition: all 0.15s;
        }
        .md-back-btn:active { background: var(--c-border); }
        .md-topbar-title {
            flex: 1; text-align: center;
            font-family: var(--f-mono);
            font-size: 10px; font-weight: 500;
            letter-spacing: 2px; text-transform: uppercase;
            color: var(--c-ink-4);
        }

        /* ── MATCH DETAIL HEADER (sombre conservé pour contraste score) ── */
        .md-header {
            flex-shrink: 0;
            background: linear-gradient(170deg, #111827 0%, #0C1220 100%);
            padding: 18px 16px 16px;
            position: relative; overflow: hidden;
            border-bottom: 1px solid rgba(0,0,0,0.15);
        }
        .md-header::before {
            content: "";
            position: absolute; inset: 0;
            background:
                radial-gradient(ellipse at 15% 50%, rgba(5,150,105,0.09) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 50%, rgba(59,130,246,0.07) 0%, transparent 55%);
            pointer-events: none;
        }
        .md-header-glow { display: none; }

        .md-league-row {
            font-family: var(--f-mono); font-size: 10px;
            font-weight: 500; margin-bottom: 16px;
            display: flex; align-items: center; gap: 8px; padding: 0 2px;

        .md-league-row .lg-country { color: rgba(255,255,255,0.38); font-size: 10px; white-space: nowrap; flex-shrink: 0; }
        .md-league-row .lg-name { color: rgba(255,255,255,0.85); font-weight: 600; font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .md-league-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--c-jade-light); flex-shrink: 0; box-shadow: 0 0 6px rgba(16,185,129,0.6); }

        .md-scoreline { display: flex; align-items: center; justify-content: space-between; gap: 6px; margin-bottom: 10px; }
        .md-team-col { flex: 1; min-width: 0; display: flex; flex-direction: column; align-items: center; gap: 7px; }
        .md-team-name { font-family: var(--f-sans); font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.75); text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; line-height: 1.2; }

        .md-score-center { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; min-width: 110px; gap: 2px; }
        .md-score-nums { font-family: var(--f-serif); font-size: 64px; font-style: italic; color: #fff; line-height: 1; letter-spacing: -2px; text-align: center; text-shadow: 0 2px 24px rgba(0,0,0,0.4); }
        .md-score-nums.live { color: #FC8181; text-shadow: 0 0 28px rgba(252,129,129,0.35); }

        .md-datetime { font-family: var(--f-mono); font-size: 10px; color: rgba(255,255,255,0.30); text-align: center; margin-bottom: 2px; }

        .md-status-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 6px; }

        .md-status-badge.live { background: rgba(252,129,129,0.14); color: #FC8181; border-color: rgba(252,129,129,0.28); animation: pulse 1.4s infinite; }
        .md-status-badge.done { background: rgba(16,185,129,0.10); color: var(--c-jade-light); border-color: rgba(16,185,129,0.22); }

        .md-minute { font-family: var(--f-mono); font-size: 10px; font-weight: 500; color: #FC8181; background: rgba(252,129,129,0.12); border-radius: 20px; padding: 3px 10px; border: 1px solid rgba(252,129,129,0.2); }

        /* ── MD TABS ── */
        .md-tabs {
            display: flex;
            border-bottom: 1px solid var(--c-border);
            background: var(--c-surface);
            flex-shrink: 0; overflow-x: auto;

        }

            font-size: 10px; font-weight: 600;

            color: var(--c-ink-3);

            background: none; cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: color 0.15s, border-color 0.15s;
            white-space: nowrap;

        .md-tab-btn.active { color: var(--c-jade); border-bottom-color: var(--c-jade); font-weight: 700; }

        }

        .md-info-section-title::before, .md-info-section-title::after { display: none; }

        .md-evt-row { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: var(--c-surface); border-radius: 0; margin-bottom: 0; border-bottom: 1px solid var(--c-border); transition: background 0.12s; }

async function api(path, ttl=TTL.SCORES, signal=null) {
  const now = Date.now();
  if(_cache.has(path) && now-_cache.get(path).t < ttl) return _cache.get(path).d;
  _trackApiCall();
  const r = await fetch(BASE+path, {headers:{"x-apisports-key":API_KEY}, signal});
  if(!r.ok) throw new Error(`Erreur HTTP ${r.status}`);
  const j = await r.json();
  if(j.errors && Object.keys(j.errors).length) {
    const msg = Object.values(j.errors)[0];
    throw new Error(typeof msg==="string"?msg:"Erreur API");
  }
  const d = j.response??[];
  const skipCache = d.length===0 && (path.includes("/lineups")||path.includes("/players"));
  if(!skipCache) _cache.set(path, {d, t:now});
  return d;
}

function useMinute(elapsed,status){
  const[m,setM]=useState(elapsed??0);
  useEffect(()=>{
    setM(elapsed??0);
    if(!LIVE_ST.has(status))return;
    const id=setInterval(()=>setM(v=>{const c=(status==="2H"||status==="ET")?96:47; return v<c?v+1:v;}),60000);
    return()=>clearInterval(id);
  },[elapsed,status]);
  return m;
}

// Hook pour afficher minutes:secondes en temps réel (comme Flashscore)
function useLiveTime(elapsed, status, fixtureDate) {
  const [display, setDisplay] = useState("");
  useEffect(() => {
    if (!LIVE_ST.has(status) || elapsed == null) {
      setDisplay("");
      return;
    }
    // Calculer le décalage : on sait que à l'instant t0, elapsed = N minutes
    const t0 = Date.now();
    const baseSeconds = elapsed * 60;
    const maxSeconds = (status === "2H" || status === "ET") ? 96 * 60 : 47 * 60;

    const tick = () => {
      const nowSeconds = Math.min(baseSeconds + Math.floor((Date.now() - t0) / 1000), maxSeconds);
      const m = Math.floor(nowSeconds / 60);
      const s = nowSeconds % 60;
      setDisplay(`${m}:${String(s).padStart(2, "0")}`);
    };
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, [elapsed, status]);
  return display;
}

}

async function resolvePlayerPhoto(playerId,playerName){
  const key=`pph_${playerId||""}_${playerName}`;
  if(_photoCache.has(key))return _photoCache.get(key);
  try{const lc=localStorage.getItem(key);if(lc){_photoCache.set(key,lc);return lc;}}catch(e){}
  for(const src of PHOTO_SOURCES){
    try{
      const url=await src.getUrl(playerId,playerName);
      if(!url)continue;
      const ok=await checkImg(url);
      if(ok){
        _photoCache.set(key,url);
        try{localStorage.setItem(key,url);}catch(e){}
        return url;
      }
    }catch(e){}
  }
  _photoCache.set(key,null);
  return null;
}

const organizePlayersByLine = (players, formation) => {
  if (!players || players.length === 0) return [];

  const defaultFormation = [1, 4, 3, 3];

  let lines = [];
  if (formation) {
    const parts = formation.split("-").map(Number);
    lines = [1, ...parts];
  } else {
    lines = defaultFormation;
  }

  const result = [];
  let playerIndex = 0;

  for (let i = 0; i < lines.length; i++) {
    const lineSize = lines[i];
    const line = [];

    for (let j = 0; j < lineSize && playerIndex < players.length; j++) {
      line.push(players[playerIndex]);
      playerIndex++;
    }

    result.push(line);
  }

  if (playerIndex < players.length) {
    const subs = [];
    while (playerIndex < players.length) {
      subs.push(players[playerIndex]);
      playerIndex++;
    }
    result.push(subs);
  }

  return result;
};

const refereeStatsCache = new Map();

const getRefereeStats = async (refereeName) => {
  if (!refereeName) return null;

  if (refereeStatsCache.has(refereeName)) {
    return refereeStatsCache.get(refereeName);
  }

  try {
    const cleanName = refereeName.split(',')[0].trim();

    let matches = await api(
      `/fixtures?referee=${encodeURIComponent(cleanName)}&last=10&status=FT`,
      86400000
    ).catch(() => []);

    if (!matches || matches.length === 0) {
      const fallbackMatches = await api(
        `/fixtures?referee=${encodeURIComponent(cleanName)}&last=5&status=FT`,
        86400000
      ).catch(() => []);

      if (!fallbackMatches || fallbackMatches.length === 0) {
        return null;
      }

      matches = fallbackMatches;
    }

    let totalY = 0, totalR = 0, count = 0;
    let countryCount = {};

    const limitedMatches = matches.slice(0, 8);

    for (const match of limitedMatches) {
      try {
        const events = await api(
          `/fixtures/events?fixture=${match.fixture.id}`,
          86400000
        ).catch(() => []);

        if (events && events.length) {
          const yellows = events.filter(e =>
            e.type === "Card" && e.detail === "Yellow Card"
          ).length;

          const reds = events.filter(e =>
            e.type === "Card" && (e.detail === "Red Card" || e.detail === "Second Yellow Card")
          ).length;

          totalY += yellows;
          totalR += reds;
          count++;
        }

        if (match.league?.country) {
          countryCount[match.league.country] = (countryCount[match.league.country] || 0) + 1;
        }

      } catch (e) {}
    }

    let countryCode = null;
    if (Object.keys(countryCount).length > 0) {
      const topCountry = Object.entries(countryCount)
        .sort((a, b) => b[1] - a[1])[0][0];

      const codeMap = {
        'Brazil': 'br', 'France': 'fr', 'England': 'gb', 'Spain': 'es',
        'Italy': 'it', 'Germany': 'de', 'Turkey': 'tr', 'Portugal': 'pt',
        'Netherlands': 'nl', 'Belgium': 'be', 'Switzerland': 'ch',
        'Algeria': 'dz', 'Morocco': 'ma', 'Tunisia': 'tn', 'Egypt': 'eg',
        'Argentina': 'ar', 'USA': 'us', 'Mexico': 'mx', 'Russia': 'ru',
        'Poland': 'pl', 'Sweden': 'se', 'Norway': 'no', 'Denmark': 'dk',
        'Greece': 'gr', 'Romania': 'ro', 'Serbia': 'rs', 'Croatia': 'hr',
        'Austria': 'at', 'Scotland': 'gb-sct', 'Ireland': 'ie', 'Israel': 'il',
        'Japan': 'jp', 'South Korea': 'kr', 'China': 'cn', 'Australia': 'au'
      };

      countryCode = codeMap[topCountry] || null;
    }

    const stats = {
      matches: count || Math.min(matches.length, 5),
      yellow: count > 0 ? (totalY / count).toFixed(2) : "0.00",
      red: count > 0 ? (totalR / count).toFixed(2) : "0.00",
      totalYellow: totalY,
      totalRed: totalR,
      countryCode
    };

    refereeStatsCache.set(refereeName, stats);
    return stats;

  } catch (error) {
    return null;
  }
};

const _algerianScorersCache = { data: null, ts: 0 };

async function buildAlgerianScorers(season) {

  if (_algerianScorersCache.data && Date.now() - _algerianScorersCache.ts < 1800000) {
    return _algerianScorersCache.data;
  }

  const fixtures = await api(`/fixtures?league=186&season=${season}`, 3600000);
  if (!fixtures || fixtures.length === 0) return [];

  const finished = fixtures.filter(f => DONE_ST.has(f.fixture.status.short));
  if (finished.length === 0) return [];

  const scorersMap = new Map();
  const allFinishedIds = finished.map(f => f.fixture.id);

  const BATCH = 8;
  for (let i = 0; i < allFinishedIds.length; i += BATCH) {
    const batch = allFinishedIds.slice(i, i + BATCH);
    const results = await Promise.allSettled(
      batch.map(id => api(`/fixtures/events?fixture=${id}`, 86400000))
    );

    results.forEach(r => {
      if (r.status !== "fulfilled") return;
      const events = r.value || [];
      events.forEach(e => {
        if (e.type !== "Goal" || e.detail === "Missed Penalty" || e.detail === "Own Goal") return;
        const pid = e.player?.id;
        const pname = e.player?.name;
        if (!pid || !pname) return;
        if (scorersMap.has(pid)) {
          scorersMap.get(pid).goals++;
        } else {
          scorersMap.set(pid, {
            player: { id: pid, name: pname, photo: `https://media.api-sports.io/football/players/${pid}.png` },
            team: { id: e.team?.id, name: e.team?.name, logo: `https://media.api-sports.io/football/teams/${e.team?.id}.png` },
            goals: 1
          });
        }
      });
    });
  }

  const result = Array.from(scorersMap.values())
    .map(s => ({
      player: s.player,
      statistics: [{ team: s.team, goals: { total: s.goals }, games: { appearences: 0 } }]
    }))
    .sort((a, b) => b.statistics[0].goals.total - a.statistics[0].goals.total)
    .slice(0, 30);

  _algerianScorersCache.data = result;
  _algerianScorersCache.ts = Date.now();
  return result;
}

  "free":  { label: "Gratuit",  bg: "linear-gradient(135deg,#00c170,#009e5c)", icon: "🆓" },

function getTypeInfo(type) {
  if (!type) return { label: "—", bg: "linear-gradient(135deg,#94a3b8,#64748b)", icon: "" };

  return { label: type, bg: "linear-gradient(135deg,#f59e0b,#d97706)", icon: "💶" };
}

function TeamPage({ teamId, teamName, teamLogo, leagueId, season, onClose }) {
  const [info,     setInfo]     = useState(null);
  const [results,  setResults]  = useState([]);
  const [next,     setNext]     = useState([]);
  const [standing, setStanding] = useState(null);
  const [topScore, setTopScore] = useState([]);
  const [loading,  setLoading]  = useState(true);
  const [tab,      setTab]      = useState("resultats");

  useEffect(() => {
    if (!teamId) return;
    let cancelled = false;
    setLoading(true);

    Promise.allSettled([
      api(`/teams?id=${teamId}`, 86400000),
      api(`/fixtures?team=${teamId}&last=6`, TTL.DONE),
      api(`/fixtures?team=${teamId}&next=5`, TTL.UPCOMING),
    ]).then(async ([rInfo, rRes, rNext]) => {
      if (cancelled) return;
      if (rInfo.status === "fulfilled") setInfo(rInfo.value?.[0] || null);
      const recentFix = rRes.status === "fulfilled" ? (rRes.value || []) : [];
      const nextFix   = rNext.status === "fulfilled" ? (rNext.value || []) : [];
      if (recentFix.length) setResults(recentFix);
      if (nextFix.length)   setNext(nextFix);

      const allFix = [...recentFix, ...nextFix];
      const detectedLeague = allFix.find(f => f.league?.id)?.league;
      const lid  = leagueId  || detectedLeague?.id     || 39;
      const seas = season    || detectedLeague?.season  || new Date().getFullYear();

      const [rStand, rPlayers] = await Promise.allSettled([
        api(`/standings?league=${lid}&season=${seas}`, TTL.STANDING),
        api(`/players?team=${teamId}&season=${seas}`, 3600000),
      ]);
      if (cancelled) return;

      if (rStand.status === "fulfilled") {
        const rows = (rStand.value || []).flatMap(g =>
          Array.isArray(g) ? g : (g?.league?.standings || []).flat()
        );
        setStanding(rows.find(r => r.team?.id === teamId) || null);
      }
      if (rPlayers.status === "fulfilled") {
        const sorted = (rPlayers.value || [])
          .filter(p => (p.statistics?.[0]?.goals?.total || 0) > 0)
          .sort((a, b) => (b.statistics?.[0]?.goals?.total || 0) - (a.statistics?.[0]?.goals?.total || 0));
        setTopScore(sorted.slice(0, 5));
      }
      setLoading(false);
    });
    return () => { cancelled = true; };
  }, [teamId, leagueId, season]);

  const FC = { W: "#00c170", D: "#f59e0b", L: "#ef4444" };
  const FL = { W: "V", D: "N", L: "D" };
  const getRes = (m) => {
    const isH = m.teams?.home?.id === teamId;
    const gF = isH ? m.goals?.home : m.goals?.away;
    const gA = isH ? m.goals?.away : m.goals?.home;
    if (gF == null || gA == null) return null;
    return gF > gA ? "W" : gF < gA ? "L" : "D";
  };
  const last5 = [...results].reverse().slice(0, 5);
  const formStr = last5.map(m => getRes(m)).filter(Boolean);
  const winPct = results.length
    ? Math.round((results.filter(m => getRes(m) === "W").length / results.length) * 100)
    : null;

  const heroGrad = "linear-gradient(180deg, #0b0f1a 0%, #111827 60%, #1a1d23 100%)";

  const FormDots = ({ matches, size = 26 }) => {
    const last = [...matches].reverse().slice(0, 5);
    return (
      <div style={{ display: "flex", gap: 4 }}>
        {last.map((m, i) => {
          const r = getRes(m);
          if (!r) return null;
          return (
            <div key={i} style={{
              width: size, height: size, borderRadius: size / 3,
              background: FC[r],
              display: "flex", alignItems: "center", justifyContent: "center",
              color: "#fff", fontSize: size * .38, fontWeight: 900,
              boxShadow: `0 2px 6px ${FC[r]}55`
            }}>{FL[r]}</div>
          );
        })}
      </div>
    );
  };

  const MatchRow = ({ m, idx }) => {
    const isHome  = m.teams?.home?.id === teamId;
    const opp     = isHome ? m.teams?.away : m.teams?.home;
    const gF = isHome ? m.goals?.home : m.goals?.away;
    const gA = isHome ? m.goals?.away : m.goals?.home;
    const sh = m.fixture?.status?.short;
    const done = ["FT","AET","PEN","AWD","WO"].includes(sh);
    const ns   = ["NS","TBD","PST"].includes(sh);
    const res  = done && gF != null ? getRes(m) : null;

    return (
      <div style={{
        display: "flex", alignItems: "center", gap: 10,

        background: "#fff",
      }}>
        {}
        <div style={{
          width: 28, height: 28, borderRadius: 8, flexShrink: 0,

          <div style={{ fontSize: 10, color: "#94a3b8", marginTop: 2, display: "flex", alignItems: "center", gap: 4 }}>

        {ns && (
          <div style={{ fontSize: 10, color: "#94a3b8", background: "#f8fafc", borderRadius: 8, padding: "4px 10px", flexShrink: 0, fontWeight: 600, border: "1px solid #e8edf3" }}>
            {hhmm(m.fixture?.date)}
          </div>
        )}
      </div>
    );
  };

  const TABS = [
    { id: "resultats", label: "Résultats", icon: "📊" },
    { id: "prochains", label: "Prochains", icon: "📅" },
    { id: "stats",     label: "Stats",     icon: "🏆" },
    { id: "infos",     label: "Infos",     icon: "🏟️" },

  if (loading) {
    return (
      <div className="md-overlay" style={{ background: heroGrad }}>
        <div className="md-topbar" style={{ background: "transparent", borderBottom: "none", paddingTop: "calc(env(safe-area-inset-top, 0px) + 14px)" }}>

        </div>
        <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 16 }}>

          <span style={{ color: "rgba(255,255,255,.4)", fontSize: 13 }}>Chargement de la fiche…</span>
        </div>
      </div>
    );
  }

  const venue = info?.venue;
  const team  = info?.team;
  const st    = standing;
  const totalGames = st ? (st.all?.win + st.all?.draw + st.all?.lose) : 0;

              <>
                <div style={{ fontSize: 10, fontWeight: 800, color: "#94a3b8", textTransform: "uppercase", letterSpacing: ".8px", marginBottom: 10 }}>Bilan</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 16 }}>
                  {[
                    { label: "À domicile", d: st.home, color: "#3b82f6", icon: "🏠" },
                    { label: "À l'extérieur", d: st.away, color: "#f59e0b", icon: "✈️" },
                  ].map((s, i) => (
                    <div key={i} style={{
                      background: "#fff", borderRadius: 14, padding: "14px",
                      boxShadow: "0 2px 8px rgba(0,0,0,.06)",
                      borderTop: `3px solid ${s.color}`
                    }}>
                      <div style={{ fontSize: 11, fontWeight: 700, color: "#64748b", marginBottom: 10 }}>{s.icon} {s.label}</div>
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6 }}>
                        {[
                          { l: "V", v: s.d?.win,  c: "#00c170" },
                          { l: "N", v: s.d?.draw, c: "#f59e0b" },
                          { l: "D", v: s.d?.lose, c: "#ef4444" },
                        ].map((r, j) => (
                          <div key={j} style={{ textAlign: "center" }}>
                            <div style={{ fontSize: 18, fontWeight: 900, color: r.c }}>{r.v || 0}</div>
                            <div style={{ fontSize: 9, color: "#94a3b8", fontWeight: 700 }}>{r.l}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>

                {}
                <div style={{ fontSize: 10, fontWeight: 800, color: "#94a3b8", textTransform: "uppercase", letterSpacing: ".8px", marginBottom: 10 }}>Répartition saison</div>
                <div style={{ background: "#fff", borderRadius: 14, padding: 16, boxShadow: "0 2px 8px rgba(0,0,0,.06)", marginBottom: 16 }}>
                  {[
                    { label: "Victoires", val: st.all?.win,  total: totalGames, color: "#00c170" },
                    { label: "Nuls",      val: st.all?.draw, total: totalGames, color: "#f59e0b" },
                    { label: "Défaites",  val: st.all?.lose, total: totalGames, color: "#ef4444" },
                  ].map((r, i) => {
                    const pct = totalGames > 0 ? Math.round((r.val / totalGames) * 100) : 0;
                    return (
                      <div key={i} style={{ marginBottom: i < 2 ? 12 : 0 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                          <span style={{ fontSize: 11, color: "#64748b", fontWeight: 600 }}>{r.label}</span>
                          <span style={{ fontSize: 11, fontWeight: 800, color: r.color }}>{r.val} <span style={{ color: "#94a3b8", fontWeight: 500 }}>({pct}%)</span></span>
                        </div>
                        <div style={{ height: 6, background: "#f1f5f9", borderRadius: 4, overflow: "hidden" }}>
                          <div style={{ width: `${pct}%`, height: "100%", background: r.color, borderRadius: 4, transition: "width .6s ease" }} />
                        </div>
                      </div>
                    );
                  })}
                </div>
              </>
            )}

            {}
            {topScore.length > 0 && (
              <>
                <div style={{ fontSize: 10, fontWeight: 800, color: "#94a3b8", textTransform: "uppercase", letterSpacing: ".8px", marginBottom: 10 }}>Buteurs du club</div>
                <div style={{ background: "#fff", borderRadius: 14, overflow: "hidden", boxShadow: "0 2px 8px rgba(0,0,0,.06)" }}>
                  {topScore.map((p, i) => {
                    const st2 = p.statistics?.[0];
                    return (
                      <div key={i} style={{
                        display: "flex", alignItems: "center", gap: 12,
                        padding: "12px 16px",
                        borderBottom: i < topScore.length - 1 ? "1px solid #f1f5f9" : "none"
                      }}>
                        <PlayerImage playerId={p.player?.id} playerName={p.player?.name} size={40} ring="#e8edf3" />
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 13, fontWeight: 700, color: "#0f1117" }}>{p.player?.name}</div>
                          <div style={{ fontSize: 10, color: "#94a3b8", marginTop: 2 }}>{st2?.games?.position || "—"}</div>
                        </div>
                        <div style={{ display: "flex", gap: 8 }}>
                          <div style={{ textAlign: "center" }}>
                            <div style={{ fontSize: 18, fontWeight: 900, color: "#00c170" }}>{st2?.goals?.total || 0}</div>
                            <div style={{ fontSize: 8, color: "#94a3b8", fontWeight: 700 }}>BUTS</div>
                          </div>
                          <div style={{ textAlign: "center" }}>
                            <div style={{ fontSize: 18, fontWeight: 900, color: "#3b82f6" }}>{st2?.goals?.assists || 0}</div>
                            <div style={{ fontSize: 8, color: "#94a3b8", fontWeight: 700 }}>PASSES</div>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </>
            )}
          </div>
        )}

        {}
        {tab === "infos" && (
          <div style={{ padding: 14, paddingBottom: 24 }}>
            {}
            {venue && (
              <div style={{ background: "#fff", borderRadius: 16, overflow: "hidden", boxShadow: "0 4px 20px rgba(0,0,0,.08)", marginBottom: 14 }}>
                {venue.image && (
                  <div style={{ position: "relative", height: 170, overflow: "hidden" }}>
                    <img src={venue.image} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} onError={e => e.target.parentElement.style.display = "none"} />
                    <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, height: "60%", background: "linear-gradient(transparent,rgba(0,0,0,.7))" }} />
                    <div style={{ position: "absolute", bottom: 12, left: 14, right: 14 }}>
                      <div style={{ fontSize: 15, fontWeight: 900, color: "#fff" }}>{venue.name}</div>
                      <div style={{ fontSize: 11, color: "rgba(255,255,255,.65)", marginTop: 2 }}>{venue.city}</div>
                    </div>
                  </div>
                )}
                <div style={{ padding: "14px 16px" }}>
                  {!venue.image && <div style={{ fontSize: 15, fontWeight: 800, color: "#0f1117", marginBottom: 8 }}>{venue.name}</div>}
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                    {[
                      { label: "Capacité", val: venue.capacity ? venue.capacity.toLocaleString("fr-FR") + " places" : "—", icon: "🏟️" },
                      { label: "Surface", val: venue.surface || "—", icon: "🌿" },
                      { label: "Ville", val: venue.city || "—", icon: "📍" },
                      { label: "Adresse", val: venue.address || "—", icon: "🗺️" },
                    ].map((r, i) => (
                      <div key={i} style={{ background: "#f8fafc", borderRadius: 10, padding: "10px 12px" }}>
                        <div style={{ fontSize: 9, color: "#94a3b8", fontWeight: 700, textTransform: "uppercase", letterSpacing: ".5px", marginBottom: 4 }}>{r.icon} {r.label}</div>
                        <div style={{ fontSize: 12, fontWeight: 700, color: "#0f1117" }}>{r.val}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {}
            {team && (
              <div style={{ background: "#fff", borderRadius: 16, overflow: "hidden", boxShadow: "0 4px 20px rgba(0,0,0,.08)" }}>
                <div style={{ padding: "14px 16px 10px", borderBottom: "1px solid #f1f5f9", display: "flex", alignItems: "center", gap: 12 }}>
                  <Logo src={teamLogo} size={36} />
                  <div>
                    <div style={{ fontSize: 14, fontWeight: 800, color: "#0f1117" }}>{team.name}</div>
                    <div style={{ fontSize: 10, color: "#94a3b8", marginTop: 2 }}>{team.country}</div>
                  </div>
                </div>
                <div style={{ padding: "8px 0" }}>
                  {[
                    { label: "Fondé en", val: team.founded, icon: "📅" },
                    { label: "Code",     val: team.code,    icon: "🔤" },
                    { label: "Pays",     val: team.country, icon: "🌍" },
                  ].filter(r => r.val).map((r, i, arr) => (
                    <div key={i} style={{
                      display: "flex", justifyContent: "space-between", alignItems: "center",
                      padding: "10px 16px",
                      borderBottom: i < arr.length - 1 ? "1px solid #f8fafc" : "none"
                    }}>
                      <span style={{ fontSize: 12, color: "#64748b", display: "flex", alignItems: "center", gap: 8 }}>
                        <span>{r.icon}</span>{r.label}
                      </span>
                      <span style={{ fontSize: 13, fontWeight: 700, color: "#0f1117" }}>{r.val}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}

      </div>
    </div>
  );
}

function App() {
  const [currentTab, setCurrentTab] = useState(() => {
    try { return sessionStorage.getItem("wf_last_tab") || "scores"; }
    catch { return "scores"; }
  });

  const [apiCallsToday, setApiCallsToday] = useState(0);

  useEffect(() => {
    try {
      const today = new Date().toDateString();
      const calls = localStorage.getItem('wf_api_calls_' + today);
      setApiCallsToday(parseInt(calls) || 0);
    } catch {
      setApiCallsToday(0);
    }

    const interval = setInterval(() => {
      try {
        const today = new Date().toDateString();
        const calls = localStorage.getItem('wf_api_calls_' + today);
        setApiCallsToday(parseInt(calls) || 0);
      } catch {}
    }, 30000);

    return () => clearInterval(interval);
  }, []);

  useEffect(() => {
    try { sessionStorage.setItem("wf_last_tab", currentTab); }
    catch {}
  }, [currentTab]);

  const [teamPage, setTeamPage] = useState(null);
  const openTeam = useCallback((teamId, teamName, teamLogo, leagueId, season) => {
    setTeamPage({ teamId, teamName, teamLogo, leagueId, season });
  }, []);

  const [favs, setFavs] = useState(() => {
    try {
      const saved = localStorage.getItem("wf_favs");
      return saved ? new Set(JSON.parse(saved)) : new Set();
    } catch {
      return new Set();
    }
  });

  useEffect(() => {
    try { localStorage.setItem("wf_favs", JSON.stringify([...favs])); }
    catch {}
  }, [favs]);

  const toggleFav = useCallback((id) => {
    setFavs(prev => {
      const newSet = new Set(prev);
      if (newSet.has(id)) newSet.delete(id);
      else newSet.add(id);
      return newSet;
    });
  }, []);

  const tabs = [
    { id: "scores", label: "SCORES" },
    { id: "standings", label: "CLASSEMENT" },
    { id: "scorers", label: "BUTEURS" },
    { id: "calendar", label: "CALENDRIER" },
    { id: "transfers", label: "TRANSFERTS" },
    { id: "actu", label: "ACTUALITÉS" },
    { id: "jsk", label: "JSK" }
  ];

  const renderContent = () => {
    switch (currentTab) {
      case "scores": return React.createElement(ScoresTab, { favs, onFav: toggleFav, onTeam: openTeam });
      case "standings": return React.createElement(StandingsTab, { onTeam: openTeam });
      case "scorers": return React.createElement(ScorersTab, null);
      case "calendar": return React.createElement(CalendarTab, { favs, onFav: toggleFav, onTeam: openTeam });
      case "transfers": return React.createElement(TransfersTab, { onTeam: openTeam });
      case "actu": return React.createElement(ActuTab, null);
      case "jsk": return React.createElement(JSKTab, null);
      default: return React.createElement(ScoresTab, { favs, onFav: toggleFav });
    }
  };

  return React.createElement("div", { style: { height: "100%", display: "flex", flexDirection: "column", background: "var(--c-base)" } },

    React.createElement("div", { style: {
      flexShrink: 0,
      background: "#fff",
      borderBottom: "1px solid var(--c-border)",
      boxShadow: "var(--s-header)",
      paddingTop: "calc(env(safe-area-inset-top) + 14px)",
      position: "relative",
      overflow: "hidden"
    } },

      React.createElement("div", { style: {
        position: "absolute", top: 0, left: 0, right: 0, height: 2,
        background: "linear-gradient(90deg, var(--c-jade) 0%, #10B981 35%, #059669 65%, var(--c-jade) 100%)",
        backgroundSize: "300% 100%",
        animation: "stripeShift 6s linear infinite"
      } }),

      React.createElement("div", { style: { display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 18px 14px" } },

        React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 11 } },
          React.createElement("div", { style: {
            width: 38, height: 38, borderRadius: 12,
            background: "linear-gradient(145deg, #059669, #047857)",
            display: "flex", alignItems: "center", justifyContent: "center",
            fontSize: 18,
            boxShadow: "0 4px 14px rgba(5,150,105,0.30), 0 1px 0 rgba(255,255,255,0.20) inset"
          } }, "⚡"),
          React.createElement("div", { style: { display: "flex", flexDirection: "column", gap: 1 } },
            React.createElement("span", { style: {
              fontFamily: "'Instrument Serif', Georgia, serif",
              fontStyle: "italic",
              fontSize: 22, color: "var(--c-ink)", lineHeight: 1, letterSpacing: "-0.5px"
            } }, "WorldFoot"),
            React.createElement("span", { style: {
              fontFamily: "'JetBrains Mono', monospace",
              fontSize: 8, fontWeight: 500, letterSpacing: "3px",
              textTransform: "uppercase", color: "var(--c-jade)"
            } }, "PRO · LIVE")
          )
        ),

        React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 7 } },

          React.createElement("div", { style: {
            display: "flex", alignItems: "center", gap: 5,
            padding: "5px 11px", borderRadius: 20,
            background: "var(--c-live-dim)",
            border: "1px solid rgba(229,62,62,0.18)"
          } },
            React.createElement("div", { className: "live-dot" }),
            React.createElement("span", { style: {
              fontFamily: "'JetBrains Mono', monospace",
              fontSize: 10, fontWeight: 500, letterSpacing: "1px", color: "var(--c-live)"
            } }, "LIVE")
          ),

          React.createElement("div", { style: {
            padding: "5px 9px", borderRadius: 10,
            background: "var(--c-base)",
            border: "1px solid var(--c-border)"
          } },
            React.createElement("span", { style: {
              fontFamily: "'JetBrains Mono', monospace",
              fontSize: 9, fontWeight: 500, color: "var(--c-ink-3)"
            } },
              React.createElement("strong", { style: { color: "var(--c-ink-2)", fontWeight: 600 } }, apiCallsToday),
              "/7.5k"
            )
          ),

          React.createElement("button", {
            title: "Déconnexion",
            onClick: () => { localStorage.removeItem("wf_auth"); window.location.href = "login.html"; },
            style: {
              width: 34, height: 34,
              borderRadius: 10,
              background: "var(--c-base)",
              border: "1px solid var(--c-border)",
              display: "flex", alignItems: "center", justifyContent: "center",
              cursor: "pointer", color: "var(--c-ink-3)",
              transition: "all 0.15s"
            },
            onMouseEnter: e => { e.currentTarget.style.background = "var(--c-live-dim)"; e.currentTarget.style.color = "var(--c-live)"; e.currentTarget.style.borderColor = "rgba(229,62,62,0.22)"; },
            onMouseLeave: e => { e.currentTarget.style.background = "var(--c-base)"; e.currentTarget.style.color = "var(--c-ink-3)"; e.currentTarget.style.borderColor = "var(--c-border)"; }
          },
            React.createElement("svg", { width: 15, height: 15, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2.2, strokeLinecap: "round", strokeLinejoin: "round" },
              React.createElement("path", { d: "M18.36 6.64A9 9 0 1 1 5.64 6.64" }),
              React.createElement("line", { x1: 12, y1: 2, x2: 12, y2: 12 })
            )
          )
        )
      ),

      React.createElement("div", { style: {
        display: "flex", gap: 4,
        overflowX: "auto", scrollbarWidth: "none",
        padding: "0 14px 14px", WebkitOverflowScrolling: "touch"
      } },
        tabs.map(tab =>
          React.createElement("button", {
            key: tab.id,
            onClick: () => setCurrentTab(tab.id),
            style: {
              flexShrink: 0,
              padding: "7px 14px",
              borderRadius: 10,
              border: currentTab === tab.id ? "1px solid rgba(5,150,105,0.18)" : "1px solid transparent",
              background: currentTab === tab.id ? "rgba(5,150,105,0.08)" : "transparent",
              boxShadow: currentTab === tab.id ? "inset 0 1px 0 rgba(5,150,105,0.15), 0 1px 6px rgba(5,150,105,0.08)" : "none",
              cursor: "pointer",
              fontFamily: "'Plus Jakarta Sans', sans-serif",
              fontSize: 10, fontWeight: 700,
              letterSpacing: "0.4px",
              textTransform: "uppercase",
              color: currentTab === tab.id ? "var(--c-jade)" : "var(--c-ink-3)",
              whiteSpace: "nowrap",
              transition: "all 0.2s cubic-bezier(0.22,1,0.36,1)"
            }
          }, tab.label)
        )
      )
    ),

    React.createElement("div", { style: { flex: 1, overflow: "hidden" } },
      renderContent()
    ),

    teamPage ? React.createElement(TeamPage, {
      key: teamPage.teamId,
      teamId:   teamPage.teamId,
      teamName: teamPage.teamName,
      teamLogo: teamPage.teamLogo,
      leagueId: teamPage.leagueId,
      season:   teamPage.season,
      onClose:  () => setTeamPage(null)
    }) : null
  );
}

if (localStorage.getItem('wf_auth') !== '1') {
  window.location.href = 'login.html';
} else {
  ReactDOM.render(React.createElement(App, null), document.getElementById('root'));
}
</script>
</body>
</html>
