<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
    <meta name="theme-color" content="#00b86b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WorldFoot Pro" />
    <title>WorldFoot Pro</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@600;700;800;900&display=swap" rel="stylesheet" />
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            scrollbar-width: none;
        }
        
        *::-webkit-scrollbar {
            display: none;
        }
        
        html, body {
            height: 100%;
            background: #eef0f5;
            font-family: 'Barlow', -apple-system, sans-serif;
            color: #1a1d23;
            overflow: hidden;
        }
        
        #root {
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }
        
        @keyframes dotPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.6); opacity: 0.7; }
        }
        
        .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff5252;
            animation: dotPulse 1.4s ease-in-out infinite;
        }
        
        .bc {
            font-family: 'Barlow Condensed', sans-serif;
        }
        
        .sk {
            background: linear-gradient(90deg, #f0f2f6 25%, #e8eaef 50%, #f0f2f6 75%);
            background-size: 200% 100%;
            animation: spin 1.5s infinite;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>

    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        const API_KEY = "3a14b1347c177458e2f23bea7899e9cf";
        const BASE = "https://v3.football.api-sports.io";
        
        // ============================================
        // CACHE API
        // ============================================
        const cache = new Map();
        let apiCallsToday = parseInt(localStorage.getItem('wf_api_calls_' + new Date().toDateString()) || '0');
        let apiCallsDate = new Date().toDateString();
        
        function trackApiCall() {
            const today = new Date().toDateString();
            if (today !== apiCallsDate) {
                apiCallsToday = 0;
                apiCallsDate = today;
            }
            apiCallsToday++;
            try {
                localStorage.setItem('wf_api_calls_' + today, apiCallsToday);
            } catch (e) {}
        }
        
        const TTL = {
            LIVE: 15000,
            SCORES: 60000,
            DONE: 86400000,
            UPCOMING: 21600000,
            STANDING: 3600000,
            H2H: 86400000,
            LINEUP: 3600000,
            PLAYERS: 3600000
        };
        
        async function api(path, ttl = TTL.SCORES, signal = null) {
            const now = Date.now();
            const cached = cache.get(path);
            if (cached && now - cached.t < ttl) return cached.d;
            
            trackApiCall();
            const r = await fetch(BASE + path, {
                headers: { "x-apisports-key": API_KEY },
                signal
            });
            
            if (!r.ok) throw new Error("Erreur HTTP " + r.status);
            
            const j = await r.json();
            if (j.errors && Object.keys(j.errors).length) {
                throw new Error(Object.values(j.errors)[0]);
            }
            
            const d = j.response || [];
            cache.set(path, { d, t: now });
            return d;
        }
        
        // ============================================
        // HELPERS
        // ============================================
        const today = () => new Date().toISOString().slice(0, 10);
        
        const hhmm = (s) => {
            const d = new Date(s);
            return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
        };
        
        const ddmm = (s) => {
            const d = new Date(s);
            return String(d.getDate()).padStart(2, '0') + '.' + String(d.getMonth() + 1).padStart(2, '0') + '.' + d.getFullYear();
        };
        
        const esc = (s) => {
            if (!s) return '';
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        };
        
        const LIVE_ST = new Set(['1H', 'HT', '2H', 'ET', 'BT', 'P']);
        const DONE_ST = new Set(['FT', 'AET', 'PEN', 'AWD', 'WO']);
        const NS_ST = new Set(['NS', 'TBD', 'PST', 'CANC']);
        
        // ============================================
        // LIGUES
        // ============================================
        const LEAGUES = [
            { id: 2, name: "Champions League", country: "Europe", flag: "🏆", region: "Coupes EU" },
            { id: 3, name: "Europa League", country: "Europe", flag: "🟠", region: "Coupes EU" },
            { id: 39, name: "Premier League", country: "Angleterre", flag: "🏴󠁧󠁢󠁥󠁮󠁧󠁿", region: "Top 5" },
            { id: 140, name: "La Liga", country: "Espagne", flag: "🇪🇸", region: "Top 5" },
            { id: 135, name: "Serie A", country: "Italie", flag: "🇮🇹", region: "Top 5" },
            { id: 78, name: "Bundesliga", country: "Allemagne", flag: "🇩🇪", region: "Top 5" },
            { id: 61, name: "Ligue 1", country: "France", flag: "🇫🇷", region: "Top 5" },
            { id: 168, name: "Ligue Pro 1", country: "Algérie", flag: "🇩🇿", region: "Afrique" },
            { id: 199, name: "Botola Pro", country: "Maroc", flag: "🇲🇦", region: "Afrique" },
            { id: 233, name: "Premier League", country: "Égypte", flag: "🇪🇬", region: "Afrique" },
            { id: 211, name: "Ligue 1 Pro", country: "Tunisie", flag: "🇹🇳", region: "Afrique" }
        ];
        
        const REGIONS = [...new Set(LEAGUES.map(l => l.region))];
        const SEASONS = [2025, 2024, 2023, 2022, 2021];
        const CUR_SEASON = 2024;
        
        // ============================================
        // COMPOSANTS ATOMES
        // ============================================
        const { useState, useEffect, useCallback, useRef, useMemo } = React;
        
        function Spin({ s = 22, c = '#00c170' }) {
            return React.createElement('div', {
                style: {
                    width: s,
                    height: s,
                    border: '2px solid #e4e7ef',
                    borderTopColor: c,
                    borderRadius: '50%',
                    animation: 'spin .55s linear infinite',
                    flexShrink: 0
                }
            });
        }
        
        function Logo({ src, size = 16 }) {
            const [error, setError] = useState(false);
            const style = {
                width: size,
                height: size,
                flexShrink: 0,
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                borderRadius: size / 2,
                background: !src || error ? '#eef0f5' : 'transparent'
            };
            
            if (!src || error) {
                return React.createElement('div', { style });
            }
            
            return React.createElement('div', { style }, 
                React.createElement('img', {
                    src: src,
                    width: size,
                    height: size,
                    style: { objectFit: 'contain', display: 'block', width: '100%', height: '100%' },
                    onError: () => setError(true)
                })
            );
        }
        
        function Avatar({ src, size = 40, ring = '#e4e7ef' }) {
            const [error, setError] = useState(false);
            const style = {
                width: size,
                height: size,
                borderRadius: size / 2,
                background: '#eef0f5',
                border: '2px solid ' + ring,
                flexShrink: 0,
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                overflow: 'hidden'
            };
            
            if (!src || error) {
                return React.createElement('div', { style },
                    React.createElement('svg', {
                        width: size * 0.46,
                        height: size * 0.46,
                        viewBox: '0 0 24 24',
                        fill: '#ccc'
                    },
                        React.createElement('path', { d: 'M12 12c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm0 2c-3.33 0-10 1.67-10 5v2h20v-2c0-3.33-6.67-5-10-5z' })
                    )
                );
            }
            
            return React.createElement('div', { style },
                React.createElement('img', {
                    src: src,
                    style: { width: '100%', height: '100%', objectFit: 'cover' },
                    onError: () => setError(true)
                })
            );
        }
        
        // ============================================
        // MATCH DETAIL COMPONENT (COMPLET)
        // ============================================
        function MatchDetail({ fixtureId, onClose }) {
            const [loading, setLoading] = useState(true);
            const [fixture, setFixture] = useState(null);
            const [events, setEvents] = useState([]);
            const [stats, setStats] = useState([]);
            const [lineups, setLineups] = useState([]);
            const [players, setPlayers] = useState([]);
            const [h2h, setH2h] = useState([]);
            const [activeTab, setActiveTab] = useState('resume');
            
            useEffect(() => {
                if (!fixtureId) return;
                
                let isMounted = true;
                setLoading(true);
                
                const loadData = async () => {
                    try {
                        // Charger le fixture
                        const fx = await api('/fixtures?id=' + fixtureId, TTL.LIVE);
                        if (!isMounted || !fx || !fx[0]) return;
                        
                        const fix = fx[0];
                        setFixture(fix);
                        
                        const isStarted = !NS_ST.has(fix.fixture.status.short);
                        const isDone = DONE_ST.has(fix.fixture.status.short);
                        const detailTTL = isDone ? TTL.DONE : TTL.LIVE;
                        
                        // Charger les événements
                        if (isStarted) {
                            const evts = await api('/fixtures/events?fixture=' + fixtureId, detailTTL).catch(() => []);
                            if (isMounted) setEvents(evts || []);
                            
                            const sts = await api('/fixtures/statistics?fixture=' + fixtureId, detailTTL).catch(() => []);
                            if (isMounted) setStats(sts || []);
                        }
                        
                        // Charger lineups
                        const lus = await api('/fixtures/lineups?fixture=' + fixtureId, detailTTL).catch(() => []);
                        if (isMounted) setLineups(lus || []);
                        
                        // Charger H2H
                        if (fix.teams?.home?.id && fix.teams?.away?.id) {
                            const h2hData = await api('/fixtures/headtohead?h2h=' + fix.teams.home.id + '-' + fix.teams.away.id + '&last=30', TTL.H2H).catch(() => []);
                            if (isMounted) setH2h(h2hData || []);
                        }
                        
                        if (isMounted) setLoading(false);
                    } catch (err) {
                        console.error(err);
                        if (isMounted) setLoading(false);
                    }
                };
                
                loadData();
                
                return () => { isMounted = false; };
            }, [fixtureId]);
            
            if (!fixtureId) return null;
            
            const fix = fixture;
            const s = fix?.fixture?.status;
            const sh = s?.short;
            const isLive = LIVE_ST.has(sh);
            const homeTeam = fix?.teams?.home;
            const awayTeam = fix?.teams?.away;
            const hg = fix?.goals?.home;
            const ag = fix?.goals?.away;
            
            const getStatusLabel = () => {
                const map = {
                    NS: 'À venir', TBD: 'TBD', PST: 'Reporté', CANC: 'Annulé',
                    '1H': '1re mi-temps', HT: 'Mi-temps', '2H': '2e mi-temps',
                    ET: 'Prol.', BT: 'Pause prol.', P: 'Tab.', INT: 'Interrompu',
                    SUSP: 'Suspendu', FT: 'Terminé', AET: 'A.P.', PEN: 'Aux tirs'
                };
                return map[sh] || sh;
            };
            
            const hasGoals = events.filter(e => e.type === 'Goal').length > 0;
            
            return React.createElement('div', {
                style: {
                    position: 'fixed',
                    inset: 0,
                    zIndex: 1000,
                    background: '#fff',
                    display: 'flex',
                    flexDirection: 'column',
                    animation: 'fadeIn 0.2s ease'
                }
            },
                // Header
                React.createElement('div', {
                    style: {
                        display: 'flex',
                        alignItems: 'center',
                        padding: '12px 16px',
                        background: '#fff',
                        borderBottom: '1px solid rgba(0,0,0,0.08)',
                        flexShrink: 0
                    }
                },
                    React.createElement('button', {
                        onClick: onClose,
                        style: {
                            background: 'none',
                            border: 'none',
                            fontSize: '24px',
                            cursor: 'pointer',
                            color: '#555',
                            padding: '0 8px'
                        }
                    }, '←'),
                    
                    React.createElement('span', {
                        style: {
                            flex: 1,
                            textAlign: 'center',
                            fontFamily: 'Barlow Condensed, sans-serif',
                            fontSize: '14px',
                            fontWeight: 700,
                            color: '#666',
                            letterSpacing: '1px',
                            textTransform: 'uppercase'
                        }
                    }, loading ? 'CHARGEMENT...' : (fix?.league?.name || 'MATCH'))
                ),
                
                // Contenu
                React.createElement('div', {
                    style: {
                        flex: 1,
                        overflowY: 'auto',
                        padding: '16px',
                        background: '#f5f6f9'
                    }
                },
                    loading ? React.createElement('div', { style: { textAlign: 'center', padding: '40px' } },
                        React.createElement(Spin, { s: 32 })
                    ) : !fix ? React.createElement('div', { style: { textAlign: 'center', padding: '40px', color: '#888' } },
                        'Match non disponible'
                    ) : React.createElement('div', null,
                        // En-tête du match
                        React.createElement('div', {
                            style: {
                                background: '#fff',
                                borderRadius: '12px',
                                padding: '16px',
                                marginBottom: '16px',
                                boxShadow: '0 2px 8px rgba(0,0,0,0.05)'
                            }
                        },
                            React.createElement('div', {
                                style: {
                                    display: 'flex',
                                    alignItems: 'center',
                                    justifyContent: 'space-between',
                                    marginBottom: '12px'
                                }
                            },
                                React.createElement('span', {
                                    style: {
                                        fontFamily: 'Barlow Condensed, sans-serif',
                                        fontSize: '12px',
                                        fontWeight: 600,
                                        color: '#666'
                                    }
                                }, (fix.league?.country || '') + ' · ' + (fix.league?.name || '')),
                                
                                React.createElement('span', {
                                    style: {
                                        display: 'inline-flex',
                                        alignItems: 'center',
                                        gap: '4px',
                                        padding: '4px 10px',
                                        borderRadius: '20px',
                                        background: isLive ? 'rgba(229,53,53,0.1)' : '#f0f0f0',
                                        color: isLive ? '#e53535' : '#666',
                                        fontSize: '11px',
                                        fontWeight: 700
                                    }
                                },
                                    isLive && React.createElement('span', {
                                        style: {
                                            width: '6px',
                                            height: '6px',
                                            borderRadius: '50%',
                                            background: '#e53535',
                                            animation: 'dotPulse 1.2s infinite'
                                        }
                                    }),
                                    getStatusLabel()
                                )
                            ),
                            
                            React.createElement('div', {
                                style: {
                                    display: 'flex',
                                    alignItems: 'center',
                                    gap: '12px'
                                }
                            },
                                React.createElement('div', {
                                    style: {
                                        flex: 1,
                                        display: 'flex',
                                        flexDirection: 'column',
                                        alignItems: 'center',
                                        gap: '8px'
                                    }
                                },
                                    React.createElement(Logo, { src: homeTeam?.logo, size: 48 }),
                                    React.createElement('span', {
                                        style: {
                                            fontFamily: 'Barlow Condensed, sans-serif',
                                            fontSize: '14px',
                                            fontWeight: 600,
                                            textAlign: 'center',
                                            color: '#1a1d23'
                                        }
                                    }, homeTeam?.name || '—')
                                ),
                                
                                React.createElement('div', {
                                    style: {
                                        flexShrink: 0,
                                        textAlign: 'center'
                                    }
                                },
                                    React.createElement('div', {
                                        style: {
                                            fontFamily: 'Barlow Condensed, sans-serif',
                                            fontSize: '36px',
                                            fontWeight: 900,
                                            color: '#1a1d23',
                                            lineHeight: 1
                                        }
                                    }, (hg ?? '-') + ' - ' + (ag ?? '-')),
                                    
                                    s?.elapsed ? React.createElement('div', {
                                        style: {
                                            fontSize: '12px',
                                            color: '#888',
                                            marginTop: '4px'
                                        }
                                    }, s.elapsed + "'") : null
                                ),
                                
                                React.createElement('div', {
                                    style: {
                                        flex: 1,
                                        display: 'flex',
                                        flexDirection: 'column',
                                        alignItems: 'center',
                                        gap: '8px'
                                    }
                                },
                                    React.createElement(Logo, { src: awayTeam?.logo, size: 48 }),
                                    React.createElement('span', {
                                        style: {
                                            fontFamily: 'Barlow Condensed, sans-serif',
                                            fontSize: '14px',
                                            fontWeight: 600,
                                            textAlign: 'center',
                                            color: '#1a1d23'
                                        }
                                    }, awayTeam?.name || '—')
                                )
                            )
                        ),
                        
                        // Tabs
                        React.createElement('div', {
                            style: {
                                display: 'flex',
                                gap: '8px',
                                marginBottom: '16px',
                                overflowX: 'auto',
                                paddingBottom: '4px'
                            }
                        },
                            ['resume', 'stats', 'compos', 'h2h'].map(tab => {
                                const labels = {
                                    resume: 'Résumé',
                                    stats: 'Stats',
                                    compos: 'Compos',
                                    h2h: 'H2H'
                                };
                                return React.createElement('button', {
                                    key: tab,
                                    onClick: () => setActiveTab(tab),
                                    style: {
                                        flexShrink: 0,
                                        padding: '8px 16px',
                                        borderRadius: '20px',
                                        border: 'none',
                                        background: activeTab === tab ? '#00b86b' : '#f0f0f0',
                                        color: activeTab === tab ? '#fff' : '#666',
                                        fontSize: '12px',
                                        fontWeight: activeTab === tab ? 700 : 500,
                                        cursor: 'pointer',
                                        transition: 'all 0.2s'
                                    }
                                }, labels[tab]);
                            })
                        ),
                        
                        // Onglet Résumé
                        activeTab === 'resume' && React.createElement('div', null,
                            // Timeline des événements
                            React.createElement('div', {
                                style: {
                                    background: '#fff',
                                    borderRadius: '12px',
                                    padding: '16px',
                                    marginBottom: '16px',
                                    boxShadow: '0 2px 8px rgba(0,0,0,0.05)'
                                }
                            },
                                React.createElement('div', {
                                    style: {
                                        fontFamily: 'Barlow Condensed, sans-serif',
                                        fontSize: '14px',
                                        fontWeight: 700,
                                        color: '#1a1d23',
                                        marginBottom: '12px'
                                    }
                                }, '⚽ Événements'),
                                
                                events.length === 0
                                    ? React.createElement('div', {
                                        style: {
                                            textAlign: 'center',
                                            padding: '20px',
                                            color: '#888',
                                            fontSize: '13px'
                                        }
                                      }, 'Aucun événement pour le moment')
                                    : events.sort((a, b) => (a.time?.elapsed || 0) - (b.time?.elapsed || 0)).map((e, i) => {
                                        const isHome = e.team?.id === fix.teams.home.id;
                                        let icon = '';
                                        if (e.type === 'Goal') icon = '⚽';
                                        else if (e.type === 'Card') icon = e.detail?.includes('Yellow') ? '🟨' : '🟥';
                                        else if (e.type === 'subst') icon = '🔄';
                                        else icon = '📋';
                                        
                                        return React.createElement('div', {
                                            key: i,
                                            style: {
                                                display: 'flex',
                                                alignItems: 'center',
                                                justifyContent: isHome ? 'flex-start' : 'flex-end',
                                                marginBottom: '8px'
                                            }
                                        },
                                            isHome ? React.createElement('div', {
                                                style: {
                                                    display: 'flex',
                                                    alignItems: 'center',
                                                    gap: '8px',
                                                    background: '#e8f5e9',
                                                    borderRadius: '20px',
                                                    padding: '8px 12px',
                                                    maxWidth: '70%'
                                                }
                                            },
                                                React.createElement('span', { style: { fontSize: '16px' } }, icon),
                                                React.createElement('span', { style: { fontWeight: 600 } }, e.player?.name || 'Joueur'),
                                                React.createElement('span', { style: { marginLeft: '4px', color: '#888', fontSize: '11px' } }, 
                                                    e.time?.elapsed ? e.time.elapsed + "'" : ''
                                                )
                                            ) : React.createElement('div', {
                                                style: {
                                                    display: 'flex',
                                                    alignItems: 'center',
                                                    gap: '8px',
                                                    background: '#e3f2fd',
                                                    borderRadius: '20px',
                                                    padding: '8px 12px',
                                                    maxWidth: '70%'
                                                }
                                            },
                                                React.createElement('span', { style: { marginRight: '4px', color: '#888', fontSize: '11px' } },
                                                    e.time?.elapsed ? e.time.elapsed + "'" : ''
                                                ),
                                                React.createElement('span', { style: { fontWeight: 600 } }, e.player?.name || 'Joueur'),
                                                React.createElement('span', { style: { fontSize: '16px' } }, icon)
                                            )
                                        );
                                    })
                            ),
                            
                            // Informations du match
                            React.createElement('div', {
                                style: {
                                    background: '#fff',
                                    borderRadius: '12px',
                                    padding: '16px',
                                    boxShadow: '0 2px 8px rgba(0,0,0,0.05)'
                                }
                            },
                                React.createElement('div', {
                                    style: {
                                        fontFamily: 'Barlow Condensed, sans-serif',
                                        fontSize: '14px',
                                        fontWeight: 700,
                                        color: '#1a1d23',
                                        marginBottom: '12px'
                                    }
                                }, 'ℹ️ Informations'),
                                
                                React.createElement('div', {
                                    style: {
                                        display: 'flex',
                                        flexDirection: 'column',
                                        gap: '8px'
                                    }
                                },
                                    React.createElement('div', {
                                        style: {
                                            display: 'flex',
                                            alignItems: 'center',
                                            gap: '8px',
                                            fontSize: '13px'
                                        }

                        ? React.createElement('div', { style: { textAlign: 'center', padding: '40px', color: '#e53535' } },
                            'Erreur: ' + error
                          )
                        : standings.length === 0
                        ? React.createElement('div', { style: { textAlign: 'center', padding: '40px', color: '#888' } },
                            'Classement non disponible'
                          )
                        : React.createElement('div', null,
                            React.createElement('div', {
                                style: {
                                    display: 'grid',
                                    gridTemplateColumns: '30px 1fr 40px 40px 50px',
                                    padding: '10px 12px',
                                    background: '#f8f9fc',
                                    borderRadius: '8px',
                                    marginBottom: '8px',
                                    fontSize: '11px',
                                    fontWeight: 700,
                                    color: '#888'
                                }
                            },
                                React.createElement('span', null, '#'),
                                React.createElement('span', null, 'Équipe'),
                                React.createElement('span', { style: { textAlign: 'center' } }, 'MJ'),
                                React.createElement('span', { style: { textAlign: 'center' } }, 'DB'),
                                React.createElement('span', { style: { textAlign: 'center' } }, 'PTS')
                            ),
                            
                            standings.map((r, i) =>
                                React.createElement('div', {
                                    key: r.team?.id || i,
                                    style: {
                                        display: 'grid',
                                        gridTemplateColumns: '30px 1fr 40px 40px 50px',
                                        padding: '12px 12px',
                                        borderBottom: '1px solid rgba(0,0,0,0.05)',
                                        alignItems: 'center',
                                        background: i < 3 ? 'rgba(0,184,107,0.03)' : '#fff'
                                    }
                                },
                                    React.createElement('span', {
                                        style: {
                                            fontFamily: 'Barlow Condensed, sans-serif',
                                            fontSize: '14px',
                                            fontWeight: 800,
                                            color: i < 3 ? '#00b86b' : '#888'
                                        }
                                    }, r.rank),
                                    
                                    React.createElement('div', {
                                        style: {
                                            display: 'flex',
                                            alignItems: 'center',
                                            gap: '8px'
                                        }
                                    },
                                        React.createElement(Logo, { src: r.team?.logo, size: 20 }),
                                        React.createElement('span', {
                                            style: {
                                                fontSize: '13px',
                                                fontWeight: 600,
                                                color: '#1a1d23',
                                                whiteSpace: 'nowrap',
                                                overflow: 'hidden',
                                                textOverflow: 'ellipsis'
                                            }
                                        }, r.team?.name || '—')
                                    ),
                                    
                                    React.createElement('span', {
                                        style: { textAlign: 'center', fontSize: '12px' }
                                    }, r.all?.played || '-'),
                                    
                                    React.createElement('span', {
                                        style: {
                                            textAlign: 'center',
                                            fontSize: '12px',
                                            fontWeight: 700,
                                            color: (r.goalsDiff || 0) > 0 ? '#00b86b' : (r.goalsDiff || 0) < 0 ? '#e53535' : '#888'
                                        }
                                    }, (r.goalsDiff > 0 ? '+' : '') + (r.goalsDiff || '0')),
                                    
                                    React.createElement('span', {
                                        style: {
                                            textAlign: 'center',
                                            fontSize: '16px',
                                            fontWeight: 900,
                                            color: i < 3 ? '#00b86b' : '#1a1d23'
                                        }
                                    }, r.points || '-')
                                )
                            )
                        )
                )
            );
        }
        
        // ============================================
        // SCORERS TAB
        // ============================================
        function ScorersTab() {
            const [leagueId, setLeagueId] = useState(39);
            const [season, setSeason] = useState(CUR_SEASON);
            const [type, setType] = useState('scorers');
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            
            useEffect(() => {
                let cancelled = false;
                setLoading(true);
                
                const path = type === 'assists'
                    ? '/players/topassists?league=' + leagueId + '&season=' + season
                    : '/players/topscorers?league=' + leagueId + '&season=' + season;
                
                api(path, TTL.PLAYERS)
                    .then(d => {
                        if (!cancelled) {
                            setData(d || []);
                            setLoading(false);
                        }
                    })
                    .catch(() => {
                        if (!cancelled) {
                            setData([]);
                            setLoading(false);
                        }
                    });
                
                return () => { cancelled = true; };
            }, [leagueId, season, type]);
            
            return React.createElement('div', {
                style: {
                    display: 'flex',
                    flexDirection: 'column',
                    height: '100%',
                    background: '#eef0f5'
                }
            },
                React.createElement('div', {
                    style: {
                        padding: '12px 14px',
                        background: '#fff',
                        borderBottom: '1px solid rgba(0,0,0,0.08)',
                        display: 'flex',
                        gap: '8px',
                        flexShrink: 0
                    }
                },
                    React.createElement('div', {
                        style: {
                            display: 'flex',
                            background: '#f8f9fc',
                            borderRadius: '8px',
                            padding: '2px'
                        }
                    },
                        React.createElement('button', {
                            onClick: () => setType('scorers'),
                            style: {
                                padding: '6px 12px',
                                borderRadius: '6px',
                                border: 'none',
                                background: type === 'scorers' ? 'linear-gradient(135deg,#00b86b,#009657)' : 'transparent',
                                color: type === 'scorers' ? '#fff' : '#888',
                                fontSize: '12px',
                                fontWeight: type === 'scorers' ? 700 : 500,
                                cursor: 'pointer'
                            }
                        }, '⚽ Buts'),
                        
                        React.createElement('button', {
                            onClick: () => setType('assists'),
                            style: {
                                padding: '6px 12px',
                                borderRadius: '6px',
                                border: 'none',
                                background: type === 'assists' ? 'linear-gradient(135deg,#00b86b,#009657)' : 'transparent',
                                color: type === 'assists' ? '#fff' : '#888',
                                fontSize: '12px',
                                fontWeight: type === 'assists' ? 700 : 500,
                                cursor: 'pointer'
                            }
                        }, '🎯 Passes')
                    ),
                    
                    React.createElement('select', {
                        value: leagueId,
                        onChange: e => setLeagueId(parseInt(e.target.value)),
                        style: {
                            flex: 1,
                            padding: '6px 12px',
                            borderRadius: '8px',
                            border: '1px solid rgba(0,0,0,0.08)',
                            background: '#f8f9fc',
                            fontSize: '12px',
                            outline: 'none',
                            cursor: 'pointer'
                        }
                    },
                        REGIONS.map(region =>
                            React.createElement('optgroup', { key: region, label: region },
                                LEAGUES.filter(l => l.region === region).map(l =>
                                    React.createElement('option', { key: l.id, value: l.id },
                                        l.flag + ' ' + l.name
                                    )
                                )
                            )
                        )
                    ),
                    
                    React.createElement('select', {
                        value: season,
                        onChange: e => setSeason(parseInt(e.target.value)),
                        style: {
                            width: '80px',
                            padding: '6px 12px',
                            borderRadius: '8px',
                            border: '1px solid rgba(0,0,0,0.08)',
                            background: '#f8f9fc',
                            fontSize: '12px',
                            outline: 'none',
                            cursor: 'pointer'
                        }
                    },
                        SEASONS.map(y =>
                            React.createElement('option', { key: y, value: y }, y)
                        )
                    )
                ),
                
                React.createElement('div', {
                    style: {
                        flex: 1,
                        overflowY: 'auto',
                        padding: '16px'
                    }
                },
                    loading
                        ? React.createElement('div', { style: { textAlign: 'center', padding: '40px' } },
                            React.createElement(Spin, null)
                          )
                        : data.length === 0
                        ? React.createElement('div', { style: { textAlign: 'center', padding: '40px', color: '#888' } },
                            'Aucune donnée disponible'
                          )
                        : data.slice(0, 30).map((item, index) => {
                            const player = item.player;
                            const stats = item.statistics?.[0];
                            const value = type === 'assists'
                                ? (stats?.goals?.assists || 0)
                                : (stats?.goals?.total || 0);
                            
                            return React.createElement('div', {
                                key: player?.id || index,
                                style: {
                                    display: 'flex',
                                    alignItems: 'center',
                                    gap: '12px',
                                    padding: '12px 14px',
                                    background: '#fff',
                                    borderRadius: '12px',
                                    marginBottom: '8px',
                                    border: '1px solid rgba(0,0,0,0.05)'
                                }
                            },
                                React.createElement('span', {
                                    style: {
                                        fontFamily: 'Barlow Condensed, sans-serif',
                                        fontSize: '16px',
                                        fontWeight: 800,
                                        color: index < 3 ? ['#f59e0b', '#c0c0c0', '#cd7f32'][index] : '#888',
                                        width: '30px',
                                        textAlign: 'center'
                                    }
                                }, index < 3 ? ['🥇', '🥈', '🥉'][index] : (index + 1)),
                                
                                React.createElement('div', {
                                    style: {
                                        width: '40px',
                                        height: '40px',
                                        borderRadius: '50%',
                                        overflow: 'hidden',
                                        background: '#eef0f5',
                                        flexShrink: 0
                                    }
                                },
                                    player?.photo
                                        ? React.createElement('img', {
                                            src: player.photo,
                                            style: { width: '100%', height: '100%', objectFit: 'cover' },
                                            onError: e => e.target.style.display = 'none'
                                        })
                                        : React.createElement('div', {
                                            style: {
                                                width: '100%',
                                                height: '100%',
                                                display: 'flex',
                                                alignItems: 'center',
                                                justifyContent: 'center',
                                                fontSize: '20px'
                                            }
                                        }, '👤')
                                ),
                                
                                React.createElement('div', {
                                    style: { flex: 1 }
                                },
                                    React.createElement('div', {
                                        style: {
                                            fontFamily: 'Barlow Condensed, sans-serif',
                                            fontSize: '15px',
                                            fontWeight: 700,
                                            color: '#1a1d23'
                                        }
                                    }, player?.name || '—'),
                                    
                                    React.createElement('div', {
                                        style: {
                                            fontSize: '11px',
                                            color: '#888',
                                            marginTop: '2px'
                                        }
                                    }, (stats?.team?.name || '') + ' · ' + (player?.nationality || ''))
                                ),
                                
                                React.createElement('div', {
                                    style: {
                                        textAlign: 'center'
                                    }
                                },
                                    React.createElement('div', {
                                        style: {
                                            fontFamily: 'Barlow Condensed, sans-serif',
                                            fontSize: '22px',
                                            fontWeight: 900,
                                            color: index < 3 ? ['#f59e0b', '#c0c0c0', '#cd7f32'][index] : '#1a1d23'
                                        }
                                    }, value),
                                    
                                    React.createElement('div', {
                                        style: {
                                            fontSize: '9px',
                                            color: '#888',
                                            textTransform: 'uppercase'
                                        }
                                    }, type === 'assists' ? 'PASSES' : 'BUTS')
                                )
                            );
                        })
                )
            );
        }
        
        // ============================================
        // APP PRINCIPALE
        // ============================================
        function App() {
            const [activeTab, setActiveTab] = useState(() => {
                try {
                    return sessionStorage.getItem('wf_last_tab') || 'scores';
                } catch {
                    return 'scores';
                }
            });
            
            const [favorites, setFavorites] = useState(() => {
                try {
                    const saved = localStorage.getItem('wf_favs');
                    return saved ? new Set(JSON.parse(saved)) : new Set();
                } catch {
                    return new Set();
                }
            });
            
            useEffect(() => {
                try {
                    sessionStorage.setItem('wf_last_tab', activeTab);
                } catch {}
            }, [activeTab]);
            
            useEffect(() => {
                try {
                    localStorage.setItem('wf_favs', JSON.stringify([...favorites]));
                } catch {}
            }, [favorites]);
            
            const toggleFavorite = useCallback((id) => {
                setFavorites(prev => {
                    const next = new Set(prev);
                    if (next.has(id)) {
                        next.delete(id);
                    } else {
                        next.add(id);
                    }
                    return next;
                });
            }, []);
            
            const tabs = [
                { id: 'scores', label: 'Scores', icon: '⚽' },
                { id: 'standings', label: 'Classement', icon: '🏆' },
                { id: 'scorers', label: 'Buteurs', icon: '⚡' }
            ];
            
            return React.createElement('div', {
                style: {
                    display: 'flex',
                    flexDirection: 'column',
                    height: '100%',
                    background: '#eef0f5'
                }
            },
                // Header
                React.createElement('div', {
                    style: {
                        background: 'linear-gradient(135deg,#00b86b,#009657)',
                        padding: '16px 16px 0',
                        flexShrink: 0,
                        boxShadow: '0 4px 20px rgba(0,184,107,0.2)'
                    }
                },
                    React.createElement('div', {
                        style: {
                            display: 'flex',
                            alignItems: 'center',
                            justifyContent: 'space-between',
                            marginBottom: '16px'
                        }
                    },
                        React.createElement('div', {
                            style: {
                                display: 'flex',
                                alignItems: 'center',
                                gap: '8px'
                            }
                        },
                            React.createElement('div', {
                                style: {
                                    width: '36px',
                                    height: '36px',
                                    background: 'rgba(255,255,255,0.2)',
                                    borderRadius: '10px',
                                    display: 'flex',
                                    alignItems: 'center',
                                    justifyContent: 'center',
                                    fontSize: '18px',
                                    color: '#fff'
                                }
                            }, '⚡'),
                            
                            React.createElement('span', {
                                style: {
                                    fontFamily: 'Barlow Condensed, sans-serif',
                                    fontSize: '22px',
                                    fontWeight: 900,
                                    color: '#fff',
                                    letterSpacing: '-0.5px'
                                }
                            }, 'WorldFoot Pro')
                        ),
                        
                        React.createElement('span', {
                            style: {
                                background: 'rgba(255,255,255,0.15)',
                                borderRadius: '20px',
                                padding: '4px 12px',
                                fontSize: '10px',
                                fontWeight: 700,
                                color: '#fff',
                                letterSpacing: '1px'
                            }
                        }, 'LIVE')
                    ),
                    
                    // Tabs
                    React.createElement('div', {
                        style: {
                            display: 'flex',
                            gap: '4px',
                            marginTop: '8px'
                        }
                    },
                        tabs.map(tab =>
                            React.createElement('button', {
                                key: tab.id,
                                onClick: () => setActiveTab(tab.id),
                                style: {
                                    flex: 1,
                                    padding: '10px 4px',
                                    background: 'none',
                                    border: 'none',
                                    color: activeTab === tab.id ? '#fff' : 'rgba(255,255,255,0.5)',
                                    fontSize: '11px',
                                    fontWeight: activeTab === tab.id ? 800 : 600,
                                    cursor: 'pointer',
                                    borderBottom: activeTab === tab.id ? '2px solid #fff' : '2px solid transparent',
                                    transition: 'all 0.2s',
                                    display: 'flex',
                                    flexDirection: 'column',
                                    alignItems: 'center',
                                    gap: '4px'
                                }
                            },
                                React.createElement('span', { style: { fontSize: '16px' } }, tab.icon),
                                React.createElement('span', null, tab.label)
                            )
                        )
                    )
                ),
                
                // Contenu
                React.createElement('div', {
                    style: {
                        flex: 1,
                        overflow: 'hidden'
                    }
                },
                    activeTab === 'scores' && React.createElement(ScoresTab, {
                        favs: favorites,
                        onFav: toggleFavorite
                    }),
                    
                    activeTab === 'standings' && React.createElement(StandingsTab, null),
                    
                    activeTab === 'scorers' && React.createElement(ScorersTab, null)
                )
            );
        }
        
        // ============================================
        // POINT D'ENTRÉE
        // ============================================
        ReactDOM.createRoot(document.getElementById('root')).render(
            React.createElement(App, null)
        );
    </script>
</body>
</html>
