<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
    <meta name="theme-color" content="#00b86b" />
    <title>WorldFoot Pro</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #root {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, #00b86b, #009657);
            padding: 50px 20px 20px;
            color: white;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        
        .header p {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 4px;
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            overflow-x: auto;
            background: white;
            border-bottom: 1px solid #f0f0f0;
            scrollbar-width: none;
        }
        
        .tabs button {
            padding: 14px 16px;
            font-size: 14px;
            font-weight: 600;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            color: #888;
            cursor: pointer;
            white-space: nowrap;
        }
        
        .tabs button.active {
            color: #00b86b;
            border-bottom-color: #00b86b;
        }
        
        /* Content */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: #fafafa;
        }
        
        /* Match Card */
        .match-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #f0f0f0;
        }
        
        .league-info {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .league-flag {
            width: 24px;
            height: 24px;
            background: #f0f0f0;
            border-radius: 50%;
        }
        
        .league-name {
            font-size: 13px;
            font-weight: 600;
            color: #333;
        }
        
        .match-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
        }
        
        .match-time {
            width: 45px;
            font-size: 13px;
            font-weight: 600;
            color: #00b86b;
        }
        
        .match-teams {
            flex: 1;
        }
        
        .team {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 4px 0;
        }
        
        .team-logo {
            width: 20px;
            height: 20px;
            background: #f0f0f0;
            border-radius: 50%;
        }
        
        .team-name {
            flex: 1;
            font-size: 14px;
            color: #333;
        }
        
        .team-score {
            font-size: 15px;
            font-weight: 700;
            color: #333;
        }
        
        .live-badge {
            background: #ff3b30;
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 20px;
            margin-left: 8px;
        }
        
        /* Match Detail */
        .match-detail {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: white;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        
        .detail-header {
            background: linear-gradient(145deg, #00b86b, #009657);
            padding: 50px 20px 20px;
            color: white;
        }
        
        .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 20px;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            margin-bottom: 20px;
            cursor: pointer;
        }
        
        .score-board {
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-align: center;
        }
        
        .team-large {
            flex: 1;
        }
        
        .team-large .logo {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            margin: 0 auto 8px;
        }
        
        .team-large .name {
            font-size: 16px;
            font-weight: 600;
        }
        
        .score-large {
            font-size: 48px;
            font-weight: 900;
            font-family: monospace;
            padding: 0 20px;
        }
        
        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(255,255,255,0.2);
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 12px;
        }
        
        .detail-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        
        .events-title {
            font-size: 14px;
            font-weight: 700;
            color: #666;
            margin-bottom: 12px;
        }
        
        .event-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .event-minute {
            font-weight: 700;
            color: #00b86b;
            min-width: 40px;
        }
        
        .event-icon {
            font-size: 18px;
            width: 30px;
        }
        
        .event-desc {
            flex: 1;
        }
        
        .event-player {
            font-weight: 600;
            color: #333;
        }
        
        .event-detail {
            font-size: 12px;
            color: #999;
            margin-top: 2px;
        }
        
        .event-score {
            font-weight: 700;
            color: #333;
        }
        
        .big-chance {
            background: rgba(255, 59, 48, 0.1);
            border-left: 3px solid #ff3b30;
            padding-left: 12px;
            animation: pulse-red 1.5s infinite;
        }
        
        @keyframes pulse-red {
            0% { background: rgba(255, 59, 48, 0.1); }
            50% { background: rgba(255, 59, 48, 0.3); }
            100% { background: rgba(255, 59, 48, 0.1); }
        }
        
        /* Stats */
        .stats-card {
            background: #f8f8f8;
            border-radius: 16px;
            padding: 16px;
            margin: 16px 0;
        }
        
        .stat-row {
            display: flex;
            align-items: center;
            padding: 8px 0;
        }
        
        .stat-value {
            font-weight: 700;
            min-width: 40px;
        }
        
        .stat-label {
            flex: 1;
            text-align: center;
            color: #666;
            font-size: 13px;
        }
        
        .stat-bar {
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
            display: flex;
            margin: 8px 0;
        }
        
        .bar-home {
            height: 100%;
            background: #00b86b;
        }
        
        .bar-away {
            height: 100%;
            background: #2563eb;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        (function() {
            const root = document.getElementById('root');
            
            // Données simulées pour éviter les appels API
            const MOCK_MATCHES = [
                {
                    id: 1,
                    league: { id: 1, name: "Ligue 1 Pro", country: "Algérie", logo: null },
                    fixture: { 
                        date: new Date().toISOString(), 
                        status: { short: "1H", elapsed: 23 },
                        venue: { name: "Stade du 5 Juillet" }
                    },
                    teams: {
                        home: { id: 918, name: "JS Kabylie", logo: null },
                        away: { id: 906, name: "MC Alger", logo: null }
                    },
                    goals: { home: 1, away: 0 }
                },
                {
                    id: 2,
                    league: { id: 1, name: "Ligue 1 Pro", country: "Algérie", logo: null },
                    fixture: { 
                        date: new Date().toISOString(), 
                        status: { short: "FT", elapsed: 90 }
                    },
                    teams: {
                        home: { id: 904, name: "CR Belouizdad", logo: null },
                        away: { id: 905, name: "ES Sétif", logo: null }
                    },
                    goals: { home: 2, away: 1 }
                },
                {
                    id: 3,
                    league: { id: 39, name: "Premier League", country: "Angleterre", logo: null },
                    fixture: { 
                        date: new Date().toISOString(), 
                        status: { short: "2H", elapsed: 67 }
                    },
                    teams: {
                        home: { id: 40, name: "Liverpool", logo: null },
                        away: { id: 42, name: "Arsenal", logo: null }
                    },
                    goals: { home: 2, away: 2 }
                }
            ];
            
            const MOCK_EVENTS = [
                { time: { elapsed: 12 }, type: "Goal", player: { name: "Boudebouz" }, detail: "Penalty", homeScore: 1, awayScore: 0 },
                { time: { elapsed: 23 }, type: "Card", player: { name: "Benlamri" }, detail: "Yellow Card" },
                { time: { elapsed: 31 }, type: "Big Chance", player: { name: "Belaïli" }, detail: "Big chance missed" },
                { time: { elapsed: 45 }, type: "subst", player: { name: "Slimani" }, assist: { name: "Mahrez" } },
                { time: { elapsed: 52 }, type: "Goal", player: { name: "Mahrez" }, detail: "Goal", homeScore: 1, awayScore: 1 },
                { time: { elapsed: 67 }, type: "Hit Woodwork", player: { name: "Benzia" }, detail: "Hit woodwork" },
                { time: { elapsed: 78 }, type: "Card", player: { name: "Zedadka" }, detail: "Red Card" },
                { time: { elapsed: 84 }, type: "Var", detail: "Goal cancelled - offside" }
            ];
            
            const MOCK_STATS = [
                { team: { id: 918 }, statistics: [
                    { type: "Ball Possession", value: "55%" },
                    { type: "Total Shots", value: 14 },
                    { type: "Shots on Goal", value: 5 },
                    { type: "Corner Kicks", value: 6 }
                ]},
                { team: { id: 906 }, statistics: [
                    { type: "Ball Possession", value: "45%" },
                    { type: "Total Shots", value: 9 },
                    { type: "Shots on Goal", value: 3 },
                    { type: "Corner Kicks", value: 4 }
                ]}
            ];
            
            // ============================================
            // COMPOSANTS SIMPLIFIÉS
            // ============================================
            
            // Écran principal
            function MainScreen() {
                const [activeTab, setActiveTab] = React.useState('scores');
                const [selectedMatch, setSelectedMatch] = React.useState(null);
                
                const tabs = [
                    { id: 'scores', label: 'SCORES' },
                    { id: 'standings', label: 'CLASSEMENT' },
                    { id: 'scorers', label: 'BUTEURS' },
                    { id: 'calendar', label: 'CALENDRIER' },
                    { id: 'transfers', label: 'TRANSFERTS' },
                    { id: 'actu', label: 'ACTUALITÉS' },
                    { id: 'results', label: 'RÉSULTATS' },
                    { id: 'jsk', label: 'JSK' }
                ];
                
                if (selectedMatch) {
                    return React.createElement(MatchDetail, {
                        matchId: selectedMatch,
                        onClose: () => setSelectedMatch(null)
                    });
                }
                
                return React.createElement('div', { style: { height: '100%', display: 'flex', flexDirection: 'column' } },
                    // Header
                    React.createElement('div', { className: 'header' },
                        React.createElement('h1', null, 'WORLDFOOT'),
                        React.createElement('p', null, 'PRO · LIVE · BY AMINE')
                    ),
                    
                    // Tabs
                    React.createElement('div', { className: 'tabs' },
                        tabs.map(tab => 
                            React.createElement('button', {
                                key: tab.id,
                                className: activeTab === tab.id ? 'active' : '',
                                onClick: () => setActiveTab(tab.id)
                            }, tab.label)
                        )
                    ),
                    
                    // Content
                    React.createElement('div', { className: 'content' },
                        activeTab === 'scores' && React.createElement(ScoresList, { 
                            matches: MOCK_MATCHES,
                            onSelectMatch: setSelectedMatch
                        }),
                        activeTab !== 'scores' && React.createElement('div', { style: { textAlign: 'center', padding: 40, color: '#999' } },
                            tabContent[activeTab] || 'Bientôt disponible'
                        )
                    )
                );
            }
            
            const tabContent = {
                standings: 'Classement - Bientôt disponible',
                scorers: 'Buteurs - Bientôt disponible',
                calendar: 'Calendrier - Bientôt disponible',
                transfers: 'Transferts - Bientôt disponible',
                actu: 'Actualités - Bientôt disponible',
                results: 'Résultats - Bientôt disponible',
                jsk: 'JS Kabylie - Bientôt disponible'
            };
            
            // Liste des scores
            function ScoresList({ matches, onSelectMatch }) {
                // Grouper par ligue
                const groups = {};
                matches.forEach(m => {
                    const leagueId = m.league.id;
                    if (!groups[leagueId]) {
                        groups[leagueId] = { ...m.league, matches: [] };
                    }
                    groups[leagueId].matches.push(m);
                });
                
                return React.createElement('div', null,
                    Object.values(groups).map(league => 
                        React.createElement('div', { key: league.id, className: 'match-card' },
                            React.createElement('div', { className: 'league-info' },
                                React.createElement('div', { className: 'league-flag' }),
                                React.createElement('span', { className: 'league-name' }, league.name)
                            ),
                            league.matches.map(match => {
                                const isLive = ['1H','2H','ET','BT','P'].includes(match.fixture.status.short);
                                const timeDisplay = isLive ? match.fixture.status.elapsed + "'" : 
                                                   match.fixture.status.short === 'FT' ? 'FT' : 
                                                   new Date(match.fixture.date).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                                
                                return React.createElement('div', {
                                    key: match.id,
                                    className: 'match-row',
                                    onClick: () => onSelectMatch(match.id),
                                    style: { cursor: 'pointer' }
                                },
                                    React.createElement('div', { className: 'match-time' }, timeDisplay),
                                    React.createElement('div', { className: 'match-teams' },
                                        React.createElement('div', { className: 'team' },
                                            React.createElement('div', { className: 'team-logo' }),
                                            React.createElement('span', { className: 'team-name' }, match.teams.home.name),
                                            React.createElement('span', { className: 'team-score' }, match.goals.home ?? '-')
                                        ),
                                        React.createElement('div', { className: 'team' },
                                            React.createElement('div', { className: 'team-logo' }),
                                            React.createElement('span', { className: 'team-name' }, match.teams.away.name),
                                            React.createElement('span', { className: 'team-score' }, match.goals.away ?? '-')
                                        )
                                    ),
                                    isLive && React.createElement('span', { className: 'live-badge' }, 'LIVE')
                                );
                            })
                        )
                    )
                );
            }
            
            // Détail du match
            function MatchDetail({ matchId, onClose }) {
                const match = MOCK_MATCHES.find(m => m.id === matchId) || MOCK_MATCHES[0];
                const isLive = ['1H','2H','ET','BT','P'].includes(match.fixture.status.short);
                
                return React.createElement('div', { className: 'match-detail' },
                    React.createElement('div', { className: 'detail-header' },
                        React.createElement('button', { className: 'back-btn', onClick: onClose }, '←'),
                        React.createElement('div', { className: 'score-board' },
                            React.createElement('div', { className: 'team-large' },
                                React.createElement('div', { className: 'logo' }),
                                React.createElement('div', { className: 'name' }, match.teams.home.name)
                            ),
                            React.createElement('div', { className: 'score-large' },
                                match.goals.home + ' - ' + match.goals.away
                            ),
                            React.createElement('div', { className: 'team-large' },
                                React.createElement('div', { className: 'logo' }),
                                React.createElement('div', { className: 'name' }, match.teams.away.name)
                            )
                        ),
                        React.createElement('div', { style: { textAlign: 'center' } },
                            React.createElement('span', { className: 'status-badge' },
                                isLive ? match.fixture.status.elapsed + "'" : 
                                match.fixture.status.short === 'FT' ? 'Terminé' : 
                                new Date(match.fixture.date).toLocaleString()
                            )
                        )
                    ),
                    
                    React.createElement('div', { className: 'detail-content' },
                        // Événements
                        React.createElement('div', { className: 'events-title' }, 'ÉVÉNEMENTS'),
                        MOCK_EVENTS.map((event, i) => {
                            const isBigChance = event.type === 'Big Chance' || 
                                                event.type === 'Hit Woodwork' ||
                                                event.detail?.includes('Big chance');
                            
                            let icon = '⚽';
                            if (event.type === 'Card') icon = event.detail?.includes('Yellow') ? '🟨' : '🟥';
                            else if (event.type === 'subst') icon = '🔄';
                            else if (event.type === 'Var') icon = '📺';
                            else if (isBigChance) icon = '⚡';
                            
                            return React.createElement('div', {
                                key: i,
                                className: `event-item ${isBigChance ? 'big-chance' : ''}`
                            },
                                React.createElement('div', { className: 'event-minute' }, event.time.elapsed + "'"),
                                React.createElement('div', { className: 'event-icon' }, icon),
                                React.createElement('div', { className: 'event-desc' },
                                    React.createElement('div', { className: 'event-player' },
                                        isBigChance ? 'GROSSE OCCASION!' : (event.player?.name || 'Joueur')
                                    ),
                                    event.assist && React.createElement('div', { className: 'event-detail' },
                                        'passe: ' + event.assist.name
                                    ),
                                    event.detail && !isBigChance && React.createElement('div', { className: 'event-detail' },
                                        event.detail
                                    )
                                ),
                                event.homeScore !== undefined && React.createElement('div', { className: 'event-score' },
                                    event.homeScore + ' - ' + event.awayScore
                                )
                            );
                        }),
                        
                        // Stats
                        React.createElement('div', { className: 'stats-card' },
                            MOCK_STATS.map((stat, i) => {
                                if (i === 0) {
                                    const homeStats = stat.statistics;
                                    const awayStats = MOCK_STATS[1].statistics;
                                    
                                    const getVal = (arr, type) => {
                                        const s = arr.find(s => s.type === type);
                                        return s?.value || 0;
                                    };
                                    
                                    const possessionH = parseInt(String(getVal(homeStats, 'Ball Possession')).replace('%', '')) || 0;
                                    const possessionA = parseInt(String(getVal(awayStats, 'Ball Possession')).replace('%', '')) || 0;
                                    
                                    return React.createElement('div', { key: i },
                                        React.createElement('div', { className: 'stat-row' },
                                            React.createElement('span', { className: 'stat-value' }, possessionH + '%'),
                                            React.createElement('span', { className: 'stat-label' }, 'POSSESSION'),
                                            React.createElement('span', { className: 'stat-value' }, possessionA + '%')
                                        ),
                                        React.createElement('div', { className: 'stat-bar' },
                                            React.createElement('div', { className: 'bar-home', style: { width: possessionH + '%' } }),
                                            React.createElement('div', { className: 'bar-away', style: { width: possessionA + '%' } })
                                        )
                                    );
                                }
                                return null;
                            })
                        )
                    )
                );
            }
            
            // Lancement de l'application
            ReactDOM.createRoot(root).render(React.createElement(MainScreen, null));
        })();
    </script>
    
    <!-- React et React DOM -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
</body>
</html>
